function drawRow(rowKey, y, cards, cap, label, isEnemy) {
  const CW = isEnemy ? CONFIG.ENEMY_CARD_W : CONFIG.CARD_W;
  const CH = isEnemy ? CONFIG.ENEMY_CARD_H : CONFIG.CARD_H;
  const gap = isEnemy ? 4 : 6;
  const w = cap * CW + (cap - 1) * gap;
  const startX = CONFIG.W/2 - w/2;
  const glow = (isEnemy ? game.glowRows.enemy : game.glowRows.player)[rowKey];

  // 金光暈（贏的道）
  if (glow) {
    const alpha = glow / 60;
    ctx.shadowColor = `rgba(255, 215, 0, ${alpha})`;
    ctx.shadowBlur = 20;
    ctx.fillStyle = `rgba(255, 215, 0, ${alpha * 0.25})`;
    ctx.fillRect(startX - 8, y - 4, w + 16, CH + 8);
    ctx.shadowBlur = 0;
  }

  // 槽位
  for (let i = 0; i < cap; i++) {
    const cx = startX + i * (CW + gap);
    const slotGrad = ctx.createLinearGradient(cx, y, cx, y + CH);
    if (isEnemy) {
      slotGrad.addColorStop(0, '#1e0606');
      slotGrad.addColorStop(1, '#120303');
    } else {
      slotGrad.addColorStop(0, '#0a1828');
      slotGrad.addColorStop(1, '#040810');
    }
    ctx.fillStyle = slotGrad;
    roundRect(cx, y, CW, CH, 3, true, false);
    ctx.strokeStyle = isEnemy ? 'rgba(150, 80, 0, 0.4)' : 'rgba(170, 119, 0, 0.5)';
    ctx.lineWidth = 1;
    roundRect(cx, y, CW, CH, 3, false, true);
  }

  // 卡片（敵方用縮小版）
  cards.forEach((c, i) => {
    const cx = startX + i * (CW + gap);
    if (isEnemy) {
      drawCardScaled(cx, y, c, CONFIG.ENEMY_CARD_W / CONFIG.CARD_W);
    } else {
      drawCard(cx, y, c, true);
    }
  });

  // 道別標籤
  ctx.fillStyle = isEnemy ? '#bb5533' : '#6699cc';
  ctx.font = isEnemy
    ? 'bold 12px "Ma Shan Zheng","Noto Serif TC",serif'
    : 'bold 16px "Ma Shan Zheng","Noto Serif TC",serif';
  ctx.textAlign = 'right';
  ctx.shadowColor = isEnemy ? 'rgba(180,50,0,0.5)' : 'rgba(60,100,180,0.6)';
  ctx.shadowBlur = 5;
  ctx.fillText(label, startX - 8, y + CH/2 + 5);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';

  // 牌型 + Royalty（敵方字小一點）
  if (cards.length > 0) {
    const allRows = isEnemy ? game.enemyRows : game.rows;
    const allFull = allRows.front.length === game.cardCaps.front &&
                    allRows.middle.length === game.cardCaps.middle &&
                    allRows.back.length === game.cardCaps.back;

    let ev;
    if (allFull) {
      const arr = getBestArrangement(allRows);
      ev = arr[rowKey];
    } else {
      ev = evaluateHand(cards);
    }

    const fullColor = cards.length === cap;
    const tagX = startX + w + 8;
    const tagW = isEnemy ? 72 : 88;
    const tagH = isEnemy ? CH - 4 : CH - 10;

    if (fullColor) {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(tagX, y + 2, tagW, tagH);
      ctx.strokeStyle = isEnemy ? 'rgba(255,215,0,0.5)' : '#ffd700';
      ctx.lineWidth = 1;
      ctx.strokeRect(tagX, y + 2, tagW, tagH);

      ctx.fillStyle = '#ffe680';
      ctx.font = isEnemy
        ? 'bold 11px "Noto Serif TC",serif'
        : 'bold 14px "Noto Serif TC",serif';
      ctx.textAlign = 'center';
      ctx.fillText(handTypeName(ev.type), tagX + tagW/2, y + tagH/2 + (isEnemy ? 8 : 10));

      const royalty = getRoyalty(rowKey, ev);
      if (royalty > 0 && !isEnemy) {
        ctx.fillStyle = '#ffaa00';
        ctx.font = 'bold 11px "Noto Serif TC",serif';
        ctx.fillText(`+${royalty}`, tagX + tagW/2, y + tagH/2 + 26);
      }
    } else if (cards.length > 0) {
      ctx.fillStyle = isEnemy ? '#666' : '#999';
      ctx.font = isEnemy ? '10px "Noto Serif TC",serif' : '12px "Noto Serif TC",serif';
      ctx.fillText(handTypeName(ev.type), tagX, y + CH/2 + 4);
    }
  }

  if (!isEnemy) {
    game._rowZones = game._rowZones || {};
    game._rowZones[rowKey] = { x: startX, y, w, h: CH };
  }
}

function drawCard(x, y, card, showFace) {
  if (!showFace) {
    // 卡背：精緻紋理 — 朱紅底 + 金線交錯 + 「魏」字
    const bgGrad = ctx.createLinearGradient(x, y, x + CONFIG.CARD_W, y + CONFIG.CARD_H);
    bgGrad.addColorStop(0, '#5a1010');
    bgGrad.addColorStop(0.5, '#3a0808');
    bgGrad.addColorStop(1, '#1a0303');
    ctx.fillStyle = bgGrad;
    roundRect(x, y, CONFIG.CARD_W, CONFIG.CARD_H, 4, true, false);
    // 金邊
    ctx.strokeStyle = '#aa7700';
    ctx.lineWidth = 1.5;
    roundRect(x + 3, y + 3, CONFIG.CARD_W - 6, CONFIG.CARD_H - 6, 3, false, true);
    // 「魏」字（曹軍）
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 28px "Ma Shan Zheng", "Noto Serif TC",serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 4;
    ctx.fillText('魏', x + CONFIG.CARD_W/2, y + CONFIG.CARD_H/2 + 10);
    ctx.shadowBlur = 0;
    return;
  }

  // 鬼牌：金底紫字 + 星星，有光暈
  if (card.isJoker) {
    // 光暈
    const glowAlpha = 0.5 + Math.sin(Date.now() / 300) * 0.15;
    ctx.shadowColor = `rgba(255, 200, 0, ${glowAlpha})`;
    ctx.shadowBlur = 12;

    const grad = ctx.createLinearGradient(x, y, x + CONFIG.CARD_W, y + CONFIG.CARD_H);
    grad.addColorStop(0, '#fff5d0');
    grad.addColorStop(0.5, '#ffce40');
    grad.addColorStop(1, '#d97700');
    ctx.fillStyle = grad;
    roundRect(x, y, CONFIG.CARD_W, CONFIG.CARD_H, 4, true, false);
    ctx.shadowBlur = 0;

    // 紫紅邊框
    ctx.strokeStyle = '#8b0a50';
    ctx.lineWidth = 2;
    roundRect(x, y, CONFIG.CARD_W, CONFIG.CARD_H, 4, false, true);

    // 內框
    ctx.strokeStyle = '#aa1a70';
    ctx.lineWidth = 0.5;
    roundRect(x + 3, y + 3, CONFIG.CARD_W - 6, CONFIG.CARD_H - 6, 3, false, true);

    // 「鬼」字
    ctx.fillStyle = '#6a0530';
    ctx.font = 'bold 12px "Ma Shan Zheng", "Noto Serif TC",serif';
    ctx.textAlign = 'left';
    ctx.fillText('鬼', x + 4, y + 15);
    ctx.textAlign = 'right';
    ctx.fillText('鬼', x + CONFIG.CARD_W - 4, y + CONFIG.CARD_H - 5);

    // 大星星
    ctx.fillStyle = '#8b0a50';
    ctx.font = 'bold 30px \"Noto Serif TC\",serif';
    ctx.textAlign = 'center';
    ctx.fillText('★', x + CONFIG.CARD_W/2, y + CONFIG.CARD_H/2 + 12);
    return;
  }

  // 一般牌：象牙色底 + 角花 + 漸層
  const cardGrad = ctx.createLinearGradient(x, y, x, y + CONFIG.CARD_H);
  cardGrad.addColorStop(0, '#fdfaf0');
  cardGrad.addColorStop(1, '#f0e8d0');
  ctx.fillStyle = cardGrad;
  roundRect(x, y, CONFIG.CARD_W, CONFIG.CARD_H, 4, true, false);

  ctx.strokeStyle = '#3a2010';
  ctx.lineWidth = 1;
  roundRect(x, y, CONFIG.CARD_W, CONFIG.CARD_H, 4, false, true);

  // 內框細線
  ctx.strokeStyle = 'rgba(58, 32, 16, 0.2)';
  ctx.lineWidth = 0.5;
  roundRect(x + 2.5, y + 2.5, CONFIG.CARD_W - 5, CONFIG.CARD_H - 5, 3, false, true);

  const isRed = card.suit === '♥' || card.suit === '♦';
  const mainColor = isRed ? '#c41e1e' : '#1a1a1a';

  // 左上角：點數 + 花色
  ctx.fillStyle = mainColor;
  ctx.font = 'bold 16px "Noto Serif TC",serif';
  ctx.textAlign = 'left';
  ctx.fillText(rankStr(card.rank), x + 4, y + 17);
  ctx.font = 'bold 12px \"Noto Serif TC\",serif';
  ctx.fillText(card.suit, x + 4, y + 30);

  // 右下角：旋轉 180 度的小點數
  ctx.save();
  ctx.translate(x + CONFIG.CARD_W - 4, y + CONFIG.CARD_H - 5);
  ctx.rotate(Math.PI);
  ctx.font = 'bold 16px "Noto Serif TC",serif';
  ctx.fillText(rankStr(card.rank), 0, 12);
  ctx.font = 'bold 12px \"Noto Serif TC\",serif';
  ctx.fillText(card.suit, 0, 24);
  ctx.restore();

  // 中央大花色
  ctx.fillStyle = mainColor;
  ctx.font = 'bold 28px \"Noto Serif TC\",serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = isRed ? 'rgba(196, 30, 30, 0.3)' : 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 4;
  ctx.fillText(card.suit, x + CONFIG.CARD_W/2, y + CONFIG.CARD_H/2 + 10);
  ctx.shadowBlur = 0;

  // 點數越大，加金色光暈（A/K/Q/J）
  if (card.rank >= 11) {
    ctx.fillStyle = 'rgba(255, 200, 0, 0.15)';
    ctx.fillRect(x + 1, y + 1, CONFIG.CARD_W - 2, 4);
    ctx.fillRect(x + 1, y + CONFIG.CARD_H - 5, CONFIG.CARD_W - 2, 4);
  }
}

// 圓角矩形輔助函式
function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function drawHand() {
  const cW = _portrait ? Math.floor(CONFIG.CARD_W * 0.88) : CONFIG.CARD_W;
  const cH = _portrait ? Math.floor(CONFIG.CARD_H * 0.88) : CONFIG.CARD_H;
  const gap = _portrait ? 5 : 6;
  const total = game.hand.length;
  if (total === 0 && !game.drag) return;

  const totalW = total * (cW + gap) - gap;
  const handY = CONFIG.H - cH - 8;
  const startX = Math.max(8, (CONFIG.W - totalW) / 2);

  const bgX = startX - 14;
  const bgW = Math.min(CONFIG.W - bgX - 8, totalW + 28);
  const bgH = cH + (_portrait ? 28 : 32);
  const bgY = handY - (_portrait ? 20 : 22);

  const bgGrad = ctx.createLinearGradient(0, bgY, 0, bgY + bgH);
  bgGrad.addColorStop(0, 'rgba(60,30,15,0.92)');
  bgGrad.addColorStop(1, 'rgba(30,12,6,0.92)');
  ctx.fillStyle = bgGrad;
  roundRect(bgX, bgY, bgW, bgH, 6, true, false);
  ctx.strokeStyle = 'rgba(255,215,0,0.5)';
  ctx.lineWidth = 1.5;
  roundRect(bgX, bgY, bgW, bgH, 6, false, true);

  ctx.fillStyle = '#ffe680';
  ctx.font = 'bold 12px "Ma Shan Zheng","Noto Serif TC",serif';
  ctx.textAlign = 'center';
  ctx.fillText('◆ 手中 ' + total + ' 張 ◆', bgX + bgW/2, handY - 6);

  game._handZone = { x: bgX, y: bgY, w: bgW, h: bgH };

  game.hand.forEach(function(c, i) {
    const x = startX + i * (cW + gap);
    let y = handY;
    const isSelected = game.selectedCard === c;

    if (isSelected) {
      y -= _portrait ? 18 : 22;
      ctx.shadowColor = 'rgba(255,215,0,0.9)';
      ctx.shadowBlur = 18;
      ctx.fillStyle = 'rgba(255,215,0,0.25)';
      roundRect(x - 4, y - 4, cW + 8, cH + 8, 6, true, false);
      ctx.shadowBlur = 0;
    }

    if (game.drag && game.drag.card === c) return;

    if (_portrait && cW !== CONFIG.CARD_W) {
      drawCardScaled(x, y, c, cW / CONFIG.CARD_W);
    } else {
      drawCard(x, y, c, true);
    }
    c._x = x; c._y = y; c._cW = cW; c._cH = cH;
  });
}


function handTypeName(t) {
  return {
    HIGH:'高牌', PAIR:'對子', TWO_PAIR:'兩對', THREE_KIND:'三條',
    STRAIGHT:'順子', FLUSH:'同花', FULL_HOUSE:'葫蘆', FOUR_KIND:'四條',
    STRAIGHT_FLUSH:'同花順', ROYAL_FLUSH:'皇家同花順'
  }[t] || t;
}

function drawHpBar(x, y, w, h, hp, max, color) {
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, w, h);
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, color);
  grad.addColorStop(1, shadeColor(color, -30));
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w * (hp / max), h);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px \"Noto Serif TC\",serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${hp} / ${max}`, x + w/2, y + h - 4);
}
function shadeColor(hex, amt) {
  const c = hex.replace('#','');
  const r = Math.max(0, Math.min(255, parseInt(c.substr(0,2),16)+amt));
  const g = Math.max(0, Math.min(255, parseInt(c.substr(2,2),16)+amt));
  const b = Math.max(0, Math.min(255, parseInt(c.substr(4,2),16)+amt));
  return `rgb(${r},${g},${b})`;
}

                     mousePos.y >= y && mousePos.y <= y + h;

    // 光暈
    if (hovering) {
      ctx.shadowColor = rs.glow; ctx.shadowBlur = 35;
    }

    // 背景
    const bgGrad = ctx.createLinearGradient(x, y, x, y + h);
    bgGrad.addColorStop(0, hovering ? lightenColor(rs.bg0, 15) : rs.bg0);
    bgGrad.addColorStop(1, rs.bg1);
    ctx.fillStyle = bgGrad;
    roundRect(x, y, w, h, 8, true, false);
    ctx.shadowBlur = 0;

    // 外框
    ctx.strokeStyle = hovering ? rs.border2 : rs.border;
    ctx.lineWidth = hovering ? 4 : 2.5;
    roundRect(x, y, w, h, 8, false, true);
    // 內框
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    roundRect(x + 5, y + 5, w - 10, h - 10, 6, false, true);

    // 稀有度標籤（頂部色條）
    const labelGrad = ctx.createLinearGradient(x, y, x + w, y);
    labelGrad.addColorStop(0, rs.border + '88');
    labelGrad.addColorStop(1, rs.border + '22');
    ctx.fillStyle = labelGrad;
    roundRect(x, y, w, 28, 8, true, false);
    ctx.fillStyle = rs.textColor;
    ctx.font = 'bold 12px "Noto Serif TC",serif';
    ctx.textAlign = 'center';
    ctx.fillText(rs.label, x + w/2, y + 18);

    // 遺物名稱
    ctx.fillStyle = rs.textColor;
    ctx.font = `bold 34px "Ma Shan Zheng","Noto Serif TC",serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = rs.glow; ctx.shadowBlur = 10;
    ctx.fillText(r.name, x + w/2, y + 85);
    ctx.shadowBlur = 0;

    // 分隔線
    ctx.strokeStyle = rs.border + '66';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + 25, y + 105); ctx.lineTo(x + w - 25, y + 105);
    ctx.stroke();

    // 效果說明
    ctx.fillStyle = '#ddd';
    ctx.font = '14px "Noto Serif TC",serif';
    wrapText(r.desc, x + w/2, y + 138, w - 36, 22, 'center');

    // 已持有提示
    if (game.relics.find(rr => rr.id === r.id)) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = '#ff8888';
      ctx.font = 'bold 18px "Noto Serif TC",serif';
      ctx.fillText('已持有', x + w/2, y + h/2);
    }

    // 收下按鈕
    const btnY = y + h - 58;
    const btnHover = hovering;
    const btnGrad = ctx.createLinearGradient(x + 30, btnY, x + 30, btnY + 42);
    btnGrad.addColorStop(0, btnHover ? lightenColor(rs.bg0, 30) : lightenColor(rs.bg0, 10));
    btnGrad.addColorStop(1, rs.bg0);
    ctx.fillStyle = btnGrad;
    roundRect(x + 30, btnY, w - 60, 42, 5, true, false);
    ctx.strokeStyle = rs.border;
    ctx.lineWidth = btnHover ? 3 : 2;
    roundRect(x + 30, btnY, w - 60, 42, 5, false, true);
    ctx.fillStyle = rs.textColor;
    ctx.font = `bold 20px "Ma Shan Zheng","Noto Serif TC",serif`;
    ctx.fillText('✦ 收  下 ✦', x + w/2, btnY + 28);

    r._btn = { x: x + 30, y: btnY, w: w - 60, h: 42 };
  });

  // 底部：目前已有遺物
  if (game.relics.length > 0) {
    ctx.fillStyle = '#886644';
    ctx.font = 'bold 13px "Noto Serif TC",serif';
    ctx.textAlign = 'center';
    ctx.fillText('── 目前持有 ──', CONFIG.W/2, 598);
    ctx.fillStyle = '#aa8855';
    ctx.font = '13px "Noto Serif TC",serif';
    const relicStr = game.relics.map(rr => {
      const rs2 = rarityStyle[rr.rarity] || rarityStyle.yellow;
      return rr.name;
    }).join('  ·  ');
    ctx.fillText(relicStr, CONFIG.W/2, 618);
  }
}

function wrapText(text, x, y, maxW, lh, align) {
  ctx.textAlign = align || 'center';
  const chars = text.split('');
  let line = '';
  let yy = y;
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxW && line.length > 0) {
      ctx.fillText(line, x, yy);
      line = ch;
      yy += lh;
    } else line = test;
  }
  if (line) ctx.fillText(line, x, yy);
}

// ============================================================
// 【輸入】
// ============================================================
canvas.addEventListener('mousemove', (e) => {
  const p = screenToCanvas(e.clientX, e.clientY);
  mousePos.x = p.x; mousePos.y = p.y;
  if (game.drag) moveDrag(e.clientX, e.clientY);
});

canvas.addEventListener('mousedown', (e) => {
  if (game.phase !== 'placing') return;
  const p = screenToCanvas(e.clientX, e.clientY);
  // 找點到的牌
  for (const c of game.hand) {
    const cW = c._cW || CONFIG.CARD_W;
    const cH = c._cH || CONFIG.CARD_H;
    if (c._x !== undefined && p.x >= c._x && p.x <= c._x + cW &&
        p.y >= c._y && p.y <= c._y + cH) {
      startDrag(c, e.clientX, e.clientY, true, null);
      return;
    }
  }
  // 三道裡的牌（本回合才放的）
  for (const row of ['front','middle','back']) {
    for (const c of [...game.rows[row]]) {
      if (c._placedRound === game.round) {
        const rz = game._rowZones && game._rowZones[row];
        if (rz) {
          const cIdx = game.rows[row].indexOf(c);
          const cs = getCardSize(false);
          const cx = getRowSlotX(row, cIdx, false);
          const cy = getRowY(row, false);
          if (p.x >= cx && p.x <= cx + cs.w && p.y >= cy && p.y <= cy + cs.h) {
            startDrag(c, e.clientX, e.clientY, false, row);
            return;
          }
        }
      }
    }
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (game.drag) endDrag(e.clientX, e.clientY);
});

canvas.addEventListener('click', (e) => {
  handleTap(e.clientX, e.clientY);
});

// Touch 支援（手機）— 支援拖曳
let _touchHoldTimer = null;
let _touchStartPos = null;
let _touchStartCard = null;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const p = screenToCanvas(t.clientX, t.clientY);
  mousePos.x = p.x; mousePos.y = p.y;
  _touchStartPos = { x: t.clientX, y: t.clientY };
  _touchStartCard = null;

  // 找是否點到手牌
  if (game.phase === 'placing') {
    for (const c of game.hand) {
      const cW = c._cW || CONFIG.CARD_W;
      const cH = c._cH || CONFIG.CARD_H;
      if (c._x !== undefined && p.x >= c._x && p.x <= c._x + cW &&
          p.y >= c._y && p.y <= c._y + cH) {
        _touchStartCard = c;
        break;
      }
    }
    // 也找三道裡的牌（允許從三道拖回）
    if (!_touchStartCard) {
      for (const row of ['front','middle','back']) {
        for (const c of game.rows[row]) {
          const rz = game._rowZones && game._rowZones[row];
          if (rz && p.x >= rz.x && p.x <= rz.x + rz.w &&
                    p.y >= rz.y && p.y <= rz.y + rz.h) {
            _touchStartCard = { card: c, fromRow: row };
            break;
          }
        }
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const p = screenToCanvas(t.clientX, t.clientY);
  mousePos.x = p.x; mousePos.y = p.y;

  // 拖曳中：更新位置
  if (game.drag) {
    moveDrag(t.clientX, t.clientY);
    return;
  }

  // 移動超過 8px 且有起始牌 → 開始拖曳
  if (_touchStartPos && _touchStartCard) {
    const dx = t.clientX - _touchStartPos.x;
    const dy = t.clientY - _touchStartPos.y;
    if (Math.sqrt(dx*dx + dy*dy) > 8) {
      if (_touchStartCard.fromRow) {
        // 從三道拖出
        const c = _touchStartCard.card;
        if (c._placedRound === game.round) {
          startDrag(c, t.clientX, t.clientY, false, _touchStartCard.fromRow);
        }
      } else {
        startDrag(_touchStartCard, t.clientX, t.clientY, true, null);
      }
      _touchStartCard = null;
      _touchStartPos = null;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];

  if (game.drag) {
    endDrag(t.clientX, t.clientY);
  } else {
    handleTap(t.clientX, t.clientY);
  }
  _touchStartCard = null;
  _touchStartPos = null;
}, { passive: false });

function handleTap(clientX, clientY) {
  const p = screenToCanvas(clientX, clientY);
  const mx = p.x, my = p.y;

  // 確認送出按鈕優先
  if (game.confirmPending) {
    const cb = game._confirmBtn;
    if (cb && mx >= cb.x && mx <= cb.x+cb.w && my >= cb.y && my <= cb.y+cb.h) {
      doConfirm(); return;
    }
    const rb = game._confirmResetBtn;
    if (rb && mx >= rb.x && mx <= rb.x+rb.w && my >= rb.y && my <= rb.y+rb.h) {
      cancelConfirm(); return;
    }
    return; // 確認等待中，不處理其他點擊
  }

  if (game.phase === 'menu') {
    const b = game._menuBtn;
    if (b && mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) startGame();
    return;
  }
  if (game.phase === 'gameover' || game.phase === 'victory') {
    const b = game._endBtn;
    if (b && mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) {
      initGame(); startGame();
    }
    return;
  }
  if (game.phase === 'reward') {
    game.rewardChoices.forEach((r, i) => {
      const b = r._btn;
      if (b && mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) {
        chooseReward(i);
        playSound('place');
      }
    });
    return;
  }

  // 結算中點擊關閉回顧
  if (game.logViewIdx >= 0) {
    const cb = game._closeBtnBox;
    if (cb && mx >= cb.x && mx <= cb.x + cb.w && my >= cb.y && my <= cb.y + cb.h) {
      game.logViewIdx = -1; return;
    }
    return;
  }

  // 牌局紀錄按鈕
  const lb = game._logBtn;
  if (lb && mx >= lb.x && mx <= lb.x + lb.w && my >= lb.y && my <= lb.y + lb.h) {
    game.showLog = !game.showLog;
    if (!game.showLog) game.logViewIdx = -1;
    playSound('deal');
    return;
  }

  // 牌局紀錄面板列表點擊
  if (game.showLog) {
    for (const log of game.matchLog) {
      if (log._logBox) {
        const b = log._logBox;
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
          game.logViewIdx = game.logViewIdx === b.idx ? -1 : b.idx;
          playSound('place');
          return;
        }
      }
    }
  }

  if (game.phase === 'placing') {
    if (game._buttons) {
      const sb = game._buttons.skill;
      if (sb && mx >= sb.x && mx <= sb.x+sb.w && my >= sb.y && my <= sb.y+sb.h) {
        useSkill(); return;
      }
      const rb = game._buttons.reset;
      if (rb && mx >= rb.x && mx <= rb.x+rb.w && my >= rb.y && my <= rb.y+rb.h) {
        resetThisRoundOnly(); return;
      }
      // Fantasyland 專屬按鈕
      const flr = game._buttons.fl_reset;
      if (flr && mx >= flr.x && mx <= flr.x+flr.w && my >= flr.y && my <= flr.y+flr.h) {
        resetFantasyland(); return;
      }
      const ss = game._buttons.sort_suit;
      if (ss && mx >= ss.x && mx <= ss.x+ss.w && my >= ss.y && my <= ss.y+ss.h) {
        sortHand(game.hand); game.selectedCard = null;
        flashMessage('已按花色 + 點數排序'); playSound('deal'); return;
      }
      const sr = game._buttons.sort_rank;
      if (sr && mx >= sr.x && mx <= sr.x+sr.w && my >= sr.y && my <= sr.y+sr.h) {
        sortHandByRank(game.hand); game.selectedCard = null;
        flashMessage('已按點數大小排序'); playSound('deal'); return;
      }
    }
    for (const c of game.hand) {
      if (c._x !== undefined && mx >= c._x && mx <= c._x+CONFIG.CARD_W &&
          my >= c._y && my <= c._y+CONFIG.CARD_H) {
        game.selectedCard = (game.selectedCard === c) ? null : c;
        playSound('deal');
        return;
      }
    }
    if (game.selectedCard && game._rowZones) {
      for (const k of ['front','middle','back']) {
        const z = game._rowZones[k];
        if (z && mx >= z.x && mx <= z.x+z.w && my >= z.y && my <= z.y+z.h) {
          placeCard(k); return;
        }
      }
    }
  }
}  // end handleTap

document.addEventListener('keydown', (e) => {
  if (game.phase === 'placing') {
    if (e.key === '1' && game.selectedCard) placeCard('front');
    else if (e.key === '2' && game.selectedCard) placeCard('middle');
    else if (e.key === '3' && game.selectedCard) placeCard('back');
    else if (e.key === 'q' || e.key === 'Q') useSkill();
    else if (e.key === 'r' || e.key === 'R') resetThisRoundOnly();
  }
});

function loop() {
  updateEffects();
  draw();
  requestAnimationFrame(loop);
}

initGame();
loop();
</script>
