// ── 設定 Modal ───────────────────────────────────────────────
function SettingsModal({ onClose }) {
  const [muted, setMuted] = useState(window._audioMuted === true);
  const [save, setSave] = useState(() => window.readSave?.() || null);
  const [confirmingClear, setConfirmingClear] = useState(false);

  const toggleMute = () => {
    if (typeof window.toggleAudioMute === 'function') {
      window.toggleAudioMute();
      setMuted(window._audioMuted === true);
    }
  };
  const doClearSave = () => {
    if (typeof window.clearSave === 'function') {
      window.clearSave();
      setSave(null);
      setConfirmingClear(false);
    }
  };
  const formatStage = (s) => s ? `第 ${s.stage + 1} 關（${s.relics?.length || 0} 件神兵）` : '尚無存檔';
  const formatTime = (ts) => {
    if (!ts) return '';
    const d = new Date(ts);
    const pad = (n) => String(n).padStart(2,'0');
    return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  return (
    <ModalShell title="設    定" onClose={onClose}>
      <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
        <SettingRow label="音 效" sub={muted ? '已靜音' : '正常播放'} action={
          <button onClick={() => { toggleMute(); window._vibrate?.(20); }} style={btnSm(muted)}>{muted ? '🔇 開啟' : '🔊 靜音'}</button>
        } />
        <VolumeRow muted={muted} />
        <SettingRow label="存 檔 進 度" sub={save ? `${formatStage(save)} · 最後存檔 ${formatTime(save.savedAt)}` : '尚無存檔（通關後自動存）'} action={
          confirmingClear ? (
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={doClearSave} style={btnSm(true)}>確認刪除</button>
              <button onClick={() => setConfirmingClear(false)} style={btnSm(false)}>取消</button>
            </div>
          ) : (
            <button onClick={() => setConfirmingClear(true)} disabled={!save} style={btnSm(false, !save)}>清除</button>
          )
        } />
        <div style={{ marginTop:8, padding:12, background:'rgba(0,0,0,0.4)', border:`1px solid ${TT.color.bronze900}`, fontSize:11, color:TT.color.textMuted, lineHeight:1.7, letterSpacing:'0.1em' }}>
          <div style={{ color:TT.color.bronze400, marginBottom:6, fontSize:12, letterSpacing:'0.3em' }}>關 於</div>
          <div>趙雲菠蘿傳 v0.6 — Pineapple Open-Face Chinese Poker</div>
          <div>Build: 2026-05-04 · UI v2 · Balance v0.7</div>
        </div>
      </div>
    </ModalShell>
  );
}

  { id:'caocao', name:'曹操', faction:'魏', portrait:'characters/10_Level10_FinalBoss_CaoCao.jpg', rarity:5,
    desc:'魏武帝，治世能臣亂世奸雄',
    story:'字孟德，沛國譙人。挾天子以令諸侯，統一中原北方。許劭評曰：「治世之能臣，亂世之奸雄。」橫槊賦詩，《短歌行》「對酒當歌，人生幾何」千古絕唱。文武雙全、雄才大略，三國第一梟雄。' },
];

    <ModalShell title="武 將 圖 鑑" onClose={onClose}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:14 }}>
        {HEROES.map(h => (
          <button key={h.id} onClick={() => setSelected(h)} style={{
            position:'relative', padding:0, cursor:'pointer',
            background: `linear-gradient(180deg, ${TT.color.steel900}, ${TT.color.ink800})`,
            border: `1.5px solid ${factionColor(h.faction)}50`,
            color: TT.color.text, textAlign:'left',
            transition: 'all 0.18s',
            overflow: 'hidden',
          }}
          onMouseEnter={(e) => { e.currentTarget.style.borderColor = factionColor(h.faction); e.currentTarget.style.transform = 'translateY(-3px)'; e.currentTarget.style.boxShadow = `0 8px 20px ${factionColor(h.faction)}40`; }}
          onMouseLeave={(e) => { e.currentTarget.style.borderColor = factionColor(h.faction)+'50'; e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = 'none'; }}
          >
            {/* 派系徽章 — top-right 朱印風 */}
            <div style={{
              position:'absolute', top:6, right:6, width:24, height:24,
              background: factionColor(h.faction), color: TT.color.ink900, fontSize:14, fontWeight:900,
              display:'flex', alignItems:'center', justifyContent:'center',
              border:`1.5px solid ${TT.color.bronze100}`, letterSpacing:0,
              boxShadow:'0 2px 4px rgba(0,0,0,0.6)',
              zIndex: 5,
            }}>{h.faction}</div>
            {/* 立繪 — 戰鬥畫面尺寸（大） */}
            <div style={{ position:'relative', width:'100%', aspectRatio:'1/1.25', background: TT.color.ink900, overflow:'hidden' }}>
              <img src={h.portrait} alt={h.name} style={{
                width:'100%', height:'100%', objectFit:'cover', objectPosition:'center top',
                display:'block',
              }} onError={(e) => e.target.style.display='none'} />
              {/* 底部漸層融入卡片資訊 */}
              <div style={{
                position:'absolute', left:0, right:0, bottom:0, height:'40%',
                background: `linear-gradient(180deg, transparent 0%, ${TT.color.ink800}cc 60%, ${TT.color.ink800} 100%)`,
                pointerEvents:'none',
              }} />
            </div>
            {/* 文字資訊區 */}
            <div style={{ padding:'10px 12px 12px' }}>
              <div style={{ fontFamily:TT.font.display, fontSize:17, color:TT.color.text, letterSpacing:'0.15em', marginBottom:4, fontWeight:700 }}>{h.name}</div>
              <div style={{ fontSize:11, color:TT.color.textMuted, letterSpacing:'0.1em', lineHeight:1.4, marginBottom:6, minHeight:32 }}>{h.desc}</div>
              <div style={{ color: factionColor(h.faction), fontSize:11, letterSpacing:'0.05em' }}>
                {'★'.repeat(h.rarity)}{'☆'.repeat(5-h.rarity)}
              </div>
            </div>
          </button>
        ))}
      </div>
      {selected && (
        <div onClick={() => setSelected(null)} style={{
          position:'fixed', inset:0, zIndex:3000, background:'rgba(0,0,0,0.92)',
          display:'flex', alignItems:'center', justifyContent:'center', padding:20,
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            position:'relative', maxWidth:520, padding:24,
            background:`linear-gradient(180deg, ${TT.color.ink700}, ${TT.color.ink800})`,
            border:`1px solid ${factionColor(selected.faction)}`,
            boxShadow:`0 0 60px ${factionColor(selected.faction)}40`,
          }}>
            <BeastCorner pos="tl" size={28} />
            <BeastCorner pos="br" size={28} />
            <button onClick={() => setSelected(null)} style={{
              position:'absolute', top:8, right:8, background:'transparent',
              border:`1px solid ${TT.color.bronze700}`, color:TT.color.bronze400,
              padding:'2px 10px', cursor:'pointer', fontSize:12, letterSpacing:'0.2em',
            }}>✕</button>
            <div style={{ display:'flex', gap:16, marginBottom:16 }}>
              <img src={selected.portrait} alt={selected.name} style={{
                width:140, height:170, objectFit:'cover', objectPosition:'center top',
                border:`1px solid ${factionColor(selected.faction)}`,
              }} onError={(e) => e.target.style.display='none'} />
              <div style={{ flex:1 }}>
                <div style={{ fontSize:11, color: factionColor(selected.faction), letterSpacing:'0.4em', marginBottom:4 }}>
                  {selected.faction === '蜀' ? '蜀 漢' : '曹 魏'}
                </div>
                <div style={{ fontFamily:TT.font.display, fontSize:24, color:TT.color.text, letterSpacing:'0.15em', marginBottom:6 }}>{selected.name}</div>
                <div style={{ color: factionColor(selected.faction), fontSize:13, letterSpacing:'0.15em', marginBottom:8 }}>{selected.desc}</div>
                <div style={{ color: TT.color.bronze400, fontSize:14 }}>
                  {'★'.repeat(selected.rarity)}{'☆'.repeat(5-selected.rarity)}
                </div>
              </div>
            </div>
            <div style={{ borderTop:`1px solid ${TT.color.bronze900}`, paddingTop:14, color:TT.color.text, fontSize:14, lineHeight:1.9, letterSpacing:'0.05em' }}>
              {selected.story}
            </div>
          </div>
        </div>
      )}
    </ModalShell>
  );
}

function VolumeRow({ muted }) {
  const [vol, setVol] = useState(window.getAudioVolume?.() || 80);
  const apply = (v) => {
    setVol(v);
    if (window.setAudioVolume) window.setAudioVolume(v);
  };
  return (
    <div style={{ padding: '14px 0', borderBottom: `1px solid ${TT.color.ink600}` }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 10 }}>
        <div>
          <div style={{ fontFamily: TT.font.display, fontSize: 18, color: TT.color.text, letterSpacing: '0.3em' }}>音 量</div>
          <div style={{ fontSize: 12, color: TT.color.textMuted, letterSpacing: '0.15em', marginTop: 4 }}>
            {muted ? '已靜音（先開啟音效）' : `${vol}%`}
          </div>
        </div>
        <span style={{ fontFamily: TT.font.mono, fontSize: 14, color: muted ? TT.color.textMuted : TT.color.bronze300, minWidth: 40, textAlign: 'right' }}>{vol}</span>
      </div>
      <input
        type="range"
        min="0" max="100" step="5"
        value={vol}
        disabled={muted}
        onChange={(e) => apply(parseInt(e.target.value, 10))}
        style={{
          width: '100%', height: 6,
          accentColor: TT.color.bronze400,
          opacity: muted ? 0.4 : 1,
          cursor: muted ? 'not-allowed' : 'pointer',
        }}
      />
    </div>
  );
}

function SettingRow({ label, sub, action }) {
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding: '14px 0', borderBottom: `1px solid ${TT.color.ink600}` }}>
      <div>
        <div style={{ fontFamily: TT.font.display, fontSize: 18, color: TT.color.text, letterSpacing: '0.3em' }}>{label}</div>
        <div style={{ fontSize: 12, color: TT.color.textMuted, letterSpacing: '0.15em', marginTop: 4 }}>{sub}</div>
      </div>
      {action}
    </div>
  );
}

// ── Modal 通用外殼 ──────────────────────────────────────────
function ModalShell({ title, onClose, children }) {
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, zIndex:2000,
      background:'rgba(0,0,0,0.85)',
      display:'flex', alignItems:'center', justifyContent:'center', padding: 20,
      animation: 'fadeIn 0.18s ease-out',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        position:'relative',
        width: 'min(640px, 92vw)', maxHeight: '88vh', overflowY: 'auto',
        padding: 32,
        background: `linear-gradient(180deg, ${TT.color.ink700}, ${TT.color.ink800})`,
        border: `1px solid ${TT.color.bronze500}`,
        boxShadow: `0 20px 60px rgba(0,0,0,0.8), 0 0 60px rgba(216,167,88,0.15)`,
      }}>
        <BeastCorner pos="tl" size={36} />
        <BeastCorner pos="tr" size={36} />
        <BeastCorner pos="bl" size={36} />
        <BeastCorner pos="br" size={36} />
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 24 }}>
          <h2 style={{ margin:0, fontFamily: TT.font.display, fontSize: 28, color: TT.color.bronze300, letterSpacing: '0.4em', fontWeight: 900 }}>{title}</h2>
          <button onClick={onClose} style={{ background:'transparent', border:`1px solid ${TT.color.bronze700}`, color: TT.color.bronze400, fontSize:16, padding:'4px 12px', cursor:'pointer', letterSpacing:'0.2em' }}>✕ 關 閉</button>
        </div>
        <CloudBar />
        <div style={{ marginTop: 16 }}>{children}</div>
      </div>
    </div>
  );
}

// ── MenuApp（主選單核心）─────────────────────────────────────
function MenuApp() {
  const [phase, setPhase] = useState(window.game?.phase || 'menu');
  const [modal, setModal] = useState(null);  // 'rules' | 'settings' | 'heroes' | null
  const [toast, setToast] = useState(null);
  const [save, setSave] = useState(() => window.readSave?.() || null);
  const [confirmReturn, setConfirmReturn] = useState(false);

  // 每 200ms poll game.phase + save + 主選單確認 flag
  useEffect(() => {
    const id = setInterval(() => {
      const p = window.game?.phase;
      if (p && p !== phase) setPhase(p);
      const s = window.readSave?.() || null;
      const sigOld = save ? `${save.stage}_${save.savedAt}` : 'none';
      const sigNew = s ? `${s.stage}_${s.savedAt}` : 'none';
      if (sigOld !== sigNew) setSave(s);
      // 戰鬥中按主選單按鈕的偵測
      if (window.game?._showMenuConfirm && !confirmReturn) {
        window.game._showMenuConfirm = false;
        setConfirmReturn(true);
      }
    }, 300);
    return () => clearInterval(id);
  }, [phase, save, confirmReturn]);

  const visible = phase === 'menu';
  if (!visible) return null;

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };
  const startBattle = () => {
    if (typeof window.startGame === 'function') window.startGame();
    else showToast('遊戲未就緒');
  };

  return (
    <>
      <div style={{
        position:'absolute', inset:0,
        background: `radial-gradient(ellipse 70% 50% at 60% 30%, rgba(58, 77, 122, 0.35), transparent 65%), radial-gradient(ellipse 80% 60% at 50% 100%, rgba(20, 14, 8, 0.95), transparent 70%), linear-gradient(180deg, ${TT.color.steel900} 0%, ${TT.color.ink900} 100%)`,
        overflow:'hidden', fontFamily: TT.font.serif, color: TT.color.text,
        display:'flex', flexDirection:'column',
      }}>
        {/* 回紋背景紋 */}
        <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity:0.06, pointerEvents:'none', zIndex:1 }}>
          <defs>
            <pattern id="leiwen-bg" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M0 0 L20 0 L20 8 L8 8 L8 16 L16 16 L16 12 L12 12 L12 20 L0 20 Z" fill="none" stroke={TT.color.bronze300} strokeWidth="0.6" />
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#leiwen-bg)" />
        </svg>

        {/* 趙雲立繪（半身英雄主視覺，從按鈕區上方升起，露出更多上半身） */}
        <div style={{
          position:'absolute',
          left:'50%', bottom:140,
          transform:'translateX(-50%)',
          width: 720, height: 720,
          pointerEvents:'none',
          zIndex: 2,
          WebkitMaskImage: 'radial-gradient(ellipse 55% 60% at 50% 40%, black 50%, transparent 85%)',
          maskImage: 'radial-gradient(ellipse 55% 60% at 50% 40%, black 50%, transparent 85%)',
          opacity: 0.92,
        }}>
          <img src="assets/zhaoyun_hero.jpg" alt="趙雲" style={{
            width:'100%', height:'100%',
            objectFit:'cover',
            objectPosition:'center top',
            filter: 'brightness(0.85) contrast(1.05) drop-shadow(0 0 40px rgba(216,167,88,0.18))',
          }} onError={(e) => { e.target.style.display='none'; }} />
          {/* 上下漸層融入主背景 */}
          <div style={{
            position:'absolute', inset:0,
            background: 'linear-gradient(180deg, rgba(13,14,18,0.55) 0%, transparent 25%, transparent 60%, rgba(13,14,18,0.85) 100%)',
            pointerEvents:'none',
          }} />
        </div>

        {/* 頂部欄 */}
        <div style={{ flexShrink:0, padding:'32px 40px 0', display:'flex', justifyContent:'space-between', alignItems:'center', position:'relative', zIndex:10 }}>
          <div style={{ display:'flex', alignItems:'center', gap:12, padding:'8px 18px', border:`1px solid ${TT.color.bronze700}`, background:'rgba(13,14,18,0.7)' }}>
            <span style={{ width:6, height:6, background:TT.color.bronze300, borderRadius:'50%', boxShadow:`0 0 6px ${TT.color.bronze300}` }} />
            <span style={{ fontSize:14, color: TT.color.bronze400, letterSpacing:'0.4em' }}>建安十三年 · 長坂</span>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <IconBtn icon={Icons.book} label="圖鑑" onClick={() => setModal('heroes')} />
            <IconBtn icon={Icons.gear} label="設定" onClick={() => setModal('settings')} />
          </div>
        </div>

        {/* 標題區（精簡 padding 把空間留給趙雲立繪） */}
        <div style={{ flexShrink:0, padding:'20px 36px 0', position:'relative', zIndex:10 }}>
          <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:10, fontSize:14, color: TT.color.bronze400, letterSpacing:'0.5em' }}>
            <span style={{ width:30, height:1, background: TT.color.bronze500 }} />
            ZHAOYUN · PINEAPPLE
          </div>
          <div style={{ display:'flex', justifyContent:'center', position:'relative' }}>
            <img src="assets/logo.png" alt="趙雲菠蘿傳"
              style={{ width:'82%', maxWidth:480, height:'auto',
                filter: 'drop-shadow(0 8px 24px rgba(0,0,0,0.8)) drop-shadow(0 0 32px rgba(216,167,88,0.35))' }}
              onError={(e) => { e.target.style.display='none'; }}
            />
          </div>
          <div style={{ marginTop:4, display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
            <div style={{ display:'flex', alignItems:'center', gap:14 }}>
              <div style={{ width:36, height:1, background: TT.color.bronze500 }} />
              <span style={{ fontSize:12, color: TT.color.textMuted, letterSpacing:'0.5em' }}>v0.6 · THE LEGEND OF CHANGBAN</span>
              <div style={{ width:36, height:1, background: TT.color.bronze500 }} />
            </div>
            <Epigraph>吾 乃 常 山 趙 子 龍 是 也</Epigraph>
          </div>
        </div>

        <div style={{ flex:1 }} />

        {/* 選單按鈕區（縮 padding 確保都看得到） */}
        <div style={{ flexShrink:0, padding:'0 28px 28px', display:'flex', flexDirection:'column', gap:10, position:'relative', zIndex:10 }}>
          <PrimaryBtn label="新章節" onClick={() => { window._vibrate?.(30); startBattle(); }}>出　戰</PrimaryBtn>
          <div style={{ display:'flex', gap:10 }}>
            <ListBtn
              label="繼續征途"
              sub={save ? `第 ${save.stage + 1} 關 · ${HEROES[save.stage + 1]?.name || HEROES.find(h => h.id === ['caosoldier','xiahoudun','zhanghe','xuchu','wenpin','caoren','caohong','zhangliao','simayi','caocao'][save.stage])?.name || '?'}` : '尚無進度'}
              badge={save ? '進行中' : null}
              onClick={() => {
                if (!save) { showToast('尚無存檔，請先點 出戰 開始新章節'); return; }
                if (typeof window.loadGame === 'function' && window.loadGame()) {
                  // loadGame 會自動切到 placing phase；React 200ms 內偵測到並隱藏選單
                } else {
                  showToast('載入失敗');
                }
              }}
            />
            <ListBtn label="武將圖鑑" sub={`已收 ${HEROES.length} 位`} onClick={() => setModal('heroes')} />
          </div>
          <div style={{ display:'flex', gap:10 }}>
            <ListBtn label="戰場規則" sub="新手必讀" onClick={() => setModal('rules')} />
            <ListBtn label="設　定" sub="音效 · 音量 · 存檔" onClick={() => setModal('settings')} />
          </div>
        </div>

        {/* 全頁四角獸首 */}
        <BeastCorner pos="tl" size={60} />
        <BeastCorner pos="tr" size={60} />
        <BeastCorner pos="bl" size={60} />
        <BeastCorner pos="br" size={60} />

        {/* Toast */}
        {toast && (
          <div style={{ position:'absolute', bottom: 240, left:'50%', transform:'translateX(-50%)', padding:'12px 24px', background: TT.color.ink900, border:`1px solid ${TT.color.bronze500}`, color: TT.color.bronze300, fontFamily: TT.font.display, letterSpacing:'0.3em', fontSize:14, zIndex:30, boxShadow:`0 8px 24px rgba(0,0,0,0.7)` }}>
            {toast}
          </div>
        )}
      </div>

      {modal === 'rules' && <RulesModal onClose={() => setModal(null)} />}
      {modal === 'settings' && <SettingsModal onClose={() => setModal(null)} />}
      {modal === 'heroes' && <HeroesModal onClose={() => setModal(null)} />}
      {confirmReturn && (
        <div onClick={() => setConfirmReturn(false)} style={{
          position:'fixed', inset:0, zIndex:3000, background:'rgba(0,0,0,0.85)',
          display:'flex', alignItems:'center', justifyContent:'center', padding:20
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            position:'relative', maxWidth:400, padding:28,
            background:`linear-gradient(180deg, ${TT.color.ink700}, ${TT.color.ink800})`,
            border:`1px solid ${TT.color.crimson400}`,
            boxShadow:`0 0 60px rgba(196,30,30,0.3)`,
          }}>
            <BeastCorner pos="tl" size={28} />
            <BeastCorner pos="br" size={28} />
            <div style={{ fontFamily: TT.font.display, fontSize: 22, color: TT.color.bronze300, letterSpacing: '0.3em', textAlign: 'center', marginBottom: 16 }}>
              退 出 戰 鬥
            </div>
            <div style={{ color: TT.color.text, fontSize: 14, lineHeight: 1.8, letterSpacing: '0.1em', textAlign: 'center', marginBottom: 24 }}>
              當前戰鬥進度將遺失。<br/>
              （已通關的關卡仍保留在「繼續征途」存檔）
            </div>
            <div style={{ display:'flex', gap: 10 }}>
              <button onClick={() => setConfirmReturn(false)} style={{ flex:1, padding:'12px', background: TT.color.ink700, border:`1px solid ${TT.color.bronze700}`, color: TT.color.textSoft, fontFamily: TT.font.serif, fontSize: 14, letterSpacing: '0.3em', cursor:'pointer' }}>
                繼續戰鬥
              </button>
              <button onClick={() => {
                window._vibrate?.(20);
                if (window.game) window.game.phase = 'menu';
                setConfirmReturn(false);
              }} style={{ flex:1, padding:'12px', background: TT.color.crimson500, border:`1px solid ${TT.color.crimson400}`, color: TT.color.bronze100, fontFamily: TT.font.serif, fontSize: 14, letterSpacing: '0.3em', cursor:'pointer' }}>
                回主選單
              </button>
            </div>
          </div>
        </div>
      )}

      <style>{`
        @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
      `}</style>
    </>
  );
}

// Mount
const _menuRoot = document.getElementById('menu-root');
if (_menuRoot && window.React && window.ReactDOM) {
  ReactDOM.createRoot(_menuRoot).render(<MenuApp />);
}
</script>

</body>
</html>
