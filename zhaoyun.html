<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>長坂坡 · 趙雲菠蘿傳 v0.6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Serif+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- UI v2 整合：React + Babel for DOM 主選單 -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }

  body {
    background:
      radial-gradient(ellipse at top, #3a1810 0%, #0a0503 60%),
      #0a0503;
    color: #f4e4bc;
    font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
    /* 取消 flex centering，改 absolute centering 配合 transform scale，避免行動裝置 viewport 計算誤差 */
    margin: 0; padding: 0;
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden;
    position: fixed; inset: 0;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* 雜訊紋理覆蓋層 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent 0, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 3px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* === 手機外殼（720×1280）+ 響應式 scale ===
     v0.7 mobile fix v2: scale 改由 JS 算寫入 CSS 變數 --scale
     原因：CSS min(calc()) 在某些 mobile 瀏覽器 fall back 到 1（不縮），導致超框 */
  .game-frame {
    position: absolute;
    top: 50%; left: 50%;
    width: 720px; height: 1280px;
    background: linear-gradient(135deg, #1a2238 0%, #0a0f1c 100%);
    border-radius: 12px;
    padding: 6px;
    box-shadow:
      0 0 0 1px #b8893a,
      0 0 80px rgba(216, 167, 88, 0.18),
      0 20px 60px rgba(0,0,0,0.9);
    transform: translate(-50%, -50%) scale(var(--scale, 1));
    transform-origin: center center;
    will-change: transform;
  }
  .game-frame::after {
    /* 雜訊掃描線 — 史詩感濾鏡 */
    content: '';
    position: absolute; inset: 6px;
    border-radius: 8px;
    background-image: repeating-linear-gradient(
      0deg, transparent 0, transparent 2px,
      rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 3px
    );
    pointer-events: none;
    z-index: 200;
    mix-blend-mode: multiply;
  }
  .game-screen {
    width: 100%; height: 100%;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background: #06070a;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, #2a1408 0%, #0f0503 100%);
    image-rendering: optimizeQuality;
    touch-action: none;
  }
  #menu-root {
    position: absolute; inset: 0;
    z-index: 50;
    pointer-events: none;  /* 子元素可點，自身不擋 canvas */
  }
  #menu-root > * { pointer-events: auto; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
// === Mobile fit: 動態計算 .game-frame 縮放比例 ===
// 比 CSS min(calc()) 可靠（不依賴 100dvh / min() 的瀏覽器支援）
(function() {
  function updateScale() {
    var el = document.querySelector('.game-frame');
    if (!el) { setTimeout(updateScale, 50); return; }
    var vw = window.innerWidth || document.documentElement.clientWidth;
    var vh = window.innerHeight || document.documentElement.clientHeight;
    var sx = (vw - 8) / 720;
    var sy = (vh - 8) / 1280;
    var scale = Math.min(sx, sy, 1);
    el.style.setProperty('--scale', String(scale));
  }
  window.addEventListener('resize', updateScale, { passive: true });
  window.addEventListener('orientationchange', function() { setTimeout(updateScale, 100); });
  if (document.readyState !== 'loading') updateScale();
  else document.addEventListener('DOMContentLoaded', updateScale);
  // 多排程幾次確保 mobile URL bar 動態調整後也校正
  setTimeout(updateScale, 100);
  setTimeout(updateScale, 500);
  setTimeout(updateScale, 1500);
})();
</script>
</head>
<body>
<div class="game-frame">
  <div class="game-screen">
    <canvas id="game" width="720" height="1280"></canvas>
    <!-- UI v2: React DOM 主選單 root（疊在 canvas 上，display 由 React 內部依 game.phase 控制） -->
    <div id="menu-root"></div>
  </div>
</div>

    { key: 'player_s1', url: './characters/zhaoyun_s1.jpg' },
    { key: 'player_s2', url: './characters/zhaoyun_s2.jpg' },
    { key: 'player_s3', url: './characters/zhaoyun_s3.jpg' },
    { key: 'player_s4', url: './characters/zhaoyun_s4.jpg' },
    { key: 'player_s5', url: './characters/zhaoyun_s5.jpg' },
    // 10 BOSS — 改用 JPG 壓縮版（從 25MB → 1.2MB）
    { key: '曹軍小兵', url: './characters/01_Level1_CaoSoldier.jpg'         },
    { key: '夏侯惇',   url: './characters/02_Level2_BOSS_XiahouDun.jpg'     },
    { key: '張郃',     url: './characters/03_Level3_BOSS_ZhangHe.jpg'       },
    { key: '許褚',     url: './characters/04_Level4_BOSS_XuChu.jpg'         },
    { key: '文聘',     url: './characters/05_Level5_BOSS_WenPin.jpg'        },
    { key: '曹仁',     url: './characters/06_Level6_BOSS_CaoRen.jpg'        },
    { key: '曹洪',     url: './characters/07_Level7_BOSS_CaoHong.jpg'       },
    { key: '張遼',     url: './characters/08_Level8_BOSS_ZhangLiao.jpg'     },
    { key: '司馬懿',   url: './characters/09_Level9_BOSS_SimaYi.jpg'        },
    { key: '曹操',     url: './characters/10_Level10_FinalBoss_CaoCao.jpg'  },
    // Logo: 兩個 URL 都指向同樣內容（容錯）— 加 cache-bust query 強制 browser 重抓
    { key: '_logo',    url: './logo.png?v=2'      },
    { key: '_logo2',   url: './logo.png.png?v=2'  },
    { key: 'victoryBg',       url: './victory_bg.png'       },
    { key: 'battleResultBg',  url: './battle_result_bg.png' },
  ];
  toLoad.forEach(({ key, url }) => {
    if (_ASSET_LOAD_ATTEMPTS[key]) return;   // 只嘗試一次
    _ASSET_LOAD_ATTEMPTS[key] = true;
    const img = new Image();
    img.onload  = () => {
      _ASSET_IMGS[key] = img;
      // 載入耗時記錄（只記第一次）— 方便 debug 大檔案
      if (!_ASSET_LOAD_ATTEMPTS['_log_' + key]) {
        _ASSET_LOAD_ATTEMPTS['_log_' + key] = true;
        // 大於 200 KB 的資產才 log，避免 console 噪音
        if (img.naturalWidth * img.naturalHeight > 100000) {
          // (silent — 之後若需 debug 可改成 console.log)
        }
      }
    };
    img.onerror = () => {
      // fallback 到 canvas 繪製，但 log 一次方便 debug
      if (!_ASSET_LOAD_ATTEMPTS['_warn_' + key]) {
        _ASSET_LOAD_ATTEMPTS['_warn_' + key] = true;
        console.warn('[asset] failed to load', key, '@', url, '— using canvas fallback');
      }
    };
    img.src = url;
  });
}

function getAssetUrl(category, key) {
  const rel = ASSET_PATHS[category]?.[key];
  if (!rel) return null;
  return ASSET_PATHS.base + rel;
}

// 非同步嘗試載入圖片；失敗回傳 null（讓 canvas 接手繪製）
function tryLoadAsset(url) {
  return new Promise(resolve => {
    if (!url) return resolve(null);
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

// 【撲克牌邏輯】
// ============================================================
const SUITS = ['♠','♥','♦','♣'];
const SUIT_COLORS = { '♠':'#222', '♣':'#222', '♥':'#c00', '♦':'#c00' };

function newDeck() {
  const d = [];
  for (let s = 0; s < 4; s++) {
    for (let r = 2; r <= 14; r++) d.push({ rank: r, suit: SUITS[s] });
  }
  // 加入 2 張鬼牌（Joker）— 可代任何牌
  d.push({ rank: 0, suit: '★', isJoker: true });
  d.push({ rank: 0, suit: '★', isJoker: true });
  return shuffle(d);
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// 排序手牌：鬼牌→黑桃→紅心→方塊→梅花，組內按點數大到小
function sortHand(hand) {
  const suitOrder = { '★': 0, '♠': 1, '♥': 2, '♦': 3, '♣': 4 };
  hand.sort((a, b) => {
    const sa = suitOrder[a.suit];
    const sb = suitOrder[b.suit];
    if (sa !== sb) return sa - sb;
    return b.rank - a.rank;  // 同花色內大到小（A 在前面）
  });
  return hand;
}

// 純按點數排序（大到小），鬼牌排最前
function sortHandByRank(hand) {
  hand.sort((a, b) => {
    if (a.isJoker && !b.isJoker) return -1;
    if (!a.isJoker && b.isJoker) return 1;
    return b.rank - a.rank;
  });
  return hand;
}

// Fantasyland 重置：把已擺的牌全部退回手牌並重新排序
function resetFantasyland() {
  if (!game.inFantasyland) return;
  const returned = [];
  ['front', 'middle', 'back'].forEach(rn => {
    returned.push(...game.rows[rn]);
    game.rows[rn] = [];
  });
  game.hand.push(...returned);
  game.mustPlace = 13;
  game.mustDiscard = game.hand.length - 13;
  game.placedThisRound = 0;
  game.selectedCard = null;
  sortHand(game.hand);
  flashMessage(`已重置，重新整理 ${game.hand.length} 張手牌`);
  playSound('deal');
}
function rankStr(r) {
  if (r === 14) return 'A';
  if (r === 13) return 'K';
  if (r === 12) return 'Q';
  if (r === 11) return 'J';
  return String(r);
}

// 純牌評估（不含鬼牌）
function evaluateHandPure(cards) {
  if (cards.length === 0) return { type: 'HIGH', rank: 0, kickers: [] };
  const ranks = cards.map(c => c.rank).sort((a,b) => b - a);
  const suits = cards.map(c => c.suit);
  const counts = {};
  ranks.forEach(r => counts[r] = (counts[r]||0) + 1);
  const countVals = Object.values(counts).sort((a,b) => b - a);
  const isFlush = cards.length >= 4 && suits.every(s => s === suits[0]);
  const uniqueRanks = [...new Set(ranks)].sort((a,b) => b - a);
  let isStraight = false;
  if (cards.length === 5 && uniqueRanks.length === 5) {
    if (uniqueRanks[0] - uniqueRanks[4] === 4) isStraight = true;
    if (uniqueRanks.join(',') === '14,5,4,3,2') isStraight = true;
  }
  if (cards.length === 4 && uniqueRanks.length === 4 && uniqueRanks[0] - uniqueRanks[3] === 3) isStraight = true;

  // 計算 kicker（剩餘非主牌的高牌，用於同牌型比大小）
  const makeKickers = (usedRanks) => {
    const rem = [...ranks];
    usedRanks.forEach(r => { const i = rem.indexOf(r); if (i >= 0) rem.splice(i, 1); });
    return rem;
  };

  if (isFlush && isStraight && uniqueRanks[0] === 14 && uniqueRanks[1] === 13)
    return { type:'ROYAL_FLUSH', rank:14, kickers:[] };
  if (isFlush && isStraight)
    return { type:'STRAIGHT_FLUSH', rank:uniqueRanks[0], kickers:[] };
  if (countVals[0] === 4) {
    const r = parseInt(Object.keys(counts).find(k=>counts[k]===4));
    return { type:'FOUR_KIND', rank:r, kickers: makeKickers([r,r,r,r]) };
  }
  if (countVals[0] === 3 && countVals[1] === 2) {
    const r = parseInt(Object.keys(counts).find(k=>counts[k]===3));
    return { type:'FULL_HOUSE', rank:r, kickers:[] };
  }
  if (isFlush) return { type:'FLUSH', rank:ranks[0], kickers: ranks.slice(1) };
  if (isStraight) return { type:'STRAIGHT', rank:uniqueRanks[0], kickers:[] };
  if (countVals[0] === 3) {
    const r = parseInt(Object.keys(counts).find(k=>counts[k]===3));
    return { type:'THREE_KIND', rank:r, kickers: makeKickers([r,r,r]) };
  }
  if (countVals[0] === 2 && countVals[1] === 2) {
    const pairs = Object.keys(counts).filter(k=>counts[k]===2).map(Number).sort((a,b)=>b-a);
    return { type:'TWO_PAIR', rank:pairs[0], rank2:pairs[1], kickers: makeKickers([pairs[0],pairs[0],pairs[1],pairs[1]]) };
  }
  if (countVals[0] === 2) {
    const r = parseInt(Object.keys(counts).find(k=>counts[k]===2));
    return { type:'PAIR', rank:r, kickers: makeKickers([r,r]) };
  }
  return { type:'HIGH', rank:ranks[0], kickers: ranks.slice(1) };
}

// 單道最強評估（含鬼牌，只管自己這一道）
// 用於：牌型預覽、Fantasyland 觸發判定
function evaluateHand(cards) {
  if (cards.length === 0) return { type: 'HIGH', rank: 0, kickers: [] };
  const jokers = cards.filter(c => c.isJoker);
  const nonJ = cards.filter(c => !c.isJoker);
  if (jokers.length === 0) return evaluateHandPure(cards);
  let best = null;
  const try_ = (idx, cur) => {
    if (idx === jokers.length) {
      const ev = evaluateHandPure([...nonJ, ...cur]);
      if (!best || compareHandsCore(ev, best) > 0) best = ev;
      return;
    }
    for (let s = 0; s < 4; s++)
      for (let r = 2; r <= 14; r++) {
        cur.push({ rank: r, suit: SUITS[s] });
        try_(idx + 1, cur);
        cur.pop();
      }
  };
  try_(0, []);
  return best || { type: 'HIGH', rank: 0, kickers: [] };
}

// 帶 kicker 的比牌（同牌型同主牌點數時繼續比副牌）
function compareHandsCore(a, b) {
  const ra = CONFIG.HAND_RANK[a.type];
  const rb = CONFIG.HAND_RANK[b.type];
  if (ra !== rb) return ra > rb ? 1 : -1;
  if (a.rank !== b.rank) return a.rank > b.rank ? 1 : -1;
  // 兩對時比較第二對
  if (a.type === 'TWO_PAIR' && a.rank2 !== b.rank2) return (a.rank2||0) > (b.rank2||0) ? 1 : -1;
  // kicker 比較
  const ka = a.kickers || [], kb = b.kickers || [];
  for (let i = 0; i < Math.max(ka.length, kb.length); i++) {
    const va = ka[i] || 0, vb = kb[i] || 0;
    if (va !== vb) return va > vb ? 1 : -1;
  }
  return 0;
}

// compareHands 別名（相容舊呼叫）
function compareHands(a, b) { return compareHandsCore(a, b); }

// 整副最佳合法解：分道枚舉選項，找不犯規的最強組合
// ＊鬼牌只能代替自己所在那道的牌（不跨道）
let _arrCache = { key: null, value: null };
function getBestArrangement(rows) {
  // 未擺滿：用單道最強預覽
  if (rows.front.length < 3 || rows.middle.length < 5 || rows.back.length < 5) {
    return {
      foul: false,
      front: evaluateHand(rows.front),
      middle: evaluateHand(rows.middle),
      back: evaluateHand(rows.back),
      complete: false
    };
  }

  // 快取
  const k = (cs) => cs.map(c => c.isJoker ? 'J' : c.rank + c.suit).join(',');
  const cacheKey = k(rows.front) + '|' + k(rows.middle) + '|' + k(rows.back);
  if (_arrCache.key === cacheKey) return _arrCache.value;

  // 每道獨立取「所有可能牌型」（去重，從強到弱排序）
  const getOpts = (cards) => {
    const jokers = cards.filter(c => c.isJoker);
    const nonJ = cards.filter(c => !c.isJoker);
    if (jokers.length === 0) return [evaluateHandPure(cards)];
    const seen = new Map();
    const try_ = (idx, cur) => {
      if (idx === jokers.length) {
        const ev = evaluateHandPure([...nonJ, ...cur]);
        // key 要含 kicker 才能分辨同牌型不同 kicker
        const key = ev.type + ':' + ev.rank + ':' + (ev.kickers||[]).join(',');
        if (!seen.has(key)) seen.set(key, ev);
        return;
      }
      for (let s = 0; s < 4; s++)
        for (let r = 2; r <= 14; r++) {
          cur.push({ rank: r, suit: SUITS[s] });
          try_(idx + 1, cur);
          cur.pop();
        }
    };
    try_(0, []);
    return [...seen.values()].sort((a, b) => compareHandsCore(b, a)); // 強→弱
  };

  const frontOpts = getOpts(rows.front);
  const midOpts   = getOpts(rows.middle);
  const backOpts  = getOpts(rows.back);

  // 從後墩最強開始，找第一個不犯規的三道組合
  let result = null;
  outer:
  for (const b of backOpts) {
    for (const m of midOpts) {
      if (compareHandsCore(b, m) < 0) continue;
      for (const f of frontOpts) {
        if (compareHandsCore(m, f) < 0) continue;
        result = { foul: false, front: f, middle: m, back: b, complete: true };
        break outer;
      }
    }
  }

  if (!result) {
    // 全部組合都犯規：回傳各道最強（標記犯規）
    result = { foul: true, front: frontOpts[0], middle: midOpts[0], back: backOpts[0], complete: true };
  }

  _arrCache = { key: cacheKey, value: result };
  return result;
}

function checkFoul(rows) {
  return getBestArrangement(rows).foul;
}

function getRoyalty(row, handEval) {
  if (row === 'front') {
    if (handEval.type === 'PAIR') return CONFIG.ROYALTY_FRONT.PAIR[handEval.rank] || 0;
    if (handEval.type === 'THREE_KIND') return CONFIG.ROYALTY_FRONT.THREE_KIND;
    return 0;
  }
  if (row === 'middle') return CONFIG.ROYALTY_MIDDLE[handEval.type] || 0;
  if (row === 'back') return CONFIG.ROYALTY_BACK[handEval.type] || 0;
  return 0;
}

// 判定是否達到 Fantasyland 門檻，回傳該發牌數（0=未達）
// 前墩：QQ→14, KK→15, AA→16, 三條→17
// 中墩：葫蘆以上→14, 四條→15, 同花順→16, 皇家→17
// 後墩：四條以上→14, 同花順→15, 皇家→16
function checkFantasylandFromEval(frontEval, midEval, backEval) {
  // 前墩判定
  if (frontEval) {
    if (frontEval.type === 'THREE_KIND') return CONFIG.FANTASY_CARDS.THREE_KIND;
    if (frontEval.type === 'PAIR') {
      if (frontEval.rank === 14) return CONFIG.FANTASY_CARDS.PAIR_AA;
      if (frontEval.rank === 13) return CONFIG.FANTASY_CARDS.PAIR_KK;
      if (frontEval.rank === 12) return CONFIG.FANTASY_CARDS.PAIR_QQ;
    }
  }
  // 中墩判定
  if (midEval) {
    if (midEval.type === 'ROYAL_FLUSH')    return 17;
    if (midEval.type === 'STRAIGHT_FLUSH') return 16;
    if (midEval.type === 'FOUR_KIND')      return 15;
    if (midEval.type === 'FULL_HOUSE')     return 14;
  }
  // 後墩判定
  if (backEval) {
    if (backEval.type === 'ROYAL_FLUSH')    return 16;
    if (backEval.type === 'STRAIGHT_FLUSH') return 15;
    if (backEval.type === 'FOUR_KIND')      return 14;
  }
  return 0;
}

// 舊接口相容
function checkFantasyland(frontCards) {
  if (!frontCards || frontCards.length !== 3) return 0;
  return checkFantasylandFromEval(evaluateHand(frontCards), null, null);
}

// ============================================================
// 【SAVE / LOAD】UI v2 Milestone 2: 繼續征途存檔機制
// localStorage key 'zhaoyun_save_v1'
// 觸發儲存: chooseReward (玩家通關後選遺物，自動存)
// 觸發清除: victory (打贏曹操) 或 clearSave 手動
// 觸發載入: window.loadGame() 由 React 主選單呼叫
// ============================================================
const SAVE_KEY = 'zhaoyun_save_v1';
function saveProgress() {
  try {
    const data = {
      v: 1,
      savedAt: Date.now(),
      stage: game.stage,
      relics: (game.relics || []).map(r => ({...r})),
      playerMaxHp: CONFIG.PLAYER_MAX_HP,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) {
    console.warn('saveProgress failed:', e.message);
  }
}
function readSave() {
  try {
    const s = localStorage.getItem(SAVE_KEY);
    if (!s) return null;
    const d = JSON.parse(s);
    if (d.v !== 1) return null;
    if (typeof d.stage !== 'number' || d.stage < 0 || d.stage >= ENEMIES.length) return null;
    return d;
  } catch(e) { return null; }
}
function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}
function loadGame() {
  const save = readSave();
  if (!save) { return false; }
  game.stage = save.stage;
  game.relics = save.relics || [];
  if (save.playerMaxHp) CONFIG.PLAYER_MAX_HP = save.playerMaxHp;
  game.playerHp = CONFIG.PLAYER_MAX_HP;
  recalcCaps();
  startStage();
  playSound('start');
  startBGM('battle');
  return true;
}
// 暴露給 React 主選單
window.saveProgress = saveProgress;
window.readSave = readSave;
window.clearSave = clearSave;
window.loadGame = loadGame;

// ============================================================
// 【遊戲流程 v0.4】雙人對戰
// ============================================================
function startGame() {
  game.stage = 0;
  game.relics = [];
  game.playerHp = CONFIG.PLAYER_MAX_HP;
  recalcCaps();
  startStage();
  playSound('start');
  startBGM('battle');
}

function startStage() {
  const enemy = ENEMIES[game.stage];
  game.enemyMaxHp = enemy.hp;
  game.enemyHp = enemy.hp;

  // 雙方共用一副牌
  game.deck = newDeck();
  game.enemyDeck = null;
  game.hand = [];
  game.enemyHand = [];
  game.rows = { front: [], middle: [], back: [] };
  game.enemyRows = { front: [], middle: [], back: [] };
  game.discards = [];
  game.enemyDiscards = [];
  game.round = 0;
  game.skillUsed = false;
  game._skillUseCount = 0;
  game._skillMode = false;
  game._qi = 0;         // 龍膽氣值（每關重置）
  game._ziShieldUsed = false;
  game._dragonSpearActive = false;
  game._silverArmorBuff = false;
  game._reviveUsed = false;      // 皇后恩典：每關只觸發一次
  game._zhugeStreak = 0;         // 諸葛連弩：連勝計數每關重置
  game._revengeBuff = false;     // 呂布遺甲：復仇狀態每關重置
  game._noFoulStreak = 0;        // 銀甲白袍：無犯規連勝每關重置
  game._queenGraceUsed = false;  // 夢幻國度皇后恩典：每關重置
  game._dragonScaleUsed = false; // 龍鱗護甲：每關重置
  game._deathDefierUsed = false; // 不死戰魂：每關重置
  game.battleResults = null;
  game._resBtns = null;
  game._resAnimStart = null;
  game._battleResultTimer = null;

  // 七星燈：進入新關卡回復 HP
  const qixing = game.relics.find(r => r.id === 'qixing_lamp');
  if (qixing && game.stage > 0) {
    game.playerHp = Math.min(CONFIG.PLAYER_MAX_HP, game.playerHp + qixing.value);
    spawnFloatScore(getPlayerHpBarX() + 100, CONFIG.LAYOUT.PLAYER_INFO_Y + 38, `+${qixing.value}`);
  }

  // 跨關進入 Fantasyland（如果上關末場觸發）
  if (game.fantasylandPending > 0) {
    startFantasyland(game.fantasylandPending);
    game.fantasylandPending = 0;
  } else {
    game.inFantasyland = false;
    startRound();
  }
}

// 每場戰鬥開始時觸發 BOSS modifier
function applyRoundStartModifier() {
  const enemy = ENEMIES[game.stage];
  if (enemy.modifier === 'heal_each_round') {
    game.enemyHp = Math.min(game.enemyMaxHp, game.enemyHp + 15);
    flashMessage(`曹仁鐵壁回復 15 HP！(現 ${game.enemyHp})`);
  }
  // 許褚棄牌傷害：在棄牌時觸發（在 discardCard 裡加）
  // 曹操：隨機削弱玩家一道（v0.5 已有，此處明確記錄）
  if (enemy.modifier === 'double_dmg' && game.round === 1) {
    flashMessage('魏武帝臨陣！本場造成傷害 ×1.4');
  }
  // 夏侯惇前墩 Royalty 翻倍：計算在 resolveBattle 中處理
  // 文聘穩定傷害：計算在 resolveBattle 中處理
  // 曹洪 Scoop+：計算在 resolveBattle 中處理
}

function startRound() {
  recalcCaps();
  game.round++;
  game.selectedCard = null;
  game.placedThisRound = 0;
  game.aiThinking = false;
  // 龍膽氣積累（第2回合起每回合+2氣）
  if (game.round > 1) {
    const qiGain = 2;
    game._qi = Math.min(CONFIG.QI_MAX, (game._qi || 0) + qiGain);
    spawnFloatScore(110, CONFIG.LAYOUT.PLAYER_INFO_Y + 44, `+${qiGain}氣 ✦`, '#44ddff');
  }
  const enemy = ENEMIES[game.stage];

  if (game.round === 1) {
    // 第 1 回合：雙方各發 5 張
    for (let i = 0; i < CONFIG.INITIAL_DEAL; i++) {
      if (game.deck.length > 0) game.hand.push(game.deck.pop());
      if (game.deck.length > 0) game.enemyHand.push(game.deck.pop());
    }
    sortHand(game.hand);
    game.mustPlace = 5;
    game.mustDiscard = 0;
    game.message = `第 ${game.stage + 1} 關 · 第 1 回合｜${enemy.name}：「${enemy.quote}」 — 將 5 張全部擺入三道`;
  } else {
    for (let i = 0; i < CONFIG.ROUND_DEAL; i++) {
      if (game.deck.length > 0) game.hand.push(game.deck.pop());
      if (game.deck.length > 0) game.enemyHand.push(game.deck.pop());
    }
    sortHand(game.hand);
    game.mustPlace = 2;
    game.mustDiscard = 1;
    game.message = `第 ${game.stage + 1} 關 · 第 ${game.round} 回合 — 從 3 張中擺 2 張、最後 1 張自動棄掉`;
  }
  game.phase = 'placing';
  playSound('deal');
}

function placeCard(rowName) {
  if (!game.selectedCard) return;
  if (game.mustPlace <= 0) {
    flashMessage("本回合擺牌已完成");
    playSound('error');
    return;
  }
  if (game.rows[rowName].length >= game.cardCaps[rowName]) {
    flashMessage(rowMap(rowName) + "已滿");
    playSound('error');
    return;
  }
  game.selectedCard._placedRound = game.round;
  game.rows[rowName].push(game.selectedCard);
  spawnParticles(getRowSlotX(rowName, game.rows[rowName].length-1, false) + CONFIG.CARD_W/2,
                 getRowY(rowName, false) + CONFIG.CARD_H/2, '#ffd700', 8);
  game.hand = game.hand.filter(c => c !== game.selectedCard);
  game.selectedCard = null;
  game.mustPlace--;
  game.placedThisRound++;
  playSound('place');

  // Fantasyland：擺滿 13 張後自動棄掉剩餘所有牌
  if (game.inFantasyland && game.mustPlace === 0) {
    // 不自動棄牌；等使用者確認
    game._flConfirmPending = true;
    return;
  }

  // 一般模式：擺完且剩 1 張需要棄 1 → 自動棄
  if (game.mustPlace === 0 && game.mustDiscard === 1 && game.hand.length === 1) {
    setTimeout(() => autoDiscard(), 300);
    return;
  }
  checkRoundProgress();
}

// Fantasyland 自動棄掉手中所有剩餘牌
function autoDiscardAll() {
  const breakRelic = game.relics.find(r => r.id === 'discard_dmg');
  while (game.hand.length > 0) {
    const card = game.hand.shift();
    if (breakRelic) {
      game.enemyHp = Math.max(0, game.enemyHp - breakRelic.value);
      spawnFloatScore(getEnemyHpBarX(), CONFIG.LAYOUT.ENEMY_INFO_Y + 60, `-${breakRelic.value}`);
    }
    game.discards.push(card);
  }
  game.mustDiscard = 0;
  flashMessage(`夢幻國度結束！棄牌已處理`);
  playSound('discard');
  checkRoundProgress();
}

// 自動棄牌（剩 1 張時呼叫，不需手動點）
function autoDiscard() {
  if (game.phase !== 'placing') return;  // guard: ignore stale timeouts
  if (game.hand.length !== 1) return;
  const card = game.hand[0];
  const breakRelic = game.relics.find(r => r.id === 'discard_dmg');
  if (breakRelic) {
    game.enemyHp = Math.max(0, game.enemyHp - breakRelic.value);
    spawnFloatScore(getEnemyHpBarX(), CONFIG.LAYOUT.ENEMY_INFO_Y + 60, `-${breakRelic.value}`);
  }
  game.discards.push(card);
  game.hand = [];
  game.mustDiscard = 0;
  flashMessage("自動棄掉最後 1 張");
  playSound('discard');
  checkRoundProgress();
}

function discardCard() {
  if (!game.selectedCard) {
    flashMessage("先點選一張要棄掉的牌");
    return;
  }
  if (game.mustDiscard <= 0) {
    flashMessage("本回合不需棄牌");
    playSound('error');
    return;
  }
  if (game.mustPlace > 0) {
    flashMessage("先擺完該擺的牌再棄");
    playSound('error');
    return;
  }
  // 破軍：棄牌時對敵造成傷害
  const breakRelic = game.relics.find(r => r.id === 'discard_dmg');
  if (breakRelic) {
    game.enemyHp = Math.max(0, game.enemyHp - breakRelic.value);
    spawnFloatScore(getEnemyHpBarX(), CONFIG.LAYOUT.ENEMY_INFO_Y + 60, `-${breakRelic.value}`);
  }
  game.discards.push(game.selectedCard);  // 公開棄牌
  game.hand = game.hand.filter(c => c !== game.selectedCard);
  game.selectedCard = null;
  game.mustDiscard--;
  playSound('discard');
  // 軍醫帳篷：棄牌回 4 HP，每場最多 20 HP
  const medicTent = game.relics.find(r => r.id === 'medic_tent');
  if (medicTent && (game._medicHealCount || 0) < 5) {
    game.playerHp = Math.min(CONFIG.PLAYER_MAX_HP, game.playerHp + medicTent.value);
    spawnFloatScore(getPlayerHpBarX() + 100, CONFIG.LAYOUT.PLAYER_INFO_Y + 38, `+${medicTent.value}（帳篷）`);
    game._medicHealCount = (game._medicHealCount || 0) + 1;
  }
  checkRoundProgress();
}

function checkRoundProgress() {
  if (game.mustPlace === 0 && game.mustDiscard === 0) {
    // Fantasyland 模式：玩家擺完了，要等 AI 也擺完才能結算
    if (game.inFantasyland) {
      if (game._enemyFantasyDone) {
        game.message = "夢幻國度比牌中...";
        setTimeout(() => resolveBattle(), 800);
      } else {
        game.message = "你已擺完，等待對手...";
      }
      return;
    }
    // 一般模式：觸發 AI 擺牌
    if (!game.aiThinking) {
      game.aiThinking = true;
      game.message = "對手思考中...";
      setTimeout(() => doEnemyTurn(), CONFIG.AI_THINK_DELAY);
    }
  }
}

// AI 出牌（同步當前回合）
function doEnemyTurn() {
  if (game.phase !== 'placing') return;  // guard: ignore stale timeouts
  const enemy = ENEMIES[game.stage];
  const isFirstRound = game.round === 1;
  const totalToPlace = isFirstRound ? 5 : 2;
  const totalToDiscard = isFirstRound ? 0 : 1;

  // AI 策略：根據 enemy.ai 強度決定擺牌品質
  aiDecide(enemy.ai, totalToPlace, totalToDiscard);

  // 檢查兩邊是否都到 13 張或 5 回合結束
  const playerTotal = game.rows.front.length + game.rows.middle.length + game.rows.back.length;
  const enemyTotal = game.enemyRows.front.length + game.enemyRows.middle.length + game.enemyRows.back.length;

  if ((playerTotal >= 13 && enemyTotal >= 13) || game.round >= CONFIG.TOTAL_ROUNDS) {
    setTimeout(() => resolveBattle(), 800);
  } else {
    setTimeout(() => startRound(), 800);
  }
}

// ============================================================
// 【v0.6】三層 AI 評分系統 + BOSS 個性偏差
// ============================================================

// 後墩評分：追求最強整體牌型（主要傷害輸出道）
function scoreBack(cards, personality) {
  if (cards.length === 0) return 0;
  const ev = evaluateHand(cards);
  const HR = CONFIG.HAND_RANK;
  const base = (HR[ev.type] || 1) * (personality.backW || 1.0);
  // 同花系加分（張郃/司馬懿有 flushBonus）
  let bonus = 0;
  if (ev.type === 'FLUSH' || ev.type === 'STRAIGHT_FLUSH' || ev.type === 'ROYAL_FLUSH') {
    bonus += (personality.flushBonus || 0) * 0.5;
  }
  // 潛力加分：對子聚合、同花聚合
  const suitCnt = {};
  cards.forEach(c => { if (!c.isJoker) suitCnt[c.suit] = (suitCnt[c.suit]||0)+1; });
  const maxSuit = Math.max(0, ...Object.values(suitCnt));
  bonus += maxSuit * 4;
  return base * 200 + ev.rank * 5 + bonus;
}

// 中墩評分：追求葫蘆/同花以上（高 Royalty 獎勵帶）
function scoreMiddle(cards, personality) {
  if (cards.length === 0) return 0;
  const ev = evaluateHand(cards);
  const HR = CONFIG.HAND_RANK;
  let base = (HR[ev.type] || 1) * (personality.midW || 1.0);
  // 中墩 Royalty 價值大，額外加重
  const royalty = getRoyalty('middle', ev);
  base += royalty * 25 * (personality.royaltyW || 1.0);
  // 同花系加分
  if (ev.type === 'FLUSH' || ev.type === 'STRAIGHT_FLUSH' || ev.type === 'ROYAL_FLUSH') {
    base += (personality.flushBonus || 0) * 0.3;
  }
  return base * 80 + ev.rank * 2;
}

// 前墩評分：追求 QQ+ 對子 / 三條（Fantasyland + 高 Royalty）
function scoreFront(cards, personality) {
  if (cards.length === 0) return 0;
  const ev = evaluateHand(cards);
  const HR = CONFIG.HAND_RANK;
  let base = (HR[ev.type] || 1) * (personality.frontW || 1.0);
  // 前墩 Royalty 特別重要
  const royalty = getRoyalty('front', ev);
  base += royalty * 40 * (personality.royaltyW || 1.0);
  // 高對子額外大加分（12=Q, 13=K, 14=A）
  if (ev.type === 'PAIR' && ev.rank >= 12) base += (ev.rank - 11) * 30 * (personality.frontW || 1);
  if (ev.type === 'THREE_KIND') base += 120 * (personality.frontW || 1);
  return base * 30 + ev.rank;
}

// 整體評分：三排聯合評估
function scoreEnemyRows(rows, personality) {
  const p = personality || { backW:1, midW:1, frontW:1, flushBonus:0, royaltyW:1 };
  const arr = getBestArrangement(rows);
  if (arr.foul) return -5000;

  const f = arr.front, m = arr.middle, b = arr.back;
  const HR = CONFIG.HAND_RANK;

  // 三排個別評分
  let score = HR[b.type]*200*(p.backW||1)  + b.rank*5
            + HR[m.type]*80*(p.midW||1)    + m.rank*2
            + HR[f.type]*30*(p.frontW||1)  + f.rank;

  // Royalty 評分（含個性倍率）
  score += getRoyalty('front', f)  * 40 * (p.royaltyW||1);
  score += getRoyalty('middle', m) * 20 * (p.royaltyW||1);
  score += getRoyalty('back', b)   * 10 * (p.royaltyW||1);

  // 同花獎勵（含個性）
  if (p.flushBonus > 0) {
    ['FLUSH','STRAIGHT_FLUSH','ROYAL_FLUSH'].forEach(t => {
      if (b.type === t) score += p.flushBonus;
      if (m.type === t) score += p.flushBonus * 0.6;
      if (f.type === t) score += p.flushBonus * 0.3;
    });
  }

  // 全排最低牌型加成（不犯規保底）
  const minRank = Math.min(HR[f.type], HR[m.type], HR[b.type]);
  if (minRank >= 3) score += 100;
  if (minRank >= 2) score += 50;

  return score;
}

// 智能棄牌：找出「保留剩餘牌潛力最高」的組合，棄掉最沒用的
function aiFindBestDiscard(hand) {
  if (hand.length === 0) return null;
  let bestKeepScore = -Infinity, bestDiscard = null;
  for (let i = 0; i < hand.length; i++) {
    const discard = hand[i];
    if (discard.isJoker) continue; // 鬼牌不棄
    const remaining = hand.filter((_, j) => j !== i);
    const ranks = remaining.map(c => c.rank);
    const suits = remaining.map(c => c.suit);
    const counts = {};
    ranks.forEach(r => counts[r] = (counts[r]||0)+1);
    let val = 0;
    Object.entries(counts).forEach(([r, cnt]) => {
      if (cnt >= 3) val += parseInt(r) * 12;
      else if (cnt >= 2) val += parseInt(r) * 5;
      else val += parseInt(r) * 0.5;
    });
    const suitCounts = {};
    suits.forEach(s => suitCounts[s] = (suitCounts[s]||0)+1);
    val += Math.max(...Object.values(suitCounts)) * 8;
    if (val > bestKeepScore) { bestKeepScore = val; bestDiscard = discard; }
  }
  return bestDiscard || hand.reduce((a, b) => a.rank <= b.rank ? a : b);
}

// 智能排序：同花牌和對子牌聚在一起（v0.5 相容）
function smartSort(hand, existingRows) {
  const allCards = [...existingRows.front, ...existingRows.middle, ...existingRows.back, ...hand];
  const suitCount = {}, rankCount = {};
  allCards.forEach(c => {
    suitCount[c.suit] = (suitCount[c.suit]||0)+1;
    rankCount[c.rank] = (rankCount[c.rank]||0)+1;
  });
  return [...hand].sort((a, b) => {
    const sa = (a.isJoker ? 500 : 0)
             + (rankCount[a.rank] >= 3 ? a.rank * 15 : rankCount[a.rank] >= 2 ? a.rank * 8 : 0)
             + (suitCount[a.suit] >= 4 ? 60 : suitCount[a.suit] >= 3 ? 30 : 0)
             + a.rank;
    const sb = (b.isJoker ? 500 : 0)
             + (rankCount[b.rank] >= 3 ? b.rank * 15 : rankCount[b.rank] >= 2 ? b.rank * 8 : 0)
             + (suitCount[b.suit] >= 4 ? 60 : suitCount[b.suit] >= 3 ? 30 : 0)
             + b.rank;
    return sb - sa;
  });
}

// 嘗試將 mustPlace 張牌排入三道
function tryArrange(hand, rows, rem, mustPlace) {
  const ops = [], trialRem = { ...rem };
  const toPlace = hand.slice(0, mustPlace);
  for (const card of toPlace) {
    let targets;
    if (card.isJoker || card.rank >= 12) targets = ['back','middle','front'];
    else if (card.rank >= 8) targets = ['middle','back','front'];
    else targets = ['front','middle','back'];
    if (Math.random() < 0.25) shuffle(targets);
    const target = targets.find(t => trialRem[t] > 0);
    if (!target) return null;
    ops.push({ card, row: target });
    trialRem[target]--;
  }
  return ops;
}

function simulateRows(rows, ops) {
  const t = { front:[...rows.front], middle:[...rows.middle], back:[...rows.back] };
  ops.forEach(op => t[op.row].push(op.card));
  return t;
}

// ============================================================
// 【v0.6】aiDecide：BOSS 個性 + DDA 動態難度調整
// ============================================================
function aiDecide(strength, mustPlace, mustDiscard) {
  const enemy = ENEMIES[game.stage];
  const personality = enemy.personality || { backW:1, midW:1, frontW:1, flushBonus:0, royaltyW:1 };

  // DDA：依連勝/連敗調整實際強度
  const ddaWins  = game._ddaWins  || 0;
  const ddaLoss  = game._ddaLoss  || 0;
  let   effStr   = strength;
  if (ddaWins >= CONFIG.DDA_WIN_THRESHOLD)
    effStr = Math.max(CONFIG.DDA_MIN, effStr * 0.95);
  if (ddaLoss >= CONFIG.DDA_LOSS_THRESHOLD)
    effStr = Math.min(CONFIG.DDA_MAX, effStr * 1.06);

  // 司馬懿特殊：reveal_hand → 偷看玩家手牌，提升評分準確度
  const canSeePlayerHand = (enemy.modifier === 'reveal_hand');

  const currentHand = [...game.enemyHand];
  const rows = game.enemyRows;
  const caps = CONFIG.ROW_CAPS;
  const rem = {
    front: caps.front - rows.front.length,
    middle: caps.middle - rows.middle.length,
    back: caps.back - rows.back.length,
  };

  let bestPlan = null;
  // 強度高 → 更多嘗試；司馬懿額外大幅增加搜尋量
  const totalAttempts = Math.floor(80 + effStr * 280 + (canSeePlayerHand ? 120 : 0));

  // 生成候選棄牌列表：強度高 → 智能棄牌；低 → 隨機
  const discardCandidates = mustDiscard > 0
    ? (effStr > 0.70
        ? [aiFindBestDiscard(currentHand), currentHand[Math.floor(Math.random()*currentHand.length)]]
        : [currentHand[Math.floor(Math.random()*currentHand.length)]]
      ).filter(Boolean)
    : [null];

  for (const trialDiscard of discardCandidates) {
    const trialHand = trialDiscard
      ? currentHand.filter(c => c !== trialDiscard)
      : [...currentHand];

    for (let a = 0; a < Math.ceil(totalAttempts / discardCandidates.length); a++) {
      // 個性偏差影響排序：frontW 大的 BOSS 優先把好牌送前排
      const sorted = Math.random() < effStr
        ? smartSortWithPersonality(trialHand, rows, personality)
        : shuffle([...trialHand]);

      const plan = tryArrange(sorted, rows, rem, mustPlace);
      if (!plan) continue;

      const tempRows = simulateRows(rows, plan);
      // 傳入 personality 讓評分帶入偏差
      const score = scoreEnemyRows(tempRows, personality);
      if (!bestPlan || score > bestPlan.score) {
        bestPlan = { placeOps: plan, discard: trialDiscard, score };
      }
    }
  }

  // 執行最佳方案
  if (bestPlan) {
    bestPlan.placeOps.forEach(op => {
      game.enemyRows[op.row].push(op.card);
      game.enemyHand = game.enemyHand.filter(c => c !== op.card);
      spawnParticles(
        getRowSlotX(op.row, game.enemyRows[op.row].length-1, true) + CONFIG.CARD_W/2,
        getRowY(op.row, true) + CONFIG.CARD_H/2,
        '#ff6644', 6
      );
    });
    if (bestPlan.discard) {
      game.enemyDiscards.push(bestPlan.discard);
      game.enemyHand = game.enemyHand.filter(c => c !== bestPlan.discard);
    }
  }
  game.enemyHand = [];
}

// 帶個性偏差的排序：frontW 大 → 高牌優先推到前排位置
function smartSortWithPersonality(hand, existingRows, personality) {
  const allCards = [...existingRows.front, ...existingRows.middle, ...existingRows.back, ...hand];
  const suitCount = {}, rankCount = {};
  allCards.forEach(c => {
    suitCount[c.suit] = (suitCount[c.suit]||0)+1;
    rankCount[c.rank] = (rankCount[c.rank]||0)+1;
  });
  // 前墩偏差高時，高牌優先排到前排（讓 tryArrange 放前排）
  const frontBias = (personality.frontW || 1.0) > 1.5;
  return [...hand].sort((a, b) => {
    const baseA = (a.isJoker ? 500 : 0)
                + (rankCount[a.rank] >= 3 ? a.rank * 15 : rankCount[a.rank] >= 2 ? a.rank * 8 : 0)
                + (suitCount[a.suit] >= 4 ? 60 : suitCount[a.suit] >= 3 ? 30 : 0)
                + a.rank;
    const baseB = (b.isJoker ? 500 : 0)
                + (rankCount[b.rank] >= 3 ? b.rank * 15 : rankCount[b.rank] >= 2 ? b.rank * 8 : 0)
                + (suitCount[b.suit] >= 4 ? 60 : suitCount[b.suit] >= 3 ? 30 : 0)
                + b.rank;
    if (frontBias) {
      // 前排偏差：讓高對子、高單牌排到前面的搜尋順序更靠前
      const frontValA = (rankCount[a.rank] === 2 ? a.rank * 20 : a.rank * 2);
      const frontValB = (rankCount[b.rank] === 2 ? b.rank * 20 : b.rank * 2);
      return (baseB + frontValB) - (baseA + frontValA);
    }
    return baseB - baseA;
  });
}

// 【v0.6】子龍之力：重整一排（把該排牌退回手牌，不算犯規）
function useSkill() {
  if (game.phase !== 'placing') return;
  const hasFan = game.relics.some(r => r.id === 'kongming_fan');

}

// 換牌模式：點擊已放置的牌
function trySwapSelect(card, rowName, slotIdx) {
  if (!game._skillMode) return false;
  if (!game._swapFirst) {
    game._swapFirst = { card, rowName, slotIdx };
    flashMessage(`已選第一張 [${card.rank === 14 ? 'A' : card.rank}${card.suit}]，選第二張牌互換`);
    playSound('deal');
    return true;
  }
  // Second selection — execute swap
  const a = game._swapFirst;
  if (a.card === card) {
    flashMessage("請選不同的牌"); return true;
  }
  // Swap in rows
  game.rows[a.rowName][a.slotIdx] = card;
  game.rows[rowName][slotIdx] = a.card;
  game._skillMode = false;
  game._swapFirst = null;
  game._skillUseCount = (game._skillUseCount || 0) + 1;
  game._qi = Math.max(0, (game._qi || 0) - 4);
  const spear = game.relics.find(r => r.id === 'dragon_spear');
  if (spear) game._dragonSpearActive = true;
  flashMessage(`龍膽換位！已互換 [${a.card.rank===14?'A':a.card.rank}${a.card.suit}] ↔ [${card.rank===14?'A':card.rank}${card.suit}]`);

  playSound('skill');
  return true;
}

// ============================================================
// 【最終結算】比三道、算傷害、扣血
// ============================================================
function resolveBattle() {
  game.phase = 'battle';
  game.battleResults = [];
  game.battleStep = -1;      // 當前顯示到第幾步（-1=還沒開始）
  game.battleFinalDmg = { toEnemy: 0, toPlayer: 0 };
  game.battleAnimDone = false;

  // 先計算所有結果（不立刻顯示）
  const playerArr = getBestArrangement(game.rows);
  const enemyArr  = getBestArrangement(game.enemyRows);
  const playerFoul = playerArr.foul;
  const enemyFoul  = enemyArr.foul;
  const enemy = ENEMIES[game.stage];

  const steps = [];   // 每個 step 是一個結算事件
  let dmgToEnemy = 0, dmgToPlayer = 0;
  let playerWins = 0, enemyWins = 0;

  // 犯規（FIX-ORDER: 計算 dmg 但延後 push step，先讓三道結算動畫播完，最後才公布犯規）
  const hasChangban = game.relics.find(r => r.id === 'changban');
  const _pendingFoulSteps = [];
  if (playerFoul) {
    if (hasChangban) {
      dmgToEnemy += hasChangban.value;
      _pendingFoulSteps.push({ type: 'foul', side: 'player', label: '陣型崩潰', sub: `長坂魂反擊 +${hasChangban.value}`, dmgEnemy: hasChangban.value, dmgPlayer: 0 });
    } else {
      dmgToPlayer += CONFIG.FOUL_PENALTY;
      _pendingFoulSteps.push({ type: 'foul', side: 'player', label: '⚠ 陣型崩潰！', sub: `自損 ${CONFIG.FOUL_PENALTY} HP`, dmgEnemy: 0, dmgPlayer: CONFIG.FOUL_PENALTY });
    }
  }
  if (enemyFoul) {
    dmgToEnemy += CONFIG.FOUL_PENALTY;
    _pendingFoulSteps.push({ type: 'foul', side: 'enemy', label: '敵方陣型崩潰！', sub: `對敵 +${CONFIG.FOUL_PENALTY} HP`, dmgEnemy: CONFIG.FOUL_PENALTY, dmgPlayer: 0 });
  }

  // 每場戰鬥重置遺物計數器
  game._currentWins = 0;
  game._chainBonus = 0;
  game._sealCount = 0;

  // 三道比牌
  ['front', 'middle', 'back'].forEach((row) => {
    const ph = playerArr[row];
    const eh = enemyArr[row];
    let cmp = 0;
    if (playerFoul && !enemyFoul) cmp = -1;
    else if (enemyFoul && !playerFoul) cmp = 1;
    else if (playerFoul && enemyFoul) cmp = 0;
    else cmp = compareHandsCore(ph, eh);

    const rowLabel = { front: '前 鋒', middle: '中 軍', back: '後 陣' }[row];

    if (cmp > 0) {
      game._currentWins = (game._currentWins || 0) + 1;
      const royalty = getRoyalty(row, ph);
      const base = CONFIG.HAND_BASE[ph.type] || { chips: 0, mult: 0 };
      const baseDmgRaw = (base.chips * base.mult) / CONFIG.DAMAGE_DIVISOR;
      const ctx = { row, cards: game.rows[row], handType: ph.type, enemyHandType: eh.type, win: true,
                    dmg: baseDmgRaw + royalty, trigger: [] };
      const dmgBeforeRelics = ctx.dmg;
      applyRelics(ctx);
      const finalDmg = Math.floor(ctx.dmg);
      dmgToEnemy += finalDmg;
      playerWins++;

      // 計算過程：chips × mult ÷ divisor + royalty [+ relics]
      const calcSteps = [
        `${base.chips} × ${base.mult} ÷ ${CONFIG.DAMAGE_DIVISOR} = ${baseDmgRaw.toFixed(0)}`,
        ...(royalty > 0 ? [`+ Royalty ${royalty}`] : []),
        ...(ctx.trigger.length > 0 ? ctx.trigger.map(t => `+ ${t.name} ${t.text}`) : []),
        `= ${finalDmg} 傷害`,
      ];

      steps.push({
        type: 'row', row, rowLabel, winner: 'player',
        playerHand: ph, enemyHand: eh,
        playerCards: game.rows[row].map(c => ({ ...c })),
        enemyCards: game.enemyRows[row].map(c => ({ ...c })),
        label: `我 ${handTypeName(ph.type)} > 敵 ${handTypeName(eh.type)}`,
        sub: royalty > 0 ? `+Royalty ${royalty}` : '',
        calcSteps,
        dmgEnemy: finalDmg, dmgPlayer: 0
      });
    } else if (cmp < 0) {
      let royalty = getRoyalty(row, eh);
      if (enemy.modifier === 'front_royalty' && row === 'front') royalty *= 2;
      const base = CONFIG.HAND_BASE[eh.type] || { chips: 0, mult: 0 };
      const baseDmgRaw = (base.chips * base.mult) / CONFIG.DAMAGE_DIVISOR;
      let baseDmg = baseDmgRaw + royalty;
      const calcSteps = [
        `${base.chips} × ${base.mult} ÷ ${CONFIG.DAMAGE_DIVISOR} = ${baseDmgRaw.toFixed(0)}`,
        ...(royalty > 0 ? [`+ Royalty ${royalty}`] : []),
      ];
      const wall = game.relics.find(r => r.id === 'iron_wall');
      const spear = game.relics.find(r => r.id === 'heavenly_spear');
      if (wall && !spear) { calcSteps.push(`× 鐵壁 ${wall.value}`); baseDmg *= wall.value; }
      else if (wall && spear) { calcSteps.push(`天龍破甲：無視鐵壁`); }
      if (enemy.modifier === 'double_dmg') { calcSteps.push(`× 魏武帝 1.4`); baseDmg *= 1.4; }
      if (enemy.modifier === 'double_front_dmg' && row === 'front') { calcSteps.push(`× 張遼前鋒 1.5`); baseDmg *= 1.5; }
      if (enemy.modifier === 'flush_bonus') {
        const eRank = CONFIG.HAND_RANK[eh.type] || 0;
        if (eRank >= 6) { calcSteps.push(`+ 張郃同花 +15`); baseDmg += 15; }
      }
      if (enemy.modifier === 'steady_damage') { calcSteps.push(`+ 文聘守城 +12`); baseDmg += 12; }
      // 子龍護盾：HP < 50 時前墩免疫傷害（每場一次）
      const ziShield = game.relics.find(r => r.id === 'zilong_shield');
      if (ziShield && row === 'front' && game.playerHp < 50 && !game._ziShieldUsed) {
        game._ziShieldUsed = true;
        calcSteps.push(`子龍護盾 → 前墩免傷`); baseDmg = 0;
      }
      const finalDmg = Math.floor(baseDmg);
      calcSteps.push(`= ${finalDmg} 傷害`);
      dmgToPlayer += finalDmg;
      enemyWins++;
      steps.push({
        type: 'row', row, rowLabel, winner: 'enemy',
        playerHand: ph, enemyHand: eh,
        playerCards: game.rows[row].map(c => ({ ...c })),
        enemyCards: game.enemyRows[row].map(c => ({ ...c })),
        label: `我 ${handTypeName(ph.type)} < 敵 ${handTypeName(eh.type)}`,
        sub: '',
        calcSteps,
        dmgEnemy: 0, dmgPlayer: finalDmg
      });
    } else {
      steps.push({
        type: 'row', row, rowLabel, winner: 'tie',
        playerHand: ph, enemyHand: eh,
        playerCards: game.rows[row].map(c => ({ ...c })),
        enemyCards: game.enemyRows[row].map(c => ({ ...c })),
        label: `我 ${handTypeName(ph.type)} = 敵 ${handTypeName(eh.type)}`,
        sub: '平手',
        calcSteps: ['平手 — 無傷害'],
        dmgEnemy: 0, dmgPlayer: 0
      });
    }
  });

  // FIX-ORDER: 三道結算完才 push foul step（讓 row 動畫先播）
  _pendingFoulSteps.forEach(s => steps.push(s));

  // Scoop（三道全勝後才加）— 改為倍率制：1.5x（早期）→ 1.95x（曹操關）
  const scoopMult = Math.min(
    CONFIG.SCOOP_MULT_MAX,
    CONFIG.SCOOP_MULT_BASE + game.stage * CONFIG.SCOOP_MULT_STEP
  );
  if (playerWins === 3 && !playerFoul) {
    const sm = game.relics.find(r => r.id === 'yiqiankudun');
    const dd = game.relics.find(r => r.id === 'double_down');
    const effectiveMult = dd ? 2.5 : scoopMult;  // 龍膽破軍：scoop 倍率強制 ×2.5（v0.7 從 ×3.0 降）
    const baseDmg = dmgToEnemy;
    const multBonus = Math.floor(baseDmg * (effectiveMult - 1));
    const relicBonus = sm ? sm.value : 0;
    const total = multBonus + relicBonus;
    dmgToEnemy += total;
    const ddNote = dd ? ` ★龍膽破軍` : '';
    steps.push({
      type: 'scoop', winner: 'player',
      label: `⚔ 一掃三軍！×${effectiveMult.toFixed(2)}${ddNote}`,
      sub: relicBonus > 0 ? `Scoop +${multBonus} ＋ 一騎當千 +${relicBonus}` : `Scoop 倍率加成 +${multBonus}`,
      calcSteps: [
        `基礎 ${baseDmg} × (${effectiveMult.toFixed(2)} - 1) = +${multBonus}`,
        ...(dd ? [`龍膽破軍：強制 ×2.5`] : []),
        ...(relicBonus ? [`+ 一騎當千 ${relicBonus}`] : []),
        `= 額外 +${total} 傷害`,
      ],
      dmgEnemy: total, dmgPlayer: 0,
    });
  }
  if (enemyWins === 3 && !enemyFoul) {
    const baseDmg = dmgToPlayer;
    const dd = game.relics.find(r => r.id === 'double_down');
    const enemyScoopMult = dd ? 2.5 : scoopMult + (enemy.modifier === 'scoop_plus' ? 0.5 : 0);
    const multBonus = Math.floor(baseDmg * (enemyScoopMult - 1));
    dmgToPlayer += multBonus;
    steps.push({
      type: 'scoop', winner: 'enemy',
      label: `敵方一掃三軍！×${enemyScoopMult.toFixed(2)}`,
      sub: enemy.modifier === 'scoop_plus' ? `曹洪掠奪 +${multBonus}` : `Scoop 倍率加成 +${multBonus}`,
      calcSteps: [`基礎 ${baseDmg} × (${enemyScoopMult.toFixed(2)} - 1) = +${multBonus}`],
      dmgEnemy: 0, dmgPlayer: multBonus,
    });
  }

  // 甲定乾坤：前墩勝且後墩同花以上 → 中墩無論輸贏都計算傷害
  const jiading = game.relics.find(r => r.id === 'jiading');
  if (jiading) {
    const frontWon = steps.some(s => s.type === 'row' && s.row === 'front' && s.winner === 'player');
    const backRank = CONFIG.HAND_RANK[playerArr.back ? playerArr.back.type : ''] || 0;
    if (frontWon && backRank >= 6) {  // FLUSH or better
      const midStep = steps.find(s => s.type === 'row' && s.row === 'middle');
      if (midStep && midStep.winner !== 'player') {
        const ph = playerArr.middle;
        const base = CONFIG.HAND_BASE[ph.type] || { chips: 0, mult: 0 };
        const baseDmgRaw = (base.chips * base.mult) / CONFIG.DAMAGE_DIVISOR;
        const royalty = getRoyalty('middle', ph);
        const jCtx = { row: 'middle', cards: game.rows.middle, handType: ph.type,
                       enemyHandType: ph.type, win: true, dmg: baseDmgRaw + royalty, trigger: [] };
        jCtx.trigger.push({ name:"甲定乾坤", text:"中軍強制傷害" });
        applyRelics(jCtx);
        const bonusDmg = Math.floor(jCtx.dmg);
        dmgToEnemy += bonusDmg;
        steps.push({
          type: 'scoop', winner: 'player',
          label: `甲定乾坤：中軍強制 +${bonusDmg}`,
          sub: '前墩勝＋後墩同花以上',
          calcSteps: [`甲定乾坤 中軍 +${bonusDmg}`],
          dmgEnemy: bonusDmg, dmgPlayer: 0,
        });
        flashBigText('甲定乾坤！中軍強制傷害！', '#44ffcc');
      }
    }
  }

  game.battleResults = steps;
  game.battleFinalDmg = { toEnemy: dmgToEnemy, toPlayer: dmgToPlayer };

  // Fantasyland 判定（雙方）
  // 玩家：用單道最強判定
  let playerFL = 0, enemyFL = 0;
  if (!playerFoul) {
    const fBest = evaluateHand(game.rows.front);
    const mBest = evaluateHand(game.rows.middle);
    const bBest = evaluateHand(game.rows.back);
    playerFL = checkFantasylandFromEval(fBest, mBest, bBest);
  }
  if (!enemyFoul) {
    const fBest = evaluateHand(game.enemyRows.front);
    const mBest = evaluateHand(game.enemyRows.middle);
    const bBest = evaluateHand(game.enemyRows.back);
    enemyFL = checkFantasylandFromEval(fBest, mBest, bBest);
  }
  game._pendingPlayerFL = playerFL;
  game._pendingEnemyFL  = enemyFL;

  // 開始逐步顯示
  game.battleStep = 0;
  showNextBattleStep();
}

// 逐步顯示結算（每步 1.2 秒）
function showNextBattleStep() {
  if (game.phase !== 'battle') return;  // guard: ignore stale timeouts
  if (game.battleStep >= game.battleResults.length) {
    // 所有步驟顯示完畢 → 套用傷害、等待後進入下一狀態
    const { toEnemy, toPlayer } = game.battleFinalDmg;

    // 龍鱗護甲：每關首次受傷完全免疫
    const dragonScale = game.relics.find(r => r.id === 'dragon_scale');
    if (dragonScale && toPlayer > 0 && !game._dragonScaleUsed) {
      game._dragonScaleUsed = true;
      spawnFloatScore(getPlayerHpBarX() + 100, CONFIG.LAYOUT.PLAYER_INFO_Y + 38, `免傷！（龍鱗）`);
      flashBigText('龍鱗護甲！首次傷害免疫！', '#44aaff');
      toPlayer = 0;
    }
    // 不死戰魂：HP 降至 15 以下時，本場剩餘傷害免疫（每關一次）
    const deathDefier = game.relics.find(r => r.id === 'death_defier');
    if (deathDefier && !game._deathDefierUsed && (game.playerHp - toPlayer) <= 15 && game.playerHp > 15) {
      game._deathDefierUsed = true;
      spawnFloatScore(getPlayerHpBarX() + 100, CONFIG.LAYOUT.PLAYER_INFO_Y + 38, `不死護體！`);
      flashBigText('不死戰魂！死中求活！', '#ff6644');
      toPlayer = Math.max(0, game.playerHp - 15);  // HP 最低降到 15
    }

    game.enemyHp = Math.max(0, game.enemyHp - toEnemy);
    game.playerHp = Math.max(0, game.playerHp - toPlayer);

    // 八卦逆轉：承受的傷害 50% 反彈給對手
    const bagua = game.relics.find(r => r.id === 'bagua_reversal');
    if (bagua && toPlayer > 0) {
      const reflect = Math.floor(toPlayer * bagua.value);
      game.enemyHp = Math.max(0, game.enemyHp - reflect);
      spawnFloatScore(getEnemyHpBarX() + 180, CONFIG.LAYOUT.ENEMY_INFO_Y + 60, `-${reflect}（反噬）`);
      flashBigText(`八卦逆轉！反彈 ${reflect} 傷害！`, '#cc88ff');
    }

    if (toEnemy > 0) {
      spawnFloatScore(getEnemyHpBarX() + 180, CONFIG.LAYOUT.ENEMY_INFO_Y + 60, `-${toEnemy}`);
      spawnParticles(CONFIG.W/2, CONFIG.LAYOUT.ENEMY_INFO_Y + 50, '#ff4444', 40);
      game.shake = Math.min(20, toEnemy / 4);
      playSound('hit');
    }
    if (toPlayer > 0) {
      spawnFloatScore(getPlayerHpBarX() + 180, CONFIG.LAYOUT.PLAYER_INFO_Y + 38, `-${toPlayer}`);
      spawnParticles(CONFIG.W/2, CONFIG.LAYOUT.PLAYER_INFO_Y + 38, '#ff8800', 40);
      game.shake = Math.max(game.shake, Math.min(15, toPlayer / 4));
      playSound('hurt');
    }

    // Fantasyland 判定
    if (game._pendingPlayerFL > 0) {
      game.fantasylandPending = game._pendingPlayerFL;
      flashBigText(`夢幻國度！${game._pendingPlayerFL} 張`, '#ff44ff');
      const queenGrace = game.relics.find(r => r.id === 'queen_grace');
      if (queenGrace && !game._queenGraceUsed) {
        game.playerHp = Math.min(CONFIG.PLAYER_MAX_HP, game.playerHp + queenGrace.value);
        game._queenGraceUsed = true;
        spawnFloatScore(getPlayerHpBarX() + 100, CONFIG.LAYOUT.PLAYER_INFO_Y + 38, `+${queenGrace.value}`);
      }
      playSound('crit');
    }
    if (game._pendingEnemyFL > 0) {
      game.enemyFantasylandPending = game._pendingEnemyFL;
      flashBigText(`對手也進夢幻！${game._pendingEnemyFL} 張`, '#ff88ff');
    }

    game.message = `我 -${toPlayer} HP ／ 敵 -${toEnemy} HP`;
    game.battleAnimDone = true;

    // 儲存牌局紀錄
    const logEntry = {
      stage: game.stage,
      enemyName: ENEMIES[game.stage].name,
      round: game.matchLog.length + 1,
      playerRows: {
        front: game.rows.front.map(c => ({ ...c })),
        middle: game.rows.middle.map(c => ({ ...c })),
        back: game.rows.back.map(c => ({ ...c })),
      },
      enemyRows: {
        front: game.enemyRows.front.map(c => ({ ...c })),
        middle: game.enemyRows.middle.map(c => ({ ...c })),
        back: game.enemyRows.back.map(c => ({ ...c })),
      },
      playerDiscards: game.discards.map(c => ({ ...c })),
      enemyDiscards: game.enemyDiscards.map(c => ({ ...c })),
      steps: [...game.battleResults],
      dmgToEnemy: toEnemy,
      dmgToPlayer: toPlayer,
      playerHpBefore: game.playerHp + toPlayer,
      enemyHpBefore: game.enemyHp + toEnemy,
      inFantasyland: game.inFantasyland,
    };
    game.matchLog.unshift(logEntry);      // 最新的在最前面
    if (game.matchLog.length > 8) game.matchLog.pop();

    game._resAnimStart = Date.now();
    if (game._battleResultTimer) clearTimeout(game._battleResultTimer);
    game._battleResultTimer = setTimeout(() => finishBattle(), 9000);
    return;
  }

  const step = game.battleResults[game.battleStep];
  game.battleStep++;

  // 高亮對應的道
  if (step.row) {
    if (step.winner === 'player') game.glowRows.player[step.row] = 60;
    else if (step.winner === 'enemy') game.glowRows.enemy[step.row] = 60;
  }

  // 音效
  if (step.winner === 'player') playSound('place');
  else if (step.winner === 'enemy') playSound('hurt');
  else if (step.type === 'scoop') playSound('crit');
  else if (step.type === 'foul') playSound('error');

  setTimeout(() => showNextBattleStep(), 1300);
}

function finishBattle() {
  if (game.phase !== 'battle') return;  // guard: ignore stale timeouts
  // 呂布遺甲：本局受傷 > 30，下一局輸出 ×2
  const lubu = game.relics.find(r => r.id === 'lubu');
  if (lubu && game.battleFinalDmg.toPlayer > 30) {
    game._revengeBuff = true;
    flashBigText('呂布遺甲！下局 ×2！', '#ff8800');
  }

  // 長坂英魂：三道全勝，HP 上限永久 +10（最多累積 +100）
  const ziLegend = game.relics.find(r => r.id === 'zilong_legend');
  if (ziLegend) {
    const rowWinsZL = (game.battleResults || []).filter(s => s.type === 'row' && s.winner === 'player').length;
    if (rowWinsZL === 3) {
      const maxBonus = 100;
      const currentBonus = (CONFIG.PLAYER_MAX_HP - 150);  // how much above base
      if (currentBonus < maxBonus) {
        CONFIG.PLAYER_MAX_HP += ziLegend.value;
        flashBigText(`長坂英魂！HP 上限 +${ziLegend.value}→${CONFIG.PLAYER_MAX_HP}`, '#cc88ff');
      }
    }
  }

  // 諸葛連弩：三道全勝，累積連勝
  const zhuge = game.relics.find(r => r.id === 'zhuge');
  if (zhuge) {
    const steps = game.battleResults || [];
    const rowWins = steps.filter(s => s.type === 'row' && s.winner === 'player').length;
    if (rowWins === 3) {
      game._zhugeStreak = (game._zhugeStreak || 0) + 1;
      if (game._zhugeStreak >= 3) {
        const bonus = zhuge.value;
        game.enemyHp = Math.max(0, game.enemyHp - bonus);
        spawnFloatScore(getEnemyHpBarX() + 180, CONFIG.LAYOUT.ENEMY_INFO_Y + 60, `-${bonus}`);
        flashBigText(`連弩！-${bonus}！`, '#88ccff');
        game._zhugeStreak = 0;
      } else {
        flashBigText(`連弩蓄力 ${game._zhugeStreak}/3`, '#88ccff');
      }
    } else {
      game._zhugeStreak = 0;
    }
  }

  // 皇后恩典 revive
  const queenGrace = game.relics.find(r => r.id === 'queen_grace');
  if (game.playerHp <= 0 && queenGrace && !game._reviveUsed) {
    game._reviveUsed = true;
    game.playerHp = queenGrace.value;
    spawnFloatScore(getPlayerHpBarX() + 100, CONFIG.LAYOUT.PLAYER_INFO_Y + 38, `復活！+${queenGrace.value}`);
    spawnParticles(CONFIG.W/2, CONFIG.H/2, '#ffd700', 80);
    flashBigText('皇后恩典！復活！', '#ffd700');
    playSound('victory');
    setTimeout(() => startNextMatch(), 2000);
    return;
  }

  const ahdou = game.relics.find(r => r.id === 'ahdou');

  // ===== DDA 更新 =====
  const { toEnemy: dmgE, toPlayer: dmgP } = game.battleFinalDmg;
  if (dmgE > dmgP) {
    // 玩家這局淨贏
    game._ddaWins  = (game._ddaWins  || 0) + 1;
    game._ddaLoss  = 0;
  } else if (dmgP > dmgE) {
    game._ddaLoss  = (game._ddaLoss  || 0) + 1;
    game._ddaWins  = 0;
  }

  // 銀甲白袍：連 3 場不犯規 → 下場 ×1.5
  const silArmor = game.relics.find(r => r.id === 'silver_armor');
  if (silArmor) {
    const playerFoul = getBestArrangement(game.rows).foul;
    if (!playerFoul) {
      game._noFoulStreak = (game._noFoulStreak || 0) + 1;
      if (game._noFoulStreak >= 3) {
        game._silverArmorBuff = true;
        game._noFoulStreak = 0;
        flashBigText('銀甲白袍！下場 ×1.5！', '#e8e8ff');
      }
    } else {
      game._noFoulStreak = 0;
    }
  }

  if (game.playerHp <= 0) {
    game.phase = 'gameover';
    playSound('lose');
  } else if (game.enemyHp <= 0) {
    if (ahdou) {
      game.playerHp = Math.min(CONFIG.PLAYER_MAX_HP, game.playerHp + ahdou.value);
      spawnFloatScore(getPlayerHpBarX() + 100, CONFIG.LAYOUT.PLAYER_INFO_Y + 38, `+${ahdou.value}`);
    }
    if (game.stage >= ENEMIES.length - 1) {
      game.phase = 'victory';
      clearSave();  // UI v2 Milestone 2: 通關全 10 關 → 清存檔
      playSound('victory');
    } else prepareReward();
  } else {
    // 敵方仍有 HP，直接進入下一場（不另設 timer，否則點擊後仍卡住）
    startNextMatch();
  }
}

// 同關卡內再戰一場（HP 保留、洗新牌、重置三道）
function startNextMatch() {
  startBGM('battle');
  game._resBtns = null;
  game._resAnimStart = null;
  if (game._battleResultTimer) { clearTimeout(game._battleResultTimer); game._battleResultTimer = null; }

  // ── 每場戰鬥開始的遺物觸發 ──
  // 血盟誓約：扣 15 HP，本場傷害 ×2.5
  game._bloodPactActive = false;
  const bloodPact = game.relics.find(r => r.id === 'blood_pact');
  if (bloodPact) {
    const cost = 15;
    game.playerHp = Math.max(1, game.playerHp - cost);
    game._bloodPactActive = true;
    spawnFloatScore(getPlayerHpBarX() + 100, CONFIG.LAYOUT.PLAYER_INFO_Y + 38, `-${cost}（血盟）`);
    flashBigText('血盟誓約！-15 HP，傷害 ×2.5', '#cc2244');
  }
  // 福星高照：20% 機率本場傷害 ×2
  game._fortuneActive = false;
  if (game.relics.find(r => r.id === 'fortune_star') && Math.random() < 0.2) {
    game._fortuneActive = true;
    flashBigText('福星高照！本場傷害 ×2！', '#ffdd00');
  }
  // 武侯遺策：顯示敵方第一張牌
  game._wuhouReveal = !!game.relics.find(r => r.id === 'wuhou_scroll');
  // 每場重置計數器
  game._medicHealCount = 0;
  game._berserkerStack = 0;

  applyRoundStartModifier();  // 每場戰鬥開始觸發 BOSS 特殊能力
  game.deck = newDeck();
  game.hand = [];
  game.enemyHand = [];
  game.rows = { front: [], middle: [], back: [] };
  game.enemyRows = { front: [], middle: [], back: [] };
  game.discards = [];
  game.enemyDiscards = [];
  game.round = 0;
  game.skillUsed = false;
  game.battleResults = [];
  game.battleAnimDone = false;

  // 對手 Fantasyland pending（AI 也進 Fantasyland）
  const enemyFL = game.enemyFantasylandPending || 0;
  game.enemyFantasylandPending = 0;

  if (game.fantasylandPending > 0) {
    startFantasyland(game.fantasylandPending, enemyFL);
    game.fantasylandPending = 0;
  } else if (enemyFL > 0) {
    // 只有對手進 Fantasyland：對手一次拿牌，玩家走正常流程
    game.inFantasyland = false;
    startEnemyOnlyFantasyland(enemyFL);
  } else {
    game.inFantasyland = false;
    startRound();
  }
}

// 進入 Fantasyland：一次發 N 張到玩家手牌、AI 也用啟發式一次擺好
// 玩家進 Fantasyland（enemyFL > 0 表示對手也進）
function startFantasyland(cardCount, enemyFL) {
  game.inFantasyland = true;
  game._queenGraceUsed = false;  // reset so FL HP bonus fires each time FL is entered
  recalcCaps();

  // 玩家發 N 張並排序
  for (let i = 0; i < cardCount; i++) {
    if (game.deck.length > 0) game.hand.push(game.deck.pop());
  }
  sortHand(game.hand);

  game.mustPlace = 13;
  game.mustDiscard = cardCount - 13;
  game.placedThisRound = 0;
  game.selectedCard = null;
  game.round = 1;

  if (enemyFL > 0) {
    // 雙方都進 Fantasyland — AI 也一次拿 enemyFL 張
    game.enemyHand = [];
    for (let i = 0; i < enemyFL; i++) {
      if (game.deck.length > 0) game.enemyHand.push(game.deck.pop());
    }
    // AI 直接從手牌中找最佳 13 張擺法
    game.enemyFantasyQueue = game.enemyHand;
    game.enemyFantasyRound = 0;
    game._enemyFantasyDone = false;
    setTimeout(() => doEnemyFantasyTurn(), 2000);
    game.message = `★ 雙方皆入夢幻！你 ${cardCount} 張 / 敵 ${enemyFL} 張 ★`;
  } else {
    // 只有玩家進 Fantasyland，AI 走正常 5 回合節奏
    game.enemyHand = [];
    game.enemyFantasyQueue = [];
    for (let i = 0; i < 17; i++) {
      if (game.deck.length > 0) game.enemyFantasyQueue.push(game.deck.pop());
    }
    game.enemyFantasyRound = 0;
    game._enemyFantasyDone = false;
    setTimeout(() => doEnemyFantasyTurn(), 1500);
    game.message = `★夢幻國度★ 一次拿到 ${cardCount} 張！排好 13 張、其餘自動棄掉`;
  }

  game.phase = 'placing';
  playSound('skill');
}

// 只有 AI 進 Fantasyland，玩家走正常流程
function startEnemyOnlyFantasyland(enemyFL) {
  game.enemyHand = [];
  for (let i = 0; i < enemyFL; i++) {
    if (game.deck.length > 0) game.enemyHand.push(game.deck.pop());
  }
  // AI 快速擺好（用啟發式最佳解），再走正常回合讓玩家看到
  // 這邊 AI 已經有了所有牌，直接計算最佳配置
  const aiCards = [...game.enemyHand];
  game.enemyHand = [];
  let best = null;
  for (let a = 0; a < 150; a++) {
    const shuffled = shuffle([...aiCards]);
    const rows = { front: shuffled.slice(0,3), middle: shuffled.slice(3,8), back: shuffled.slice(8,13) };
    if (!checkFoul(rows)) {
      const score = scoreEnemyRows(rows);
      if (!best || score > best.score) best = { rows, score };
    }
  }
  if (best) {
    game.enemyRows = best.rows;
  } else {
    const s = [...aiCards].sort((a,b)=>b.rank-a.rank);
    game.enemyRows = { front:s.slice(10,13), middle:s.slice(5,10), back:s.slice(0,5) };
  }
  // 棄掉剩下（enemyFL - 13 張）
  for (let i = 13; i < enemyFL; i++) {
    if (aiCards[i]) game.enemyDiscards.push(aiCards[i]);
  }
  // 玩家走正常流程（但訊息顯示對手進了夢幻）
  game.message = `對手進入夢幻國度（${enemyFL} 張）！你照常出牌`;
  startRound();
}

// AI 在玩家 Fantasyland 期間，一回合一回合擺（讓玩家看得到動作）
function doEnemyFantasyTurn() {
  if (game._enemyFantasyDone) return;
  game.enemyFantasyRound++;
  const enemy = ENEMIES[game.stage];
  const isFirst = game.enemyFantasyRound === 1;
  const dealCount = isFirst ? 5 : 3;
  const placeCount = isFirst ? 5 : 2;
  const discardCount = isFirst ? 0 : 1;

  // 從 queue 取出本回合的牌
  for (let i = 0; i < dealCount; i++) {
    if (game.enemyFantasyQueue.length > 0) {
      game.enemyHand.push(game.enemyFantasyQueue.shift());
    }
  }

  // AI 決策（沿用原本的 aiDecide）
  aiDecide(enemy.ai, placeCount, discardCount);

  // 檢查是否擺完
  const enemyTotal = game.enemyRows.front.length + game.enemyRows.middle.length + game.enemyRows.back.length;
  if (enemyTotal >= 13 || game.enemyFantasyRound >= 5) {
    game._enemyFantasyDone = true;
    // 看玩家是否也擺完，若是則結算
    tryResolveFantasyland();
  } else {
    // 排程下一回合
    setTimeout(() => doEnemyFantasyTurn(), 1500);
  }
}

// 嘗試結算 Fantasyland（玩家+AI 都擺完才執行）
function tryResolveFantasyland() {
  const playerTotal = game.rows.front.length + game.rows.middle.length + game.rows.back.length;
  const enemyTotal = game.enemyRows.front.length + game.enemyRows.middle.length + game.enemyRows.back.length;
  if (playerTotal >= 13 && enemyTotal >= 13) {
    setTimeout(() => resolveBattle(), 800);
  }
}

function applyRelics(ctx) {
  game.relics.forEach(r => { if (r.effect) r.effect(ctx); });
  // 呂布遺甲 revenge_buff：上一局受傷 > 30，本局傷害 ×2
  if (game._revengeBuff && ctx.win) {
    ctx.dmg *= 2;
    ctx.trigger.push({ name: "呂布遺甲", text: "×2（復仇）" });
    game._revengeBuff = false;
  }
  // 龍膽破陣：子龍之力後全場傷害 ×1.2
  if (game._dragonSpearActive && ctx.win) {
    ctx.dmg *= 1.2;
    ctx.trigger.push({ name: "龍膽破陣", text: "×1.2（龍魂）" });
  }
  // 銀甲白袍：連不犯規獎勵 ×1.5
  if (game._silverArmorBuff && ctx.win) {
    ctx.dmg *= 1.5;
    ctx.trigger.push({ name: "銀甲白袍", text: "×1.5（不犯規）" });
  }
  // 長坂衝鋒：第一回合 +50%
  const charge = game.relics.find(r => r.id === 'changban_charge');
  if (charge && game.round === 1 && ctx.win) {
    ctx.dmg *= charge.value;
    ctx.trigger.push({ name: "長坂衝鋒", text: `×${charge.value}（先鋒）` });
  }
  // 戰功勳章：每關 +8（最多 +80）
  const trophy = game.relics.find(r => r.id === 'war_trophy');
  if (trophy && ctx.win) {
    const bonus = Math.min(game.stage * trophy.value, 80);
    if (bonus > 0) {
      ctx.dmg += bonus;
      ctx.trigger.push({ name: "戰功勳章", text: `+${bonus}` });
    }
  }
}

function prepareReward() {
  const owned = new Set(game.relics.map(r => r.id));
  const pool = RELICS.filter(r => !owned.has(r.id));
  // 加權隨機抽選：依 rarity weight 決定出現機率
  function weightedShuffle(arr) {
    const weighted = [];
    arr.forEach(r => {
      const w = r.weight || 1.0;
      const copies = Math.max(1, Math.round(w * 10));
      for (let i = 0; i < copies; i++) weighted.push(r);
    });
    // 洗牌後去重
    const seen = new Set();
    const result = [];
    shuffle(weighted).forEach(r => { if (!seen.has(r.id)) { seen.add(r.id); result.push(r); } });
    return result;
  }
  game.rewardChoices = weightedShuffle([...pool]).slice(0, 3);
  game._rewardQuote = VICTORY_QUOTES[Math.floor(Math.random() * VICTORY_QUOTES.length)];
  // T6b 已 rollback：直接進入神兵選擇，不經過 transition 過場
  // (drawStageTransition + drawCharTransition 連串 9 秒太長，玩家以為卡住)
  game.phase = 'reward';
  game.message = "戰勝！選擇一件神兵 / 戰功";
  playSound('reward');
}

function chooseReward(idx) {
  startBGM('battle');
  game.relics.push(game.rewardChoices[idx]);
  recalcCaps();
  game.stage++;
  saveProgress();  // UI v2 Milestone 2: 自動存進度（next stage to fight）
  // 進入角色過場，展示下一關敵將立繪後再 startStage()
  game._charTransStart = Date.now();
  game._charTransAdvanced = false;
  game.phase = 'char_transition';
}

function flashMessage(msg) { game.message = msg; }
function flashBigText(text, color) {
  game.floatTexts.push({ text, color, x: CONFIG.W/2, y: CONFIG.H/2, life: 80, scale: 0.1 });
}
function spawnFloatScore(x, y, text, color) {
  color = color || '#ffd700';
  game.floatTexts.push({ text, color, x, y, life: 70, scale: 1 });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    game.particles.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 30 + Math.random()*25, color, size: 2 + Math.random()*3,
    });
  }
}
function updateEffects() {
  game.particles = game.particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--;
    return p.life > 0;
  });
  game.floatTexts = game.floatTexts.filter(t => {
    t.life--;
    if (t.scale < 1.2) t.scale += 0.08;
    t.y -= 0.5;
    return t.life > 0;
  });
  ['player', 'enemy'].forEach(side => {
    Object.keys(game.glowRows[side] || {}).forEach(k => {
      game.glowRows[side][k]--;
      if (game.glowRows[side][k] <= 0) delete game.glowRows[side][k];
    });
  });
  game.shake *= CONFIG.SHAKE_DECAY;
}

function _initTone() {
  if (_toneReady || typeof Tone === 'undefined') return false;
  try {
    Tone.start();
    Tone.Transport.bpm.value = 120;
    const reverb = new Tone.Reverb({ decay: 1.2, wet: 0.18 }).toDestination();
    const limiter = new Tone.Limiter(-6).toDestination();
    _sfxSynths = {
      mel: new Tone.Synth({
        oscillator: { type: 'triangle8' },
        envelope: { attack: 0.005, decay: 0.12, sustain: 0.2, release: 0.3 }
      }).chain(reverb),
      metal: new Tone.MetalSynth({
        frequency: 250,
        envelope: { attack: 0.001, decay: 0.22, release: 0.04 },
        harmonicity: 3.1, modulationIndex: 16, resonance: 2800, octaves: 1.5
      }).toDestination(),
      drum: new Tone.MembraneSynth({
        pitchDecay: 0.1, octaves: 8,
        envelope: { attack: 0.001, decay: 0.35, sustain: 0, release: 0.1 }
      }).toDestination(),
      poly: new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'sine' },
        envelope: { attack: 0.02, decay: 0.4, sustain: 0.4, release: 0.6 }
      }).chain(reverb),
      noise: new Tone.NoiseSynth({
        noise: { type: 'pink' },
        envelope: { attack: 0.001, decay: 0.08, sustain: 0, release: 0.04 }
      }).toDestination()
    };
    _sfxSynths.mel.volume.value   = -8;
    _sfxSynths.metal.volume.value = -10;
    _sfxSynths.drum.volume.value  = -6;
    _sfxSynths.poly.volume.value  = -12;
    _sfxSynths.noise.volume.value = -16;
    _toneReady = true;
    return true;
  } catch(e) { console.warn('[Audio] Tone init failed:', e); return false; }
}

function playSound(type) {
  if (_audioMuted) return;
  if (typeof Tone !== 'undefined') {
    if (!_toneReady) _initTone();
    if (_toneReady) { _playSfxTone(type); return; }
  }
  _playSfxLegacy(type);
}

function _playSfxTone(type) {
  const s = _sfxSynths; if (!s) return;
  try {
    const n = Tone.now();
    switch(type) {
      case 'place':
        s.mel.triggerAttackRelease('A4', '32n', n); break;
      case 'deal':
        s.mel.triggerAttackRelease('E4', '32n', n); break;
      case 'discard':
        s.noise.triggerAttackRelease('16n', n); break;
      case 'hit':
        s.metal.triggerAttackRelease('32n', n);
        s.drum.triggerAttackRelease('C2', '16n', n + 0.02); break;
      case 'hurt':
        s.metal.triggerAttackRelease('8n', n);
        s.mel.triggerAttackRelease('D3', '8n', n + 0.06); break;
      case 'crit':
        s.drum.triggerAttackRelease('C1', '8n', n);
        s.poly.triggerAttackRelease(['G4','C5','E5'], '4n', n + 0.05);
        s.metal.triggerAttackRelease('32n', n + 0.18); break;
      case 'skill':
        s.mel.triggerAttackRelease('C5', '16n', n);
        s.mel.triggerAttackRelease('E5', '16n', n + 0.12);
        s.mel.triggerAttackRelease('G5', '8n',  n + 0.24);
        s.poly.triggerAttackRelease(['C4','G4'], '4n', n + 0.1); break;
      case 'reward':
        s.poly.triggerAttackRelease(['C4','E4','G4'], '8n', n);
        s.mel.triggerAttackRelease('G4', '16n', n + 0.12);
        s.mel.triggerAttackRelease('A4', '16n', n + 0.24);
        s.mel.triggerAttackRelease('C5', '4n',  n + 0.36); break;
      case 'victory':
        s.poly.triggerAttackRelease(['C4','E4','G4'], '16n', n);
        s.poly.triggerAttackRelease(['D4','G4','A4'], '16n', n + 0.22);
        s.poly.triggerAttackRelease(['E4','A4','C5'], '16n', n + 0.44);
        s.poly.triggerAttackRelease(['G4','C5','E5'], '2n',  n + 0.66);
        s.drum.triggerAttackRelease('C1', '8n', n + 0.66); break;
      case 'lose':
        s.mel.triggerAttackRelease('A3', '4n', n);
        s.mel.triggerAttackRelease('G3', '4n', n + 0.35);
        s.mel.triggerAttackRelease('E3', '2n', n + 0.70); break;
      case 'start':
        s.mel.triggerAttackRelease('C4', '16n', n);
        s.mel.triggerAttackRelease('E4', '16n', n + 0.10);
        s.mel.triggerAttackRelease('G4', '16n', n + 0.20);
        s.mel.triggerAttackRelease('C5', '8n',  n + 0.30); break;
      case 'error':
        s.noise.triggerAttackRelease('32n', n);
        s.mel.triggerAttackRelease('C3', '16n', n + 0.02); break;
    }
  } catch(e) {}
}

// ── BGM ──────────────────────────────────────────────────────
function startBGM(trackName) {
  if (_bgmMuted || _audioMuted) return;
  if (_bgmTrack === trackName) return;
  stopBGM();
  _bgmTrack = trackName;
  if (typeof Tone === 'undefined') return;
  if (!_toneReady) _initTone();
  if (!_toneReady) return;
  try {
    switch(trackName) {
      case 'menu':     _bgmMenu();     break;
      case 'battle':   _bgmBattle();   break;
      case 'victory':  _bgmVictory();  break;
      case 'gameover': _bgmGameover(); break;
    }
    Tone.Transport.start();
  } catch(e) { console.warn('[BGM]', e); }
}

function stopBGM() {
  try {
    Tone.Transport.stop();
    Tone.Transport.cancel();
    _bgmParts.forEach(p => { try { p.stop(); p.dispose(); } catch(_){} });
    _bgmSynths.forEach(s => { try { s.dispose(); } catch(_){} });
  } catch(_) {}
  _bgmParts = []; _bgmSynths = []; _bgmTrack = null;
}

function _percentToDb(p) {
  // 0% = -Infinity, 50% = -12 dB, 80% = -4 dB, 100% = 0 dB

// ── Track: Jazz Blues（慢爵士藍調）───────────────────────────
// 共用函式 — menu / battle / reward 全部播這一首
function _bgmJazzBlues() {
  const reverb = new Tone.Reverb({ decay: 2.2, wet: 0.32 }).toDestination();

  // 鋼琴和弦（PolySynth — triangle 近似鋼琴暖音）
  const comp = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.02, decay: 0.6, sustain: 0.22, release: 2.5 }
  }).connect(reverb);
  comp.volume.value = -12;

  // 旋律（右手，sine 偏柔）
  const mel = new Tone.Synth({
    oscillator: { type: 'sine' },
    envelope: { attack: 0.05, decay: 0.5, sustain: 0.4, release: 2.0 }
  }).connect(reverb);
  mel.volume.value = -16;

  // 低音（左手根音，triangle）
  const bs = new Tone.Synth({
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.06, decay: 0.6, sustain: 0.5, release: 1.5 }
  }).connect(reverb);
  bs.volume.value = -9;

  _bgmSynths.push(reverb, comp, mel, bs);

  Tone.Transport.bpm.value = 68;
  Tone.Transport.swing = 0.55;
  Tone.Transport.swingSubdivision = '8n';

  // ── 12-bar blues in C，Jazz shell voicings ─────────────────
  // C7 = root+3rd+b7  F7 = same  G7 = same (no 5th = jazz feel)
  const C7 = ['C3','E3','Bb3'];
  const F7 = ['F3','A3','Eb4'];
  const G7 = ['G3','B3','F4'];

  // 12小節進行表
  const chords12   = [C7,C7,C7,C7, F7,F7,C7,C7, G7,F7,C7,G7];
  const bassRoots  = ['C2','C2','C2','C2', 'F2','F2','C2','C2', 'G2','F2','C2','G2'];

  // ── Comping節奏：每小節在 "and of 1"、beat3、"and of 3"、beat4 各按一次
  const compEvents = [];
  const bassEvents = [];
  for (let b = 0; b < 12; b++) {
    const ch = chords12[b];
    const ro = bassRoots[b];
    // "bar:beat:sixteenth" notation
    compEvents.push([`${b}:0:2`, ch]);   // and of 1 (swing 8th)
    compEvents.push([`${b}:2:0`, ch]);   // beat 3
    compEvents.push([`${b}:2:2`, ch]);   // and of 3 (swing 8th)
    compEvents.push([`${b}:3:0`, ch]);   // beat 4
    // bass: beat 1 & beat 3
    bassEvents.push([`${b}:0:0`, ro]);
    bassEvents.push([`${b}:2:0`, ro]);
  }

  // ── 旋律：C blues 音階 (C Eb F Gb G Bb)，稀疏點綴 ───────────
  const melEvents = [
    ['0:1:0','C5'],  ['0:1:2','Eb5'], ['0:2:1','F5'],
    ['2:0:2','G4'],  ['2:1:1','Bb4'], ['2:2:0','C5'],
    ['4:1:0','F4'],  ['4:2:0','A4'],  ['4:3:0','Eb5'],
    ['6:0:0','C5'],  ['6:0:2','Bb4'], ['6:1:1','G4'],  ['6:2:0','F4'],
    ['8:0:2','B4'],  ['8:1:1','F4'],  ['8:2:0','G4'],
    ['10:2:0','Eb5'],['10:2:2','D5'], ['10:3:0','C5'],
  ];

  // ── Tone.Part 組裝 ─────────────────────────────────────────
  const compPart = new Tone.Part((time, chord) => {
    comp.triggerAttackRelease(chord, '8n', time);
  }, compEvents);
  compPart.loop = true; compPart.loopEnd = '12m'; compPart.start(0);

  const bassPart = new Tone.Part((time, note) => {
    bs.triggerAttackRelease(note, '4n', time);
  }, bassEvents);
  bassPart.loop = true; bassPart.loopEnd = '12m'; bassPart.start(0);

  const melPart = new Tone.Part((time, note) => {
    mel.triggerAttackRelease(note, '4n', time);
  }, melEvents);
  melPart.loop = true; melPart.loopEnd = '12m'; melPart.start(0);

  _bgmParts.push(compPart, bassPart, melPart);
}

// ── Legacy fallback ──────────────────────────────────────────
let _legacyAudioCtx = null;
function _playSfxLegacy(type) {
  if (!_legacyAudioCtx) {
    try { _legacyAudioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    catch(e) { return; }
  }
  const ac = _legacyAudioCtx, now = ac.currentTime;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  let freq=440, dur=0.1, wt='square', vol=0.07;
  switch(type){
    case 'place':   freq=600; dur=0.06; wt='square';   vol=0.06; break;
    case 'deal':    freq=350; dur=0.08; wt='triangle'; vol=0.05; break;
    case 'discard': freq=200; dur=0.15; wt='sawtooth'; vol=0.06; break;
    case 'hit':     freq=150; dur=0.3;  wt='square';   vol=0.13; break;
    case 'hurt':    freq=80;  dur=0.3;  wt='sawtooth'; vol=0.12; break;
    case 'crit':    freq=1000;dur=0.4;  wt='sine';     vol=0.14; break;
    case 'skill':   freq=880; dur=0.4;  wt='sine';     vol=0.12; break;
    case 'reward':  freq=660; dur=0.5;  wt='sine';     vol=0.1;  break;
    case 'victory': freq=880; dur=1.0;  wt='sine';     vol=0.13; break;
    case 'lose':    freq=100; dur=0.8;  wt='sawtooth'; vol=0.12; break;
    case 'start':   freq=523; dur=0.3;  wt='square';   vol=0.08; break;
    case 'error':   freq=150; dur=0.1;  wt='square';   vol=0.07; break;
  }
  o.type=wt; o.frequency.setValueAtTime(freq,now);
  if(['skill','reward','victory','crit'].includes(type)) o.frequency.exponentialRampToValueAtTime(freq*2,now+dur);
  else if(['hit','hurt','lose'].includes(type)) o.frequency.exponentialRampToValueAtTime(freq*0.4,now+dur);
  g.gain.setValueAtTime(vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+dur);
  o.start(now); o.stop(now+dur);
}

function draw() {
  const sx = (Math.random() - 0.5) * game.shake;
  const sy = (Math.random() - 0.5) * game.shake;
  ctx.save();
  ctx.translate(sx, sy);

  const grad = ctx.createRadialGradient(CONFIG.W/2, CONFIG.H/2, 100, CONFIG.W/2, CONFIG.H/2, 900);
  grad.addColorStop(0, '#2a1810');
  grad.addColorStop(1, '#0f0805');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);

  // 中央分隔線（直版：在訊息列上方）
  ctx.strokeStyle = '#5a3018';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, CONFIG.LAYOUT.DIVIDER_Y);
  ctx.lineTo(CONFIG.W, CONFIG.LAYOUT.DIVIDER_Y);
  ctx.stroke();

  // ── Phase render dispatcher（T6：取代 if-else 鏈）
  // PHASE_RENDERERS 是 phase 名稱 → 渲染函數的對應表，定義於 drawIntro 上方 (line ~3113)。
  // 找不到對應 renderer 時 fall back 到 drawBattlefield（涵蓋 placing / reward）。
  const _renderer = PHASE_RENDERERS[game.phase];
  if (_renderer) {
    _renderer();
  } else {
    drawBattlefield();
    if (game.phase === 'reward') drawReward();
  }

  // ── 全域特效層：粒子 + 飄字
  // T2 修正：限定只在 placing / battle 階段渲染，避免戰鬥殘留特效（-32 飄字、紅色粒子等）
  // 在 reward / char_transition / gameover / victory 等過場畫面留下殘影。
  // 不直接 clear 陣列是為了保留 life-decay 邏輯（line 2610-）。
  const _showFx = (game.phase === 'placing' || game.phase === 'battle');
  if (_showFx) {
    game.particles.forEach(p => {
      ctx.globalAlpha = Math.min(1, p.life / 50);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    game.floatTexts.forEach(t => {
      ctx.save();
      ctx.translate(t.x, t.y);
      ctx.scale(t.scale, t.scale);
      ctx.globalAlpha = Math.min(1, t.life / 50);
      ctx.fillStyle = t.color;
      ctx.font = 'bold 46px "Noto Serif TC", serif';
      ctx.textAlign = 'center';
      ctx.shadowColor = t.color;
      ctx.shadowBlur = 20;
      ctx.fillText(t.text, 0, 0);
      ctx.shadowBlur = 0;
      ctx.restore();
    });
  }

  // 拖曳中的牌 ghost（最上層）
  if (game._drag && game._drag.hasMoved) {
    const d = game._drag;
    const cx = d.currentX - CONFIG.CARD_W / 2;
    const cy = d.currentY - CONFIG.CARD_H / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(255, 215, 0, 0.85)';
    ctx.shadowBlur = 24;
    drawCard(cx, cy, d.card, true);
    ctx.restore();
  }

  ctx.restore();
}
