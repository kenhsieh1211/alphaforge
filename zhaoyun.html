// 共用狀態 context — 一次計算給 4 個函數複用
function _computeResultsContext() {
  const now = Date.now();
  const W = CONFIG.W, H = CONFIG.H;
  const isReview = game.logViewIdx >= 0;
  const logData  = isReview ? game.matchLog[game.logViewIdx] : null;
  const steps    = isReview ? logData.steps : game.battleResults;
  const rowSteps = steps.filter(s => s.type === 'row');
  const otherSteps = steps.filter(s => s.type !== 'row');
  const playerR  = isReview ? logData.playerRows : game.rows;
  const enemyR   = isReview ? logData.enemyRows  : game.enemyRows;
  const enemyName = isReview ? logData.enemyName : ENEMIES[game.stage].name;
  const stageNum  = isReview ? (logData.stage || 0) : game.stage;
  const allShown = isReview || game.battleAnimDone;
  const de = allShown ? (isReview ? logData.dmgToEnemy  : game.battleFinalDmg.toEnemy)  : 0;
  const dp = allShown ? (isReview ? logData.dmgToPlayer : game.battleFinalDmg.toPlayer) : 0;
  const rowWins  = rowSteps.filter(s => s.winner === 'player').length;
  const rowLoses = rowSteps.filter(s => s.winner === 'enemy').length;
  const won = rowWins > rowLoses;
  return { now, W, H, isReview, logData, steps, rowSteps, otherSteps,
           playerR, enemyR, enemyName, stageNum, allShown, de, dp,
           rowWins, rowLoses, won };
}

// Section 1: 全螢幕背景 + 大氣光暈 + 飄落微粒
function _drawResultsBg(r) {
  const { now, W, H, won } = r;
  const _rBg = _ASSET_IMGS.battleResultBg;
  if (_rBg) {
    const scale = Math.max(W / _rBg.width, H / _rBg.height);
    const sw = _rBg.width * scale, sh = _rBg.height * scale;
    ctx.drawImage(_rBg, (W - sw) / 2, (H - sh) / 2, sw, sh);
    ctx.fillStyle = won ? 'rgba(5,4,2,0.68)' : 'rgba(5,2,2,0.72)';
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = '#050201';
    ctx.fillRect(0, 0, W, H);
  }
  const _atmGr = ctx.createRadialGradient(W/2, 150, 0, W/2, 150, 400);
  _atmGr.addColorStop(0, won ? 'rgba(160,90,0,0.22)' : 'rgba(140,20,0,0.24)');
  _atmGr.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = _atmGr; ctx.fillRect(0, 0, W, H);

  for (let _pi = 0; _pi < 20; _pi++) {
    const _spd = 0.35 + (_pi%4)*0.18;
    const _ppx = (now/(18+_pi*5)*_spd + _pi*97) % W;
    const _ppy = (now/(22+_pi*3)*_spd + _pi*61) % H;
    const _pa  = 0.035 + Math.sin(now/900+_pi)*0.018;
    ctx.fillStyle = won ? `rgba(255,190,40,${_pa})` : `rgba(200,40,40,${_pa})`;
    ctx.beginPath(); ctx.arc(_ppx, _ppy, 1.2, 0, Math.PI*2); ctx.fill();
  }
}

// Section 2: Header — 標題、副題、回顧/結算雙模式、關閉按鈕
function _drawResultsHeader(r) {
  const { W, isReview, logData, stageNum, enemyName, won, allShown, steps } = r;
  const _hH = 128;
  const _hGr = ctx.createLinearGradient(0, 0, 0, _hH + 24);
  if (won) { _hGr.addColorStop(0,'#221000'); _hGr.addColorStop(1,'rgba(15,6,0,0)'); }
  else     { _hGr.addColorStop(0,'#1e0000'); _hGr.addColorStop(1,'rgba(12,0,0,0)'); }
  ctx.fillStyle = _hGr; ctx.fillRect(0, 0, W, _hH + 24);

  ctx.textAlign = 'center';
  if (isReview) {
    ctx.font = 'bold 28px "Noto Serif TC",serif';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = 'rgba(255,160,0,0.5)'; ctx.shadowBlur = 10;
    ctx.fillText('戰 鬥 回 顧', W/2, 44);
    ctx.shadowBlur = 0;
    ctx.font = '15px "Noto Serif TC",serif';
    ctx.fillStyle = '#cc9955';
    ctx.fillText(`第 ${stageNum+1} 關 · ${enemyName}`, W/2, 68);
    ctx.font = '13px "Noto Serif TC",serif';
    ctx.fillStyle = '#887755';
    ctx.fillText(`造成 ${logData.dmgToEnemy} 傷  ·  受傷 ${logData.dmgToPlayer}`, W/2, 88);
    const _rl = ctx.createLinearGradient(20,0,W-20,0);
    _rl.addColorStop(0,'rgba(0,0,0,0)'); _rl.addColorStop(0.35,'rgba(200,160,60,0.4)');
    _rl.addColorStop(0.65,'rgba(200,160,60,0.4)'); _rl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.strokeStyle=_rl; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(20,102); ctx.lineTo(W-20,102); ctx.stroke();
    // Close button
    const _cbX=W-84,_cbY=10,_cbW=72,_cbH=32;
    const _cbGr=ctx.createLinearGradient(_cbX,_cbY,_cbX,_cbY+_cbH);
    _cbGr.addColorStop(0,'#6a1400'); _cbGr.addColorStop(1,'#3a0800');
    ctx.fillStyle=_cbGr; roundRect(_cbX,_cbY,_cbW,_cbH,5,true,false);
    ctx.strokeStyle='#aa3300'; ctx.lineWidth=1.5;
    roundRect(_cbX,_cbY,_cbW,_cbH,5,false,true);
    ctx.fillStyle='#ffcc88'; ctx.font='bold 13px "Noto Serif TC",serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✕ 關閉', _cbX+_cbW/2, _cbY+_cbH/2);
    ctx.textBaseline='alphabetic';
    game._closeBtnBox={x:_cbX,y:_cbY,w:_cbW,h:_cbH};
  } else {
    game._closeBtnBox = null;
    ctx.font = '13px "Noto Serif TC",serif';
    ctx.fillStyle = won ? '#cc9944' : '#994444';
    ctx.fillText(`第 ${stageNum+1} 關 · ${enemyName}`, W/2, 20);

    const _titleAlpha = allShown ? 1 : Math.min(1, game.battleStep / Math.max(1, steps.length));
    ctx.globalAlpha = _titleAlpha;
    ctx.font = 'bold 50px "Noto Serif TC",serif';
    ctx.fillStyle = won ? '#ffd700' : '#cc3333';
    ctx.shadowColor = won ? '#ff8800' : '#880000'; ctx.shadowBlur = 22;
    ctx.fillText(won ? '大獲全勝' : '戰鬥結算', W/2, 74);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;

    ctx.font = '14px "Noto Serif TC",serif';
    ctx.fillStyle = won ? 'rgba(255,200,100,0.65)' : 'rgba(200,100,100,0.65)';
    ctx.fillText(won ? '三路對決結果如下' : '我軍潰退，請整軍再戰', W/2, 102);

    const _rl2 = ctx.createLinearGradient(20,0,W-20,0);
    _rl2.addColorStop(0,'rgba(0,0,0,0)');
    _rl2.addColorStop(0.3, won?'rgba(255,200,0,0.5)':'rgba(200,50,50,0.5)');
    _rl2.addColorStop(0.7, won?'rgba(255,200,0,0.5)':'rgba(200,50,50,0.5)');
    _rl2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.strokeStyle=_rl2; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(20,120); ctx.lineTo(W-20,120); ctx.stroke();
  }
}

// Section 3: 三道戰報卡 — 含 slide-in 動畫、勝負徽章、傷害量、卡牌縮圖、勝者金光掃過
// 回傳 _lcStartY / _lcH / _lcGap (給 section 4-5 計算 _extraY 用)
function _drawResultsRows(r) {
  const { W, now, isReview, steps, rowSteps, playerR, enemyR } = r;
  const _cs  = 0.50;
  const _cW  = Math.floor(CONFIG.CARD_W * _cs);
  const _lcX = 8, _lcW = W - 16;
  const _lcH = 148, _lcGap = 6;
  const _lcStartY = 132;

  const _midW = 66;
  const _sideW = (_lcW - _midW - 16) / 2;
  const _pX  = _lcX + 8;
  const _midX = _lcX + 8 + _sideW;

  if (!game._resAnimStart && !isReview) game._resAnimStart = now;

  const ROWS3 = ['front','middle','back'];
  const ROWLABELS3 = ['前鋒','中軍','後陣'];

  ROWS3.forEach((rowKey, ri) => {
    const matchStep  = rowSteps.find(s => s.row === rowKey);
    const rowRevealIdx = steps.findIndex(s => s.type === 'row' && s.row === rowKey);
    const isRevealed = isReview || (rowRevealIdx >= 0 && game.battleStep > rowRevealIdx);
    if (!isRevealed) return;

    const winner = matchStep ? matchStep.winner : 'tie';
    const pHand  = matchStep ? matchStep.playerHand : null;
    const eHand  = matchStep ? matchStep.enemyHand  : null;
    const dmgE   = matchStep ? (matchStep.dmgEnemy  || 0) : 0;
    const dmgP   = matchStep ? (matchStep.dmgPlayer || 0) : 0;
    const cSteps = matchStep ? (matchStep.calcSteps || []) : [];

    const _elapsed = game._resAnimStart ? (now - game._resAnimStart) : 9999;
    const _slideT  = isReview ? 1 : Math.min(1, (_elapsed/360) - ri*0.28);
    const _slideOff = _slideT >= 1 ? 0 : (1 - Math.max(0,_slideT)) * (-90);
    const _fadeA   = Math.max(0, Math.min(1, _slideT * 2));

    ctx.save();
    ctx.translate(0, _slideOff);
    ctx.globalAlpha = _fadeA;

    const _ly = _lcStartY + ri * (_lcH + _lcGap);

    const _winBg = winner === 'player' ? '#091a0e' : winner === 'enemy' ? '#1a0505' : '#0b0b18';
    const _winBd = winner === 'player' ? '#44cc66' : winner === 'enemy' ? '#cc3333' : '#5566aa';
    const _winGl = winner === 'player' ? '#22cc44' : winner === 'enemy' ? '#cc2222' : '#4455aa';

    const _lcBg = ctx.createLinearGradient(_lcX,_ly,_lcX,_ly+_lcH);
    _lcBg.addColorStop(0, _winBg); _lcBg.addColorStop(1,'#060403');
    ctx.fillStyle = _lcBg; roundRect(_lcX,_ly,_lcW,_lcH,8,true,false);

    ctx.shadowColor = _winGl; ctx.shadowBlur = winner==='tie' ? 6 : 12;
    ctx.strokeStyle = _winBd + (winner==='player'?'99':'66');
    ctx.lineWidth = winner==='player'?2:1.5;
    roundRect(_lcX,_ly,_lcW,_lcH,8,false,true);
    ctx.shadowBlur = 0;

    ctx.fillStyle = _winBd;
    ctx.fillRect(_lcX, _ly, 3, _lcH);

    const _badgeW = 44, _badgeH = 20;
    ctx.fillStyle = _winBd + '28';
    roundRect(_lcX+6, _ly+5, _badgeW, _badgeH, 4, true, false);
    ctx.strokeStyle = _winBd+'66'; ctx.lineWidth=1;
    roundRect(_lcX+6, _ly+5, _badgeW, _badgeH, 4, false, true);
    ctx.fillStyle = _winBd;
    ctx.font = 'bold 12px "Noto Serif TC",serif';
    ctx.textAlign = 'center';
    ctx.fillText(ROWLABELS3[ri], _lcX+6+_badgeW/2, _ly+5+_badgeH-5);

    ctx.textAlign = 'left';
    ctx.font = 'bold 14px "Noto Serif TC",serif';
    ctx.fillStyle = winner==='player' ? '#88ffaa' : winner==='tie' ? '#ffff99' : '#ff9999';
    ctx.fillText(pHand ? handTypeName(pHand.type) : '—', _pX+2, _ly+20);

    const _pCards = playerR[rowKey] || [];
    let _pcx = _pX + 2;
    _pCards.forEach(card => { drawCardScaled(_pcx, _ly+26, card, _cs); _pcx += _cW + 3; });

    if (cSteps.length > 0 && (dmgE > 0 || dmgP > 0)) {
      ctx.font = '13px "Noto Serif TC",sans-serif';
      ctx.fillStyle = 'rgba(190,165,120,0.75)';
      ctx.textAlign = 'left';
      const _baseLine = `基礎傷害：${dmgE > 0 ? dmgE : dmgP}`;
      ctx.fillText(_baseLine, _pX+2, _ly+_lcH-28);
      const _royalty = cSteps.find(s => s.includes('Royalty') || s.includes('加成') || s.includes('神兵'));
      if (_royalty) {
        const _rMatch = _royalty.match(/[+\-]?\d+/);
        const _rn = _rMatch ? _rMatch[0] : '';
        if (_royalty.includes('Royalty'))
          ctx.fillText(`Royalty +${_rn}`, _pX+2, _ly+_lcH-14);
        else
          ctx.fillText(_royalty.slice(0,18), _pX+2, _ly+_lcH-14);
      }
    }

    const _mx = _midX + _midW/2;
    const _resTxt  = winner==='player' ? '勝' : winner==='enemy' ? '敗' : '平';
    const _resColor= winner==='player' ? '#44ff88' : winner==='enemy' ? '#ff4444' : '#aaaaff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 38px "Noto Serif TC",serif';
    ctx.fillStyle = _resColor;
    ctx.shadowColor = _resColor; ctx.shadowBlur = 18;
    ctx.fillText(_resTxt, _mx, _ly + _lcH/2 + 12);
    ctx.shadowBlur = 0;
    ctx.font = '10px sans-serif';
    ctx.fillStyle = '#44445a';
    ctx.fillText('VS', _mx, _ly + _lcH/2 + 28);

    const _dmgColX = _lcX + _lcW - 8;
    const _eCardsRX = _dmgColX - 76;
    ctx.textAlign = 'right';
    ctx.font = 'bold 14px "Noto Serif TC",serif';
    ctx.fillStyle = winner==='enemy' ? '#ff9999' : winner==='tie' ? '#ffff99' : '#88ffaa';
    ctx.fillText(eHand ? handTypeName(eHand.type) : '—', _eCardsRX - 4, _ly+20);

    const _eCards = enemyR[rowKey] || [];
    const _eTotalW = _eCards.length * (_cW+3) - 3;
    let _ecx = _eCardsRX - 4 - _eTotalW;
    _eCards.forEach(card => { drawCardScaled(_ecx, _ly+26, card, _cs); _ecx += _cW+3; });

    if (dmgE > 0 || dmgP > 0) {
      const _bdgW=68, _bdgH=52;
      const _bdgX=_lcX+_lcW-_bdgW-4, _bdgY=_ly+(_lcH-_bdgH)/2;
      if (dmgE > 0) {
        ctx.fillStyle='rgba(20,90,35,0.88)';
        roundRect(_bdgX,_bdgY,_bdgW,_bdgH,6,true,false);
        ctx.strokeStyle='#44cc66'; ctx.lineWidth=1.5;
        roundRect(_bdgX,_bdgY,_bdgW,_bdgH,6,false,true);
        ctx.fillStyle='rgba(80,220,100,0.15)';
        roundRect(_bdgX,_bdgY,_bdgW,_bdgH,6,true,false);
        ctx.textAlign='center'; ctx.font='12px "Noto Serif TC",sans-serif';
        ctx.fillStyle='#88ffaa'; ctx.fillText('造成傷害',_bdgX+_bdgW/2,_bdgY+14);
        ctx.font='bold 22px "Noto Serif TC",serif';
        ctx.fillStyle='#44ff88';
        ctx.shadowColor='#00ff44'; ctx.shadowBlur=8;
        ctx.fillText(`+${dmgE}`,_bdgX+_bdgW/2,_bdgY+_bdgH-10);
        ctx.shadowBlur=0;
      } else {
        ctx.fillStyle='rgba(90,15,15,0.88)';
        roundRect(_bdgX,_bdgY,_bdgW,_bdgH,6,true,false);
        ctx.strokeStyle='#cc3333'; ctx.lineWidth=1.5;
        roundRect(_bdgX,_bdgY,_bdgW,_bdgH,6,false,true);
        ctx.textAlign='center'; ctx.font='12px "Noto Serif TC",sans-serif';
        ctx.fillStyle='#ffaaaa'; ctx.fillText('承受傷害',_bdgX+_bdgW/2,_bdgY+14);
        ctx.font='bold 22px "Noto Serif TC",serif';
        ctx.fillStyle='#ff6666';
        ctx.shadowColor='#ff2222'; ctx.shadowBlur=8;
        ctx.fillText(`-${dmgP}`,_bdgX+_bdgW/2,_bdgY+_bdgH-10);
        ctx.shadowBlur=0;
      }
    }

    if (winner === 'player') {
      const _sweepPos = ((now%2400)/2400);
      const _sweepX   = _lcX + _sweepPos * (_lcW + 180) - 90;
      const _sweepGr  = ctx.createLinearGradient(_sweepX,_ly,_sweepX+80,_ly);
      _sweepGr.addColorStop(0,'rgba(255,220,80,0)');
      _sweepGr.addColorStop(0.5,'rgba(255,220,80,0.12)');
      _sweepGr.addColorStop(1,'rgba(255,220,80,0)');
      ctx.fillStyle=_sweepGr;
      roundRect(_lcX,_ly,_lcW,_lcH,8,true,false);
    }

    ctx.restore();
  });

  return { _lcStartY, _lcH, _lcGap };  // 給 section 4-5 計算 _extraY
}

// 主 orchestrator — 取代原 435 行 drawResults
function drawResults() {
  if (!game.battleResults || game.battleResults.length === 0) return;
  const r = _computeResultsContext();

  _drawResultsBg(r);
  _drawResultsHeader(r);
  const { _lcStartY, _lcH, _lcGap } = _drawResultsRows(r);

  // === 從 section 3 的回傳值繼續，sections 4-6 仍 inline（_extraY 互相 share）===
  const W = r.W, isReview = r.isReview, steps = r.steps,
        rowSteps = r.rowSteps, otherSteps = r.otherSteps,
        allShown = r.allShown, de = r.de, dp = r.dp, won = r.won;


  // ── 4. Other steps (foul / scoop) ─────────────────────────────
  const _otherShown = steps.filter((s,i) => s.type !== 'row' && (isReview || i < game.battleStep));
  let _extraY = _lcStartY + 3*(_lcH+_lcGap);
  _otherShown.forEach(step => {
    const _sc = step.winner==='player' ? '#88ffaa' : step.type==='scoop' ? '#ffcc44' : '#ff8888';
    ctx.fillStyle = _sc+'22'; roundRect(8,_extraY,W-16,28,4,true,false);
    ctx.strokeStyle=_sc+'66'; ctx.lineWidth=1; roundRect(8,_extraY,W-16,28,4,false,true);
    ctx.fillStyle=_sc; ctx.font='bold 12px "Noto Serif TC",serif'; ctx.textAlign='left';
    ctx.fillText(step.label||'特殊事件',16,_extraY+19);
    ctx.textAlign='right';
    if (step.dmgEnemy>0)      { ctx.fillStyle='#88ffaa'; ctx.fillText(`+${step.dmgEnemy}`,W-14,_extraY+19); }
    else if (step.dmgPlayer>0){ ctx.fillStyle='#ff8888'; ctx.fillText(`-${step.dmgPlayer}`,W-14,_extraY+19); }
    _extraY += 32;
  });

  // ── 5. Summary Panel (only when all steps shown) ──────────────
  if (allShown) {
    const _sumY = _extraY + 8;
    const _sumH = 158;
    const _sumX = 8, _sumW = W-16;

    const _sumBg = ctx.createLinearGradient(_sumX,_sumY,_sumX,_sumY+_sumH);
    _sumBg.addColorStop(0,'rgba(22,11,4,0.94)');
    _sumBg.addColorStop(1,'rgba(10,5,2,0.90)');
    ctx.fillStyle=_sumBg; roundRect(_sumX,_sumY,_sumW,_sumH,8,true,false);
    const _sumBd=ctx.createLinearGradient(_sumX,_sumY,_sumX,_sumY+_sumH);
    _sumBd.addColorStop(0,'rgba(200,160,50,0.55)');
    _sumBd.addColorStop(0.5,'rgba(150,100,20,0.30)');
    _sumBd.addColorStop(1,'rgba(200,160,50,0.55)');
    ctx.strokeStyle=_sumBd; ctx.lineWidth=1.5;
    roundRect(_sumX,_sumY,_sumW,_sumH,8,false,true);

    // Title
    ctx.textAlign='center';
    ctx.font='bold 15px "Noto Serif TC",serif';
    ctx.fillStyle='rgba(200,160,60,0.9)';
    ctx.fillText('── 本場戰果 ──',W/2,_sumY+17);

    // Vertical divider
    ctx.strokeStyle='rgba(200,160,60,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(_sumX+_sumW/2,_sumY+24); ctx.lineTo(_sumX+_sumW/2,_sumY+_sumH-8); ctx.stroke();

    // Left: our damage received
    const _dpCol = dp===0?'#66ff88':dp<20?'#ffcc44':'#ff6666';
    ctx.textAlign='center';
    ctx.font='14px "Noto Serif TC",serif'; ctx.fillStyle='#886644';
    ctx.fillText('我方承傷',_sumX+_sumW/4,_sumY+36);
    ctx.font=`bold 36px "Noto Serif TC",serif`; ctx.fillStyle=_dpCol;
    ctx.shadowColor=_dpCol; ctx.shadowBlur=10;
    ctx.fillText(dp===0?'無傷':'-'+dp, _sumX+_sumW/4, _sumY+80);
    ctx.shadowBlur=0;
    if (!isReview) {
      ctx.font='13px "Noto Serif TC",serif'; ctx.fillStyle='rgba(180,140,80,0.65)';
      ctx.fillText(`兵力 ${game.playerHp} / ${CONFIG.PLAYER_MAX_HP}`,_sumX+_sumW/4,_sumY+98);
    }

    // Right: enemy damage dealt
    const _deCol = de===0?'#ff6666':de<20?'#ffcc44':'#66ff88';
    ctx.font='14px "Noto Serif TC",serif'; ctx.fillStyle='#886644';
    ctx.fillText('敵方損傷',_sumX+_sumW*3/4,_sumY+36);
    ctx.font=`bold 36px "Noto Serif TC",serif`; ctx.fillStyle=_deCol;
    ctx.shadowColor=_deCol; ctx.shadowBlur=10;
    ctx.fillText(`+${de}`,_sumX+_sumW*3/4,_sumY+80);
    ctx.shadowBlur=0;
    if (!isReview) {
      ctx.font='13px "Noto Serif TC",serif'; ctx.fillStyle='rgba(180,140,80,0.65)';
      ctx.fillText(`敵方兵力 ${game.enemyHp}`,_sumX+_sumW*3/4,_sumY+98);
    }

    // Battle rating (center bottom)
    let _rating, _ratingC;
    if (won&&dp===0)          { _rating='完勝'; _ratingC='#ffd700'; }
    else if (won&&de>dp*2)    { _rating='優勢'; _ratingC='#88ff88'; }
    else if (won)             { _rating='險勝'; _ratingC='#ffcc44'; }
    else if (de>0)            { _rating='苦戰'; _ratingC='#ff8844'; }
    else                      { _rating='戰敗'; _ratingC='#ff4444'; }
    const _rtW=52,_rtH=24,_rtX=_sumX+_sumW/2-_rtW/2,_rtY=_sumY+36;
    ctx.fillStyle=_ratingC+'33';
    roundRect(_rtX,_rtY,_rtW,_rtH,5,true,false);
    ctx.strokeStyle=_ratingC+'88'; ctx.lineWidth=1;
    roundRect(_rtX,_rtY,_rtW,_rtH,5,false,true);

    ctx.textAlign='center';
    ctx.fillText(_rating,_sumX+_sumW/2,_rtY+_rtH-5);
    ctx.shadowBlur=0;

    // Best lane
    const _bestLane = rowSteps.reduce((best,s) => {
      if (s.winner==='player' && (s.dmgEnemy||0) > best.dmg) return {name:s.rowLabel||'前鋒',dmg:s.dmgEnemy||0};
      return best;
    },{name:'—',dmg:0});
    ctx.font='13px "Noto Serif TC",serif'; ctx.fillStyle='rgba(180,150,80,0.8)';
    ctx.fillText(`最佳戰線：${_bestLane.name}`,_sumX+_sumW/2,_rtY+_rtH+14);

    // Special effects (foul/scoop labels)
    const _effSteps = steps.filter(s=>s.type==='foul'||s.type==='scoop');
    if (_effSteps.length>0) {
      const _effStr = _effSteps.map(s=>s.label||'').filter(Boolean).join(' · ');
      ctx.font='12px "Noto Serif TC",serif'; ctx.fillStyle='rgba(170,140,70,0.7)';
      wrapText(_effStr,W/2,_sumY+_sumH-10,_sumW-20,13,'center');
    }

    // ── 6. Action Buttons ──────────────────────────────────────
    if (!isReview) {
      const _btnAreaY = _sumY + _sumH + 16;
      const _stageWon = !isReview && game.enemyHp <= 0;
      if (!game._resBtns) game._resBtns = {};

      // Primary button
      const _p1W=360, _p1H=62, _p1X=(W-_p1W)/2, _p1Y=_btnAreaY;
      const _p1Hov=mousePos.x>=_p1X&&mousePos.x<=_p1X+_p1W&&mousePos.y>=_p1Y&&mousePos.y<=_p1Y+_p1H;
      const _p1Gr=ctx.createLinearGradient(_p1X,_p1Y,_p1X,_p1Y+_p1H);
      if (_stageWon) {
        _p1Gr.addColorStop(0,_p1Hov?'#3a2200':'#2a1600');
        _p1Gr.addColorStop(1,_p1Hov?'#201000':'#160a00');
        ctx.fillStyle=_p1Gr; roundRect(_p1X,_p1Y,_p1W,_p1H,8,true,false);
        ctx.shadowColor='#ffaa00'; ctx.shadowBlur=_p1Hov?20:8;
        ctx.strokeStyle=_p1Hov?'#ffd700':'#cc8800'; ctx.lineWidth=_p1Hov?2:1.5;
        roundRect(_p1X,_p1Y,_p1W,_p1H,8,false,true);
        ctx.shadowBlur=0;
        ctx.textAlign='center'; ctx.font='bold 22px "Noto Serif TC",serif';
        ctx.fillStyle=_p1Hov?'#ffe080':'#ffd700';
        ctx.fillText('▶ 領取神兵',_p1X+_p1W/2,_p1Y+_p1H/2+7);
        game._resBtns.primary={x:_p1X,y:_p1Y,w:_p1W,h:_p1H,action:'finish'};
      } else {
        _p1Gr.addColorStop(0,_p1Hov?'#3a0a0a':'#260505');
        _p1Gr.addColorStop(1,_p1Hov?'#200404':'#140202');
        ctx.fillStyle=_p1Gr; roundRect(_p1X,_p1Y,_p1W,_p1H,8,true,false);
        ctx.shadowColor='#cc2222'; ctx.shadowBlur=_p1Hov?20:8;
        ctx.strokeStyle=_p1Hov?'#ff4444':'#cc2222'; ctx.lineWidth=_p1Hov?2:1.5;
        roundRect(_p1X,_p1Y,_p1W,_p1H,8,false,true);
        ctx.shadowBlur=0;
        ctx.textAlign='center'; ctx.font='bold 22px "Noto Serif TC",serif';
        ctx.fillStyle=_p1Hov?'#ff9999':'#ee4444';
        ctx.fillText('⚔ 再戰！',_p1X+_p1W/2,_p1Y+_p1H/2+7);
        game._resBtns.primary={x:_p1X,y:_p1Y,w:_p1W,h:_p1H,action:'finish'};
      }


    }
  }
}

function drawDiscardPile(x, y, cards, label) {
  // 棄牌區：2×2 半尺寸牌格，外框等同「兩格牌寬 × 一格牌高」
  const scale = 0.5;
  const cW = Math.round(CONFIG.CARD_W * scale);  // 38
  const cH = Math.round(CONFIG.CARD_H * scale);  // 53
  const gap = 4;
  const totalW = cW * 2 + gap;  // 80
  const totalH = cH * 2 + gap;  // 110

  // 外框背景
  const grad = ctx.createLinearGradient(x, y, x, y + totalH);
  grad.addColorStop(0, 'rgba(40,20,10,0.70)');
  grad.addColorStop(1, 'rgba(20,8,4,0.70)');
  ctx.fillStyle = grad;
  roundRect(x - 3, y - 3, totalW + 6, totalH + 6, 4, true, false);
  ctx.strokeStyle = 'rgba(180,120,20,0.55)';
  ctx.lineWidth = 1;
  roundRect(x - 3, y - 3, totalW + 6, totalH + 6, 4, false, true);

  // 4 個小凹槽（2 列 × 2 欄）
  for (let row = 0; row < 2; row++) {
    for (let col = 0; col < 2; col++) {
      const cx = x + col * (cW + gap);
      const cy = y + row * (cH + gap);
      const sGrad = ctx.createLinearGradient(cx, cy, cx, cy + cH);
      sGrad.addColorStop(0, '#200606');
      sGrad.addColorStop(1, '#130303');
      ctx.fillStyle = sGrad;
      roundRect(cx, cy, cW, cH, 3, true, false);
      ctx.strokeStyle = 'rgba(140,90,0,0.3)';
      ctx.lineWidth = 1;
      roundRect(cx, cy, cW, cH, 3, false, true);
    }
  }

  // 最近 4 張牌（左上=最新，橫排優先）
  const maxShow = Math.min(cards.length, 4);
  for (let i = 0; i < maxShow; i++) {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const cx = x + col * (cW + gap);
    const cy = y + row * (cH + gap);
    drawCardScaled(cx, cy, cards[cards.length - 1 - i], scale);
  }

  // 計數標籤（右上角）
  ctx.fillStyle = '#cc9933';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`${label}${cards.length}`, x + totalW + 3, y - 5);
  ctx.textAlign = 'left';
}

function drawRow(rowKey, y, cards, cap, label, isEnemy) {
  const w = cap * CONFIG.CARD_W + (cap - 1) * 6;
  // 立繪欄 + 標籤欄之後開始放牌
  const startX = CONFIG.LAYOUT.PORTRAIT_W + CONFIG.LAYOUT.ROW_LABEL_W; // = 229
  const glow = (isEnemy ? game.glowRows.enemy : game.glowRows.player)[rowKey];

  // 玩家擺牌中：當有選牌或拖曳中，且這道還有空位 → 高亮可放置區
  const isPlacingTarget = !isEnemy && game.phase === 'placing' &&
    cards.length < cap &&
    (game.selectedCard || (game._drag && game._drag.fromRow !== rowKey));
  const dragHover = !isEnemy && game._drag && game._drag.hasMoved &&
    isOverRow(game._drag.currentX, game._drag.currentY, rowKey);

  // 拖曳懸停在這道：更強的金色光暈 + 跳動感
  if (dragHover) {
    const pulse = 0.65 + 0.35 * Math.sin(Date.now() / 120);
    ctx.shadowColor = `rgba(255, 215, 0, ${pulse})`;
    ctx.shadowBlur = 40;
    ctx.fillStyle = `rgba(255, 215, 0, ${0.18 * pulse})`;
    ctx.fillRect(startX - 14, y - 10, w + 28, CONFIG.CARD_H + 20);
    ctx.shadowBlur = 0;
  } else if (isPlacingTarget) {
    // 平時的可放置提示：較淡的金色框
    const pulse = 0.4 + 0.25 * Math.sin(Date.now() / 350);
    ctx.fillStyle = `rgba(255, 215, 0, ${0.06 + pulse * 0.04})`;
    ctx.fillRect(startX - 12, y - 8, w + 24, CONFIG.CARD_H + 16);
  }

  // 贏牌金光暈
  if (glow) {
    const alpha = glow / 60;
    ctx.shadowColor = `rgba(255, 215, 0, ${alpha})`;
    ctx.shadowBlur = 30;
    ctx.fillStyle = `rgba(255, 215, 0, ${alpha * 0.3})`;
    ctx.fillRect(startX - 12, y - 8, w + 24, CONFIG.CARD_H + 16);
    ctx.shadowBlur = 0;
  }

  // 槽位（古銅色凹槽）
  for (let i = 0; i < cap; i++) {
    const cx = startX + i * (CONFIG.CARD_W + 6);
    const slotEmpty = i >= cards.length;
    // 凹槽陰影
    const slotGrad = ctx.createLinearGradient(cx, y, cx, y + CONFIG.CARD_H);
    if (isEnemy) {
      slotGrad.addColorStop(0, '#2a0808');
      slotGrad.addColorStop(1, '#1a0404');
    } else if (isPlacingTarget && slotEmpty) {
      // 玩家可放置的空槽：淡金底，明顯許多
      slotGrad.addColorStop(0, '#3a2c10');
      slotGrad.addColorStop(1, '#1a1206');
    } else {
      slotGrad.addColorStop(0, '#0a1828');
      slotGrad.addColorStop(1, '#040810');
    }
    ctx.fillStyle = slotGrad;
    roundRect(cx, y, CONFIG.CARD_W, CONFIG.CARD_H, 4, true, false);

    // 內陰影
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    roundRect(cx + 1, y + 1, CONFIG.CARD_W - 2, CONFIG.CARD_H - 2, 3, false, true);

    // 玩家可放置空槽：明顯的金色虛線邊
    if (isPlacingTarget && slotEmpty && !isEnemy) {
      ctx.save();
      ctx.strokeStyle = dragHover ? '#ffe680' : '#aa8830';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      roundRect(cx + 2, y + 2, CONFIG.CARD_W - 4, CONFIG.CARD_H - 4, 3, false, true);
      ctx.restore();
      // 槽位中心畫一個淡淡的「+」提示
      ctx.fillStyle = dragHover ? 'rgba(255,230,128,0.85)' : 'rgba(170,136,48,0.5)';
      ctx.font = 'bold 32px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('＋', cx + CONFIG.CARD_W/2, y + CONFIG.CARD_H/2 + 12);
      continue;  // 跳過原本的金邊
    }

    // 金邊（淡）
    ctx.strokeStyle = 'rgba(170, 119, 0, 0.4)';
    ctx.lineWidth = 1;
    roundRect(cx, y, CONFIG.CARD_W, CONFIG.CARD_H, 4, false, true);
  }

  // 卡片（記下命中座標 + 略過拖曳中的）
  const dragCard = (!isEnemy && game._drag && game._drag.hasMoved) ? game._drag.card : null;
  cards.forEach((c, i) => {
    const cx = startX + i * (CONFIG.CARD_W + 6);
    c._x = cx; c._y = y;
    c._rowName = rowKey; c._slotIdx = i;  // 換牌用
    if (c === dragCard) return;
    // 換牌模式高亮
    if (!isEnemy && game._skillMode) {
      const isFirst = game._swapFirst && game._swapFirst.card === c;
      ctx.save();
      ctx.shadowColor = isFirst ? '#ffcc00' : '#44aaff';
      ctx.shadowBlur = isFirst ? 22 : 12;
      ctx.strokeStyle = isFirst ? '#ffcc00' : '#66ccff';
      ctx.lineWidth = 2.5;
      roundRect(cx, y, CONFIG.CARD_W, CONFIG.CARD_H, 4, false, true);
      ctx.restore();
    }
    drawCard(cx, y, c, true);
  });

  // 標籤（前鋒/中軍/後陣，立繪右側欄）
  {
    const lx = CONFIG.LAYOUT.PORTRAIT_W;
    const lw = CONFIG.LAYOUT.ROW_LABEL_W;
    const ly = y;
    const lh = CONFIG.CARD_H;
    // 背景
    const sealBg = ctx.createLinearGradient(lx, ly, lx, ly + lh);
    if (isEnemy) {
      sealBg.addColorStop(0, 'rgba(120,15,6,0.92)');
      sealBg.addColorStop(1, 'rgba(70,6,2,0.88)');
    } else {
      sealBg.addColorStop(0, 'rgba(15,40,95,0.92)');
      sealBg.addColorStop(1, 'rgba(8,22,60,0.88)');
    }
    ctx.fillStyle = sealBg;
    ctx.fillRect(lx, ly, lw, lh);
    // 右側細分隔線
    ctx.strokeStyle = isEnemy ? 'rgba(200,70,20,0.5)' : 'rgba(50,100,200,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(lx + lw, ly); ctx.lineTo(lx + lw, ly + lh); ctx.stroke();
    // 文字
    ctx.fillStyle = isEnemy ? '#ffccaa' : '#aaccff';
    ctx.font = 'bold 14px "Noto Serif TC", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = isEnemy ? 'rgba(200,30,10,0.6)' : 'rgba(30,80,200,0.6)';
    ctx.shadowBlur = 4;
    // 直書：每字一行
    const chars = label.replace(/ /g, '');
    const charH = 16, totalH = chars.length * charH;
    const startCharY = ly + lh/2 - totalH/2 + charH/2;
    for (let ci = 0; ci < chars.length; ci++) {
      ctx.fillText(chars[ci], lx + lw/2, startCharY + ci * charH);
    }
    ctx.shadowBlur = 0;
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
  }

  // 牌型 + Royalty（直版：放在右側，緊貼最後一張卡）
  if (cards.length > 0) {
    const allRows = isEnemy ? game.enemyRows : game.rows;
    const allFull = allRows.front.length === game.cardCaps.front &&
                    allRows.middle.length === game.cardCaps.middle &&
                    allRows.back.length === game.cardCaps.back;

    let ev;
    if (allFull) {
      const arr = getBestArrangement(allRows);
      ev = arr[rowKey];
    } else {
      ev = evaluateHand(cards);
    }

    const fullColor = cards.length === cap;
    // 牌靠右後，手牌型放在牌排左側（人物圖上方）
    // 牌型顯示：卡片右端外側
    const tagX2 = startX + 5 * CONFIG.CARD_W + 4 * 6 + 6;
    const tagW2 = CONFIG.W - tagX2 - 4;
    if (tagW2 >= 40) {
      ctx.fillStyle = isEnemy ? 'rgba(80,10,5,0.75)' : 'rgba(10,25,60,0.75)';
      ctx.fillRect(tagX2, y + 4, tagW2, CONFIG.CARD_H - 8);
      ctx.strokeStyle = fullColor ? '#ffd700' : 'rgba(100,100,100,0.3)';
      ctx.lineWidth = fullColor ? 1.5 : 0.5;
      ctx.strokeRect(tagX2, y + 4, tagW2, CONFIG.CARD_H - 8);
      ctx.fillStyle = fullColor ? '#ffe680' : '#666';
      ctx.font = `${fullColor ? 'bold ' : ''}13px "Noto Serif TC", serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const handStr = handTypeName(ev.type);
      // 直書牌型
      const hChars = handStr.replace(/ /g, '');
      const hChH = 15, hTotalH = hChars.length * hChH;
      const hStartY = y + CONFIG.CARD_H/2 - hTotalH/2 + hChH/2;
      for (let hi = 0; hi < hChars.length; hi++) {
        ctx.fillText(hChars[hi], tagX2 + tagW2/2, hStartY + hi * hChH);
      }
      const royalty = getRoyalty(rowKey, ev);
      if (royalty > 0 && fullColor) {
        ctx.fillStyle = '#ffaa00';
        ctx.font = 'bold 12px sans-serif';
        ctx.fillText(`+${royalty}`, tagX2 + tagW2/2, y + CONFIG.CARD_H - 10);
      }
      ctx.textBaseline = 'alphabetic';
    }
  }

  if (!isEnemy) {
    game._rowZones = game._rowZones || {};
    game._rowZones[rowKey] = { x: startX, y, w, h: CONFIG.CARD_H };
  }
}

// ============================================================
// 【v0.6】升級版 drawCard — 花牌全圖立繪
// ============================================================
function drawCard(x, y, card, showFace) {
  const W = CONFIG.CARD_W, H = CONFIG.CARD_H;

  const rankF = Math.max(16, Math.round(W * 0.40));   // 放大
  const suitF = Math.max(13, Math.round(W * 0.30));    // 放大
  const centerF = Math.max(24, Math.round(W * 0.68));  // 放大
  const pad = Math.max(3, Math.round(W * 0.07));

  if (!showFace) {
    // === 卡背：優先使用外部 PNG，否則 canvas 龍紋精裝版 ===
    ctx.save();
    // isEnemy flag: drawCard 在 drawRow 中呼叫時以 isEnemy 參數辨別
    // 這裡用 card._isEnemy（若有傳入）決定要用哪張卡背
    const _backImg = (card && card._isEnemy) ? _ASSET_IMGS.cardBackEnemy : _ASSET_IMGS.cardBackPlayer;
    if (_backImg) {
      roundRect(x, y, W, H, 5, true, false);  // clip
      ctx.save();
      ctx.beginPath(); roundRect(x, y, W, H, 5, false, false); ctx.clip();
      ctx.drawImage(_backImg, x, y, W, H);
      ctx.restore();
    } else {
      const bgGrad = ctx.createLinearGradient(x, y, x + W, y + H);
      bgGrad.addColorStop(0, '#6a1218');
      bgGrad.addColorStop(0.4, '#3a0808');
      bgGrad.addColorStop(1, '#1a0303');
      ctx.fillStyle = bgGrad;
      roundRect(x, y, W, H, 5, true, false);
      // 金邊雙框
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
      roundRect(x + 1, y + 1, W - 2, H - 2, 5, false, true);
      ctx.strokeStyle = 'rgba(255,215,0,0.35)'; ctx.lineWidth = 0.8;
      roundRect(x + 4, y + 4, W - 8, H - 8, 3, false, true);
      // 菱格紋
      ctx.strokeStyle = 'rgba(180,80,40,0.25)'; ctx.lineWidth = 0.6;
      for (let i = -H; i < W + H; i += 12) {
        ctx.beginPath(); ctx.moveTo(x + i, y); ctx.lineTo(x + i + H, y + H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + i, y); ctx.lineTo(x + i - H, y + H); ctx.stroke();
      }
      // 中央「趙」字帶光暈
      ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#ffd700';
      ctx.font = `bold ${Math.round(W*0.52)}px "Noto Serif TC", serif`;
      ctx.textAlign = 'center';
      ctx.fillText('趙', x + W/2, y + H/2 + Math.round(W*0.52)*0.34);
      ctx.shadowBlur = 0;
    }
    ctx.restore();
    return;
  }

  // === 鬼牌 ===
  if (card.isJoker) {
    ctx.save();
    const glowA = 0.5 + Math.sin(Date.now() / 300) * 0.2;
    ctx.shadowColor = `rgba(255,100,200,${glowA})`; ctx.shadowBlur = 16;
    const jGrad = ctx.createLinearGradient(x, y, x + W, y + H);
    jGrad.addColorStop(0, '#2a0040'); jGrad.addColorStop(0.5, '#6a0080'); jGrad.addColorStop(1, '#2a0040');
    ctx.fillStyle = jGrad;
    roundRect(x, y, W, H, 5, true, false);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#cc44ff'; ctx.lineWidth = 2;
    roundRect(x, y, W, H, 5, false, true);
    ctx.strokeStyle = 'rgba(200,100,255,0.4)'; ctx.lineWidth = 0.8;
    roundRect(x+3, y+3, W-6, H-6, 4, false, true);
    // 旋轉五角星放射
    for (let a = 0; a < 5; a++) {
      const ang = a * Math.PI * 2/5 - Math.PI/2;
      ctx.strokeStyle = `rgba(255,150,255,${0.15 + Math.sin(Date.now()/400+a)*0.08})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(x+W/2, y+H/2); ctx.lineTo(x+W/2+Math.cos(ang)*35, y+H/2+Math.sin(ang)*35); ctx.stroke();
    }
    // 中央陰陽魚紋
    ctx.fillStyle = 'rgba(255,200,255,0.9)';
    ctx.beginPath(); ctx.arc(x+W/2, y+H/2, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6a0080';
    ctx.beginPath(); ctx.arc(x+W/2, y+H/2, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,200,255,0.9)';
    ctx.beginPath(); ctx.arc(x+W/2, y+H/2-5, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6a0080';
    ctx.beginPath(); ctx.arc(x+W/2, y+H/2+5, 4, 0, Math.PI*2); ctx.fill();
    // 角落文字
    const jcF = Math.max(10, Math.round(W*0.17));
    ctx.fillStyle = '#ffaaff'; ctx.font = `bold ${jcF}px serif`;
    ctx.textAlign = 'left'; ctx.fillText('鬼', x+pad, y+jcF+2);
    ctx.textAlign = 'right'; ctx.fillText('鬼', x+W-pad, y+H-4);
    ctx.restore();
    return;
  }

  const isRed = card.suit === '♥' || card.suit === '♦';
  const mainColor = isRed ? '#c41e1e' : '#111';

  // === 花牌（A/K/Q/J）— 象牙底，左上大標 + 中央大花色 ===
  if (card.rank >= 11 || card.rank === 14) {
    ctx.save();
    // 背景（淡色調）
    // T5: 花牌底色（紅黑分支）
    const _faceStops = isRed
      ? [[0, '#fff8f8'], [1, '#f5d8d8']]
      : [[0, '#fefcf4'], [1, '#ede0c0']];
    fillRoundRectVGrad(x, y, W, H, 5, _faceStops);
    // 外框（花牌用較粗雙框）
    ctx.strokeStyle = isRed ? '#8b1c1c' : '#2a2a2a'; ctx.lineWidth = 2;
    roundRect(x, y, W, H, 5, false, true);
    ctx.strokeStyle = isRed ? 'rgba(139,28,28,0.25)' : 'rgba(0,0,0,0.18)'; ctx.lineWidth = 0.8;
    roundRect(x+3, y+3, W-6, H-6, 3, false, true);
    // 左上角：牌值（大）+ 花色（中）
    ctx.fillStyle = isRed ? '#c41e1e' : '#111111';
    ctx.font = `bold ${rankF}px "Noto Serif TC", serif`;
    ctx.textAlign = 'left';
    ctx.fillText(rankStr(card.rank), x+pad, y+pad+rankF);
    ctx.font = `bold ${suitF}px sans-serif`;
    ctx.fillText(card.suit, x+pad, y+pad+rankF+suitF+3);
    // 中央：大花色 + 小牌值在下方（無旋轉）
    ctx.fillStyle = isRed ? '#c41e1e' : '#111111';
    ctx.font = `bold ${Math.round(W*0.68)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(card.suit, x+W/2, y+H*0.62);
    ctx.font = `bold ${Math.round(W*0.22)}px "Noto Serif TC", serif`;
    ctx.fillStyle = isRed ? 'rgba(160,20,20,0.50)' : 'rgba(20,20,20,0.40)';
    ctx.fillText(rankStr(card.rank), x+W/2, y+H*0.80);
    ctx.restore();
    return;
  }

  // === 數字牌（2-10）— 精緻象牙底 ===
  ctx.save();
  // T5: 數字牌底色三色漸層
  fillRoundRectVGrad(x, y, W, H, 5, [[0, '#fefcf4'], [0.5, '#f8f0dc'], [1, '#ede0c0']]);

  // 外框
  ctx.strokeStyle = isRed ? '#8b1c1c' : '#2a2a2a'; ctx.lineWidth = 1.5;
  roundRect(x, y, W, H, 5, false, true);
  ctx.strokeStyle = isRed ? 'rgba(139,28,28,0.15)' : 'rgba(0,0,0,0.12)'; ctx.lineWidth = 0.5;
  roundRect(x+3, y+3, W-6, H-6, 3, false, true);

  ctx.fillStyle = mainColor;
  // 左上角：牌值 + 花色
  ctx.font = `bold ${rankF}px "Noto Serif TC", serif`;
  ctx.textAlign = 'left';
  ctx.fillText(rankStr(card.rank), x+pad, y+pad+rankF-1);
  ctx.font = `bold ${suitF}px sans-serif`;
  ctx.fillText(card.suit, x+pad, y+pad+rankF+suitF+1);
  // 中央大花色（無旋轉倒字）
  ctx.fillStyle = mainColor;
  ctx.font = `bold ${centerF}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.shadowColor = isRed ? 'rgba(196,30,30,0.4)' : 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 4;
  ctx.fillText(card.suit, x+W/2, y+H/2+centerF*0.32);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// 圓角矩形輔助函式
function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

// ============================================================
// 【T5 PRIMITIVES】canvas 繪圖共用工具 — 集中常見模式減少 41 個 draw 函數的重複
// ============================================================

// 建構垂直線性漸層。stops 格式：[[0, '#fff'], [1, '#000']]
function vGrad(x, y, h, stops) {
  const g = ctx.createLinearGradient(x, y, x, y + h);
  for (const [pos, color] of stops) g.addColorStop(pos, color);
  return g;
}

// 建構水平線性漸層
function hGrad(x, y, w, stops) {
  const g = ctx.createLinearGradient(x, y, x + w, y);
  for (const [pos, color] of stops) g.addColorStop(pos, color);
  return g;
}

// 圓角矩形 + 垂直漸層填色（最常見的卡片/面板背景模式）
function fillRoundRectVGrad(x, y, w, h, r, stops) {
  ctx.fillStyle = vGrad(x, y, h, stops);
  roundRect(x, y, w, h, r, true, false);
}

// 居中文字 + 可選陰影
// opts: { font, color, shadow, blur, baseline }
function textCentered(text, x, y, opts) {
  const o = opts || {};
  ctx.save();
  if (o.font) ctx.font = o.font;
  ctx.textAlign = 'center';
  if (o.baseline) ctx.textBaseline = o.baseline;
  if (o.color) ctx.fillStyle = o.color;
  if (o.shadow) { ctx.shadowColor = o.shadow; ctx.shadowBlur = o.blur || 8; }
  ctx.fillText(text, x, y);
  ctx.restore();
}

// 雙邊框（外粗內細）— 卡片金邊常用
// outer/inner: { color, width, radius?, inset? }
function drawDoubleBorder(x, y, w, h, r, outer, inner) {
  ctx.strokeStyle = outer.color; ctx.lineWidth = outer.width;
  roundRect(x, y, w, h, r, false, true);
  if (inner) {
    const ins = inner.inset || 3;
    ctx.strokeStyle = inner.color; ctx.lineWidth = inner.width;
    roundRect(x + ins, y + ins, w - ins * 2, h - ins * 2, inner.radius || (r - 2), false, true);
  }
}

function drawHand() {
  const handY = CONFIG.LAYOUT.HAND_Y;
  const total = game.hand.length;
  if (total === 0) {
    game._handBounds = { top: handY - 22, bottom: handY + CONFIG.CARD_H + 8 };
    return;
  }
  const cardW = CONFIG.CARD_W, cardH = CONFIG.CARD_H;
  const sideMargin = 12;
  const maxRowW = CONFIG.W - sideMargin * 2;
  const gap = 6;

  // 判斷單排還是雙排：超過 9 張 → 雙排（夢幻國度時很常見）
  const SPLIT_THRESHOLD = 9;
  const useTwoRows = total > SPLIT_THRESHOLD;

  // 拆分成 1 或 2 排
  let rowsArr;
  if (useTwoRows) {
    const half = Math.ceil(total / 2);
    rowsArr = [game.hand.slice(0, half), game.hand.slice(half)];
  } else {
    rowsArr = [game.hand];
  }

  // 計算每排的 startX 與步距（若還是太寬就壓縮重疊）
  const rowMeta = rowsArr.map(rowCards => {
    const n = rowCards.length;
    let step = cardW + gap;
    let totalW = n * cardW + (n - 1) * gap;
    if (totalW > maxRowW && n > 1) {
      step = (maxRowW - cardW) / (n - 1);
      totalW = step * (n - 1) + cardW;
    }
    const startX = (CONFIG.W - totalW) / 2;
    return { startX, step, totalW };
  });

  // 背景：覆蓋所有排
  const bgTop = handY - 26;
  const bgBottom = useTwoRows
    ? handY + (cardH + CONFIG.LAYOUT.HAND_2ROW_GAP) + cardH + 10
    : handY + cardH + 10;
  const bgX = sideMargin - 4;
  const bgW = CONFIG.W - 2 * (sideMargin - 4);
  const bgH = bgBottom - bgTop;
  const t_now = Date.now() / 1000;

  // 主體漸層（木質暗紋感）
  const bgGrad = ctx.createLinearGradient(0, bgTop, 0, bgBottom);
  bgGrad.addColorStop(0, 'rgba(70,34,12,0.93)');
  bgGrad.addColorStop(0.3, 'rgba(48,22,8,0.90)');
  bgGrad.addColorStop(0.7, 'rgba(38,18,6,0.90)');
  bgGrad.addColorStop(1, 'rgba(60,30,10,0.93)');
  ctx.fillStyle = bgGrad;
  roundRect(bgX, bgTop, bgW, bgH, 8, true, false);

  // 外框（雙重金邊）
  ctx.strokeStyle = 'rgba(200,140,20,0.80)';
  ctx.lineWidth = 2;
  roundRect(bgX, bgTop, bgW, bgH, 8, false, true);
  ctx.strokeStyle = 'rgba(255,210,80,0.28)';
  ctx.lineWidth = 0.8;
  roundRect(bgX + 4, bgTop + 4, bgW - 8, bgH - 8, 5, false, true);

  // 頂部光澤條
  const topShine = ctx.createLinearGradient(0, bgTop, 0, bgTop + bgH * 0.3);
  topShine.addColorStop(0, 'rgba(255,190,80,0.14)');
  topShine.addColorStop(1, 'rgba(255,190,80,0)');
  ctx.fillStyle = topShine;
  roundRect(bgX + 1, bgTop + 1, bgW - 2, bgH * 0.3, 7, true, false);

  // 四角菊花紋飾
  function drawCornerOrnament(cx2, cy2, flip) {
    ctx.save();
    ctx.translate(cx2, cy2);
    if (flip) ctx.scale(-1, -1);
    ctx.strokeStyle = 'rgba(200,150,30,0.65)';
    ctx.lineWidth = 1.2;
    // L形角線
    ctx.beginPath(); ctx.moveTo(0, 12); ctx.lineTo(0, 0); ctx.lineTo(12, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 6); ctx.lineTo(0, 0); ctx.lineTo(6, 0); ctx.stroke();
    // 小菱形
    ctx.fillStyle = 'rgba(220,170,40,0.75)';
    ctx.beginPath();
    ctx.moveTo(3, 0); ctx.lineTo(6, 3); ctx.lineTo(3, 6); ctx.lineTo(0, 3); ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  drawCornerOrnament(bgX + 8, bgTop + 8, false);
  drawCornerOrnament(bgX + bgW - 8, bgTop + 8, true);
  drawCornerOrnament(bgX + 8, bgTop + bgH - 8, false);
  drawCornerOrnament(bgX + bgW - 8, bgTop + bgH - 8, true);

  // 標題（帶脈衝微光）
  const titlePulse = 0.85 + 0.15 * Math.sin(t_now * 1.6);
  ctx.fillStyle = `rgba(255, ${Math.round(220 * titlePulse)}, ${Math.round(80 * titlePulse)}, 1)`;
  ctx.font = 'bold 16px "Noto Serif TC", serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(200,120,0,0.6)';
  ctx.shadowBlur = 8;
  ctx.fillText(`❖ 手 中 ${total} 張 ❖`, CONFIG.W/2, handY - 10);
  ctx.shadowBlur = 0;

  // 把命中座標寫回每張卡，記錄手牌總邊界
  const dragCard = (game._drag && game._drag.hasMoved) ? game._drag.card : null;
  rowsArr.forEach((rowCards, rowIdx) => {
    const meta = rowMeta[rowIdx];
    const rowY = handY + rowIdx * (cardH + CONFIG.LAYOUT.HAND_2ROW_GAP);
    rowCards.forEach((c, i) => {
      const x = meta.startX + i * meta.step;
      let y = rowY;
      c._x = x; c._y = y;
      if (c === dragCard) return;
      if (game.selectedCard === c) {
        y -= 18;
        ctx.shadowColor = 'rgba(255, 215, 0, 0.8)';
        ctx.shadowBlur = 20;
        ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
        roundRect(x - 4, y - 4, cardW + 8, cardH + 8, 6, true, false);
        ctx.shadowBlur = 0;
      }
      drawCard(x, y, c, true);
    });
  });

  game._handBounds = { top: bgTop, bottom: bgBottom };
}

function rowMap(r) {
  return { front: '前墩', middle: '中墩', back: '後墩' }[r] || r;
}
function handTypeName(t) {
  return {
    HIGH:'高牌', PAIR:'對子', TWO_PAIR:'兩對', THREE_KIND:'三條',
    STRAIGHT:'順子', FLUSH:'同花', FULL_HOUSE:'葫蘆', FOUR_KIND:'四條',
    STRAIGHT_FLUSH:'同花順', ROYAL_FLUSH:'皇家同花順'
  }[t] || t;
}

function drawHpBar(x, y, w, h, hp, max, color) {
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, w, h);
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, color);
  grad.addColorStop(1, shadeColor(color, -30));
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w * (hp / max), h);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 17px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${hp} / ${max}`, x + w/2, y + h - 4);
}
function shadeColor(hex, amt) {
  const c = hex.replace('#','');
  const r = Math.max(0, Math.min(255, parseInt(c.substr(0,2),16)+amt));
  const g = Math.max(0, Math.min(255, parseInt(c.substr(2,2),16)+amt));
  const b = Math.max(0, Math.min(255, parseInt(c.substr(4,2),16)+amt));
  return `rgb(${r},${g},${b})`;
}

function drawReward() {
  const W = CONFIG.W, H = CONFIG.H;
  const now = Date.now();

  // ── 1. 背景遮罩 ─────────────────────────────────────────────
  ctx.fillStyle = 'rgba(0,0,0,0.90)';
  ctx.fillRect(0, 0, W, H);

  // 環境粒子（按選項稀有度混合色）
  for (let i = 0; i < 40; i++) {
    const rarC = { red:'rgba(255,60,60,', yellow:'rgba(255,190,0,', green:'rgba(40,220,100,', blue:'rgba(80,140,255,' };
    const rc = game.rewardChoices[i % 3];
    const c = rc ? (rarC[rc.rarity] || 'rgba(200,200,200,') : 'rgba(200,200,200,';
    const spd = 0.5 + (i % 4) * 0.3;
    const px = (now / (22 + i % 6 * 7) * spd + i * 79) % W;
    const py = (now / (30 + i % 4 * 9) * spd + i * 47) % H;
    const alpha = 0.06 + Math.sin(now / 700 + i * 0.8) * 0.04;
    ctx.fillStyle = `${c}${alpha})`;
    ctx.beginPath();
    ctx.arc(px, py, 1.5 + (i % 3), 0, Math.PI * 2);
    ctx.fill();
  }

  // ── 2. 標題區（0–128px）─────────────────────────────────────
  const titleBg = ctx.createLinearGradient(0, 0, 0, 128);
  titleBg.addColorStop(0, 'rgba(25,8,3,0.99)');
  titleBg.addColorStop(1, 'rgba(10,4,2,0.0)');
  ctx.fillStyle = titleBg;
  ctx.fillRect(0, 0, W, 128);

  // 金邊裝飾線
  const _rdLineGr = ctx.createLinearGradient(30, 0, W-30, 0);
  _rdLineGr.addColorStop(0,'rgba(180,120,0,0)'); _rdLineGr.addColorStop(0.25,'rgba(220,170,40,0.6)');
  _rdLineGr.addColorStop(0.75,'rgba(220,170,40,0.6)'); _rdLineGr.addColorStop(1,'rgba(180,120,0,0)');
  ctx.strokeStyle = _rdLineGr; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30, 40); ctx.lineTo(W-30, 40); ctx.stroke();

  ctx.textAlign = 'center';
  ctx.font = 'bold 50px "Noto Serif TC",serif';
  ctx.fillStyle = '#ffe680';
  ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 28;
  ctx.fillText('戰後繳獲', W/2, 38);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 23px "Noto Serif TC",serif';
  ctx.fillStyle = '#ffcc66';
  ctx.shadowColor = '#cc4400'; ctx.shadowBlur = 10;
  ctx.fillText('— 神兵現世 —', W/2, 68);
  ctx.shadowBlur = 0;

  const _rdEnemy = ENEMIES[game.stage] || { name: '敵將' };
  ctx.font = 'italic 18px "Noto Serif TC",serif';
  ctx.fillStyle = '#aa8855';
  ctx.fillText(`擊潰 ${_rdEnemy.name}，請擇一神兵入陣`, W/2, 94);

  ctx.strokeStyle = _rdLineGr; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(30, 110); ctx.lineTo(W-30, 110); ctx.stroke();

  // ── 3. 三張神兵卡（橫排）─────────────────────────────────────
  const _rdRarityStyle = {
    red:    { border:'#ff4444', border2:'#ff9966', glow:'#ff2200',
              label:'禁忌神兵', catLabel:'規則改造',
              bg0:'#380808', bg1:'#1c0404', bg2:'#0e0202',
              textColor:'#ff9999', iconColor:'#ff6666', badgeBg:'#7a0000',
              catBg:'rgba(160,16,0,0.75)' },
    yellow: { border:'#ffd700', border2:'#ffee99', glow:'#ffaa00',
              label:'傳說神兵', catLabel:'乘法爆炸',
              bg0:'#342008', bg1:'#1c1004', bg2:'#0e0802',
              textColor:'#ffe680', iconColor:'#ffd040', badgeBg:'#6a4800',
              catBg:'rgba(140,90,0,0.75)' },
    green:  { border:'#44ee88', border2:'#aaffcc', glow:'#00cc55',
              label:'精良裝備', catLabel:'穩定增幅',
              bg0:'#083a18', bg1:'#041a0a', bg2:'#020e05',
              textColor:'#aaffcc', iconColor:'#55dd88', badgeBg:'#0a5020',
              catBg:'rgba(0,110,45,0.75)' },
    blue:   { border:'#5599ff', border2:'#aaccff', glow:'#3366ff',
              label:'秘術典籍', catLabel:'複合觸發',
              bg0:'#081838', bg1:'#040c1c', bg2:'#020608',
              textColor:'#aaccff', iconColor:'#6699ff', badgeBg:'#0a1c5a',
              catBg:'rgba(25,55,170,0.75)' },
    purple: { border:'#dd66ff', border2:'#ffaaff', glow:'#cc00ff',
              label:'傳奇神兵', catLabel:'命運改寫',
              bg0:'#280838', bg1:'#14041e', bg2:'#0a020f',
              textColor:'#f0aaff', iconColor:'#dd66ff', badgeBg:'#4a0070',
              catBg:'rgba(120,0,180,0.80)' }
  };

  const _rdRelicStrategy = {
    changban:'奇蹟翻盤', ahdou:'防禦盾核', yiqiankudun:'高壓強攻',
    iron_wall:'鋼鐵要塞', double_down:'極限爆炸', queen_grace:'皇家強化',
    qingang_ying:'爆發核心', douxin:'乘法引擎', qinggang:'直傷刺客',
    tongque:'資源收割', discard_dmg:'棄牌爆發', baima:'穩定輸出',
    longdan:'鬼牌共鳴', qiyou:'連勝積累', low_card:'奇兵戰術',
    imperial_seal:'帝王之氣', wuhu:'虎將增益', zhuge:'連射殺陣',
    jiading:'無敵護甲', lubu:'天下無敵', changban_charge:'衝鋒突破',
    zilong_shield:'子龍盾牆', chain_slash:'連環斬殺', boiling_blood:'熱血爆發',
    war_trophy:'功勳積累', qixing_lamp:'七星護命', kongming_fan:'軍師謀略',
    silver_armor:'白袍無敵', red_hare:'赤兔加速', dragon_spear:'龍膽破陣',
    zilong_legend:'永恆傳說', dragon_soul:'魂力共鳴', bagua_reversal:'因果反噬',
    wuhou_scroll:'神機妙算', heavenly_spear:'無視護甲',
    blood_pact:'以血換刀', death_defier:'死中求活', berserker:'狂戰之怒',
    four_generals:'四將臨陣', flush_master:'同花共鳴', ace_assault:'王牌先鋒', momentum:'乘勢追擊',
    medic_tent:'戰地救護', dragon_scale:'神甲護體', fortune_star:'天命所歸',
    karma_wheel:'業力反彈', twin_dragon:'雙龍共鳴'
  };

  const CARD_W = 218, CARD_H = 720;
  const GAP = 13;
  const _rdStartX = Math.round((W - CARD_W * 3 - GAP * 2) / 2);
  const _rdStartY = 118;

  game.rewardChoices.forEach((r, i) => {
    const baseX = _rdStartX + i * (CARD_W + GAP);
    const rs = _rdRarityStyle[r.rarity] || _rdRarityStyle.yellow;
    const hovering = mousePos.x >= baseX && mousePos.x <= baseX + CARD_W &&
                     mousePos.y >= _rdStartY && mousePos.y <= _rdStartY + CARD_H;
    const floatY = hovering ? -8 : 0;
    const cardX = baseX, cardY = _rdStartY + floatY;

    // 外發光
    ctx.shadowColor = rs.glow;
    ctx.shadowBlur = hovering ? 44 : 14;

    // 卡片主體背景
    const bgGr = ctx.createLinearGradient(cardX, cardY, cardX, cardY + CARD_H);
    bgGr.addColorStop(0, rs.bg0);
    bgGr.addColorStop(0.55, rs.bg1);
    bgGr.addColorStop(1, rs.bg2);
    ctx.fillStyle = bgGr;
    roundRect(cardX, cardY, CARD_W, CARD_H, 12, true, false);
    ctx.shadowBlur = 0;

    // 外框
    ctx.strokeStyle = hovering ? rs.border2 : rs.border;
    ctx.lineWidth = hovering ? 3.5 : 2;
    roundRect(cardX, cardY, CARD_W, CARD_H, 12, false, true);

    // 內框（質感線）
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    roundRect(cardX+4, cardY+4, CARD_W-8, CARD_H-8, 10, false, true);

    // ── 分類頂欄（高34px，圓角頂部）
    const catH = 34;
    const catGr = ctx.createLinearGradient(cardX, cardY, cardX+CARD_W, cardY);
    catGr.addColorStop(0, rs.catBg); catGr.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = catGr;
    ctx.beginPath();
    ctx.moveTo(cardX+12, cardY);
    ctx.lineTo(cardX+CARD_W-12, cardY);
    ctx.arcTo(cardX+CARD_W, cardY, cardX+CARD_W, cardY+12, 12);
    ctx.lineTo(cardX+CARD_W, cardY+catH);
    ctx.lineTo(cardX, cardY+catH);
    ctx.arcTo(cardX, cardY, cardX+12, cardY, 12);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = rs.textColor;
    ctx.font = 'bold 16px "Noto Serif TC",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(rs.catLabel, cardX+CARD_W/2, cardY+catH-10);

    // ── 圖標區（y: catH → catH+188，中心在catH+94）
    const iconAreaH = 188;
    const iconCX = cardX + CARD_W/2;
    const iconCY = cardY + catH + iconAreaH/2;
    const iconSZ = 86;   // 填滿圖示區（半徑94-留8邊距）

    // 圖標底部柔光（無硬圈）
    const ibGr = ctx.createRadialGradient(iconCX, iconCY, 0, iconCX, iconCY, iconSZ);
    ibGr.addColorStop(0, rs.border+'22'); ibGr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ibGr;
    ctx.beginPath(); ctx.arc(iconCX, iconCY, iconSZ, 0, Math.PI*2); ctx.fill();

    // 繪製圖示（無外圈）
    ctx.shadowColor = rs.iconColor; ctx.shadowBlur = 20;
    _drawRelicIcon(r.id, iconCX, iconCY, iconSZ, rs.iconColor, now);
    ctx.shadowBlur = 0;

    // ── 稀有度角標（右上）
    const badgeW = 52, badgeH = 22;
    const badgeX = cardX+CARD_W-8-badgeW, badgeY = cardY+catH+4;
    ctx.fillStyle = rs.badgeBg;
    roundRect(badgeX, badgeY, badgeW, badgeH, 4, true, false);
    ctx.strokeStyle = rs.border; ctx.lineWidth = 1;
    roundRect(badgeX, badgeY, badgeW, badgeH, 4, false, true);
    ctx.fillStyle = rs.textColor;
    ctx.font = 'bold 13px "Noto Serif TC",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(rs.label, badgeX+badgeW/2, badgeY+badgeH-6);

    // ── 卡名分隔線
    const divY = cardY + catH + iconAreaH + 6;
    const _rdDivGr = ctx.createLinearGradient(cardX+10, 0, cardX+CARD_W-10, 0);
    _rdDivGr.addColorStop(0,'rgba(0,0,0,0)'); _rdDivGr.addColorStop(0.3,rs.border+'88');
    _rdDivGr.addColorStop(0.7,rs.border+'88'); _rdDivGr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.strokeStyle = _rdDivGr; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cardX+14, divY); ctx.lineTo(cardX+CARD_W-14, divY); ctx.stroke();

    // ── 遺物名稱
    const nameY = divY + 34;
    ctx.fillStyle = rs.textColor;
    ctx.font = `bold 30px "Noto Serif TC",serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = rs.glow; ctx.shadowBlur = 10;
    ctx.fillText(r.name, cardX+CARD_W/2, nameY);
    ctx.shadowBlur = 0;

    // ── 效果文字
    ctx.fillStyle = 'rgba(225,215,205,0.9)';
    ctx.font = '16px "Noto Serif TC",serif';
    wrapText(r.desc, cardX+CARD_W/2, nameY+24, CARD_W-22, 18, 'center');

    // ── 策略定位標籤
    const stratY = cardY + CARD_H - 60;
    const stratText = _rdRelicStrategy[r.id] || '策略增幅';
    ctx.font = 'bold 14px "Noto Serif TC",sans-serif';
    const stratW2 = ctx.measureText(stratText).width + 28;
    const stratX2 = cardX + (CARD_W - stratW2) / 2;
    ctx.fillStyle = rs.catBg;
    roundRect(stratX2, stratY, stratW2, 24, 5, true, false);
    ctx.strokeStyle = rs.border+'aa'; ctx.lineWidth = 1;
    roundRect(stratX2, stratY, stratW2, 24, 5, false, true);
    ctx.fillStyle = rs.textColor;
    ctx.textAlign = 'center';
    ctx.fillText(stratText, cardX+CARD_W/2, stratY+17);

    // ── 點擊提示（底部）
    const tapA = hovering ? (0.75 + Math.sin(now/280)*0.25) : 0.30;
    ctx.fillStyle = `rgba(210,185,120,${tapA})`;
    ctx.font = '13px "Noto Serif TC",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('▶ 點擊選取', cardX+CARD_W/2, cardY+CARD_H-22);

    // ── 已持有遮罩
    if (game.relics.find(rr => rr.id === r.id)) {
      ctx.fillStyle = 'rgba(0,0,0,0.68)';
      roundRect(cardX, cardY, CARD_W, CARD_H, 12, true, false);
      ctx.fillStyle = '#ff7777';
      ctx.font = 'bold 22px "Noto Serif TC",serif';
      ctx.textAlign = 'center';
      ctx.fillText('✕ 已持有', cardX+CARD_W/2, cardY+CARD_H/2);
    }

    // ── 全卡點擊區域（整張卡可點）
    r._btn = { x: baseX, y: _rdStartY, w: CARD_W, h: CARD_H };
  });

  // ── 4. 底部提醒 ────────────────────────────────────────────
  const btmY = _rdStartY + CARD_H + 20;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(200,165,70,0.88)';
  ctx.font = 'bold 18px "Noto Serif TC",serif';
  ctx.shadowColor = '#aa5500'; ctx.shadowBlur = 8;
  ctx.fillText('本次只能選擇一項，選定後不可更改', W/2, btmY);
  ctx.shadowBlur = 0;

  if (game.relics.length > 0) {
    ctx.fillStyle = '#776644';
    ctx.font = '14px "Noto Serif TC",serif';
    const relicStr = '持有：' + game.relics.map(rr => rr.name).join(' · ');
    wrapText(relicStr, W/2, btmY+24, W-48, 17, 'center');
  }
}

// ── 遺物圖標繪製 ─────────────────────────────────────────────────
function _drawRelicIcon(id, cx, cy, sz, color, now) {
  // 優先用 sprite sheet
  if (_drawRelicSprite(id, cx, cy, sz)) return;

  ctx.save();
  ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const _spearIds  = ['qingang_ying','yiqiankudun','double_down','changban_charge','chain_slash','dragon_spear'];
  const _swordIds  = ['qinggang','discard_dmg'];
  const _shieldIds = ['iron_wall','lubu','zilong_shield','silver_armor','jiading'];
  const _scrollIds = ['longdan','zhuge','kongming_fan','douxin'];
  const _horseIds  = ['baima','red_hare'];
  const _flameIds  = ['changban','boiling_blood','qiyou'];
  const _sealIds   = ['imperial_seal','tongque'];
  const _crownIds  = ['ahdou','queen_grace'];
  const _lampIds   = ['qixing_lamp'];

  if (_spearIds.includes(id)) {
    // 長槍：斜握槍桿+槍尖+流蘇
    ctx.beginPath();
    ctx.moveTo(cx-sz*0.52, cy+sz*0.52);
    ctx.lineTo(cx+sz*0.30, cy-sz*0.30);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx+sz*0.30, cy-sz*0.30);
    ctx.lineTo(cx+sz*0.58, cy-sz*0.68);
    ctx.lineTo(cx+sz*0.42, cy-sz*0.30);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = color+'88'; ctx.lineWidth = 1.5;
    for (let j=0;j<4;j++){
      ctx.beginPath();
      ctx.moveTo(cx-sz*0.44+j*5,cy+sz*0.44);
      ctx.lineTo(cx-sz*0.50+j*5,cy+sz*0.68);
      ctx.stroke();
    }
  } else if (_swordIds.includes(id)) {
    // 直劍：刃+格檔+握柄
    ctx.beginPath();
    ctx.moveTo(cx, cy+sz*0.55);
    ctx.lineTo(cx, cy-sz*0.55);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx-4, cy-sz*0.50);
    ctx.lineTo(cx, cy-sz*0.78);
    ctx.lineTo(cx+4, cy-sz*0.50);
    ctx.closePath(); ctx.fill();
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-sz*0.38,cy+sz*0.18); ctx.lineTo(cx+sz*0.38,cy+sz*0.18); ctx.stroke();
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(cx,cy+sz*0.18); ctx.lineTo(cx,cy+sz*0.55); ctx.stroke();
  } else if (_shieldIds.includes(id)) {
    // 盾：五邊盾型+紋飾
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy-sz*0.68);
    ctx.lineTo(cx+sz*0.52, cy-sz*0.32);
    ctx.lineTo(cx+sz*0.52, cy+sz*0.18);
    ctx.quadraticCurveTo(cx+sz*0.52,cy+sz*0.58,cx,cy+sz*0.72);
    ctx.quadraticCurveTo(cx-sz*0.52,cy+sz*0.58,cx-sz*0.52,cy+sz*0.18);
    ctx.lineTo(cx-sz*0.52, cy-sz*0.32);
    ctx.closePath();
    ctx.fillStyle = color+'22'; ctx.fill();
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx,cy-sz*0.28); ctx.lineTo(cx,cy+sz*0.28);
    ctx.moveTo(cx-sz*0.28,cy); ctx.lineTo(cx+sz*0.28,cy);
    ctx.stroke();
  } else if (_scrollIds.includes(id)) {
    // 卷軸：矩形卷身+兩端滾軸
    ctx.lineWidth = 2;
    const _sw=sz*0.60, _sh=sz*0.48;
    roundRect(cx-_sw,cy-_sh,_sw*2,_sh*2,5,false,true);
    ctx.beginPath(); ctx.ellipse(cx-_sw,cy,7,_sh,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx+_sw,cy,7,_sh,0,0,Math.PI*2); ctx.stroke();
    for (let j=-1;j<=1;j++){
      ctx.beginPath();
      ctx.moveTo(cx-_sw+11,cy+j*12); ctx.lineTo(cx+_sw-11,cy+j*12);
      ctx.stroke();
    }
  } else if (_horseIds.includes(id)) {
    // 馬蹄鐵：U形+釘
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy-sz*0.08, sz*0.52, Math.PI*0.12, Math.PI*0.88, false);
    ctx.stroke();
    for (const s of [-1,1]) {
      const hx=cx+s*sz*0.50, hy=cy+sz*0.08;
      ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(hx+s*7,hy+sz*0.48); ctx.stroke();
      ctx.beginPath(); ctx.arc(hx+s*3.5,hy+sz*0.48,5,0,Math.PI*2); ctx.fill();
    }
    for (let j=0;j<5;j++){
      const ang=Math.PI*0.12+j*(Math.PI*0.76/4);
      const nr=(sz*0.52-7);
      ctx.beginPath();
      ctx.arc(cx+nr*Math.cos(ang),(cy-sz*0.08)+nr*Math.sin(ang),3,0,Math.PI*2); ctx.fill();
    }
  } else if (_flameIds.includes(id)) {
    // 火焰：三層貝塞爾曲線
    const t=now/500;
    for (let k=0;k<3;k++){
      const fw=sz*(0.38-k*0.09), fh=sz*(0.85-k*0.12), ox=(k-1)*sz*0.18;
      ctx.beginPath();
      ctx.moveTo(cx+ox, cy+sz*0.55);
      ctx.bezierCurveTo(cx+ox-fw,cy+fh*0.25+Math.sin(t+k)*7,cx+ox+fw,cy-fh*0.12+Math.cos(t+k)*7,cx+ox,cy-fh*0.58);
      ctx.bezierCurveTo(cx+ox-fw*0.25,cy-fh*0.28,cx+ox+fw*0.45,cy+fh*0.12,cx+ox,cy+sz*0.55);
      ctx.fillStyle = color+(k===0?'55':k===1?'99':'ff');
      ctx.fill();
    }
  } else if (_sealIds.includes(id)) {
    // 玉璽：方印+紐+刻字
    ctx.lineWidth = 3;
    const _ss=sz*0.58;
    roundRect(cx-_ss,cy-_ss+sz*0.12,_ss*2,_ss*2,4,false,true);
    ctx.lineWidth = 2;
    roundRect(cx-_ss*0.62,cy-_ss*0.62+sz*0.12,_ss*1.24,_ss*1.24,3,false,true);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx-_ss*0.32,cy-_ss*0.35+sz*0.12); ctx.lineTo(cx+_ss*0.32,cy-_ss*0.35+sz*0.12);
    ctx.moveTo(cx-_ss*0.28,cy+sz*0.12);           ctx.lineTo(cx+_ss*0.28,cy+sz*0.12);
    ctx.moveTo(cx-_ss*0.32,cy+_ss*0.32+sz*0.12);  ctx.lineTo(cx+_ss*0.32,cy+_ss*0.32+sz*0.12);
    ctx.moveTo(cx,cy-_ss*0.35+sz*0.12);            ctx.lineTo(cx,cy+_ss*0.32+sz*0.12);
    ctx.stroke();
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx-sz*0.18,cy-_ss+sz*0.12); ctx.lineTo(cx+sz*0.18,cy-_ss+sz*0.12); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy-_ss-sz*0.16+sz*0.12,sz*0.18,0,Math.PI*2); ctx.stroke();
  } else if (_crownIds.includes(id)) {
    // 皇冠：五齒金冠
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx-sz*0.52,cy+sz*0.32);
    ctx.lineTo(cx-sz*0.52,cy-sz*0.06);
    ctx.lineTo(cx-sz*0.24,cy-sz*0.52);
    ctx.lineTo(cx,         cy-sz*0.14);
    ctx.lineTo(cx+sz*0.24, cy-sz*0.52);
    ctx.lineTo(cx+sz*0.52, cy-sz*0.06);
    ctx.lineTo(cx+sz*0.52, cy+sz*0.32);
    ctx.closePath();
    ctx.fillStyle = color+'22'; ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy+sz*0.06,sz*0.13,0,Math.PI*2); ctx.fill();
  } else if (_lampIds.includes(id)) {
    // 七星燈：燈盞+七點
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx,cy+sz*0.18,sz*0.40,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx,cy-sz*0.22); ctx.lineTo(cx,cy-sz*0.70); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-sz*0.14,cy-sz*0.70); ctx.lineTo(cx+sz*0.14,cy-sz*0.70); ctx.stroke();
    for (let j=0;j<7;j++){
      const ang=(j/7)*Math.PI*2 - Math.PI/2;
      const _rr2=sz*0.26;
      ctx.beginPath(); ctx.arc(cx+_rr2*Math.cos(ang),cy+sz*0.18+_rr2*Math.sin(ang),3.5,0,Math.PI*2); ctx.fill();
    }
    ctx.beginPath(); ctx.arc(cx,cy+sz*0.18,4,0,Math.PI*2); ctx.fill();
  } else {
    // 預設：五芒星（wuhu / war_trophy / low_card 等）
    ctx.lineWidth = 2;
    const pts=5, outer=sz*0.62, inner=sz*0.26;
    ctx.beginPath();
    for (let j=0;j<pts*2;j++){
      const ang=(j*Math.PI/pts)-Math.PI/2;
      const _rr3=j%2===0?outer:inner;
      const nx=cx+_rr3*Math.cos(ang), ny=cy+_rr3*Math.sin(ang);
      j===0?ctx.moveTo(nx,ny):ctx.lineTo(nx,ny);
    }
    ctx.closePath();
    ctx.fillStyle=color+'30'; ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

function wrapText(text, x, y, maxW, lh, align) {
  ctx.textAlign = align || 'center';
  const chars = text.split('');
  let line = '';
  let yy = y;
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxW && line.length > 0) {
      ctx.fillText(line, x, yy);
      line = ch;
      yy += lh;
    } else line = test;
  }
  if (line) ctx.fillText(line, x, yy);
}

// ============================================================
// 【輸入】支援滑鼠 + 觸控 + 拖曳
// ============================================================
function canvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  return { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
}

// 找出某點下的可拖曳卡：先查手牌，再查玩家三道（只能拖本回合擺的）
function pickCardAt(x, y) {
  if (game.phase !== 'placing') return null;
  // 手牌（從右到左找，因為右邊的卡疊在上面）
  for (let i = game.hand.length - 1; i >= 0; i--) {
    const c = game.hand[i];
    if (c._x !== undefined &&
        x >= c._x && x <= c._x + CONFIG.CARD_W &&
        y >= c._y && y <= c._y + CONFIG.CARD_H) {
      return { card: c, fromRow: 'hand' };
    }
  }
  // 玩家三道：只能拖本回合擺的牌（已成型的不能動）
  for (const rowKey of ['front', 'middle', 'back']) {
    const rowCards = game.rows[rowKey];
    for (let i = rowCards.length - 1; i >= 0; i--) {
      const c = rowCards[i];
      if (c._placedRound !== game.round) continue;
      if (c._x !== undefined &&
          x >= c._x && x <= c._x + CONFIG.CARD_W &&
          y >= c._y && y <= c._y + CONFIG.CARD_H) {
        return { card: c, fromRow: rowKey };
      }
    }
  }
  return null;
}

function isOverRow(x, y, rowKey) {
  const z = game._rowZones && game._rowZones[rowKey];
  if (!z) return false;
  // 略微擴大命中區（更好放）
  return x >= z.x - 8 && x <= z.x + z.w + 8 &&
         y >= z.y - 6 && y <= z.y + z.h + 6;
}
function findRowAt(x, y) {
  for (const k of ['front', 'middle', 'back']) {
    if (isOverRow(x, y, k)) return k;
  }
  return null;
}
// 手牌區（用實際的手牌邊界，含雙排模式）
function isOverHandArea(x, y) {
  const b = game._handBounds;
  if (b) return y >= b.top - 6 && y <= b.bottom + 6;
  // fallback：手還沒繪製過
  const hy = CONFIG.LAYOUT.HAND_Y;
  return y >= hy - 30 && y <= hy + CONFIG.CARD_H + 12;
}

// 把指定卡放到指定道（取代 selectedCard 行為，可給任意 card 物件）
function placeCardDrag(rowName, cardObj) {
  if (!cardObj) return false;
  if (game.mustPlace <= 0) { flashMessage('本回合擺牌已完成'); playSound('error'); return false; }
  if (game.rows[rowName].length >= game.cardCaps[rowName]) {
    flashMessage(rowMap(rowName) + '已滿'); playSound('error'); return false;
  }
  cardObj._placedRound = game.round;
  game.rows[rowName].push(cardObj);
  spawnParticles(getRowSlotX(rowName, game.rows[rowName].length - 1, false) + CONFIG.CARD_W/2,
                 getRowY(rowName, false) + CONFIG.CARD_H/2, '#ffd700', 8);
  game.hand = game.hand.filter(c => c !== cardObj);
  if (game.selectedCard === cardObj) game.selectedCard = null;
  game.mustPlace--;
  game.placedThisRound++;
  playSound('place');

  if (game.inFantasyland && game.mustPlace === 0) {
    // 不自動棄牌；等使用者確認
    game._flConfirmPending = true;
    return true;
  }
  if (game.mustPlace === 0 && game.mustDiscard === 1 && game.hand.length === 1) {
    setTimeout(() => autoDiscard(), 200);
  } else if (game.mustPlace === 0) {
    checkRoundProgress();
  }
  return true;
}

// 從某道把卡退回手牌（只允許本回合擺的）
function unplaceCardDrag(fromRow, cardObj) {
  if (cardObj._placedRound !== game.round) {
    flashMessage('已成型的牌不能收回'); playSound('error'); return false;
  }
  delete cardObj._placedRound;
  game.rows[fromRow] = game.rows[fromRow].filter(c => c !== cardObj);
  game.hand.push(cardObj);
  game.mustPlace++;
  game.placedThisRound--;
  game._flConfirmPending = false;  // 收回卡 → 取消確認
  playSound('deal');
  return true;
}

// 卡從一道移到另一道
function moveCardBetweenRows(fromRow, toRow, cardObj) {
  if (fromRow === toRow) return false;
  if (game.rows[toRow].length >= game.cardCaps[toRow]) {
    flashMessage(rowMap(toRow) + '已滿'); playSound('error'); return false;
  }
  if (cardObj._placedRound !== game.round) {
    flashMessage('已成型的牌不能移動'); playSound('error'); return false;
  }
  game.rows[fromRow] = game.rows[fromRow].filter(c => c !== cardObj);
  game.rows[toRow].push(cardObj);
  cardObj._placedRound = game.round;
  playSound('place');
  return true;
}

// 找出該座標下的牌（用於拖曳交換偵測）
function findCardAt(x, y, exclude) {
  // 玩家三道
  for (const rowKey of ['front', 'middle', 'back']) {
    for (const c of game.rows[rowKey]) {
      if (c === exclude) continue;
      if (c._x !== undefined &&
          x >= c._x && x <= c._x + CONFIG.CARD_W &&
          y >= c._y && y <= c._y + CONFIG.CARD_H) {
        return { card: c, location: rowKey };
      }
    }
  }
  // 手牌
  for (const c of game.hand) {
    if (c === exclude) continue;
    if (c._x !== undefined &&
        x >= c._x && x <= c._x + CONFIG.CARD_W &&
        y >= c._y && y <= c._y + CONFIG.CARD_H) {
      return { card: c, location: 'hand' };
    }
  }
  return null;
}

// 交換兩張牌的位置
function swapCards(cardA, locA, cardB, locB) {
  // 兩張都在手牌：純手牌排序
  if (locA === 'hand' && locB === 'hand') {
    const i = game.hand.indexOf(cardA), j = game.hand.indexOf(cardB);
    [game.hand[i], game.hand[j]] = [game.hand[j], game.hand[i]];
    playSound('deal');
    return true;
  }
  // 三道的牌須是本回合擺的
  if (locA !== 'hand' && cardA._placedRound !== game.round) {
    flashMessage('已成型的牌不能交換'); playSound('error'); return false;
  }
  if (locB !== 'hand' && cardB._placedRound !== game.round) {
    flashMessage('已成型的牌不能交換'); playSound('error'); return false;
  }
  // 同一道內：排序交換
  if (locA === locB) {
    const arr = game.rows[locA];
    const i = arr.indexOf(cardA), j = arr.indexOf(cardB);
    [arr[i], arr[j]] = [arr[j], arr[i]];
    playSound('place');
    return true;
  }
  // 跨容器交換（手牌 ↔ 道、道 ↔ 道）
  const arrA = locA === 'hand' ? game.hand : game.rows[locA];
  const arrB = locB === 'hand' ? game.hand : game.rows[locB];
  const i = arrA.indexOf(cardA), j = arrB.indexOf(cardB);
  arrA[i] = cardB;
  arrB[j] = cardA;
  // 更新 _placedRound 旗標
  if (locA === 'hand') {
    cardA._placedRound = game.round;
    delete cardB._placedRound;
  } else if (locB === 'hand') {
    cardB._placedRound = game.round;
    delete cardA._placedRound;
  } else {
    cardA._placedRound = game.round;
    cardB._placedRound = game.round;
  }
  playSound('place');
  return true;
}

// === 滑鼠事件 ===
canvas.addEventListener('mousemove', (e) => {
  const p = canvasCoords(e.clientX, e.clientY);
  mousePos.x = p.x; mousePos.y = p.y;
  pointerMove(p.x, p.y);
});
canvas.addEventListener('mousedown', (e) => {
  if (typeof Tone !== 'undefined' && !_toneReady) { _initTone(); _resumeBGM(); }
  const p = canvasCoords(e.clientX, e.clientY);
  mousePos.x = p.x; mousePos.y = p.y;
  pointerDown(p.x, p.y);
});
canvas.addEventListener('mouseup', (e) => {
  const p = canvasCoords(e.clientX, e.clientY);
  pointerUp(p.x, p.y);
});
canvas.addEventListener('mouseleave', () => { game._drag = null; mousePos.x = -9999; mousePos.y = -9999; });

// === 觸控事件 ===
canvas.addEventListener('touchstart', (e) => {
  if (typeof Tone !== 'undefined' && !_toneReady) { _initTone(); _resumeBGM(); }
  if (e.touches.length === 0) return;
  const t = e.touches[0];
  const p = canvasCoords(t.clientX, t.clientY);
  mousePos.x = p.x; mousePos.y = p.y;
  pointerDown(p.x, p.y);
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 0) return;
  const t = e.touches[0];
  const p = canvasCoords(t.clientX, t.clientY);
  mousePos.x = p.x; mousePos.y = p.y;
  pointerMove(p.x, p.y);
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
  const t = (e.changedTouches && e.changedTouches[0]) || null;
  if (t) {
    const p = canvasCoords(t.clientX, t.clientY);
    pointerUp(p.x, p.y);
  } else {
    pointerUp(mousePos.x, mousePos.y);
  }
  mousePos.x = -9999; mousePos.y = -9999;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchcancel', () => { game._drag = null; mousePos.x = -9999; mousePos.y = -9999; });

const DRAG_THRESHOLD = 8;  // 移動超過此距離才視為拖曳

function pointerDown(x, y) {
  if (game.phase !== 'placing') return;
  if (game._flConfirmPending) return;  // modal 開著不允許拖曳
  const pick = pickCardAt(x, y);
  if (pick) {
    game._drag = {
      card: pick.card,
      fromRow: pick.fromRow,
      startX: x, startY: y,
      currentX: x, currentY: y,
      hasMoved: false,
    };
  }
}

function pointerMove(x, y) {
  if (!game._drag) return;
  game._drag.currentX = x;
  game._drag.currentY = y;
  if (Math.hypot(x - game._drag.startX, y - game._drag.startY) > DRAG_THRESHOLD) {
    game._drag.hasMoved = true;
  }
}

function pointerUp(x, y) {
  // 子龍之力 skill mode 取消拖曳，等待排選擇點擊
  if (game._skillMode && game._drag) { game._drag = null; return; }
  const d = game._drag;
  if (d && d.hasMoved) {
    // 1. 優先：拖曳到另一張牌上 → 交換
    const target = findCardAt(x, y, d.card);
    if (target) {
      swapCards(d.card, d.fromRow, target.card, target.location);
      game._drag = null;
      return;
    }
    // 2. 拖到某道空位
    const targetRow = findRowAt(x, y);
    if (targetRow) {
      if (d.fromRow === 'hand') {
        placeCardDrag(targetRow, d.card);
      } else {
        moveCardBetweenRows(d.fromRow, targetRow, d.card);
      }
    } else if (isOverHandArea(x, y) && d.fromRow !== 'hand') {
      // 3. 拖回手牌區
      unplaceCardDrag(d.fromRow, d.card);
    } else {
      // 沒落在合法區
      playSound('error');
    }
    game._drag = null;
    return;
  }
  game._drag = null;
  // 點擊（沒拖曳）→ 走原本的點擊流程
  handleClick(x, y);
}

// ============================================================
// 【T3 重構】handleClick 拆分為主 dispatcher + 6 個 sub-handler
// 約定：每個 sub-handler 接 (mx, my)，回傳 true=已消費、false=未處理。
// 主 dispatcher 依優先序串接，short-circuit 在第一個 true 回傳處停止。
// 純結構重構，零邏輯變更——所有 playSound / state 設值順序不動。
// ============================================================

// hit-test 小工具：判定點 (mx,my) 是否落在矩形 b={x,y,w,h} 內
function _hit(b, mx, my) {
  return b && mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h;
}

// Layer 1: 全域 UI（mute 按鈕、Fantasyland 確認 modal）— 任何 phase 都優先攔截
function handleGlobalUiClick(mx, my) {
  // 音效靜音按鈕
  if (_hit(game._muteBtn, mx, my)) {
    toggleAudioMute();
    return true;
  }
  // Fantasyland 確認 modal 優先處理
  if (game._flConfirmPending) {
    if (_hit(game._flConfirmYesBtn, mx, my)) {
      game._flConfirmPending = false;
      playSound('place');
      if (game.hand.length > 0) autoDiscardAll(); else checkRoundProgress();
      return true;
    }
    if (_hit(game._flConfirmNoBtn, mx, my)) {
      game._flConfirmPending = false;
      playSound('deal');
      return true;
    }
    // modal 開著時其他點擊都忽略
    return true;
  }
  return false;
}

// Layer 2: 簡單 phase 畫面（intro/menu/transition/char_transition/gameover/victory/reward）
function handlePhaseScreenClick(mx, my) {
  if (game.phase === 'char_transition') {
    // 200ms 後可點擊跳過（防止選神兵時的誤觸）
    if (!game._charTransAdvanced && game._charTransStart && (Date.now() - game._charTransStart) > 200) {
      game._charTransAdvanced = true;
      game.phase = 'placing';
      startStage();
    }
    return true;
  }
  if (game.phase === 'menu') {
    // menu 由 DOM 處理點擊（#menu-root），canvas handleClick 不需動作
    return true;
  }
  if (game.phase === 'gameover' || game.phase === 'victory') {
    if (_hit(game._endBtn, mx, my)) { initGame(); startGame(); }
    return true;
  }
  if (game.phase === 'reward') {
    game.rewardChoices.forEach((r, i) => {
      if (_hit(r._btn, mx, my)) {
        chooseReward(i);
        playSound('place');
      }
    });
    return true;
  }
  return false;
}

// Layer 3: Battle 結算按鈕 + 戰報回顧關閉
function handleBattleResultClick(mx, my) {
  // War report buttons (battle phase)
  if (game.phase === 'battle' && game.battleAnimDone && game._resBtns) {
    for (const _rbk of ['primary','secondary','tertiary']) {
      const _rb = game._resBtns[_rbk];
      if (_hit(_rb, mx, my)) {
        if (game._battleResultTimer) { clearTimeout(game._battleResultTimer); game._battleResultTimer = null; }
        if (_rb.action === 'finish') {
          game._resBtns = null;
          finishBattle();
        } else if (_rb.action === 'review') {
          // (牌局紀錄已移除，review 動作 no-op)
          playSound('place');
        } else if (_rb.action === 'menu') {
          game._resBtns = null;
          initGame(); startGame();
        }
        return true;
      }
    }
  }
  // 結算中點擊關閉回顧
  if (game.logViewIdx >= 0) {
    if (_hit(game._closeBtnBox, mx, my)) {
      game.logViewIdx = -1;
    }
    // 回顧模式中其他點擊都忽略（保留原 handleClick 第二個 return 的語意）
    return true;
  }
  return false;
}

// Layer 4: 主選單返回按鈕（取代之前的牌局紀錄）
function handleLogPanelClick(mx, my) {
  if (_hit(game._menuReturnBtn, mx, my)) {
    if (window._vibrate) window._vibrate(20);
    // 顯示確認 modal（用 React state — 透過 game._showMenuConfirm flag 給 React 偵測）
    game._showMenuConfirm = true;
    return true;
  }
  return false;
}

// Layer 5a (placing only): 8 個操作按鈕（skill/skill2/reset/fl_reset/fl_submit/sort_suit/sort_rank）
function handlePlacingButtonClick(mx, my) {
  if (!game._buttons) return false;
  const B = game._buttons;
  if (_hit(B.skill, mx, my))     { useSkill(); return true; }
  if (_hit(B.skill2, mx, my))    { activateSkill2(); return true; }
  if (_hit(B.reset, mx, my))     { resetThisRoundOnly(); return true; }
  if (_hit(B.fl_reset, mx, my))  { resetFantasyland(); return true; }
  if (_hit(B.fl_submit, mx, my)) {
    // 已擺完，使用者主動再開確認 modal
    game._flConfirmPending = true;
    playSound('deal');
    return true;
  }
  if (_hit(B.sort_suit, mx, my)) {
    sortHand(game.hand); game.selectedCard = null;
    flashMessage('已按花色 + 點數排序'); playSound('deal'); return true;
  }
  if (_hit(B.sort_rank, mx, my)) {
    sortHandByRank(game.hand); game.selectedCard = null;
    flashMessage('已按點數大小排序'); playSound('deal'); return true;
  }
  return false;
}

// Layer 5b (placing only): 點擊手牌（選/取消選）
function handleHandCardClick(mx, my) {
  for (const c of game.hand) {
    if (c._x !== undefined && mx >= c._x && mx <= c._x + CONFIG.CARD_W &&
        my >= c._y && my <= c._y + CONFIG.CARD_H) {
      game.selectedCard = (game.selectedCard === c) ? null : c;
      playSound('deal');
      return true;
    }
  }
  return false;
}

// Layer 5c (placing + skill mode only): 換牌模式點擊已放置牌
// 注意：原本 handleClick 在 skill mode 中即使沒命中已放置牌也會 return（line 8337 註解
// 「換牌模式下點其他地方不執行別的」）—— 這個語意要保留，所以這裡無條件回 true。
function handleSkillModeClick(mx, my) {
  if (!(game._skillMode && !game.inFantasyland)) return false;
  for (const k of ['front','middle','back']) {
    const rowCards = game.rows[k];
    for (let si = 0; si < rowCards.length; si++) {
      const c = rowCards[si];
      if (c._x !== undefined && mx >= c._x && mx <= c._x + CONFIG.CARD_W &&
          my >= c._y && my <= c._y + CONFIG.CARD_H) {
        trySwapSelect(c, k, si);
        return true;
      }
    }
  }
  return true;  // skill mode 下其他點擊吃掉，不往下傳
}

// Layer 5d (placing only): 三道區放牌
function handleRowZoneClick(mx, my) {
  if (!game._rowZones) return false;
  for (const k of ['front','middle','back']) {
    const z = game._rowZones[k];
    if (_hit(z, mx, my) && game.selectedCard) {
      placeCard(k);
      return true;
    }
  }
  return false;
}

// 主 dispatcher：依優先序串接 sub-handler，short-circuit 在第一個 true 處停止
function handleClick(mx, my) {
  if (handleGlobalUiClick(mx, my))    return;
  if (handlePhaseScreenClick(mx, my)) return;
  if (handleBattleResultClick(mx, my)) return;
  if (handleLogPanelClick(mx, my))    return;

  // placing phase 專屬層
  if (game.phase === 'placing') {
    if (handlePlacingButtonClick(mx, my)) return;
    if (handleHandCardClick(mx, my))      return;
    if (handleSkillModeClick(mx, my))     return;
    if (handleRowZoneClick(mx, my))       return;
  }
}

document.addEventListener('keydown', (e) => {
  if (game.phase === 'placing') {
    if (game._skillMode) {
      if (e.key === '1') { executeSkillOnRow('front'); return; }
      if (e.key === '2') { executeSkillOnRow('middle'); return; }
      if (e.key === '3') { executeSkillOnRow('back'); return; }
      if (e.key === 'Escape') { game._skillMode = false; game._swapFirst = null; flashMessage('龍膽換位已取消'); return; }
    }
    if (e.key === '1' && game.selectedCard) placeCard('front');
    else if (e.key === '2' && game.selectedCard) placeCard('middle');
    else if (e.key === '3' && game.selectedCard) placeCard('back');
    else if (e.key === 'q' || e.key === 'Q') useSkill();
    else if (e.key === 'r' || e.key === 'R') resetThisRoundOnly();
  }
});

function loop() {
  updateEffects();
  draw();
  requestAnimationFrame(loop);
}

initGame();
loop();
</script>
