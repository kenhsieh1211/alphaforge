<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0503;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  body {
    display: flex; justify-content: center; align-items: center;
    font-family: "Noto Serif TC", serif;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent 0, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 3px
    );
    pointer-events: none; z-index: 100;
  }
  .game-wrap { position: relative; transform-origin: center center; }
  .game-frame {
    position: relative; padding: 6px;
    background: linear-gradient(135deg, #2a1208 0%, #1a0805 100%);
    border-radius: 4px;
    box-shadow: 0 0 0 2px #5a3018, 0 0 0 4px #1a0805,
                0 0 60px rgba(220,80,0,0.35), 0 10px 40px rgba(0,0,0,0.8);
  }
  .game-frame::before { content:''; position:absolute; width:18px; height:18px; background:linear-gradient(135deg,#c41e1e,#8b0000); border:2px solid #ffd700; top:-2px; left:-2px; }
  .game-frame::after  { content:''; position:absolute; width:18px; height:18px; background:linear-gradient(135deg,#c41e1e,#8b0000); border:2px solid #ffd700; top:-2px; right:-2px; }
  .corner-bl, .corner-br { position:absolute; width:18px; height:18px; background:linear-gradient(135deg,#c41e1e,#8b0000); border:2px solid #ffd700; }
  .corner-bl { bottom:-2px; left:-2px; }
  .corner-br { bottom:-2px; right:-2px; }
  canvas { display:block; background: radial-gradient(ellipse at center, #2a1408 0%, #0f0503 100%); }
  @media (pointer: fine) { canvas { cursor: crosshair; } }
</style>
</head>
<body>
<div class="game-wrap" id="gameWrap">

    drag: null,          // { card, fromHand, fromRow, fromIdx, x, y }
    confirmPending: false,  // 擺完等待確認

    message: "",
    shake: 0,
    particles: [],
    floatTexts: [],
    glowRows: { player: {}, enemy: {} },

    battleResults: null,
    aiThinking: false,
  };
  recalcCaps();
}

function recalcCaps() {
  game.cardCaps = { ...CONFIG.ROW_CAPS };
}

// ============================================================
// 【撲克牌邏輯】
// ============================================================
const SUITS = ['♠','♥','♦','♣'];
const SUIT_COLORS = { '♠':'#222', '♣':'#222', '♥':'#c00', '♦':'#c00' };

function newDeck() {
  const d = [];
  for (let s = 0; s < 4; s++) {
    for (let r = 2; r <= 14; r++) d.push({ rank: r, suit: SUITS[s] });
  }
  // 加入 2 張鬼牌（Joker）— 可代任何牌
  d.push({ rank: 0, suit: '★', isJoker: true });
  d.push({ rank: 0, suit: '★', isJoker: true });
  return shuffle(d);
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// 排序手牌：鬼牌→黑桃→紅心→方塊→梅花，組內按點數大到小
function sortHand(hand) {
  const suitOrder = { '★': 0, '♠': 1, '♥': 2, '♦': 3, '♣': 4 };
  hand.sort((a, b) => {
    const sa = suitOrder[a.suit];
    const sb = suitOrder[b.suit];
    if (sa !== sb) return sa - sb;
    return b.rank - a.rank;  // 同花色內大到小（A 在前面）
  });
  return hand;
}

// 純按點數排序（大到小），鬼牌排最前
function sortHandByRank(hand) {
  hand.sort((a, b) => {
    if (a.isJoker && !b.isJoker) return -1;
    if (!a.isJoker && b.isJoker) return 1;
    return b.rank - a.rank;
  });
  return hand;
}

// Fantasyland 重置：把已擺的牌全部退回手牌並重新排序
function resetFantasyland() {
  if (!game.inFantasyland) return;
  const returned = [];
  ['front', 'middle', 'back'].forEach(rn => {
    returned.push(...game.rows[rn]);
    game.rows[rn] = [];
  });
  game.hand.push(...returned);
  game.mustPlace = 13;
  game.mustDiscard = game.hand.length - 13;
  game.placedThisRound = 0;
  game.selectedCard = null;
  sortHand(game.hand);
  flashMessage(`已重置，重新整理 ${game.hand.length} 張手牌`);
  playSound('deal');
}
function rankStr(r) {
  if (r === 14) return 'A';
  if (r === 13) return 'K';
  if (r === 12) return 'Q';
  if (r === 11) return 'J';
  return String(r);
}

// 純牌評估（不含鬼牌）
function evaluateHandPure(cards) {
  if (cards.length === 0) return { type: 'HIGH', rank: 0, kickers: [] };
  const ranks = cards.map(c => c.rank).sort((a,b) => b - a);
  const suits = cards.map(c => c.suit);
  const counts = {};
  ranks.forEach(r => counts[r] = (counts[r]||0) + 1);
  const countVals = Object.values(counts).sort((a,b) => b - a);
  const isFlush = cards.length >= 4 && suits.every(s => s === suits[0]);
  const uniqueRanks = [...new Set(ranks)].sort((a,b) => b - a);
  let isStraight = false;
  if (cards.length === 5 && uniqueRanks.length === 5) {
    if (uniqueRanks[0] - uniqueRanks[4] === 4) isStraight = true;
    if (uniqueRanks.join(',') === '14,5,4,3,2') isStraight = true;
  }
  if (cards.length === 4 && uniqueRanks.length === 4 && uniqueRanks[0] - uniqueRanks[3] === 3) isStraight = true;

  // 計算 kicker（剩餘非主牌的高牌，用於同牌型比大小）
  const makeKickers = (usedRanks) => {
    const rem = [...ranks];
    usedRanks.forEach(r => { const i = rem.indexOf(r); if (i >= 0) rem.splice(i, 1); });
    return rem;
  };

  if (isFlush && isStraight && uniqueRanks[0] === 14 && uniqueRanks[1] === 13)
    return { type:'ROYAL_FLUSH', rank:14, kickers:[] };
  if (isFlush && isStraight)
    return { type:'STRAIGHT_FLUSH', rank:uniqueRanks[0], kickers:[] };
  if (countVals[0] === 4) {
    const r = parseInt(Object.keys(counts).find(k=>counts[k]===4));
    return { type:'FOUR_KIND', rank:r, kickers: makeKickers([r,r,r,r]) };
  }
  if (countVals[0] === 3 && countVals[1] === 2) {
    const r = parseInt(Object.keys(counts).find(k=>counts[k]===3));
    return { type:'FULL_HOUSE', rank:r, kickers:[] };
  }
  if (isFlush) return { type:'FLUSH', rank:ranks[0], kickers: ranks.slice(1) };
  if (isStraight) return { type:'STRAIGHT', rank:uniqueRanks[0], kickers:[] };
  if (countVals[0] === 3) {
    const r = parseInt(Object.keys(counts).find(k=>counts[k]===3));
    return { type:'THREE_KIND', rank:r, kickers: makeKickers([r,r,r]) };
  }
  if (countVals[0] === 2 && countVals[1] === 2) {
    const pairs = Object.keys(counts).filter(k=>counts[k]===2).map(Number).sort((a,b)=>b-a);
    return { type:'TWO_PAIR', rank:pairs[0], rank2:pairs[1], kickers: makeKickers([pairs[0],pairs[0],pairs[1],pairs[1]]) };
  }
  if (countVals[0] === 2) {
    const r = parseInt(Object.keys(counts).find(k=>counts[k]===2));
    return { type:'PAIR', rank:r, kickers: makeKickers([r,r]) };
  }
  return { type:'HIGH', rank:ranks[0], kickers: ranks.slice(1) };
}

// 單道最強評估（含鬼牌，只管自己這一道）
// 用於：牌型預覽、Fantasyland 觸發判定
function evaluateHand(cards) {
  if (cards.length === 0) return { type: 'HIGH', rank: 0, kickers: [] };
  const jokers = cards.filter(c => c.isJoker);
  const nonJ = cards.filter(c => !c.isJoker);
  if (jokers.length === 0) return evaluateHandPure(cards);
  let best = null;
  const try_ = (idx, cur) => {
    if (idx === jokers.length) {
      const ev = evaluateHandPure([...nonJ, ...cur]);
      if (!best || compareHandsCore(ev, best) > 0) best = ev;
      return;
    }
    for (let s = 0; s < 4; s++)
      for (let r = 2; r <= 14; r++) {
        cur.push({ rank: r, suit: SUITS[s] });
        try_(idx + 1, cur);
        cur.pop();
      }
  };
  try_(0, []);
  return best || { type: 'HIGH', rank: 0, kickers: [] };
}

// 帶 kicker 的比牌（同牌型同主牌點數時繼續比副牌）
function compareHandsCore(a, b) {
  const ra = CONFIG.HAND_RANK[a.type];
  const rb = CONFIG.HAND_RANK[b.type];
  if (ra !== rb) return ra > rb ? 1 : -1;
  if (a.rank !== b.rank) return a.rank > b.rank ? 1 : -1;
  // 兩對時比較第二對
  if (a.type === 'TWO_PAIR' && a.rank2 !== b.rank2) return (a.rank2||0) > (b.rank2||0) ? 1 : -1;
  // kicker 比較
  const ka = a.kickers || [], kb = b.kickers || [];
  for (let i = 0; i < Math.max(ka.length, kb.length); i++) {
    const va = ka[i] || 0, vb = kb[i] || 0;
    if (va !== vb) return va > vb ? 1 : -1;
  }
  return 0;
}

// compareHands 別名（相容舊呼叫）
function compareHands(a, b) { return compareHandsCore(a, b); }

// 整副最佳合法解：分道枚舉選項，找不犯規的最強組合
// ＊鬼牌只能代替自己所在那道的牌（不跨道）
let _arrCache = { key: null, value: null };
function getBestArrangement(rows) {
  // 未擺滿：用單道最強預覽
  if (rows.front.length < 3 || rows.middle.length < 5 || rows.back.length < 5) {
    return {
      foul: false,
      front: evaluateHand(rows.front),
      middle: evaluateHand(rows.middle),
      back: evaluateHand(rows.back),
      complete: false
    };
  }

  // 快取
  const k = (cs) => cs.map(c => c.isJoker ? 'J' : c.rank + c.suit).join(',');
  const cacheKey = k(rows.front) + '|' + k(rows.middle) + '|' + k(rows.back);
  if (_arrCache.key === cacheKey) return _arrCache.value;

  // 每道獨立取「所有可能牌型」（去重，從強到弱排序）
  const getOpts = (cards) => {
    const jokers = cards.filter(c => c.isJoker);
    const nonJ = cards.filter(c => !c.isJoker);
    if (jokers.length === 0) return [evaluateHandPure(cards)];
    const seen = new Map();
    const try_ = (idx, cur) => {
      if (idx === jokers.length) {
        const ev = evaluateHandPure([...nonJ, ...cur]);
        // key 要含 kicker 才能分辨同牌型不同 kicker
        const key = ev.type + ':' + ev.rank + ':' + (ev.kickers||[]).join(',');
        if (!seen.has(key)) seen.set(key, ev);
        return;
      }
      for (let s = 0; s < 4; s++)
        for (let r = 2; r <= 14; r++) {
          cur.push({ rank: r, suit: SUITS[s] });
          try_(idx + 1, cur);
          cur.pop();
        }
    };
    try_(0, []);
    return [...seen.values()].sort((a, b) => compareHandsCore(b, a)); // 強→弱
  };

  const frontOpts = getOpts(rows.front);
  const midOpts   = getOpts(rows.middle);
  const backOpts  = getOpts(rows.back);

  // 從後墩最強開始，找第一個不犯規的三道組合
  let result = null;
  outer:
  for (const b of backOpts) {
    for (const m of midOpts) {
      if (compareHandsCore(b, m) < 0) continue;
      for (const f of frontOpts) {
        if (compareHandsCore(m, f) < 0) continue;
        result = { foul: false, front: f, middle: m, back: b, complete: true };
        break outer;
      }
    }
  }

  if (!result) {
    // 全部組合都犯規：回傳各道最強（標記犯規）
    result = { foul: true, front: frontOpts[0], middle: midOpts[0], back: backOpts[0], complete: true };
  }

  _arrCache = { key: cacheKey, value: result };
  return result;
}

function checkFoul(rows) {
  return getBestArrangement(rows).foul;
}

function getRoyalty(row, handEval) {
  if (row === 'front') {
    if (handEval.type === 'PAIR') return CONFIG.ROYALTY_FRONT.PAIR[handEval.rank] || 0;
    if (handEval.type === 'THREE_KIND') return CONFIG.ROYALTY_FRONT.THREE_KIND;
    return 0;
  }
  if (row === 'middle') return CONFIG.ROYALTY_MIDDLE[handEval.type] || 0;
  if (row === 'back') return CONFIG.ROYALTY_BACK[handEval.type] || 0;
  return 0;
}

// 判定是否達到 Fantasyland 門檻，回傳該發牌數（0=未達）
// 前墩：QQ→14, KK→15, AA→16, 三條→17
// 中墩：葫蘆以上→14, 四條→15, 同花順→16, 皇家→17
// 後墩：四條以上→14, 同花順→15, 皇家→16
function checkFantasylandFromEval(frontEval, midEval, backEval) {
  // 前墩判定
  if (frontEval) {
    if (frontEval.type === 'THREE_KIND') return CONFIG.FANTASY_CARDS.THREE_KIND;
    if (frontEval.type === 'PAIR') {
      if (frontEval.rank === 14) return CONFIG.FANTASY_CARDS.PAIR_AA;
      if (frontEval.rank === 13) return CONFIG.FANTASY_CARDS.PAIR_KK;
      if (frontEval.rank === 12) return CONFIG.FANTASY_CARDS.PAIR_QQ;
    }
  }
  // 中墩判定
  if (midEval) {
    if (midEval.type === 'ROYAL_FLUSH')    return 17;
    if (midEval.type === 'STRAIGHT_FLUSH') return 16;
    if (midEval.type === 'FOUR_KIND')      return 15;
    if (midEval.type === 'FULL_HOUSE')     return 14;
  }
  // 後墩判定
  if (backEval) {
    if (backEval.type === 'ROYAL_FLUSH')    return 16;
    if (backEval.type === 'STRAIGHT_FLUSH') return 15;
    if (backEval.type === 'FOUR_KIND')      return 14;
  }
  return 0;
}

// 舊接口相容
function checkFantasyland(frontCards) {
  if (!frontCards || frontCards.length !== 3) return 0;
  return checkFantasylandFromEval(evaluateHand(frontCards), null, null);
}

// ============================================================
// 【遊戲流程 v0.4】雙人對戰
// ============================================================
function startGame() {
  game.stage = 0;
  game.relics = [];
  game.playerHp = CONFIG.PLAYER_MAX_HP;
  recalcCaps();
  startStage();
  playSound('start');
}

function startStage() {
  const enemy = ENEMIES[game.stage];
  game.enemyMaxHp = enemy.hp;
  game.enemyHp = enemy.hp;

  // 雙方共用一副牌
  game.deck = newDeck();
  game.enemyDeck = null;
  game.hand = [];
  game.enemyHand = [];
  game.rows = { front: [], middle: [], back: [] };
  game.enemyRows = { front: [], middle: [], back: [] };
  game.discards = [];
  game.enemyDiscards = [];
  game.round = 0;
  game.skillUsed = false;
  game.battleResults = null;

  // 跨關進入 Fantasyland（如果上關末場觸發）
  if (game.fantasylandPending > 0) {
    startFantasyland(game.fantasylandPending);
    game.fantasylandPending = 0;
  } else {
    game.inFantasyland = false;
    startRound();
  }
}

// 每場戰鬥開始時觸發 BOSS modifier
function applyRoundStartModifier() {
  const enemy = ENEMIES[game.stage];
  if (enemy.modifier === 'heal_each_round') {
    game.enemyHp = Math.min(game.enemyMaxHp, game.enemyHp + 15);
    flashMessage(`曹仁鐵壁回復 15 HP！(現 ${game.enemyHp})`);
  }
}

function startRound() {
  recalcCaps();
  game.round++;
  game.selectedCard = null;
  game.placedThisRound = 0;
  game.aiThinking = false;
  const enemy = ENEMIES[game.stage];

  if (game.round === 1) {
    // 第 1 回合：雙方各發 5 張
    for (let i = 0; i < CONFIG.INITIAL_DEAL; i++) {
      if (game.deck.length > 0) game.hand.push(game.deck.pop());
      if (game.deck.length > 0) game.enemyHand.push(game.deck.pop());
    }
    sortHand(game.hand);
    game.mustPlace = 5;
    game.mustDiscard = 0;
    game.message = `第 ${game.stage + 1} 關 · 第 1 回合｜${enemy.name}：「${enemy.quote}」 — 將 5 張全部擺入三道`;
  } else {
    for (let i = 0; i < CONFIG.ROUND_DEAL; i++) {
      if (game.deck.length > 0) game.hand.push(game.deck.pop());
      if (game.deck.length > 0) game.enemyHand.push(game.deck.pop());
    }
    sortHand(game.hand);
    game.mustPlace = 2;
    game.mustDiscard = 1;
    game.message = `第 ${game.stage + 1} 關 · 第 ${game.round} 回合 — 從 3 張中擺 2 張、最後 1 張自動棄掉`;
  }
  game.phase = 'placing';
  playSound('deal');
}


// ============================================================
// 【拖曳系統】
// ============================================================
function startDrag(card, clientX, clientY, fromHand, fromRow) {
  if (game.phase !== 'placing') return;
  const p = screenToCanvas(clientX, clientY);
  game.drag = { card, fromHand, fromRow, x: p.x, y: p.y };
  if (fromHand) {
    game.hand = game.hand.filter(c => c !== card);
  } else if (fromRow) {
    game.rows[fromRow] = game.rows[fromRow].filter(c => c !== card);
    game.mustPlace++;
    game.placedThisRound--;
    delete card._placedRound;
  }
  game.selectedCard = null;
}

function moveDrag(clientX, clientY) {
  if (!game.drag) return;
  const p = screenToCanvas(clientX, clientY);
  game.drag.x = p.x;
  game.drag.y = p.y;
}

function endDrag(clientX, clientY) {
  if (!game.drag) return;
  const p = screenToCanvas(clientX, clientY);
  const mx = p.x, my = p.y;
  const card = game.drag.card;
  const fromRow = game.drag.fromRow;
  let placed = false;

  // 拖到三道區域
  if (game._rowZones) {
    for (const k of ['front', 'middle', 'back']) {
      const z = game._rowZones[k];
      if (z && mx >= z.x - 20 && mx <= z.x + z.w + 20 &&
              my >= z.y - 20 && my <= z.y + z.h + 20) {
        if (game.rows[k].length < game.cardCaps[k]) {
          if (!fromRow) game.mustPlace--;
          card._placedRound = game.round;
          game.rows[k].push(card);
          game.placedThisRound++;
          placed = true;
          playSound('place');
          spawnParticles(mx, my, '#ffd700', 8);
          if (game.inFantasyland && game.mustPlace === 0 && game.hand.length > 0) {
            setTimeout(() => autoDiscardAll(), 300);
          } else if (game.mustPlace === 0 && game.mustDiscard === 1 && game.hand.length === 1) {
            setTimeout(() => autoDiscard(), 300);
          } else {
            checkRoundProgress();
          }
          break;
        }
      }
    }
  }

  // 拖到手牌區 → 退回
  if (!placed) {
    const hz = game._handZone;
    if (hz && mx >= hz.x - 30 && mx <= hz.x + hz.w + 30 &&
              my >= hz.y - 30 && my <= hz.y + hz.h + 50) {
      game.hand.push(card);
      placed = true;
      playSound('deal');
    }
  }

  // 沒放成功 → 退回原位
  if (!placed) {
    if (game.drag.fromHand) {
      game.hand.push(card);
    } else if (fromRow) {
      game.mustPlace--;
      game.placedThisRound++;
      card._placedRound = game.round;
      game.rows[fromRow].push(card);
    } else {
      game.hand.push(card);
    }
  }
  game.drag = null;
}


function placeCard(rowName) {
  if (!game.selectedCard) return;
  if (game.mustPlace <= 0) {
    flashMessage("本回合擺牌已完成");
    playSound('error');
    return;
  }
  if (game.rows[rowName].length >= game.cardCaps[rowName]) {
    flashMessage(rowMap(rowName) + "已滿");
    playSound('error');
    return;
  }
  game.selectedCard._placedRound = game.round;
  game.rows[rowName].push(game.selectedCard);
  spawnParticles(getRowSlotX(rowName, game.rows[rowName].length-1, false) + CONFIG.CARD_W/2,
                 getRowY(rowName, false) + CONFIG.CARD_H/2, '#ffd700', 8);
  game.hand = game.hand.filter(c => c !== game.selectedCard);
  game.selectedCard = null;
  game.mustPlace--;
  game.placedThisRound++;
  playSound('place');

  // Fantasyland：擺滿 13 張後自動棄掉剩餘所有牌
  if (game.inFantasyland && game.mustPlace === 0 && game.hand.length > 0) {
    setTimeout(() => autoDiscardAll(), 300);
    return;
  }

  // 一般模式：擺完且剩 1 張需要棄 1 → 自動棄
  if (game.mustPlace === 0 && game.mustDiscard === 1 && game.hand.length === 1) {
    setTimeout(() => autoDiscard(), 300);
    return;
  }
  checkRoundProgress();
}

// Fantasyland 自動棄掉手中所有剩餘牌
function autoDiscardAll() {
  const breakRelic = game.relics.find(r => r.id === 'discard_dmg');
  while (game.hand.length > 0) {
    const card = game.hand.shift();
    if (breakRelic) {
      game.enemyHp = Math.max(0, game.enemyHp - breakRelic.value);
      spawnFloatScore(getEnemyHpBarX(), 100, `-${breakRelic.value}`);
    }
    game.discards.push(card);
  }
  game.mustDiscard = 0;
  flashMessage(`夢幻國度結束！棄牌已處理`);
  playSound('discard');
  checkRoundProgress();
}

// 自動棄牌（剩 1 張時呼叫，不需手動點）
function autoDiscard() {
  if (game.hand.length !== 1) return;
  const card = game.hand[0];
  const breakRelic = game.relics.find(r => r.id === 'discard_dmg');
  if (breakRelic) {
    game.enemyHp = Math.max(0, game.enemyHp - breakRelic.value);
    spawnFloatScore(getEnemyHpBarX(), 100, `-${breakRelic.value}`);
  }
  game.discards.push(card);
  game.hand = [];
  game.mustDiscard = 0;
  flashMessage("自動棄掉最後 1 張");
  playSound('discard');
  checkRoundProgress();
}

function discardCard() {
  if (!game.selectedCard) {
    flashMessage("先點選一張要棄掉的牌");
    return;
  }
  if (game.mustDiscard <= 0) {
    flashMessage("本回合不需棄牌");
    playSound('error');
    return;
  }
  if (game.mustPlace > 0) {
    flashMessage("先擺完該擺的牌再棄");
    playSound('error');
    return;
  }
  // 破軍：棄牌時對敵造成傷害
  const breakRelic = game.relics.find(r => r.id === 'discard_dmg');
  if (breakRelic) {
    game.enemyHp = Math.max(0, game.enemyHp - breakRelic.value);
    spawnFloatScore(getEnemyHpBarX(), 100, `-${breakRelic.value}`);
  }
  game.discards.push(game.selectedCard);  // 公開棄牌
  game.hand = game.hand.filter(c => c !== game.selectedCard);
  game.selectedCard = null;
  game.mustDiscard--;
  playSound('discard');
  checkRoundProgress();
}

function checkRoundProgress() {
  if (game.mustPlace === 0 && game.mustDiscard === 0) {
    if (game.inFantasyland) {
      if (game._enemyFantasyDone) {
        game.message = "夢幻國度比牌中...";
        setTimeout(() => resolveBattle(), 800);
      } else {
        game.message = "你已擺完，等待對手...";
      }
      return;
    }
    // 顯示確認按鈕
    if (!game.aiThinking && !game.confirmPending) {
      game.confirmPending = true;
      game.message = "確認出牌？還是重新調整？";
    }
  }
}

// 確認後才觸發 AI
function doConfirm() {
  game.confirmPending = false;
  if (!game.aiThinking) {
    game.aiThinking = true;
    game.message = "對手思考中...";
    setTimeout(() => doEnemyTurn(), CONFIG.AI_THINK_DELAY);
  }
}

// 取消確認：退回本回合所有牌
function cancelConfirm() {
  game.confirmPending = false;
  resetThisRoundOnly();
}

// AI 出牌（同步當前回合）
function doEnemyTurn() {
  const enemy = ENEMIES[game.stage];
  const isFirstRound = game.round === 1;
  const totalToPlace = isFirstRound ? 5 : 2;
  const totalToDiscard = isFirstRound ? 0 : 1;

  // AI 策略：根據 enemy.ai 強度決定擺牌品質
  aiDecide(enemy.ai, totalToPlace, totalToDiscard);

  // 檢查兩邊是否都到 13 張或 5 回合結束
  const playerTotal = game.rows.front.length + game.rows.middle.length + game.rows.back.length;
  const enemyTotal = game.enemyRows.front.length + game.enemyRows.middle.length + game.enemyRows.back.length;

  if ((playerTotal >= 13 && enemyTotal >= 13) || game.round >= CONFIG.TOTAL_ROUNDS) {
    setTimeout(() => resolveBattle(), 800);
  } else {
    setTimeout(() => startRound(), 800);
  }
}

// AI 擺牌邏輯：依強度從手牌中挑出該擺哪幾張、棄哪張
// 評估一副完整擺法的價值（考慮合法性、傷害潛力、Royalty）
function scoreEnemyRows(rows) {
  const arr = getBestArrangement(rows);
  if (arr.foul) return -5000;
  const f = arr.front, m = arr.middle, b = arr.back;
  const HR = CONFIG.HAND_RANK;
  let score = HR[b.type] * 200 + b.rank * 5
            + HR[m.type] * 80  + m.rank * 2
            + HR[f.type] * 30  + f.rank;
  score += getRoyalty('front', f) * 40;
  score += getRoyalty('middle', m) * 20;
  score += getRoyalty('back', b) * 10;
  const minRank = Math.min(HR[f.type], HR[m.type], HR[b.type]);
  if (minRank >= 3) score += 100;
  if (minRank >= 2) score += 50;
  return score;
}

// 智能棄牌：找出「保留剩餘牌潛力最高」的組合，棄掉最沒用的
function aiFindBestDiscard(hand) {
  if (hand.length === 0) return null;
  let bestKeepScore = -Infinity, bestDiscard = null;
  for (let i = 0; i < hand.length; i++) {
    const discard = hand[i];
    if (discard.isJoker) continue; // 鬼牌不棄
    const remaining = hand.filter((_, j) => j !== i);
    const ranks = remaining.map(c => c.rank);
    const suits = remaining.map(c => c.suit);
    const counts = {};
    ranks.forEach(r => counts[r] = (counts[r]||0)+1);
    let val = 0;
    Object.entries(counts).forEach(([r, cnt]) => {
      if (cnt >= 3) val += parseInt(r) * 12;
      else if (cnt >= 2) val += parseInt(r) * 5;
      else val += parseInt(r) * 0.5;
    });
    const suitCounts = {};
    suits.forEach(s => suitCounts[s] = (suitCounts[s]||0)+1);
    val += Math.max(...Object.values(suitCounts)) * 8;
    if (val > bestKeepScore) { bestKeepScore = val; bestDiscard = discard; }
  }
  return bestDiscard || hand.reduce((a, b) => a.rank <= b.rank ? a : b);
}

// 智能排序：同花牌和對子牌聚在一起
function smartSort(hand, existingRows) {
  const allCards = [...existingRows.front, ...existingRows.middle, ...existingRows.back, ...hand];
  const suitCount = {}, rankCount = {};
  allCards.forEach(c => {
    suitCount[c.suit] = (suitCount[c.suit]||0)+1;
    rankCount[c.rank] = (rankCount[c.rank]||0)+1;
  });
  return [...hand].sort((a, b) => {
    const sa = (a.isJoker ? 500 : 0)
             + (rankCount[a.rank] >= 3 ? a.rank * 15 : rankCount[a.rank] >= 2 ? a.rank * 8 : 0)
             + (suitCount[a.suit] >= 4 ? 60 : suitCount[a.suit] >= 3 ? 30 : 0)
             + a.rank;
    const sb = (b.isJoker ? 500 : 0)
             + (rankCount[b.rank] >= 3 ? b.rank * 15 : rankCount[b.rank] >= 2 ? b.rank * 8 : 0)
             + (suitCount[b.suit] >= 4 ? 60 : suitCount[b.suit] >= 3 ? 30 : 0)
             + b.rank;
    return sb - sa;
  });
}

// 嘗試將 mustPlace 張牌排入三道
function tryArrange(hand, rows, rem, mustPlace) {
  const ops = [], trialRem = { ...rem };
  const toPlace = hand.slice(0, mustPlace);
  for (const card of toPlace) {
    let targets;
    if (card.isJoker || card.rank >= 12) targets = ['back','middle','front'];
    else if (card.rank >= 8) targets = ['middle','back','front'];
    else targets = ['front','middle','back'];
    if (Math.random() < 0.25) shuffle(targets);
    const target = targets.find(t => trialRem[t] > 0);
    if (!target) return null;
    ops.push({ card, row: target });
    trialRem[target]--;
  }
  return ops;
}

function simulateRows(rows, ops) {
  const t = { front:[...rows.front], middle:[...rows.middle], back:[...rows.back] };
  ops.forEach(op => t[op.row].push(op.card));
  return t;
}

function aiDecide(strength, mustPlace, mustDiscard) {
  const currentHand = [...game.enemyHand];
  const rows = game.enemyRows;
  const caps = CONFIG.ROW_CAPS;
  const rem = {
    front: caps.front - rows.front.length,
    middle: caps.middle - rows.middle.length,
    back: caps.back - rows.back.length,
  };

  let bestPlan = null;
  const totalAttempts = Math.floor(60 + strength * 200); // 強度高 → 更多嘗試

  // 生成候選棄牌列表（絕對不棄鬼牌）
  const nonJokerHand = currentHand.filter(c => !c.isJoker);
  const randomDiscard = nonJokerHand.length > 0
    ? nonJokerHand[Math.floor(Math.random() * nonJokerHand.length)]
    : null;

  const discardCandidates = mustDiscard > 0
    ? (strength > 0.75
        ? [aiFindBestDiscard(currentHand), randomDiscard]
        : [randomDiscard]
      ).filter(Boolean)
    : [null];

  for (const trialDiscard of discardCandidates) {
    const trialHand = trialDiscard
      ? currentHand.filter(c => c !== trialDiscard)
      : [...currentHand];

    for (let a = 0; a < totalAttempts / discardCandidates.length; a++) {
      const sorted = Math.random() < strength
        ? smartSort(trialHand, rows)
        : shuffle([...trialHand]);

      const plan = tryArrange(sorted, rows, rem, mustPlace);
      if (!plan) continue;

      const tempRows = simulateRows(rows, plan);
      const score = scoreEnemyRows(tempRows);
      if (!bestPlan || score > bestPlan.score) {
        bestPlan = { placeOps: plan, discard: trialDiscard, score };
      }
    }
  }

  // 執行最佳方案
  if (bestPlan) {
    bestPlan.placeOps.forEach(op => {
      game.enemyRows[op.row].push(op.card);
      game.enemyHand = game.enemyHand.filter(c => c !== op.card);
      spawnParticles(
        getRowSlotX(op.row, game.enemyRows[op.row].length-1, true) + CONFIG.CARD_W/2,
        getRowY(op.row, true) + CONFIG.CARD_H/2,
        '#ff6644', 6
      );
    });
    if (bestPlan.discard) {
      game.enemyDiscards.push(bestPlan.discard);
      game.enemyHand = game.enemyHand.filter(c => c !== bestPlan.discard);
    }
  }
  game.enemyHand = [];
}

function useSkill() {
  if (game.phase !== 'placing') return;
  if (game.skillUsed) { flashMessage("龍膽技已用過"); return; }
  if (game.hand.length === 0) { flashMessage("無牌可重抽"); return; }
  const count = game.hand.length;
  game.deck.push(...game.hand);
  shuffle(game.deck);
  game.hand = [];
  for (let i = 0; i < count; i++) {
    if (game.deck.length > 0) game.hand.push(game.deck.pop());
  }
  game.skillUsed = true;
  game.selectedCard = null;
  flashMessage("龍膽發動！手牌已重抽");
  spawnParticles(CONFIG.W/2, CONFIG.H - 100, '#88ddff', 40);
  playSound('skill');
}

function resetThisRoundOnly() {
  let restored = 0;
  ['front','middle','back'].forEach(rn => {
    const remain = [];
    for (const c of game.rows[rn]) {
      if (c._placedRound === game.round) {
        delete c._placedRound;
        game.hand.push(c);
        restored++;
      } else remain.push(c);
    }
    game.rows[rn] = remain;
  });
  if (restored === 0) { flashMessage("本回合尚未擺牌"); return; }
  game.mustPlace += restored;
  game.placedThisRound -= restored;
  game.selectedCard = null;
  flashMessage(`已退回本回合 ${restored} 張`);
  playSound('deal');
}

// ============================================================
// 【最終結算】比三道、算傷害、扣血
// ============================================================
function resolveBattle() {
  game.phase = 'battle';
  game.battleResults = [];
  game.battleStep = -1;      // 當前顯示到第幾步（-1=還沒開始）
  game.battleFinalDmg = { toEnemy: 0, toPlayer: 0 };
  game.battleAnimDone = false;

  // 先計算所有結果（不立刻顯示）
  const playerArr = getBestArrangement(game.rows);
  const enemyArr  = getBestArrangement(game.enemyRows);
  const playerFoul = playerArr.foul;
  const enemyFoul  = enemyArr.foul;
  const enemy = ENEMIES[game.stage];

  const steps = [];   // 每個 step 是一個結算事件
  let dmgToEnemy = 0, dmgToPlayer = 0;
  let playerWins = 0, enemyWins = 0;

  // 犯規
  const hasChangban = game.relics.find(r => r.id === 'changban');
  if (playerFoul) {
    if (hasChangban) {
      dmgToEnemy += hasChangban.value;
      steps.push({ type: 'foul', side: 'player', label: '陣型崩潰', sub: `長坂魂反擊 +${hasChangban.value}`, dmgEnemy: hasChangban.value, dmgPlayer: 0 });
    } else {
      dmgToPlayer += CONFIG.FOUL_PENALTY;
      steps.push({ type: 'foul', side: 'player', label: '⚠ 陣型崩潰！', sub: `自損 ${CONFIG.FOUL_PENALTY} HP`, dmgEnemy: 0, dmgPlayer: CONFIG.FOUL_PENALTY });
    }
  }
  if (enemyFoul) {
    dmgToEnemy += CONFIG.FOUL_PENALTY;
    steps.push({ type: 'foul', side: 'enemy', label: '敵方陣型崩潰！', sub: `對敵 +${CONFIG.FOUL_PENALTY} HP`, dmgEnemy: CONFIG.FOUL_PENALTY, dmgPlayer: 0 });
  }

  // 每場戰鬥重置遺物計數器
  game._currentWins = 0;
  game._chainBonus = 0;
  game._sealCount = 0;

  // 三道比牌
  ['front', 'middle', 'back'].forEach((row) => {
    const ph = playerArr[row];
    const eh = enemyArr[row];
    let cmp = 0;
    if (playerFoul && !enemyFoul) cmp = -1;
    else if (enemyFoul && !playerFoul) cmp = 1;
    else if (playerFoul && enemyFoul) cmp = 0;
    else cmp = compareHandsCore(ph, eh);

    const rowLabel = { front: '前 鋒', middle: '中 軍', back: '後 陣' }[row];

    if (cmp > 0) {
      game._currentWins = (game._currentWins || 0) + 1;
      const royalty = getRoyalty(row, ph);
      const base = CONFIG.HAND_BASE[ph.type] || { chips: 0, mult: 0 };
      const baseDmgRaw = (base.chips * base.mult) / CONFIG.DAMAGE_DIVISOR;
      const ctx = { row, cards: game.rows[row], handType: ph.type, enemyHandType: eh.type, win: true,
                    dmg: baseDmgRaw + royalty, trigger: [] };
      const dmgBeforeRelics = ctx.dmg;
      applyRelics(ctx);
      const finalDmg = Math.floor(ctx.dmg);
      dmgToEnemy += finalDmg;
      playerWins++;

      // 計算過程：chips × mult ÷ divisor + royalty [+ relics]
      const calcSteps = [
        `${base.chips} × ${base.mult} ÷ ${CONFIG.DAMAGE_DIVISOR} = ${baseDmgRaw.toFixed(0)}`,
        ...(royalty > 0 ? [`+ Royalty ${royalty}`] : []),
        ...(ctx.trigger.length > 0 ? ctx.trigger.map(t => `+ ${t.name} ${t.text}`) : []),
        `= ${finalDmg} 傷害`,
      ];

      steps.push({
        type: 'row', row, rowLabel, winner: 'player',
        playerHand: ph, enemyHand: eh,
        playerCards: game.rows[row].map(c => ({ ...c })),
        enemyCards: game.enemyRows[row].map(c => ({ ...c })),
        label: `我 ${handTypeName(ph.type)} > 敵 ${handTypeName(eh.type)}`,
        sub: royalty > 0 ? `+Royalty ${royalty}` : '',
        calcSteps,
        dmgEnemy: finalDmg, dmgPlayer: 0
      });
    } else if (cmp < 0) {
      const royalty = getRoyalty(row, eh);
      const base = CONFIG.HAND_BASE[eh.type] || { chips: 0, mult: 0 };
      const baseDmgRaw = (base.chips * base.mult) / CONFIG.DAMAGE_DIVISOR;
      let baseDmg = baseDmgRaw + royalty;
      const calcSteps = [
        `${base.chips} × ${base.mult} ÷ ${CONFIG.DAMAGE_DIVISOR} = ${baseDmgRaw.toFixed(0)}`,
        ...(royalty > 0 ? [`+ Royalty ${royalty}`] : []),
      ];
      const wall = game.relics.find(r => r.id === 'iron_wall');
      if (wall) { calcSteps.push(`× 鐵壁 ${wall.value}`); baseDmg *= wall.value; }
      if (enemy.modifier === 'double_dmg') { calcSteps.push(`× 魏武帝 1.4`); baseDmg *= 1.4; }
      if (enemy.modifier === 'double_front_dmg' && row === 'front') { calcSteps.push(`× 張遼前鋒 2`); baseDmg *= 2; }
      const finalDmg = Math.floor(baseDmg);
      calcSteps.push(`= ${finalDmg} 傷害`);
      dmgToPlayer += finalDmg;
      enemyWins++;
      steps.push({
        type: 'row', row, rowLabel, winner: 'enemy',
        playerHand: ph, enemyHand: eh,
        playerCards: game.rows[row].map(c => ({ ...c })),
        enemyCards: game.enemyRows[row].map(c => ({ ...c })),
        label: `我 ${handTypeName(ph.type)} < 敵 ${handTypeName(eh.type)}`,
        sub: '',
        calcSteps,
        dmgEnemy: 0, dmgPlayer: finalDmg
      });
    } else {
      steps.push({
        type: 'row', row, rowLabel, winner: 'tie',
        playerHand: ph, enemyHand: eh,
        playerCards: game.rows[row].map(c => ({ ...c })),
        enemyCards: game.enemyRows[row].map(c => ({ ...c })),
        label: `我 ${handTypeName(ph.type)} = 敵 ${handTypeName(eh.type)}`,
        sub: '平手',
        calcSteps: ['平手 — 無傷害'],
        dmgEnemy: 0, dmgPlayer: 0
      });
    }
  });

  // Scoop（三道全勝後才加，不中途觸發）
  if (playerWins === 3 && !playerFoul) {
    const sm = game.relics.find(r => r.id === 'yiqiankudun');
    const scoopDmg = CONFIG.SCOOP_DAMAGE + (sm ? sm.value : 0);
    dmgToEnemy += scoopDmg;
    steps.push({ type: 'scoop', winner: 'player', label: '⚔ 一掃三軍！', sub: `Scoop 額外 +${scoopDmg} 傷害`, dmgEnemy: scoopDmg, dmgPlayer: 0 });
  }
  if (enemyWins === 3 && !enemyFoul) {
    dmgToPlayer += CONFIG.SCOOP_DAMAGE;
    steps.push({ type: 'scoop', winner: 'enemy', label: '敵方一掃三軍！', sub: `受額外 ${CONFIG.SCOOP_DAMAGE} 傷害`, dmgEnemy: 0, dmgPlayer: CONFIG.SCOOP_DAMAGE });
  }

  game.battleResults = steps;
  game.battleFinalDmg = { toEnemy: dmgToEnemy, toPlayer: dmgToPlayer };

  // Fantasyland 判定（雙方）
  // 玩家：用單道最強判定
  let playerFL = 0, enemyFL = 0;
  if (!playerFoul) {
    const fBest = evaluateHand(game.rows.front);
    const mBest = evaluateHand(game.rows.middle);
    const bBest = evaluateHand(game.rows.back);
    playerFL = checkFantasylandFromEval(fBest, mBest, bBest);
  }
  if (!enemyFoul) {
    const fBest = evaluateHand(game.enemyRows.front);
    const mBest = evaluateHand(game.enemyRows.middle);
    const bBest = evaluateHand(game.enemyRows.back);
    enemyFL = checkFantasylandFromEval(fBest, mBest, bBest);
  }
  game._pendingPlayerFL = playerFL;
  game._pendingEnemyFL  = enemyFL;

  // 開始逐步顯示
  game.battleStep = 0;
  showNextBattleStep();
}

// 逐步顯示結算（每步 1.2 秒）
function showNextBattleStep() {
  if (game.battleStep >= game.battleResults.length) {
    // 所有步驟顯示完畢 → 套用傷害、等待後進入下一狀態
    const { toEnemy, toPlayer } = game.battleFinalDmg;

    game.enemyHp = Math.max(0, game.enemyHp - toEnemy);
    game.playerHp = Math.max(0, game.playerHp - toPlayer);

    if (toEnemy > 0) {
      spawnFloatScore(getEnemyHpBarX() + 140, 90, `-${toEnemy}`);
      spawnParticles(200, 90, '#ff4444', 40);
      game.shake = Math.min(20, toEnemy / 4);
      playSound('hit');
    }
    if (toPlayer > 0) {
      spawnFloatScore(400, CONFIG.H - 85, `-${toPlayer}`);
      spawnParticles(400, CONFIG.H - 85, '#ff8800', 40);
      game.shake = Math.max(game.shake, Math.min(15, toPlayer / 4));
      playSound('hurt');
    }

    // Fantasyland 判定
    if (game._pendingPlayerFL > 0) {
      game.fantasylandPending = game._pendingPlayerFL;
      flashBigText(`夢幻國度！${game._pendingPlayerFL} 張`, '#ff44ff');
      const queenGrace = game.relics.find(r => r.id === 'queen_grace');
      if (queenGrace && !game._queenGraceUsed) {
        game.playerHp = Math.min(CONFIG.PLAYER_MAX_HP, game.playerHp + queenGrace.value);
        game._queenGraceUsed = true;
        spawnFloatScore(300, CONFIG.H - 85, `+${queenGrace.value}`);
      }
      playSound('crit');
    }
    if (game._pendingEnemyFL > 0) {
      game.enemyFantasylandPending = game._pendingEnemyFL;
      flashBigText(`對手也進夢幻！${game._pendingEnemyFL} 張`, '#ff88ff');
    }

    game.message = `我 -${toPlayer} HP ／ 敵 -${toEnemy} HP`;
    game.battleAnimDone = true;

    // 儲存牌局紀錄
    const logEntry = {
      stage: game.stage,
      enemyName: ENEMIES[game.stage].name,
      round: game.matchLog.length + 1,
      playerRows: {
        front: game.rows.front.map(c => ({ ...c })),
        middle: game.rows.middle.map(c => ({ ...c })),
        back: game.rows.back.map(c => ({ ...c })),
      },
      enemyRows: {
        front: game.enemyRows.front.map(c => ({ ...c })),
        middle: game.enemyRows.middle.map(c => ({ ...c })),
        back: game.enemyRows.back.map(c => ({ ...c })),
      },
      playerDiscards: game.discards.map(c => ({ ...c })),
      enemyDiscards: game.enemyDiscards.map(c => ({ ...c })),
      steps: [...game.battleResults],
      dmgToEnemy: toEnemy,
      dmgToPlayer: toPlayer,
      playerHpBefore: game.playerHp + toPlayer,
      enemyHpBefore: game.enemyHp + toEnemy,
      inFantasyland: game.inFantasyland,
    };
    game.matchLog.unshift(logEntry);      // 最新的在最前面
    if (game.matchLog.length > 8) game.matchLog.pop();

    setTimeout(() => finishBattle(), 2200);
    return;
  }

  const step = game.battleResults[game.battleStep];
  game.battleStep++;

  // 高亮對應的道
  if (step.row) {
    if (step.winner === 'player') game.glowRows.player[step.row] = 60;
    else if (step.winner === 'enemy') game.glowRows.enemy[step.row] = 60;
  }

  // 音效
  if (step.winner === 'player') playSound('place');
  else if (step.winner === 'enemy') playSound('hurt');
  else if (step.type === 'scoop') playSound('crit');
  else if (step.type === 'foul') playSound('error');

  setTimeout(() => showNextBattleStep(), 1300);
}

function finishBattle() {
  // 呂布遺甲：本局受傷 > 30，下一局輸出 ×2
  const lubu = game.relics.find(r => r.id === 'lubu');
  if (lubu && game.battleFinalDmg.toPlayer > 30) {
    game._revengeBuff = true;
    flashBigText('呂布遺甲！下局 ×2！', '#ff8800');
  }

  // 諸葛連弩：三道全勝，累積連勝
  const zhuge = game.relics.find(r => r.id === 'zhuge');
  if (zhuge) {
    const steps = game.battleResults || [];
    const rowWins = steps.filter(s => s.type === 'row' && s.winner === 'player').length;
    if (rowWins === 3) {
      game._zhugeStreak = (game._zhugeStreak || 0) + 1;
      if (game._zhugeStreak >= 3) {
        const bonus = zhuge.value;
        game.enemyHp = Math.max(0, game.enemyHp - bonus);
        spawnFloatScore(200, 90, `-${bonus}`);
        flashBigText(`連弩！-${bonus}！`, '#88ccff');
        game._zhugeStreak = 0;
      } else {
        flashBigText(`連弩蓄力 ${game._zhugeStreak}/3`, '#88ccff');
      }
    } else {
      game._zhugeStreak = 0;
    }
  }

  // 皇后恩典 revive
  const queenGrace = game.relics.find(r => r.id === 'queen_grace');
  if (game.playerHp <= 0 && queenGrace && !game._reviveUsed) {
    game._reviveUsed = true;
    game.playerHp = queenGrace.value;
    spawnFloatScore(300, CONFIG.H - 85, `復活！+${queenGrace.value}`);
    spawnParticles(CONFIG.W/2, CONFIG.H/2, '#ffd700', 80);
    flashBigText('皇后恩典！復活！', '#ffd700');
    playSound('victory');
    setTimeout(() => startNextMatch(), 2000);
    return;
  }

  const ahdou = game.relics.find(r => r.id === 'ahdou');
  if (game.playerHp <= 0) {
    game.phase = 'gameover';
    playSound('lose');
  } else if (game.enemyHp <= 0) {
    if (ahdou) {
      game.playerHp = Math.min(CONFIG.PLAYER_MAX_HP, game.playerHp + ahdou.value);
      spawnFloatScore(300, CONFIG.H - 85, `+${ahdou.value}`);
    }
    if (game.stage >= ENEMIES.length - 1) {
      game.phase = 'victory';
      playSound('victory');
    } else prepareReward();
  } else {
    flashBigText('再戰！', '#ffd700');
    setTimeout(() => startNextMatch(), 1200);
  }
}

// 同關卡內再戰一場（HP 保留、洗新牌、重置三道）
function startNextMatch() {
  applyRoundStartModifier();  // 每場戰鬥開始觸發 BOSS 特殊能力
  game.deck = newDeck();
  game.hand = [];
  game.enemyHand = [];
  game.rows = { front: [], middle: [], back: [] };
  game.enemyRows = { front: [], middle: [], back: [] };
  game.discards = [];
  game.enemyDiscards = [];
  game.round = 0;
  game.skillUsed = false;
  game.battleResults = [];
  game.battleAnimDone = false;

  // 對手 Fantasyland pending（AI 也進 Fantasyland）
  const enemyFL = game.enemyFantasylandPending || 0;
  game.enemyFantasylandPending = 0;

  if (game.fantasylandPending > 0) {
    startFantasyland(game.fantasylandPending, enemyFL);
    game.fantasylandPending = 0;
  } else if (enemyFL > 0) {
    // 只有對手進 Fantasyland：對手一次拿牌，玩家走正常流程
    game.inFantasyland = false;
    startEnemyOnlyFantasyland(enemyFL);
  } else {
    game.inFantasyland = false;
    startRound();
  }
}

// 進入 Fantasyland：一次發 N 張到玩家手牌、AI 也用啟發式一次擺好
// 玩家進 Fantasyland（enemyFL > 0 表示對手也進）
function startFantasyland(cardCount, enemyFL) {
  game.inFantasyland = true;
  recalcCaps();

  // 玩家發 N 張並排序
  for (let i = 0; i < cardCount; i++) {
    if (game.deck.length > 0) game.hand.push(game.deck.pop());
  }
  sortHand(game.hand);

  game.mustPlace = 13;
  game.mustDiscard = cardCount - 13;
  game.placedThisRound = 0;
  game.selectedCard = null;
  game.round = 1;

  if (enemyFL > 0) {
    // 雙方都進 Fantasyland — AI 也一次拿 enemyFL 張
    game.enemyHand = [];
    for (let i = 0; i < enemyFL; i++) {
      if (game.deck.length > 0) game.enemyHand.push(game.deck.pop());
    }
    // AI 直接從手牌中找最佳 13 張擺法
    game.enemyFantasyQueue = game.enemyHand;
    game.enemyFantasyRound = 0;
    game._enemyFantasyDone = false;
    setTimeout(() => doEnemyFantasyTurn(), 2000);
    game.message = `★ 雙方皆入夢幻！你 ${cardCount} 張 / 敵 ${enemyFL} 張 ★`;
  } else {
    // 只有玩家進 Fantasyland，AI 走正常 5 回合節奏
    game.enemyHand = [];
    game.enemyFantasyQueue = [];
    for (let i = 0; i < 17; i++) {
      if (game.deck.length > 0) game.enemyFantasyQueue.push(game.deck.pop());
    }
    game.enemyFantasyRound = 0;
    game._enemyFantasyDone = false;
    setTimeout(() => doEnemyFantasyTurn(), 1500);
    game.message = `★夢幻國度★ 一次拿到 ${cardCount} 張！排好 13 張、其餘自動棄掉`;
  }

  game.phase = 'placing';
  playSound('skill');
}

// 只有 AI 進 Fantasyland，玩家走正常流程
function startEnemyOnlyFantasyland(enemyFL) {
  game.enemyHand = [];
  for (let i = 0; i < enemyFL; i++) {
    if (game.deck.length > 0) game.enemyHand.push(game.deck.pop());
  }
  // AI 快速擺好（用啟發式最佳解），再走正常回合讓玩家看到
  // 這邊 AI 已經有了所有牌，直接計算最佳配置
  const aiCards = [...game.enemyHand];
  game.enemyHand = [];
  let best = null;
  for (let a = 0; a < 150; a++) {
    const shuffled = shuffle([...aiCards]);
    const rows = { front: shuffled.slice(0,3), middle: shuffled.slice(3,8), back: shuffled.slice(8,13) };
    if (!checkFoul(rows)) {
      const score = scoreEnemyRows(rows);
      if (!best || score > best.score) best = { rows, score };
    }
  }
  if (best) {
    game.enemyRows = best.rows;
  } else {
    const s = [...aiCards].sort((a,b)=>b.rank-a.rank);
    game.enemyRows = { front:s.slice(10,13), middle:s.slice(5,10), back:s.slice(0,5) };
  }
  // 棄掉剩下（enemyFL - 13 張）
  for (let i = 13; i < enemyFL; i++) {
    if (aiCards[i]) game.enemyDiscards.push(aiCards[i]);
  }
  // 玩家走正常流程（但訊息顯示對手進了夢幻）
  game.message = `對手進入夢幻國度（${enemyFL} 張）！你照常出牌`;
  startRound();
}

// AI 在玩家 Fantasyland 期間，一回合一回合擺（讓玩家看得到動作）
function doEnemyFantasyTurn() {
  if (game._enemyFantasyDone) return;
  game.enemyFantasyRound++;
  const enemy = ENEMIES[game.stage];
  const isFirst = game.enemyFantasyRound === 1;
  const dealCount = isFirst ? 5 : 3;
  const placeCount = isFirst ? 5 : 2;
  const discardCount = isFirst ? 0 : 1;

  // 從 queue 取出本回合的牌
  for (let i = 0; i < dealCount; i++) {
    if (game.enemyFantasyQueue.length > 0) {
      game.enemyHand.push(game.enemyFantasyQueue.shift());
    }
  }

  // AI 決策（沿用原本的 aiDecide）
  aiDecide(enemy.ai, placeCount, discardCount);

  // 檢查是否擺完
  const enemyTotal = game.enemyRows.front.length + game.enemyRows.middle.length + game.enemyRows.back.length;
  if (enemyTotal >= 13 || game.enemyFantasyRound >= 5) {
    game._enemyFantasyDone = true;
    // 看玩家是否也擺完，若是則結算
    tryResolveFantasyland();
  } else {
    // 排程下一回合
    setTimeout(() => doEnemyFantasyTurn(), 1500);
  }
}

// 嘗試結算 Fantasyland（玩家+AI 都擺完才執行）
function tryResolveFantasyland() {
  const playerTotal = game.rows.front.length + game.rows.middle.length + game.rows.back.length;
  const enemyTotal = game.enemyRows.front.length + game.enemyRows.middle.length + game.enemyRows.back.length;
  if (playerTotal >= 13 && enemyTotal >= 13) {
    setTimeout(() => resolveBattle(), 800);
  }
}

function applyRelics(ctx) {
  game.relics.forEach(r => { if (r.effect) r.effect(ctx); });
  // 呂布遺甲 revenge_buff：上一局受傷 > 30，本局傷害 ×2
  if (game._revengeBuff && ctx.win) {
    ctx.dmg *= 2;
    ctx.trigger.push({ name: "呂布遺甲", text: "×2（復仇）" });
    game._revengeBuff = false;  // 只觸發一次
  }
}

function prepareReward() {
  const owned = new Set(game.relics.map(r => r.id));
  const pool = RELICS.filter(r => !owned.has(r.id));
  game.rewardChoices = shuffle([...pool]).slice(0, 3);
  game._rewardQuote = VICTORY_QUOTES[Math.floor(Math.random() * VICTORY_QUOTES.length)];
  game.phase = 'reward';
  game.message = "戰勝！選擇一件神兵 / 戰功";
  playSound('reward');
}

function chooseReward(idx) {
  game.relics.push(game.rewardChoices[idx]);
  recalcCaps();
  game.stage++;
  startStage();
}

function flashMessage(msg) { game.message = msg; }
function flashBigText(text, color) {
  game.floatTexts.push({ text, color, x: CONFIG.W/2, y: CONFIG.H/2, life: 80, scale: 0.1 });
}
function spawnFloatScore(x, y, text) {
  game.floatTexts.push({ text, color: '#ffd700', x, y, life: 70, scale: 1 });
}

// 【視覺特效】
// ============================================================
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    game.particles.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 30 + Math.random()*25, color, size: 2 + Math.random()*3,
    });
  }
}
function updateEffects() {
  game.particles = game.particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--;
    return p.life > 0;
  });
  game.floatTexts = game.floatTexts.filter(t => {
    t.life--;
    if (t.scale < 1.2) t.scale += 0.08;
    t.y -= 0.5;
    return t.life > 0;
  });
  ['player', 'enemy'].forEach(side => {
    Object.keys(game.glowRows[side] || {}).forEach(k => {
      game.glowRows[side][k]--;
      if (game.glowRows[side][k] <= 0) delete game.glowRows[side][k];
    });
  });
  game.shake *= CONFIG.SHAKE_DECAY;
}

// 【音效】
// ============================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  return audioCtx;
}
function playSound(type) {
  const ac = getAudio();
  if (!ac) return;
  const now = ac.currentTime;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  let freq = 440, dur = 0.1, type_ = 'square', vol = 0.07;
  switch (type) {
    case 'place':   freq = 600; dur = 0.06; type_ = 'square'; vol = 0.06; break;
    case 'deal':    freq = 350; dur = 0.08; type_ = 'triangle'; vol = 0.05; break;
    case 'discard': freq = 200; dur = 0.15; type_ = 'sawtooth'; vol = 0.06; break;
    case 'hit':     freq = 150; dur = 0.3;  type_ = 'square'; vol = 0.13; break;
    case 'hurt':    freq = 80;  dur = 0.3;  type_ = 'sawtooth'; vol = 0.12; break;
    case 'crit':    freq = 1000; dur = 0.4; type_ = 'sine'; vol = 0.14; break;
    case 'skill':   freq = 880; dur = 0.4;  type_ = 'sine'; vol = 0.12; break;
    case 'reward':  freq = 660; dur = 0.5;  type_ = 'sine'; vol = 0.1; break;
    case 'victory': freq = 880; dur = 1.0;  type_ = 'sine'; vol = 0.13; break;
    case 'lose':    freq = 100; dur = 0.8;  type_ = 'sawtooth'; vol = 0.12; break;
    case 'start':   freq = 523; dur = 0.3;  type_ = 'square'; vol = 0.08; break;
    case 'error':   freq = 150; dur = 0.1;  type_ = 'square'; vol = 0.07; break;
  }
  o.type = type_;
  o.frequency.setValueAtTime(freq, now);
  if (type === 'skill' || type === 'reward' || type === 'victory' || type === 'crit') {
    o.frequency.exponentialRampToValueAtTime(freq * 2, now + dur);
  } else if (type === 'hit' || type === 'hurt' || type === 'lose') {
    o.frequency.exponentialRampToValueAtTime(freq * 0.4, now + dur);
  }
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + dur);
  o.start(now); o.stop(now + dur);
}

// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let mousePos = { x: 0, y: 0 };
let _scale = 1;
let _portrait = false; // 直立模式

// 橫向版面：1280×820
const LAND_W = 1280, LAND_H = 820;
// 直立版面：480×900（手機優化）
const PORT_W = 480,  PORT_H = 900;

// 當前使用的尺寸（隨方向切換）
let GAME_W = LAND_W, GAME_H = LAND_H;

// CONFIG 裡的 W/H 也要跟著更新
function syncConfigSize() {
  CONFIG.W = GAME_W;
  CONFIG.H = GAME_H;
}

function updateScale() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // 判斷是否直立模式（手機直立 or 視窗高 > 寬）
  _portrait = vh > vw && vw < 700;

  if (_portrait) {
    GAME_W = PORT_W; GAME_H = PORT_H;
  } else {
    GAME_W = LAND_W; GAME_H = LAND_H;
  }

  canvas.width  = GAME_W;
  canvas.height = GAME_H;
  syncConfigSize();

  _scale = Math.min(vw / (GAME_W + 12), vh / (GAME_H + 12));
  _scale = Math.min(_scale, 1.5); // 允許小螢幕放大到 1.5x

  const wrap = document.getElementById('gameWrap');
  wrap.style.transform = `scale(${_scale})`;
}

window.addEventListener('resize', () => { updateScale(); });
window.addEventListener('orientationchange', () => setTimeout(updateScale, 300));

function screenToCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = GAME_W / rect.width;
  const scaleY = GAME_H / rect.height;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

// 先初始化一次（在 CONFIG 定義後才能呼叫 syncConfigSize）
// updateScale() 會在 CONFIG 定義後呼叫

// 雙人對戰版面：上方敵方三道、下方玩家三道、中間雙方棄牌堆
function getRowY(row, isEnemy) {
  if (_portrait) {
    // 直立模式：對手在上（迷你），玩家在中下
    if (isEnemy) {
      const cH = Math.floor(CONFIG.CARD_H * 0.55); // 迷你高 44px
      const gap = 6;
      if (row === 'front')  return 80;
      if (row === 'middle') return 80 + cH + gap;
      return 80 + (cH + gap) * 2;
    } else {
      // 玩家三道：放在畫面下半，牌比橫向稍小
      const cH = Math.floor(CONFIG.CARD_H * 0.85); // 68px
      const gap = 8;
      const startY = CONFIG.H - (cH * 3 + gap * 2) - 180; // 留手牌空間
      if (row === 'front')  return startY;
      if (row === 'middle') return startY + cH + gap;
      return startY + (cH + gap) * 2;
    }
  } else {
    // 橫向模式
    if (isEnemy) {
      if (row === 'front')  return 92;
      if (row === 'middle') return 160;
      return 228;
    } else {
      if (row === 'front')  return 412;
      if (row === 'middle') return 502;
      return 592;
    }
  }
}

function getCardSize(isEnemy) {
  if (_portrait) {
    return isEnemy
      ? { w: Math.floor(CONFIG.CARD_W * 0.55), h: Math.floor(CONFIG.CARD_H * 0.55) }
      : { w: Math.floor(CONFIG.CARD_W * 0.85), h: Math.floor(CONFIG.CARD_H * 0.85) };
  }
  return isEnemy
    ? { w: CONFIG.ENEMY_CARD_W || CONFIG.CARD_W, h: CONFIG.CARD_H }
    : { w: CONFIG.CARD_W, h: CONFIG.CARD_H };
}

function getRowSlotX(row, idx, isEnemy) {
  const cap = (game.cardCaps || CONFIG.ROW_CAPS)[row];
  const cs = getCardSize(isEnemy);
  const gap = isEnemy ? (_portrait ? 3 : 4) : (_portrait ? 4 : 6);
  const w = cap * cs.w + (cap - 1) * gap;
  const startX = CONFIG.W/2 - w/2;
  return startX + idx * (cs.w + gap);
}

function getEnemyHpBarX() { return _portrait ? 8 : 30; }
function getPlayerHpBarX() { return _portrait ? 8 : CONFIG.W - 350; }

function draw() {
  const sx = (Math.random() - 0.5) * game.shake;
  const sy = (Math.random() - 0.5) * game.shake;
  ctx.save();
  ctx.translate(sx, sy);

  const grad = ctx.createRadialGradient(CONFIG.W/2, CONFIG.H/2, 100, CONFIG.W/2, CONFIG.H/2, 800);
  grad.addColorStop(0, '#2a1810');
  grad.addColorStop(1, '#0f0805');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);

  // 中央分隔線
  ctx.strokeStyle = '#5a3018';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 350);
  ctx.lineTo(CONFIG.W, 350);
  ctx.stroke();

  if (game.phase === 'menu') drawMenu();
  else if (game.phase === 'gameover') drawGameOver();
  else if (game.phase === 'victory') drawVictory();
  else {
    drawBattlefield();
    if (game.phase === 'reward') drawReward();
  }

  game.particles.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / 50);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  game.floatTexts.forEach(t => {
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.scale(t.scale, t.scale);
    ctx.globalAlpha = Math.min(1, t.life / 50);
    ctx.fillStyle = t.color;
    ctx.font = 'bold 42px "Ma Shan Zheng", "Noto Serif TC",serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = t.color;
    ctx.shadowBlur = 20;
    ctx.fillText(t.text, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  });

  // 拖曳中的牌：浮在最上層，跟著游標/手指
  if (game.drag) {
    const d = game.drag;
    const cW = _portrait ? Math.floor(CONFIG.CARD_W * 0.88) : CONFIG.CARD_W;
    const cH = _portrait ? Math.floor(CONFIG.CARD_H * 0.88) : CONFIG.CARD_H;
    ctx.globalAlpha = 0.9;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 20;
    if (_portrait && cW !== CONFIG.CARD_W) {
      drawCardScaled(d.x - cW/2, d.y - cH/2, d.card, cW / CONFIG.CARD_W);
    } else {
      drawCard(d.x - cW/2, d.y - cH/2, d.card, true);
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // 確認送出按鈕（擺完後彈出）
  if (game.confirmPending && game.phase === 'placing') {
    drawConfirmButton();
  }

  ctx.restore();
}

function drawConfirmButton() {
  const bw = _portrait ? 200 : 240, bh = _portrait ? 52 : 60;
  const bx = CONFIG.W/2 - bw/2;
  const by = _portrait ? CONFIG.H/2 - bh/2 - 20 : CONFIG.H/2 + 30;

  // 暗色背景
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, by - 30, CONFIG.W, bh + 60);

  // 確認按鈕
  const hovConf = mousePos.x >= bx && mousePos.x <= bx + bw &&
                  mousePos.y >= by && mousePos.y <= by + bh;
  const confGrad = ctx.createLinearGradient(bx, by, bx, by + bh);
  confGrad.addColorStop(0, hovConf ? '#dc2c2c' : '#aa1010');
  confGrad.addColorStop(1, hovConf ? '#aa1010' : '#6a0808');
  ctx.fillStyle = confGrad;
  roundRect(bx, by, bw, bh, 8, true, false);
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3;
  roundRect(bx, by, bw, bh, 8, false, true);
  ctx.fillStyle = '#ffe680';
  ctx.font = `bold ${_portrait ? 22 : 26}px "Ma Shan Zheng","Noto Serif TC",serif`;
  ctx.textAlign = 'center';
  ctx.fillText('⚔ 確認出牌！', CONFIG.W/2, by + bh/2 + 9);
  game._confirmBtn = { x: bx, y: by, w: bw, h: bh };

  // 重置按鈕（取消確認）
  const rx = bx - bw/2 - 10, rw = bw/2 - 5;
  const hovReset = mousePos.x >= rx && mousePos.x <= rx + rw &&
                   mousePos.y >= by && mousePos.y <= by + bh;
  ctx.fillStyle = hovReset ? '#3a2010' : '#2a1408';
  roundRect(rx, by, rw, bh, 8, true, false);
  ctx.strokeStyle = 'rgba(255,215,0,0.5)'; ctx.lineWidth = 1;
  roundRect(rx, by, rw, bh, 8, false, true);
  ctx.fillStyle = '#cc9966';
  ctx.font = `bold ${_portrait ? 14 : 16}px "Noto Serif TC",serif`;
  ctx.fillText('↺ 重新調整', rx + rw/2, by + bh/2 + 6);
  game._confirmResetBtn = { x: rx, y: by, w: rw, h: bh };
}

// 水墨背景：飄落的墨點 + 遠山輪廓
function drawInkBackground() {

  ctx.fillStyle = 'rgba(30, 15, 8, 0.6)';
  ctx.beginPath();
  ctx.moveTo(0, CONFIG.H);
  ctx.lineTo(0, CONFIG.H - 80);

// 卷軸框
function drawScroll(x, y, w, h) {
  // 卷軸主體（仿羊皮紙）
  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#f0d8a8');
  grad.addColorStop(0.5, '#e0c088');
  grad.addColorStop(1, '#c8a060');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // 紋理（微噪點）
  ctx.fillStyle = 'rgba(80, 40, 20, 0.05)';
  for (let i = 0; i < 200; i++) {
    const px = x + Math.random() * w;
    const py = y + Math.random() * h;
    ctx.fillRect(px, py, 1, 1);
  }

  // 上下卷軸軸頭（深棕色）
  const axleH = 22;
  const axleGrad1 = ctx.createLinearGradient(x, y - axleH, x, y);
  axleGrad1.addColorStop(0, '#3a1808');
  axleGrad1.addColorStop(0.5, '#5a2810');
  axleGrad1.addColorStop(1, '#3a1808');
  ctx.fillStyle = axleGrad1;
  ctx.fillRect(x - 10, y - axleH, w + 20, axleH);
  ctx.fillRect(x - 10, y + h, w + 20, axleH);
  // 軸頭金色裝飾
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(x - 10, y - 3, w + 20, 3);
  ctx.fillRect(x - 10, y + h, w + 20, 3);

  // 邊框
  ctx.strokeStyle = '#8a6038';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
}

// 戰場背景：硝煙、紋路
function drawBattleBackground(enemy) {
  // 上半部敵方氛圍（敵將色調）
  const upperGrad = ctx.createLinearGradient(0, 0, 0, 350);
  upperGrad.addColorStop(0, hexToRgba(enemy.color, 0.25));
  upperGrad.addColorStop(1, 'rgba(20, 8, 4, 0.9)');
  ctx.fillStyle = upperGrad;
  ctx.fillRect(0, 0, CONFIG.W, 350);

  // 下半部玩家氛圍（藍色）
  const lowerGrad = ctx.createLinearGradient(0, 400, 0, CONFIG.H);
  lowerGrad.addColorStop(0, 'rgba(20, 8, 4, 0.9)');
  lowerGrad.addColorStop(1, 'rgba(40, 70, 110, 0.25)');
  ctx.fillStyle = lowerGrad;
  ctx.fillRect(0, 400, CONFIG.W, CONFIG.H - 400);

  // 硝煙粒子（持續飄動）
  ctx.fillStyle = 'rgba(180, 100, 60, 0.04)';
  for (let i = 0; i < 6; i++) {
    const cx = (Date.now() / 80 + i * 220) % (CONFIG.W + 200) - 100;
    const cy = 50 + (i % 3) * 100;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 150, 40, 0, 0, Math.PI * 2);

  }

  // 古紋路裝飾線

  ctx.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    ctx.beginPath();
    ctx.moveTo(0, i * 40);
    ctx.lineTo(CONFIG.W, i * 40);
    ctx.stroke();
  }
}

// 將領頭像（圓形像章）
function drawWarriorPortrait(x, y, name, color, isEnemy) {
  const r = 28;
  // 外框金圈
  ctx.beginPath();
  ctx.arc(x, y, r + 3, 0, Math.PI * 2);
  ctx.fillStyle = '#ffd700';
  ctx.fill();
  // 內背景
  const grad = ctx.createRadialGradient(x - 5, y - 5, 5, x, y, r);
  grad.addColorStop(0, lightenColor(color, 30));
  grad.addColorStop(1, color);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  // 文字
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px "Ma Shan Zheng", "Noto Serif TC",serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 4;
  ctx.fillText(name.charAt(0), x, y + 9);
  ctx.shadowBlur = 0;
  // 內金圈裝飾
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, y, r - 4, 0, Math.PI * 2);
  ctx.stroke();
}

// 卷軸風 HP 條
function drawScrollBar(x, y, w, h, hp, max, fillColor, deepColor) {
  // 背景（深色凹槽）
  ctx.fillStyle = '#1a0a04';
  ctx.fillRect(x, y, w, h);

  // 內陰影
  const shadowGrad = ctx.createLinearGradient(x, y, x, y + h);
  shadowGrad.addColorStop(0, 'rgba(0,0,0,0.6)');
  shadowGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
  ctx.fillStyle = shadowGrad;
  ctx.fillRect(x, y, w, h);

  // HP fill
  const ratio = Math.max(0, hp / max);
  if (ratio > 0) {
    const hpW = w * ratio;
    const fillGrad = ctx.createLinearGradient(x, y, x, y + h);
    fillGrad.addColorStop(0, lightenColor(fillColor, 20));
    fillGrad.addColorStop(0.5, fillColor);
    fillGrad.addColorStop(1, deepColor);
    ctx.fillStyle = fillGrad;
    ctx.fillRect(x, y, hpW, h);

    // 高光
    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
    ctx.fillRect(x, y, hpW, 4);
  }

  // 金邊
  ctx.strokeStyle = '#aa7700';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);

  // 數字
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px "Noto Serif TC",serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 3;
  ctx.fillText(`${hp} / ${max}`, x + w/2, y + h - 6);
  ctx.shadowBlur = 0;
}

// 卷軸按鈕
function drawScrollButton(x, y, w, h, label, enabled, key) {

// 關卡進度指示（頂端中央）
function drawStageIndicator() {
  const y = 18;
  const total = ENEMIES.length;  // 10 關
  const spacing = 24;  // 縮小間距適配 10 個點
  const startX = CONFIG.W/2 - (total * spacing) / 2 + spacing/2;

  for (let i = 0; i < total; i++) {
    const cx = startX + i * spacing;
    // 連接線
    if (i > 0) {
      ctx.strokeStyle = i <= game.stage ? '#ffd700' : '#3a1a08';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx - spacing + 6, y);
      ctx.lineTo(cx - 6, y);
      ctx.stroke();
    }
    // 圓點（大小依難度分三段）
    const r = i < 3 ? 5 : i < 7 ? 6 : 7;
    ctx.fillStyle = i < game.stage ? '#ffd700' : (i === game.stage ? '#ff4444' : '#2a1008');
    ctx.beginPath();
    ctx.arc(cx, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = i < game.stage ? '#ffd700' : 'rgba(255,215,0,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 當前關卡：光暈 + 敵將名
    if (i === game.stage) {
      ctx.fillStyle = 'rgba(255,80,80,0.35)';
      ctx.beginPath();
      ctx.arc(cx, y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff8888';
      ctx.font = 'bold 10px "Noto Serif TC",serif';
      ctx.textAlign = 'center';
      ctx.fillText(ENEMIES[i].name, cx, y + 22);
    }
  }

  // 回合數
  ctx.fillStyle = '#ffe680';
  ctx.font = 'bold 13px "Noto Serif TC",serif';
  ctx.textAlign = 'center';
  ctx.fillText(`第 ${game.round}/${CONFIG.TOTAL_ROUNDS} 回合`, CONFIG.W/2, 45);
}

function hexToRgba(hex, alpha) {
  const c = hex.replace('#','');
  const r = parseInt(c.substr(0,2),16);
  const g = parseInt(c.substr(2,2),16);
  const b = parseInt(c.substr(4,2),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function lightenColor(hex, amt) {
  const c = hex.replace('#','');
  const r = Math.max(0, Math.min(255, parseInt(c.substr(0,2),16) + amt));
  const g = Math.max(0, Math.min(255, parseInt(c.substr(2,2),16) + amt));
  const b = Math.max(0, Math.min(255, parseInt(c.substr(4,2),16) + amt));
  return `rgb(${r},${g},${b})`;
}

function drawResults() {
  if (!game.battleResults || game.battleResults.length === 0) return;

  const isReview = game.logViewIdx >= 0;
  const logData = isReview ? game.matchLog[game.logViewIdx] : null;
  const steps = isReview ? logData.steps : game.battleResults;

  // 全屏暗色覆蓋
  ctx.fillStyle = isReview ? 'rgba(0,0,0,0.93)' : 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);

  // 面板尺寸
  const pW = 1200, pH = 660;
  const pX = CONFIG.W/2 - pW/2;
  const pY = CONFIG.H/2 - pH/2 - 10;

  // 面板背景
  const pgr = ctx.createLinearGradient(pX, pY, pX, pY + pH);
  pgr.addColorStop(0, '#1e0c06');
  pgr.addColorStop(1, '#120604');
  ctx.fillStyle = pgr;
  roundRect(pX, pY, pW, pH, 10, true, false);
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 2.5;
  roundRect(pX, pY, pW, pH, 10, false, true);
  ctx.strokeStyle = 'rgba(255,215,0,0.2)';
  ctx.lineWidth = 1;
  roundRect(pX + 5, pY + 5, pW - 10, pH - 10, 8, false, true);

  // 標題列
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 22px "Ma Shan Zheng","Noto Serif TC",serif';
  ctx.textAlign = 'left';
  if (isReview) {
    ctx.fillText(`📜 回顧 — 第 ${logData.stage + 1} 關 vs ${logData.enemyName}`, pX + 24, pY + 32);
    ctx.font = '13px "Noto Serif TC",serif';
    ctx.fillStyle = '#886644';
    ctx.fillText(`造成 ${logData.dmgToEnemy} / 受傷 ${logData.dmgToPlayer}`, pX + 24, pY + 52);
    // 關閉回顧按鈕
    ctx.fillStyle = '#aa4422';
    roundRect(pW + pX - 90, pY + 12, 75, 28, 4, true, false);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 13px "Noto Serif TC",serif';
    ctx.textAlign = 'center';
    ctx.fillText('× 關閉', pW + pX - 52, pY + 30);
    game._closeBtnBox = { x: pW + pX - 90, y: pY + 12, w: 75, h: 28 };
  } else {
    ctx.fillText('⚔ 比牌結算', pX + 24, pY + 36);
    game._closeBtnBox = null;
  }

  // 分為左（逐道結果）和右（牌面展示）
  const leftW = 520, rightW = pW - leftW - 24;
  const leftX = pX + 12, rightX = pX + leftW + 16;
  const contentY = pY + 68;
  const contentH = pH - 68 - 10;

  // --- 左側：逐道結果 + 計算過程 ---
  let rowY = contentY;
  const shownCount = isReview ? steps.length : Math.min(game.battleStep, steps.length);

  for (let i = 0; i < shownCount; i++) {
    const step = steps[i];
    const isLatest = !isReview && i === shownCount - 1 && !game.battleAnimDone;

    // 行背景
    const bgColor = step.winner === 'player' ? 'rgba(50,120,50,0.25)' :
                    step.winner === 'enemy'  ? 'rgba(120,50,50,0.25)' :
                    step.type === 'scoop'    ? 'rgba(180,120,0,0.25)' :
                    'rgba(80,80,80,0.2)';
    ctx.fillStyle = isLatest ? bgColor.replace('0.25', '0.45') : bgColor;
    roundRect(leftX, rowY - 2, leftW - 4, step.type === 'row' ? 68 : 44, 4, true, false);

    if (step.type === 'row') {
      // 道別標籤
      ctx.fillStyle = '#aa7700';
      ctx.font = 'bold 12px "Noto Serif TC",serif';
      ctx.textAlign = 'left';
      ctx.fillText(step.rowLabel, leftX + 8, rowY + 14);

      // 牌型比較
      const pColor = step.winner === 'player' ? '#88ff88' : step.winner === 'tie' ? '#ffff88' : '#ff8888';
      const eColor = step.winner === 'enemy' ? '#ff8888' : step.winner === 'tie' ? '#ffff88' : '#88ff88';

      ctx.font = 'bold 16px "Noto Serif TC",serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = pColor;
      ctx.fillText(handTypeName(step.playerHand.type), leftX + 140, rowY + 14);
      ctx.fillStyle = '#888';
      ctx.font = '11px \"Noto Serif TC\",serif';
      ctx.fillText('VS', leftX + 230, rowY + 14);
      ctx.fillStyle = eColor;
      ctx.font = 'bold 16px "Noto Serif TC",serif';
      ctx.fillText(handTypeName(step.enemyHand.type), leftX + 330, rowY + 14);

      // 計算過程 — 自動調整字體大小適配寬度
      if (step.calcSteps) {
        ctx.textAlign = 'left';
        ctx.fillStyle = step.winner === 'player' ? '#aaffbb' :
                        step.winner === 'enemy' ? '#ffaaaa' : '#bbbbbb';
        const calcLine = step.calcSteps.join(' → ');
        const maxCalcW = leftW - 80; // 留右邊傷害數字的空間
        // 自動縮小字體適配
        let fontSize = 11;
        ctx.font = `${fontSize}px "Noto Serif TC",serif`;
        while (ctx.measureText(calcLine).width > maxCalcW && fontSize > 8) {
          fontSize--;
          ctx.font = `${fontSize}px "Noto Serif TC",serif`;
        }
        // 如果還是太長，拆兩行
        if (ctx.measureText(calcLine).width > maxCalcW) {
          // 找最後一個 → 分割
          const mid = Math.floor(step.calcSteps.length / 2);
          const line1 = step.calcSteps.slice(0, mid).join(' → ');
          const line2 = step.calcSteps.slice(mid).join(' → ');
          ctx.font = `10px "Noto Serif TC",serif`;
          ctx.fillText(line1, leftX + 8, rowY + 28);
          ctx.fillText(line2, leftX + 8, rowY + 40);
        } else {
          ctx.fillText(calcLine, leftX + 8, rowY + 34);
        }
      }

      // 傷害數字
      ctx.textAlign = 'right';
      ctx.font = 'bold 18px "Noto Serif TC",serif';
      if (step.dmgEnemy > 0) {
        ctx.fillStyle = '#88ff88';
        ctx.fillText(`⚔ +${step.dmgEnemy}`, leftX + leftW - 8, rowY + 50);
      } else if (step.dmgPlayer > 0) {
        ctx.fillStyle = '#ff8888';
        ctx.fillText(`🛡 -${step.dmgPlayer}`, leftX + leftW - 8, rowY + 50);
      } else {
        ctx.fillStyle = '#666';
        ctx.fillText('—', leftX + leftW - 8, rowY + 50);
      }

      rowY += 74;
    } else {
      // foul / scoop
      const col = step.winner === 'player' || step.side === 'enemy' ? '#88ff88' :
                  step.type === 'scoop' && step.winner === 'player' ? '#ffcc00' : '#ff8888';
      ctx.fillStyle = col;
      ctx.font = 'bold 15px "Ma Shan Zheng","Noto Serif TC",serif';
      ctx.textAlign = 'left';
      ctx.fillText(step.label, leftX + 8, rowY + 18);
      if (step.calcSteps) {
        ctx.fillStyle = '#ccc';
        ctx.font = '11px \"Noto Serif TC\",serif';
        ctx.fillText(step.calcSteps.slice(0, 2).join(' → '), leftX + 8, rowY + 34);
      }
      ctx.textAlign = 'right';
      ctx.font = 'bold 16px serif';
      if (step.dmgEnemy > 0) { ctx.fillStyle = '#88ff88'; ctx.fillText(`+${step.dmgEnemy}`, leftX + leftW - 8, rowY + 28); }
      else if (step.dmgPlayer > 0) { ctx.fillStyle = '#ff8888'; ctx.fillText(`-${step.dmgPlayer}`, leftX + leftW - 8, rowY + 28); }
      rowY += 50;
    }
  }

  // 合計
  if (isReview || game.battleAnimDone) {
    const de = isReview ? logData.dmgToEnemy : game.battleFinalDmg.toEnemy;
    const dp = isReview ? logData.dmgToPlayer : game.battleFinalDmg.toPlayer;
    ctx.strokeStyle = 'rgba(255,215,0,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(leftX, rowY); ctx.lineTo(leftX + leftW - 4, rowY); ctx.stroke();
    rowY += 10;
    ctx.font = 'bold 16px "Noto Serif TC",serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ff8888';
    ctx.fillText(`我受傷：${dp}`, leftX + 8, rowY + 16);
    ctx.fillStyle = '#88ff88';
    ctx.fillText(`敵傷害：${de}`, leftX + 8, rowY + 36);
  }

  // --- 右側：牌面展示 ---
  ctx.strokeStyle = 'rgba(255,215,0,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(rightX - 4, contentY);
  ctx.lineTo(rightX - 4, contentY + contentH);
  ctx.stroke();

  // 找當前顯示的那道的牌（根據最新 step 或點擊的 step）
  const showStepIdx = isReview ? 0 : Math.min(game.battleStep - 1, steps.length - 1);
  const rowSteps = steps.filter(s => s.type === 'row');

  // 顯示雙方完整三道牌（mini）
  const playerR = isReview ? logData.playerRows : game.rows;
  const enemyR = isReview ? logData.enemyRows : game.enemyRows;

  const sideW = (rightW - 20) / 2;
  const cardScale = 0.7;
  const cW = Math.floor(CONFIG.CARD_W * cardScale);
  const cH = Math.floor(CONFIG.CARD_H * cardScale);

  // 標題
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 14px "Noto Serif TC",serif';
  ctx.textAlign = 'center';
  ctx.fillText('趙 雲', rightX + sideW/2, contentY + 16);
  ctx.fillText(isReview ? logData.enemyName : ENEMIES[game.stage].name, rightX + sideW + 20 + sideW/2, contentY + 16);

  const drawMiniRow = (cards, startX, startY, label, isWinner) => {
    const totalW = cards.length * (cW + 3);
    let cx = startX + (sideW - totalW) / 2;

    ctx.fillStyle = isWinner === true ? '#88ff88' : isWinner === false ? '#ff8888' : '#aaa';
    ctx.font = 'bold 11px "Noto Serif TC",serif';
    ctx.textAlign = 'left';
    ctx.fillText(label, startX + 4, startY - 2);

    cards.forEach(card => {
      drawCardScaled(cx, startY, card, cardScale);
      cx += cW + 3;
    });
  };

  const rows3 = ['front','middle','back'];
  const rowLabels3 = ['前鋒','中軍','後陣'];
  let rY = contentY + 28;

  rows3.forEach((rowKey, ri) => {
    const matchStep = rowSteps.find(s => s.row === rowKey);
    const pWinner = matchStep ? (matchStep.winner === 'player' ? true : matchStep.winner === 'tie' ? null : false) : null;
    const eWinner = matchStep ? (matchStep.winner === 'enemy' ? true : matchStep.winner === 'tie' ? null : false) : null;

    drawMiniRow(playerR[rowKey] || [], rightX + 5, rY + 10, rowLabels3[ri], pWinner);
    drawMiniRow(enemyR[rowKey] || [], rightX + sideW + 15, rY + 10, rowLabels3[ri], eWinner);
    rY += cH + 24;
  });

  // 棄牌小展示
  rY += 5;
  ctx.fillStyle = '#666';
  ctx.font = '11px "Noto Serif TC",serif';
  ctx.textAlign = 'left';
  const pd = isReview ? (logData.playerDiscards || []) : game.discards;
  const ed = isReview ? (logData.enemyDiscards || []) : game.enemyDiscards;
  ctx.fillText(`我棄(${pd.length})`, rightX + 5, rY);
  ctx.fillText(`敵棄(${ed.length})`, rightX + sideW + 15, rY);
  rY += 10;
  pd.slice(0, 5).forEach((card, i) => drawCardScaled(rightX + 5 + i * (cW * 0.7 + 2), rY, card, cardScale * 0.65));
  ed.slice(0, 5).forEach((card, i) => drawCardScaled(rightX + sideW + 15 + i * (cW * 0.7 + 2), rY, card, cardScale * 0.65));
}

// 按比例縮放繪製卡片
function drawCardScaled(x, y, card, scale) {
  const w = Math.floor(CONFIG.CARD_W * scale);
  const h = Math.floor(CONFIG.CARD_H * scale);
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  drawCard(0, 0, card, true);
  ctx.restore();
}

      const col = step ? (step.winner === 'player' ? '#88ff88' : step.winner === 'tie' ? '#ffff88' : '#ff8888') : '#888';
      ctx.fillStyle = col;
      ctx.font = '11px "Noto Serif TC",serif';
      ctx.textAlign = 'left';
      ctx.fillText(`${['前','中','後'][ri]}: ${handTypeName(ev.type)}`, px + 16 + ri * 92, ey + 32);
    });

    // 傷害數字
    ctx.textAlign = 'right';
    ctx.font = 'bold 13px "Noto Serif TC",serif';
    ctx.fillStyle = '#88ff88';
    ctx.fillText(`+${log.dmgToEnemy}`, px + pw - 10, ey + 50);
    ctx.fillStyle = '#ff8888';
    ctx.fillText(`-${log.dmgToPlayer}`, px + pw - 60, ey + 50);

    // 點擊區
    log._logBox = { x: px + 8, y: ey, w: pw - 16, h: 66, idx };
    ey += 74;
    if (ey + 74 > py + ph) return;
  });
}
