// ============================================================
// 【角色過場】選完神兵後顯示下一關敵將立繪 — drawCharTransition()
// ============================================================
function drawCharTransition() {
  if (!game._charTransStart) game._charTransStart = Date.now();
  const t = (Date.now() - game._charTransStart) / 1000;
  const W = CONFIG.W, H = CONFIG.H;

  // 2.5 秒後自動進入下一關（資訊在 t=2.35 全顯完，留 0.15s 喘息）— TODO-G 縮時
  if (t >= 2.5 && !game._charTransAdvanced) {
    game._charTransAdvanced = true;
    setTimeout(() => { if (game.phase === 'char_transition') { game.phase = 'placing'; startStage(); } }, 0);
    return;
  }

  const enemy = ENEMIES[game.stage];
  if (!enemy) { startStage(); return; }

  // ── 底色：全黑淡入
  const bgA = Math.min(1, t / 0.35);
  ctx.fillStyle = `rgba(6,3,2,${bgA})`;
  ctx.fillRect(0, 0, W, H);

  // ── 敵將立繪（t=0.5 開始淡入，向左輕微滑入）
  const portA = Math.min(1, Math.max(0, (t - 0.5) / 0.9));
  if (portA > 0) {
    const iH = H * 0.70, iW = Math.round(iH * 0.84);
    const slideX = (1 - portA) * 40;
    ctx.save();
    ctx.globalAlpha = portA * 0.92;
    const _pe = (typeof _PORTRAIT_IMGS !== 'undefined') && _PORTRAIT_IMGS[enemy.name];
    if (_pe) {
      ctx.drawImage(_pe, W/2 - iW/2 + slideX, H * 0.08, iW, iH);
    } else {
      drawInkCharPanel(W/2 - iW/2 + slideX, H * 0.08, iW, iH, enemy.name, enemy.color || '#8b1c1c', true);
    }
    // 上下漸層遮罩（讓立繪與文字融合更自然）
    ctx.globalAlpha = 1;
    const maskTop = ctx.createLinearGradient(0, H*0.08, 0, H*0.18);
    maskTop.addColorStop(0, `rgba(6,3,2,${portA})`);
    maskTop.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = maskTop; ctx.fillRect(0, H*0.08, W, H*0.10);
    const maskBot = ctx.createLinearGradient(0, H*0.68, 0, H*0.80);
    maskBot.addColorStop(0, 'rgba(0,0,0,0)');
    maskBot.addColorStop(1, `rgba(6,3,2,${portA})`);
    ctx.fillStyle = maskBot; ctx.fillRect(0, H*0.68, W, H*0.12);
    ctx.restore();
  }

  // ── 「第 X 關」標題（t=0.3）
  const stgA = Math.min(1, Math.max(0, (t - 0.3) / 0.45));
  if (stgA > 0) {
    ctx.save();
    ctx.globalAlpha = stgA;
    ctx.textAlign = 'center';
    ctx.font = `bold 24px "Noto Serif TC", serif`;
    ctx.fillStyle = '#c8a060';
    ctx.shadowColor = 'rgba(210,160,60,0.7)'; ctx.shadowBlur = 14;
    ctx.fillText(`— 第 ${game.stage + 1} 關 —`, W/2, 68);
    ctx.shadowBlur = 0;
    // 裝飾橫線
    const lg1 = ctx.createLinearGradient(W*0.1, 0, W*0.9, 0);
    lg1.addColorStop(0, 'rgba(0,0,0,0)');
    lg1.addColorStop(0.4, `rgba(180,130,55,${stgA*0.6})`);
    lg1.addColorStop(0.6, `rgba(180,130,55,${stgA*0.6})`);
    lg1.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.strokeStyle = lg1; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(W*0.1, 80); ctx.lineTo(W*0.9, 80); ctx.stroke();
    ctx.restore();
  }

  // ── 敵將大名（t=1.1，帶顏色光暈）
  const nmA = Math.min(1, Math.max(0, (t - 1.1) / 0.55));
  if (nmA > 0) {
    ctx.save();
    ctx.globalAlpha = nmA;
    ctx.textAlign = 'center';
    // 名字光暈
    ctx.shadowColor = enemy.color || '#cc3030';
    ctx.shadowBlur = 28;
    ctx.font = `bold 62px "Noto Serif TC", serif`;
    ctx.fillStyle = '#fff6ee';
    ctx.fillText(enemy.name, W/2, H * 0.815);
    ctx.shadowBlur = 0;
    // 名字下橫線
    const lg2 = ctx.createLinearGradient(W*0.2, 0, W*0.8, 0);
    lg2.addColorStop(0, 'rgba(0,0,0,0)');
    lg2.addColorStop(0.3, `rgba(${_hexToRgb(enemy.color||'#cc3030')},${nmA*0.5})`);
    lg2.addColorStop(0.7, `rgba(${_hexToRgb(enemy.color||'#cc3030')},${nmA*0.5})`);
    lg2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.strokeStyle = lg2; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(W*0.2, H*0.832); ctx.lineTo(W*0.8, H*0.832); ctx.stroke();
    ctx.restore();
  }

  // ── 敵將台詞（t=1.8）
  const qtA = Math.min(1, Math.max(0, (t - 1.8) / 0.55));
  if (qtA > 0) {
    ctx.save();
    ctx.globalAlpha = qtA * 0.88;
    ctx.textAlign = 'center';
    ctx.font = `20px "Noto Serif TC", serif`;
    ctx.fillStyle = `rgba(210,175,105,${qtA})`;
    // 長台詞自動縮小
    const qtxt = `「${enemy.quote}」`;
    const maxW = W * 0.82;
    ctx.font = ctx.measureText(qtxt).width > maxW ? `16px "Noto Serif TC", serif` : `20px "Noto Serif TC", serif`;
    ctx.fillText(qtxt, W/2, H * 0.892);
    ctx.restore();
  }

  // ── 「點擊繼續」提示（t=2.0，呼吸閃爍）— TODO-G 提早顯示
  const hintA = Math.min(1, Math.max(0, (t - 2.0) / 0.4));
  if (hintA > 0) {
    const pulse = 0.45 + 0.55 * Math.abs(Math.sin(t * 2.2));
    ctx.save();
    ctx.globalAlpha = hintA * pulse;
    ctx.textAlign = 'center';
    ctx.font = `15px "Noto Serif TC", serif`;
    ctx.fillStyle = 'rgba(180,145,65,0.85)';
    ctx.fillText('▼  點擊繼續  ▼', W/2, H - 24);
    ctx.restore();
  }
}

// 輔助：把 #rrggbb 轉為 "r,g,b" 字串（供 rgba 使用）
function _hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16)||180;
  const g = parseInt(hex.slice(3,5),16)||50;
  const b = parseInt(hex.slice(5,7),16)||30;
  return `${r},${g},${b}`;
}

// 水墨背景：飄落的墨點 + 遠山輪廓
function drawInkBackground() {
  // 遠山輪廓（直版：依 W 等比縮放控制點）
  ctx.fillStyle = 'rgba(30, 15, 8, 0.6)';
  ctx.beginPath();
  ctx.moveTo(0, CONFIG.H);
  ctx.lineTo(0, CONFIG.H - 80);
  ctx.quadraticCurveTo(CONFIG.W*0.12, CONFIG.H - 130, CONFIG.W*0.24, CONFIG.H - 100);
  ctx.quadraticCurveTo(CONFIG.W*0.36, CONFIG.H - 70, CONFIG.W*0.5, CONFIG.H - 110);
  ctx.quadraticCurveTo(CONFIG.W*0.66, CONFIG.H - 150, CONFIG.W*0.82, CONFIG.H - 90);
  ctx.quadraticCurveTo(CONFIG.W*0.92, CONFIG.H - 50, CONFIG.W, CONFIG.H - 80);
  ctx.lineTo(CONFIG.W, CONFIG.H);
  ctx.closePath();
  ctx.fill();

  // 雲霧
  ctx.fillStyle = 'rgba(180, 100, 40, 0.04)';
  for (let i = 0; i < 5; i++) {
    const cx = (Date.now() / 60 + i * 280) % (CONFIG.W + 200) - 100;
    const cy = 50 + i * 30;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 200, 40, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// 卷軸框
function drawScroll(x, y, w, h) {
  // 卷軸主體（仿羊皮紙）
  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#f0d8a8');
  grad.addColorStop(0.5, '#e0c088');
  grad.addColorStop(1, '#c8a060');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // 紋理（微噪點）
  ctx.fillStyle = 'rgba(80, 40, 20, 0.05)';
  for (let i = 0; i < 200; i++) {
    const px = x + Math.random() * w;
    const py = y + Math.random() * h;
    ctx.fillRect(px, py, 1, 1);
  }

  // 上下卷軸軸頭（深棕色）
  const axleH = 22;
  const axleGrad1 = ctx.createLinearGradient(x, y - axleH, x, y);
  axleGrad1.addColorStop(0, '#3a1808');
  axleGrad1.addColorStop(0.5, '#5a2810');
  axleGrad1.addColorStop(1, '#3a1808');
  ctx.fillStyle = axleGrad1;
  ctx.fillRect(x - 10, y - axleH, w + 20, axleH);
  ctx.fillRect(x - 10, y + h, w + 20, axleH);
  // 軸頭金色裝飾
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(x - 10, y - 3, w + 20, 3);
  ctx.fillRect(x - 10, y + h, w + 20, 3);

  // 邊框
  ctx.strokeStyle = '#8a6038';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
}

function drawVictory() {
  // 背景：優先使用 AI 生成圖；fallback 暗色填充
  const _vBg = _ASSET_IMGS.victoryBg;
  if (_vBg) {
    // Draw image scaled to cover canvas, then darken overlay
    const scale = Math.max(CONFIG.W / _vBg.width, CONFIG.H / _vBg.height);
    const sw = _vBg.width * scale, sh = _vBg.height * scale;
    ctx.drawImage(_vBg, (CONFIG.W - sw) / 2, (CONFIG.H - sh) / 2, sw, sh);
    ctx.fillStyle = 'rgba(0,8,0,0.55)';
    ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);
  } else {
    ctx.fillStyle = '#0a1a0a';
    ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);
  }

  // 金光散射
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = `rgba(255, 215, 0, ${0.05 + Math.random() * 0.15})`;
    ctx.beginPath();
    ctx.arc(Math.random() * CONFIG.W, Math.random() * CONFIG.H,
            10 + Math.random() * 40, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 100px "Noto Serif TC",serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 50;
  ctx.fillText('七 進 七 出', CONFIG.W/2, 360);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = '25px "Noto Serif TC",serif';
  ctx.fillText('懷抱阿斗，殺出長坂坡！', CONFIG.W/2, 430);
  ctx.fillText('擊潰 10 路敵將！', CONFIG.W/2, 460);

  ctx.fillStyle = '#cc9966';
  ctx.font = 'italic 22px "Noto Serif TC",serif';
  ctx.fillText('「子龍一身都是膽也！」—— 劉備', CONFIG.W/2, 500);

  // 隨機幹話框
  if (!game._victoryQuote) {
    game._victoryQuote = VICTORY_QUOTES[Math.floor(Math.random() * VICTORY_QUOTES.length)];
  }
  const q = game._victoryQuote;
  const qx = 30, qy = 540, qw = CONFIG.W - 60, qh = 110;
  const qgr = ctx.createLinearGradient(qx, qy, qx, qy + qh);
  qgr.addColorStop(0, '#1a0808'); qgr.addColorStop(1, '#0a0404');
  ctx.fillStyle = qgr;
  roundRect(qx, qy, qw, qh, 6, true, false);
  ctx.strokeStyle = 'rgba(255,215,0,0.4)'; ctx.lineWidth = 1;
  roundRect(qx, qy, qw, qh, 6, false, true);
  ctx.fillStyle = '#ffe680';
  ctx.font = '20px "Noto Serif TC",serif';
  ctx.textAlign = 'center';
  // 引言可能很長，自動換行
  wrapText(q.text, CONFIG.W/2, qy + 32, qw - 30, 22, 'center');
  ctx.fillStyle = '#886644';
  ctx.font = 'italic 17px "Noto Serif TC",serif';
  ctx.fillText(`── ${q.credit}`, CONFIG.W/2, qy + qh - 14);

  if (game.relics.length > 0) {
    ctx.fillStyle = '#aa7700';
    ctx.font = 'bold 19px "Noto Serif TC",serif';
    ctx.textAlign = 'center';
    ctx.fillText('── 此戰神兵 ──', CONFIG.W/2, 695);
    ctx.fillStyle = '#ffe680';
    ctx.font = '18px "Noto Serif TC",serif';
    const names = game.relics.map(r => r.name);
    const lines = [];
    for (let i = 0; i < names.length; i += 3) lines.push(names.slice(i, i + 3).join('  ·  '));
    lines.forEach((ln, i) => ctx.fillText(ln, CONFIG.W/2, 720 + i * 20));
  }

  const btnY = 830, btnX = CONFIG.W/2 - 160, btnW = 320, btnH = 80;
  const hovering = mousePos.x >= btnX && mousePos.x <= btnX + btnW &&
                   mousePos.y >= btnY && mousePos.y <= btnY + btnH;
  const grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, hovering ? '#dc8c2c' : '#a07010');
  grad.addColorStop(1, hovering ? '#a07010' : '#6a4808');
  ctx.fillStyle = grad;
  roundRect(btnX, btnY, btnW, btnH, 6, true, false);
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3;
  roundRect(btnX, btnY, btnW, btnH, 6, false, true);
  ctx.fillStyle = '#ffe680';
  ctx.font = 'bold 40px "Noto Serif TC",serif';
  ctx.textAlign = 'center';
  ctx.fillText('再  戰  一  場', CONFIG.W/2, btnY + 54);
  game._endBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
}

function drawBattlefield() {
  const enemy = ENEMIES[game.stage];
  const L = CONFIG.LAYOUT;

  // 背景：清乾淨版（用戶要求移除戰場煙塵/騎兵/船艦/火炬等元素）
  // 改成上下兩段乾淨漸層 — 上半敵方 (微紅黑) / 下半玩家 (微藍黑)
  // 中央分隔線會由 drawCentralDivider() 處理
  // (drawBattleBackground 函數本體保留在 line ~4458，未來想恢復改回呼叫即可)
  const _splitTop = L.MSG_Y;        // 490
  const _splitBot = L.MSG_Y + L.MSG_H;  // 524
  const _gTop = ctx.createLinearGradient(0, 0, 0, _splitTop);
  _gTop.addColorStop(0, '#1a0808');         // 上端微暖
  _gTop.addColorStop(1, '#08050a');         // 中段冷暗
  ctx.fillStyle = _gTop; ctx.fillRect(0, 0, CONFIG.W, _splitTop);
  const _gBot = ctx.createLinearGradient(0, _splitBot, 0, CONFIG.H);
  _gBot.addColorStop(0, '#08050a');         // 中段冷暗
  _gBot.addColorStop(1, '#0a1018');         // 下端微藍黑（玩家方）
  ctx.fillStyle = _gBot; ctx.fillRect(0, _splitBot, CONFIG.W, CONFIG.H - _splitBot);
  // 中央訊息列底
  ctx.fillStyle = '#050203';
  ctx.fillRect(0, _splitTop, CONFIG.W, _splitBot - _splitTop);

  // === 頂部資訊列（新版：名稱徽章 + 對話泡泡 + 關卡回合）===
  {
    const tbH = L.TOP_BAR_H; // 50px

    // 頂部列背景（改為半透明，不要實心黑塊）
    ctx.fillStyle = 'rgba(8,3,1,0.72)';
    ctx.fillRect(0, 0, CONFIG.W, tbH);
    // 底部金線
    const tbLine = ctx.createLinearGradient(0, 0, CONFIG.W, 0);
    tbLine.addColorStop(0, 'rgba(180,100,20,0.2)');
    tbLine.addColorStop(0.3, 'rgba(255,185,40,0.9)');
    tbLine.addColorStop(0.7, 'rgba(255,185,40,0.9)');
    tbLine.addColorStop(1, 'rgba(180,100,20,0.2)');
    ctx.strokeStyle = tbLine; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, tbH - 0.5); ctx.lineTo(CONFIG.W, tbH - 0.5); ctx.stroke();

    // === 左：敵將名徽章 ===
    const nbW = 120, nbH = 36, nbX = 10, nbY = 7;
    const nbGrad = ctx.createLinearGradient(nbX, nbY, nbX, nbY + nbH);
    nbGrad.addColorStop(0, 'rgba(100,12,6,0.95)');
    nbGrad.addColorStop(1, 'rgba(50,5,2,0.92)');
    ctx.fillStyle = nbGrad;
    roundRect(nbX, nbY, nbW, nbH, 5, true, false);
    ctx.strokeStyle = '#cc3300'; ctx.lineWidth = 1.5;
    roundRect(nbX, nbY, nbW, nbH, 5, false, true);
    ctx.strokeStyle = 'rgba(255,120,60,0.3)'; ctx.lineWidth = 0.6;
    roundRect(nbX + 2, nbY + 2, nbW - 4, nbH - 4, 4, false, true);
    // 敵將名
    ctx.fillStyle = '#fff0e0';
    ctx.font = 'bold 17px "Noto Serif TC", serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.shadowColor = enemy.color || '#cc3300'; ctx.shadowBlur = 8;
    ctx.fillText(enemy.name, nbX + 10, nbY + nbH/2);
    ctx.shadowBlur = 0;
    // 軍銜小標
    const isBoss = game.stage >= 7;
    const rankLabel = isBoss ? '帥' : '將';
    ctx.fillStyle = isBoss ? '#ff9966' : '#ffcc88';
    ctx.font = 'bold 11px "Noto Serif TC",serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(rankLabel, nbX + nbW - 8, nbY + nbH/2);
    ctx.textBaseline = 'alphabetic';

    // === 中：對話泡泡 ===
    const bubX = nbX + nbW + 8, bubY = 6;
    const bubW = 320, bubH = 38;
    ctx.fillStyle = 'rgba(255,245,230,0.92)';
    roundRect(bubX, bubY, bubW, bubH, 6, true, false);
    ctx.strokeStyle = 'rgba(180,100,20,0.5)'; ctx.lineWidth = 1;
    roundRect(bubX, bubY, bubW, bubH, 6, false, true);
    // 左箭頭
    ctx.fillStyle = 'rgba(255,245,230,0.92)';
    ctx.beginPath();
    ctx.moveTo(bubX, bubY + bubH/2 - 7);
    ctx.lineTo(bubX - 8, bubY + bubH/2);
    ctx.lineTo(bubX, bubY + bubH/2 + 7);
    ctx.closePath(); ctx.fill();
    // 泡泡文字
    ctx.fillStyle = '#2a0a00';
    ctx.font = '13px "Noto Serif TC", serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    const qText = enemy.quote.length > 26 ? enemy.quote.slice(0, 25) + '…' : enemy.quote;
    ctx.fillText(`「${qText}」`, bubX + 10, bubY + bubH/2);
    ctx.textBaseline = 'alphabetic';

    // === 右：關卡 + 回合徽章 ===
    const bd1X = CONFIG.W - 136, bdY = 8, bdW = 58, bdH = 34;
    const bd2X = CONFIG.W - 70;
    [[bd1X, `第 ${game.stage+1} 關`], [bd2X, `第 ${game.round || 1} 回合`]].forEach(([bx, txt]) => {
      const bg = ctx.createLinearGradient(bx, bdY, bx, bdY + bdH);
      bg.addColorStop(0, 'rgba(60,32,5,0.95)');
      bg.addColorStop(1, 'rgba(30,15,2,0.92)');
      ctx.fillStyle = bg;
      roundRect(bx, bdY, bdW, bdH, 5, true, false);
      ctx.strokeStyle = '#bb7700'; ctx.lineWidth = 1.5;
      roundRect(bx, bdY, bdW, bdH, 5, false, true);
      ctx.fillStyle = '#ffe066';
      ctx.font = 'bold 13px "Noto Serif TC",serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(txt, bx + bdW/2, bdY + bdH/2);
      ctx.textBaseline = 'alphabetic';
    });

    // === 敵方區塊背景（優先使用外部 PNG，否則 canvas 漸層）===
    const eSectY = L.ENEMY_SECT_Y, eSectH = L.ENEMY_SECT_H;
    if (_ASSET_IMGS.enemyPanelBg) {
      ctx.drawImage(_ASSET_IMGS.enemyPanelBg, 0, eSectY, CONFIG.W, eSectH);
    } else {
      const eSectBg = ctx.createLinearGradient(0, eSectY, 0, eSectY + eSectH);
      eSectBg.addColorStop(0, 'rgba(25,6,3,0.97)');
      eSectBg.addColorStop(0.5, 'rgba(18,4,2,0.95)');
      eSectBg.addColorStop(1, 'rgba(14,3,1,0.90)');
      ctx.fillStyle = eSectBg;
      ctx.fillRect(0, eSectY, CONFIG.W, eSectH);
      // 頂底金線
      ctx.strokeStyle = 'rgba(200,80,20,0.5)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, eSectY); ctx.lineTo(CONFIG.W, eSectY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, eSectY + eSectH); ctx.lineTo(CONFIG.W, eSectY + eSectH); ctx.stroke();
    }
    // 行分隔虛線（永遠疊上去）
    ctx.strokeStyle = 'rgba(120,30,10,0.35)'; ctx.lineWidth = 0.7;
    ctx.setLineDash([4, 6]);
    [190, 330].forEach(dy => {
      ctx.beginPath(); ctx.moveTo(L.PORTRAIT_W, eSectY + dy - 50); ctx.lineTo(CONFIG.W, eSectY + dy - 50); ctx.stroke();
    });
    ctx.setLineDash([]);

  }

  // 棄牌堆
  const _discardX = CONFIG.LAYOUT.PORTRAIT_W + CONFIG.LAYOUT.ROW_LABEL_W + (3*CONFIG.CARD_W + 2*6) + 8;
  // drawDiscardPile(_discardX, L.ENEMY_ROW_Y.front + 4, game.enemyDiscards, '敵棄');

  // === 敵方 HP + 特殊能力（敵區塊上方）===
  {
    const eSectY2 = L.ENEMY_SECT_Y;
    const ehpX = L.PORTRAIT_W + L.ROW_LABEL_W + 4;
    const ehpW = CONFIG.W - ehpX - 4;
    // HP 在第一行前鋒上方（section頂部外側，不可能，改放section頂部左側文字）
    // 實際放在敵方區塊最上方 portrait 右側
    ctx.fillStyle = '#ffaaaa'; ctx.font = 'bold 11px "Noto Serif TC",serif';
    ctx.textAlign = 'right';
    ctx.fillText(`HP ${game.enemyHp} / ${game.enemyMaxHp}`, CONFIG.W - 8, eSectY2 + 14);
    ctx.textAlign = 'left';
    drawScrollBar(ehpX, eSectY2 + 2, ehpW, 10, game.enemyHp, game.enemyMaxHp, '#c41e1e', '#8b0000');
    // 特殊能力
    if (enemy.modifierDesc && enemy.modifierDesc !== '無特殊能力') {
      ctx.font = '10px "Noto Serif TC",sans-serif';
      ctx.fillStyle = '#ffaa88';
      const md = enemy.modifierDesc;
      ctx.fillText('⚔ ' + (md.length > 40 ? md.slice(0,39)+'…' : md), ehpX, eSectY2 + 25);
    }
  }

  // === 敵方大圖立繪（整欄填滿）===
  {
    const ePX = 0, ePY = L.ENEMY_SECT_Y;
    const ePW = L.PORTRAIT_W, ePH = L.ENEMY_SECT_H;
    const _ei = _ASSET_IMGS[enemy.name] || ((typeof _PORTRAIT_IMGS !== 'undefined') && _PORTRAIT_IMGS[enemy.name]);
    if (_ei) {
      ctx.save();
      // 稍微裁切讓圖填滿
      // 保持圖片原始比例，置中裁切填滿欄位（object-fit: cover）
      const _eiAR = _ei.naturalWidth / _ei.naturalHeight;
      const _eColAR = ePW / ePH;
      let _eSX=0,_eSY=0,_eSW=_ei.naturalWidth,_eSH=_ei.naturalHeight;
      if (_eiAR > _eColAR) { _eSW = Math.round(_ei.naturalHeight * _eColAR); _eSX = Math.round((_ei.naturalWidth - _eSW)/2); }
      else { _eSH = Math.round(_ei.naturalWidth / _eColAR); _eSY = Math.round((_ei.naturalHeight - _eSH)/2); }
      ctx.drawImage(_ei, _eSX, _eSY, _eSW, _eSH, ePX, ePY, ePW, ePH);
      // 右側漸層遮罩（融合邊界）
      const fadeG = ctx.createLinearGradient(ePX + ePW - 30, 0, ePX + ePW, 0);
      fadeG.addColorStop(0, 'rgba(18,4,2,0)');
      fadeG.addColorStop(1, 'rgba(18,4,2,0.85)');
      ctx.fillStyle = fadeG;
      ctx.fillRect(ePX + ePW - 30, ePY, 30, ePH);
      ctx.restore();
    } else {
      drawInkCharPanel(ePX, ePY, ePW, ePH, enemy.name, enemy.color || '#8b1c1c', true);
    }
    // 陣營徽章「魏」已移除
  }
  // 敵方三道
  drawRow('front', getRowY('front', true), game.enemyRows.front, CONFIG.ROW_CAPS.front, '前 鋒', true);
  drawRow('middle', getRowY('middle', true), game.enemyRows.middle, CONFIG.ROW_CAPS.middle, '中 軍', true);
  drawRow('back', getRowY('back', true), game.enemyRows.back, CONFIG.ROW_CAPS.back, '後 陣', true);

  // === 中央分隔（戰場線） ===
  drawCentralDivider();

  // === 玩家區塊背景（優先使用外部 PNG，否則 canvas 漸層）===
  {
    const pSectY = L.PLAYER_SECT_Y, pSectH = L.PLAYER_SECT_H;
    if (_ASSET_IMGS.playerPanelBg) {
      ctx.drawImage(_ASSET_IMGS.playerPanelBg, 0, pSectY, CONFIG.W, pSectH);
    } else {
      const pSectBg = ctx.createLinearGradient(0, pSectY, 0, pSectY + pSectH);
      pSectBg.addColorStop(0, 'rgba(6,14,38,0.97)');
      pSectBg.addColorStop(0.5, 'rgba(5,10,28,0.95)');
      pSectBg.addColorStop(1, 'rgba(4,8,22,0.90)');
      ctx.fillStyle = pSectBg;
      ctx.fillRect(0, pSectY, CONFIG.W, pSectH);
      // 頂底藍線
      ctx.strokeStyle = 'rgba(50,100,200,0.5)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, pSectY); ctx.lineTo(CONFIG.W, pSectY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, pSectY + pSectH); ctx.lineTo(CONFIG.W, pSectY + pSectH); ctx.stroke();
    }
    // 行分隔虛線（永遠疊上去）
    ctx.strokeStyle = 'rgba(20,50,120,0.35)'; ctx.lineWidth = 0.7;
    ctx.setLineDash([4, 6]);
    [140, 280].forEach(dy => {
      ctx.beginPath(); ctx.moveTo(L.PORTRAIT_W, pSectY + dy); ctx.lineTo(CONFIG.W, pSectY + dy); ctx.stroke();
    });
    ctx.setLineDash([]);
  }

  // === 玩家大圖立繪（整欄填滿）===
  {
    const pPX = 0, pPY = L.PLAYER_SECT_Y;
    const pPW = L.PORTRAIT_W, pPH = L.PLAYER_SECT_H;
    // 趙雲依關卡進化 (1-2 → s1, 3-4 → s2, 5-6 → s3, 7-8 → s4, 9-10 → s5)
    const _stageIdx = Math.min(5, Math.floor((game.stage || 0) / 2) + 1);
    const _pi2 = _ASSET_IMGS[`player_s${_stageIdx}`]
              || _ASSET_IMGS['player_s1']
              || ((typeof _PORTRAIT_IMGS !== 'undefined') && _PORTRAIT_IMGS['player']);
    if (_pi2) {
      ctx.save();
      // 保持圖片原始比例，置中裁切填滿欄位
      const _piAR = _pi2.naturalWidth / _pi2.naturalHeight;
      const _pColAR = pPW / pPH;
      let _pSX=0,_pSY=0,_pSW=_pi2.naturalWidth,_pSH=_pi2.naturalHeight;
      if (_piAR > _pColAR) { _pSW = Math.round(_pi2.naturalHeight * _pColAR); _pSX = Math.round((_pi2.naturalWidth - _pSW)/2); }
      else { _pSH = Math.round(_pi2.naturalWidth / _pColAR); _pSY = Math.round((_pi2.naturalHeight - _pSH)/2); }
      ctx.drawImage(_pi2, _pSX, _pSY, _pSW, _pSH, pPX, pPY, pPW, pPH);
      // 右側漸層遮罩
      const fadeG2 = ctx.createLinearGradient(pPX + pPW - 30, 0, pPX + pPW, 0);
      fadeG2.addColorStop(0, 'rgba(8,20,42,0)');
      fadeG2.addColorStop(1, 'rgba(8,20,42,0.85)');
      ctx.fillStyle = fadeG2;
      ctx.fillRect(pPX + pPW - 30, pPY, 30, pPH);
      ctx.restore();
    } else {
      drawInkCharPanel(pPX, pPY, pPW, pPH, '趙雲', '#1a3a7a', false);
    }
    // 玩家名
    ctx.save();
    ctx.fillStyle = '#ddeeff';
    ctx.font = 'bold 13px "Noto Serif TC", serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(60,150,255,0.6)'; ctx.shadowBlur = 6;
    const pNameChars = '常山趙子龍';
    const pnStartY = pPY + 16;
    for (let pni = 0; pni < pNameChars.length; pni++) {
      ctx.fillText(pNameChars[pni], pPX + pPW - 16, pnStartY + pni * 16);
    }
    ctx.shadowBlur = 0; ctx.restore();
    // 陣營徽章「蜀」已移除
  }
  // === 玩家三道（直版：在訊息列下方）===
  drawRow('front', getRowY('front', false), game.rows.front, game.cardCaps.front, '前 鋒', false);
  drawRow('middle', getRowY('middle', false), game.rows.middle, game.cardCaps.middle, '中 軍', false);
  drawRow('back', getRowY('back', false), game.rows.back, game.cardCaps.back, '後 陣', false);

  // === 【v0.6】即時牌型評估 + 犯規警告 ===
  drawPlayerRowEval();

  // === 玩家資訊列（v0.7 新設計：三段式 兵力|氣力|連擊）===
  {
    const pIY = L.PLAYER_INFO_Y;
    const _t2 = Date.now() / 1000;
    const pH = L.PLAYER_INFO_H; // 56px

    // 背景板
    const pBgGrad = ctx.createLinearGradient(0, pIY, 0, pIY + pH);
    pBgGrad.addColorStop(0, 'rgba(8,18,45,0.97)');
    pBgGrad.addColorStop(1, 'rgba(5,12,30,0.95)');
    ctx.fillStyle = pBgGrad;
    ctx.fillRect(0, pIY, CONFIG.W, pH);
    // 頂部金線
    const pTopLine = ctx.createLinearGradient(0, 0, CONFIG.W, 0);
    pTopLine.addColorStop(0, 'rgba(60,130,220,0.2)');
    pTopLine.addColorStop(0.3, 'rgba(80,180,255,0.9)');
    pTopLine.addColorStop(0.7, 'rgba(80,180,255,0.9)');
    pTopLine.addColorStop(1, 'rgba(60,130,220,0.2)');
    ctx.strokeStyle = pTopLine; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, pIY); ctx.lineTo(CONFIG.W, pIY); ctx.stroke();
    ctx.strokeStyle = 'rgba(100,180,255,0.18)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(0, pIY + 3); ctx.lineTo(CONFIG.W, pIY + 3); ctx.stroke();

    // 三段佈局
    const secW = CONFIG.W / 3;

    // ── 段一：♥ 兵力（血條全寬獨佔一列）──
    {
      const hpBarX = 8, hpBarY = pIY + 4, hpBarW = CONFIG.W - 16, hpBarH = 18;
      // 標籤
      ctx.fillStyle = '#ff6666'; ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText('♥ 兵力', hpBarX, hpBarY + hpBarH/2);
      // HP 數值（右側）
      ctx.fillStyle = '#aaffaa'; ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`${game.playerHp} / ${CONFIG.PLAYER_MAX_HP}`, CONFIG.W - 8, hpBarY + hpBarH/2);
      ctx.textBaseline = 'alphabetic';
      // HP bar（標籤之後，留出文字空間）
      const hpTextW = 64;
      drawScrollBar(hpBarX + hpTextW, hpBarY + 2, hpBarW - hpTextW * 2, hpBarH - 4,
                    game.playerHp, CONFIG.PLAYER_MAX_HP, '#5cd965', '#2c8c30');
    }
    // 分隔線
    ctx.strokeStyle = 'rgba(80,160,255,0.25)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(secW, pIY + 6); ctx.lineTo(secW, pIY + pH - 6); ctx.stroke();

    // ── 段二：⚡ 氣力 ──
    {
      const _qi = game._qi || 0, _qiMax = CONFIG.QI_MAX || 10;
      const sx = secW + 10, sy = pIY + 4, sw = secW - 16;
      ctx.fillStyle = '#44ccff';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText('⚡', sx, sy);
      ctx.fillStyle = '#cceeff';
      ctx.font = 'bold 12px "Noto Serif TC",serif';
      ctx.fillText(' 氣力', sx + 16, sy + 1);
      ctx.textBaseline = 'alphabetic';
      // Qi bar（分格）
      const qbY = pIY + 22, qbH = 14;
      const qCellW = Math.floor((sw - (_qiMax - 1)) / _qiMax);
      for (let qi2 = 0; qi2 < _qiMax; qi2++) {
        const cellX = sx + qi2 * (qCellW + 1);
        if (qi2 < _qi) {
          const pulse3 = qi2 === _qi - 1 ? (0.85 + 0.15 * Math.sin(_t2 * 3)) : 1;
          const cg = ctx.createLinearGradient(cellX, qbY, cellX, qbY + qbH);
          cg.addColorStop(0, `rgba(100,220,255,${pulse3})`);
          cg.addColorStop(1, `rgba(0,100,200,${pulse3})`);
          ctx.fillStyle = cg;
          roundRect(cellX, qbY + 1, qCellW, qbH - 2, 1.5, true, false);
        } else {
          ctx.fillStyle = 'rgba(0,40,80,0.5)';
          roundRect(cellX, qbY + 1, qCellW, qbH - 2, 1.5, true, false);
        }
      }
      ctx.strokeStyle = _qi >= _qiMax ? 'rgba(120,220,255,0.9)' : 'rgba(60,150,220,0.45)';
      ctx.lineWidth = _qi >= _qiMax ? 1.5 : 0.8;
      if (_qi >= _qiMax) { ctx.shadowColor = 'rgba(80,200,255,0.5)'; ctx.shadowBlur = 5; }
      ctx.strokeRect(sx, qbY, sw, qbH);
      ctx.shadowBlur = 0;
      // Qi text
      ctx.fillStyle = _qi >= _qiMax ? '#88ffff' : '#55aacc';
      ctx.font = `${_qi >= _qiMax ? 'bold ' : ''}11px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(`${_qi} / ${_qiMax} 氣`, sx + sw/2, pIY + pH - 6);
    }
    // 分隔線
    ctx.strokeStyle = 'rgba(80,160,255,0.25)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(secW * 2, pIY + 6); ctx.lineTo(secW * 2, pIY + pH - 6); ctx.stroke();

    // ── 段三：♦ 連擊值 ──
    {
      const sx = secW * 2 + 10, sy = pIY + 4, sw = secW - 20;
      const combo = game.combo || 0;
      ctx.fillStyle = '#ffcc44';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText('♦', sx, sy);
      ctx.fillStyle = '#ffeeaa';
      ctx.font = 'bold 12px "Noto Serif TC",serif';
      ctx.fillText(` 連擊值 ${combo}`, sx + 16, sy + 1);
      ctx.textBaseline = 'alphabetic';
      // Diamond indicators (max 8)
      const dMax = 8, dY = pIY + 22, dSize = 11;
      const dSpacing = Math.min(dSize + 3, (sw) / dMax);
      for (let di = 0; di < dMax; di++) {
        const dx = sx + di * dSpacing + dSize/2;
        ctx.beginPath();
        ctx.moveTo(dx, dY); ctx.lineTo(dx + dSize/2, dY + dSize/2);
        ctx.lineTo(dx, dY + dSize); ctx.lineTo(dx - dSize/2, dY + dSize/2);
        ctx.closePath();
        if (di < combo) {
          const dg = ctx.createLinearGradient(dx - dSize/2, dY, dx + dSize/2, dY + dSize);
          dg.addColorStop(0, '#ffe080'); dg.addColorStop(1, '#cc8800');
          ctx.fillStyle = dg;
          ctx.shadowColor = 'rgba(255,200,0,0.6)'; ctx.shadowBlur = 4;
        } else {
          ctx.fillStyle = 'rgba(80,60,10,0.4)';
          ctx.shadowBlur = 0;
        }
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      // 提示文字
      if (game.phase === 'placing') {
        ctx.fillStyle = game.mustPlace > 0 ? '#ffd700' : (game.aiThinking ? '#88ddff' : '#aaffaa');
        ctx.font = 'bold 11px "Noto Serif TC", serif';
        ctx.textAlign = 'center';
        const hint = game.mustPlace > 0 ? `還需擺 ${game.mustPlace}` : (game.aiThinking ? '對手思考中…' : (game.inFantasyland ? '★陣型完成' : ''));
        if (hint) ctx.fillText(hint, sx + sw/2, pIY + pH - 6);
      }
    }
    ctx.textAlign = 'left';
  }

  // 棄牌框 — 前鋒牌右邊
  {
    const _discards = game.discards || [];
    const _frontCap = game.cardCaps.front || CONFIG.ROW_CAPS.front;
    const _cardStartX = CONFIG.LAYOUT.PORTRAIT_W + CONFIG.LAYOUT.ROW_LABEL_W; // 229
    // 緊接前鋒最後一張牌後方
    const _dX = _cardStartX + _frontCap * CONFIG.CARD_W + (_frontCap - 1) * 6 + 10;
    const _dY = getRowY('front', false) - 4;
    const _dW = Math.min(CONFIG.W - _dX - 6, 2 * CONFIG.CARD_W + 6); // 2 卡寬
    const _dH = CONFIG.CARD_H + 8;

    // 背景
    const _dBg = ctx.createLinearGradient(_dX, _dY, _dX, _dY+_dH);
    _dBg.addColorStop(0,'rgba(4,12,35,0.88)'); _dBg.addColorStop(1,'rgba(3,8,24,0.82)');
    ctx.fillStyle=_dBg; roundRect(_dX,_dY,_dW,_dH,6,true,false);
    ctx.strokeStyle='rgba(50,90,180,0.50)'; ctx.lineWidth=1;
    roundRect(_dX,_dY,_dW,_dH,6,false,true);

    // 標題
    ctx.fillStyle='#5588bb'; ctx.font='bold 11px "Noto Serif TC",serif';
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText(`棄 牌  ${_discards.length}`, _dX+6, _dY+4);
    ctx.textBaseline='alphabetic';

    // 牌面（橫排，最多顯示一列，比例縮放）
    const _dScale = 0.40;
    const _dcW = Math.floor(CONFIG.CARD_W * _dScale);
    const _dcH = Math.floor(CONFIG.CARD_H * _dScale);
    const _maxCols = Math.floor((_dW - 8) / (_dcW + 2));
    const _showD = _discards.slice(-_maxCols * 2);
    _showD.forEach((card, di) => {
      const _col = di % _maxCols, _row = Math.floor(di / _maxCols);
      const _cx = _dX + 4 + _col * (_dcW + 2);
      const _cy = _dY + 18 + _row * (_dcH + 2);
      if (_cy + _dcH > _dY + _dH - 2) return;
      drawCardScaled(_cx, _cy, card, _dScale);
    });
    if (_discards.length === 0) {
      ctx.fillStyle='rgba(60,100,180,0.25)'; ctx.font='11px sans-serif';
      ctx.textAlign='center';
      ctx.fillText('—', _dX+_dW/2, _dY+_dH/2+5);
    }
  }

  // 按鈕區（底部一列）—— 每幀清空，避免舊按鈕殘留干擾 Fantasyland 模式
  game._buttons = {};
  // 若手牌雙排則按鈕自動下移，避免被手牌遮住
  const _handBottom = game._handBounds ? game._handBounds.bottom : L.HAND_Y + CONFIG.CARD_H;
  const btnY = Math.max(L.BOTTOM_Y, _handBottom + 6);
  if (game.inFantasyland) {
    // Fantasyland：陣型完成且未開啟 modal → 顯示「送出」按鈕；否則顯示三排序鈕
    if (game.mustPlace === 0 && !game._flConfirmPending) {
      drawScrollButton(20,  btnY, 215, 40, '↺ 重排', game.phase === 'placing', 'fl_reset');
      drawScrollButton(252, btnY, 215, 40, '♦ 花色', game.phase === 'placing', 'sort_suit');
      drawScrollButton(485, btnY, 215, 40, '✦ 送出陣型 ✦', game.phase === 'placing', 'fl_submit');
    } else {
      drawScrollButton(20,  btnY, 215, 40, '↺ 全部重置', game.phase === 'placing', 'fl_reset');
      drawScrollButton(252, btnY, 215, 40, '♦ 花色排序', game.phase === 'placing', 'sort_suit');
      drawScrollButton(485, btnY, 215, 40, '# 點數排序', game.phase === 'placing', 'sort_rank');
    }
  } else {
    const hasFan = game.relics.some(r => r.id === 'kongming_fan');
    const maxSkill = hasFan ? 2 : 1;
    const skillLeft = maxSkill - (game._skillUseCount || 0);
    const curQi = game._qi || 0;
    // 技能1：子龍之力（需4氣）
    const sk1Label = game._skillMode
      ? (game._swapFirst ? '選第二張' : '選第一張')
      : '龍膽換位';
    const sk1Active = skillLeft > 0 && curQi >= 4 && game.phase === 'placing';
    drawScrollButton(20, btnY, 185, 40, sk1Label, sk1Active, 'skill');
    // 技能2：七進七出（需6氣）
    const sk2Label = '七進七出';
    const sk2Active = curQi >= 6 && game.phase === 'placing';
    drawScrollButton(213, btnY, 185, 40, sk2Label, sk2Active, 'skill2');
    // 重置
    drawScrollButton(406, btnY, 154, 40, '重置', game.phase === 'placing', 'reset');
  }

  // 主選單按鈕（取代之前的牌局紀錄按鈕位置）
  drawMenuBtn();

  // 遺物列（底部按鈕下方）
  drawRelicsBar(20, btnY + 56);

  // 關卡指示（最頂端）
  // drawStageIndicator();  // (停用：重疊上方敵將台詞，影響可讀性)

  // 訊息列（直版：450-505 中央橫條）
  ctx.save();
  const msgTop = L.MSG_Y;
  const msgBottom = msgTop + L.MSG_H;
  if (game.inFantasyland) {
    const flGrad = ctx.createLinearGradient(0, msgTop, 0, msgBottom);
    flGrad.addColorStop(0, 'rgba(160, 0, 100, 0.85)');
    flGrad.addColorStop(1, 'rgba(80, 0, 50, 0.85)');
    ctx.fillStyle = flGrad;
    ctx.fillRect(0, msgTop, CONFIG.W, L.MSG_H);
    ctx.strokeStyle = '#ff44ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, msgTop); ctx.lineTo(CONFIG.W, msgTop);
    ctx.moveTo(0, msgBottom); ctx.lineTo(CONFIG.W, msgBottom);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px "Noto Serif TC", serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff44ff';
    ctx.shadowBlur = 15;
    ctx.textBaseline = 'middle';
    ctx.fillText('★ 夢 幻 國 度 ★ ' + game.message, CONFIG.W/2, msgTop + L.MSG_H/2);
    ctx.textBaseline = 'alphabetic';
    ctx.shadowBlur = 0;
  } else {
    const msgGrad = ctx.createLinearGradient(0, msgTop, 0, msgBottom);
    msgGrad.addColorStop(0, 'rgba(0,0,0,0.85)');
    msgGrad.addColorStop(1, 'rgba(0,0,0,0.7)');
    ctx.fillStyle = msgGrad;
    ctx.fillRect(0, msgTop, CONFIG.W, L.MSG_H);
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, msgTop); ctx.lineTo(CONFIG.W, msgTop);
    ctx.moveTo(0, msgBottom); ctx.lineTo(CONFIG.W, msgBottom);
    ctx.stroke();
    ctx.fillStyle = '#ffe680';
    ctx.font = 'bold 19px "Noto Serif TC", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(game.message, CONFIG.W/2, msgTop + L.MSG_H/2);
    ctx.textBaseline = 'alphabetic';
  }
  ctx.restore();

  // 手牌
  drawHand();

  // 結算結果
  if (game.phase === 'battle' && game.battleResults && game.battleResults.length > 0) {
    drawResults();
  }

  drawRelicTooltip();

  // (drawLogPanel 已移除)

  // 回顧模式
  if (game.logViewIdx >= 0) {
    drawResults();
  }

  // Fantasyland 送出確認 modal（最上層）
  if (game._flConfirmPending) {
    drawFLConfirm();
  }
}

function drawFLConfirm() {
  // 半透明遮罩
  ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
  ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);

  // Modal 背景
  const mw = 560, mh = 280;
  const mx = (CONFIG.W - mw) / 2;
  const my = (CONFIG.H - mh) / 2;
  const grad = ctx.createLinearGradient(mx, my, mx, my + mh);
  grad.addColorStop(0, '#3a1810');
  grad.addColorStop(1, '#1a0808');
  ctx.fillStyle = grad;
  roundRect(mx, my, mw, mh, 10, true, false);
  ctx.strokeStyle = '#ff44ff';
  ctx.lineWidth = 3;
  roundRect(mx, my, mw, mh, 10, false, true);
  ctx.strokeStyle = 'rgba(255, 100, 255, 0.4)';
  ctx.lineWidth = 1;
  roundRect(mx + 5, my + 5, mw - 10, mh - 10, 8, false, true);

  // 標題
  ctx.fillStyle = '#ff88ff';
  ctx.font = 'bold 32px "Noto Serif TC", serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff44ff';
  ctx.shadowBlur = 16;
  ctx.fillText('★ 夢 幻 國 度 — 陣 型 完 成 ★', mx + mw/2, my + 60);
  ctx.shadowBlur = 0;

  // 說明
  ctx.fillStyle = '#ffe680';
  ctx.font = '18px "Noto Serif TC", serif';
  ctx.fillText('確認送出陣型，將與敵方比牌', mx + mw/2, my + 110);
  ctx.fillStyle = '#aa8855';
  ctx.font = '15px "Noto Serif TC", serif';
  ctx.fillText('（多餘的牌將自動棄掉，無法回頭）', mx + mw/2, my + 138);

  // 按鈕
  const btnW = 220, btnH = 56;
  const cy = my + mh - 80;

  // 「確認送出」（綠色）
  const cx1 = mx + 30;
  const okHover = mousePos.x >= cx1 && mousePos.x <= cx1 + btnW &&
                  mousePos.y >= cy && mousePos.y <= cy + btnH;
  const gOk = ctx.createLinearGradient(cx1, cy, cx1, cy + btnH);
  gOk.addColorStop(0, okHover ? '#5fbb55' : '#3f8a35');
  gOk.addColorStop(1, okHover ? '#3f8a35' : '#1f5a15');
  ctx.fillStyle = gOk;
  roundRect(cx1, cy, btnW, btnH, 6, true, false);
  ctx.strokeStyle = '#88ff88';
  ctx.lineWidth = okHover ? 3 : 2;
  roundRect(cx1, cy, btnW, btnH, 6, false, true);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px "Noto Serif TC", serif';
  ctx.textAlign = 'center';
  ctx.fillText('✦ 確 認 送 出 ✦', cx1 + btnW/2, cy + 36);
  game._flConfirmYesBtn = { x: cx1, y: cy, w: btnW, h: btnH };

  // 「繼續調整」（紅色）
  const cx2 = mx + mw - 30 - btnW;
  const noHover = mousePos.x >= cx2 && mousePos.x <= cx2 + btnW &&
                  mousePos.y >= cy && mousePos.y <= cy + btnH;
  const gNo = ctx.createLinearGradient(cx2, cy, cx2, cy + btnH);
  gNo.addColorStop(0, noHover ? '#bb5555' : '#8a3535');
  gNo.addColorStop(1, noHover ? '#8a3535' : '#5a1515');
  ctx.fillStyle = gNo;
  roundRect(cx2, cy, btnW, btnH, 6, true, false);
  ctx.strokeStyle = '#ff8888';
  ctx.lineWidth = noHover ? 3 : 2;
  roundRect(cx2, cy, btnW, btnH, 6, false, true);
  ctx.fillStyle = '#fff';
  ctx.fillText('↺ 繼續調整', cx2 + btnW/2, cy + 36);
  game._flConfirmNoBtn = { x: cx2, y: cy, w: btnW, h: btnH };
}

function drawSoldierSilhouette(sx, sy, scale, color, opacity, flip) {
  // 畫一個簡單士兵剪影 (身高 ~60px at scale=1)
  ctx.save();
  ctx.translate(sx, sy);
  if (flip) ctx.scale(-1, 1);
  ctx.scale(scale, scale);
  ctx.fillStyle = `rgba(${color},${opacity})`;
  // 頭
  ctx.beginPath(); ctx.arc(0, -50, 7, 0, Math.PI * 2); ctx.fill();
  // 身
  ctx.fillRect(-6, -43, 12, 25);
  // 腿
  ctx.fillRect(-8, -18, 7, 22);
  ctx.fillRect(1, -18, 7, 22);
  // 槍桿（斜）
  ctx.fillRect(6, -56, 3, 40);
  // 槍尖
  ctx.beginPath(); ctx.moveTo(7.5, -56); ctx.lineTo(3, -68); ctx.lineTo(12, -56); ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawArcherSilhouette(sx, sy, scale, color, opacity) {
  ctx.save();
  ctx.translate(sx, sy); ctx.scale(scale, scale);
  ctx.fillStyle = `rgba(${color},${opacity})`;
  ctx.beginPath(); ctx.arc(0, -48, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillRect(-6, -41, 12, 24);
  ctx.fillRect(-8, -17, 7, 20); ctx.fillRect(1, -17, 7, 20);
  // 弓
  ctx.strokeStyle = `rgba(${color},${opacity})`;
  ctx.lineWidth = 2.5;

  ctx.beginPath(); ctx.moveTo(-14, -36); ctx.lineTo(8, -36); ctx.stroke();

}

function drawBattleBackground(enemy) {
  const stage = game.stage;
  const L = CONFIG.LAYOUT;
  const splitTop = L.MSG_Y;      // 490
  const splitBot = L.MSG_Y + L.MSG_H;  // 524
  const W = CONFIG.W, H = CONFIG.H;
  const t = Date.now();
  const tSec = t / 1000;

  // 若有外部戰場背景圖，先鋪底（半透明疊加，canvas效果繼續疊上去）
  if (_ASSET_IMGS.battlefield) {
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.drawImage(_ASSET_IMGS.battlefield, 0, 0, W, H);
    ctx.globalAlpha = 1.0;
    ctx.restore();
  }

  if (stage <= 3) {
    // ═══════════════════════════════════
    // 長坂坡：黃土紅塵，曹軍鐵騎追殺
    // ═══════════════════════════════════
    // 天空漸層（黃褐+煙塵）
    const sky = ctx.createLinearGradient(0, 0, 0, splitTop);
    sky.addColorStop(0, 'rgba(90, 48, 10, 0.60)');
    sky.addColorStop(0.5, 'rgba(50, 22, 5, 0.88)');
    sky.addColorStop(1, 'rgba(18, 7, 2, 0.96)');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, splitTop);
    // 下半
    const ground = ctx.createLinearGradient(0, splitBot, 0, H);
    ground.addColorStop(0, 'rgba(18, 7, 2, 0.96)');
    ground.addColorStop(1, 'rgba(70, 40, 12, 0.45)');
    ctx.fillStyle = ground; ctx.fillRect(0, splitBot, W, H - splitBot);

    // 遠山輪廓（多層）
    const mtColors = ['rgba(60,30,8,0.50)','rgba(45,22,5,0.40)','rgba(30,14,3,0.30)'];
    [130, 100, 70].forEach((h2, mi) => {
      ctx.fillStyle = mtColors[mi];
      ctx.beginPath(); ctx.moveTo(0, splitTop);
      for (let x2 = 0; x2 <= W; x2 += 40) {
        const y2 = splitTop - h2 + Math.sin(x2*0.014 + mi*2.1)*40 + Math.sin(x2*0.031 + mi)*20;
        ctx.lineTo(x2, y2);
      }
      ctx.lineTo(W, splitTop); ctx.closePath(); ctx.fill();
    });

    // 大型塵埃雲（慢速飄動）
    for (let i = 0; i < 8; i++) {
      const cx2 = (tSec * 25 + i * 200) % (W + 350) - 175;
      const cy = 360 + (i % 4) * 35 + Math.sin(tSec*0.5+i)*10;
      const cr = 90 + i*15;
      const dg = ctx.createRadialGradient(cx2, cy, 0, cx2, cy, cr);
      dg.addColorStop(0, 'rgba(190,110,40,0.18)');
      dg.addColorStop(0.6, 'rgba(150,80,20,0.08)');
      dg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = dg;
      ctx.beginPath(); ctx.ellipse(cx2, cy, cr, cr*0.45, 0, 0, Math.PI*2); ctx.fill();
    }

    // 敵方騎兵陣線（遠景右側，y~430-490）
    for (let i = 0; i < 7; i++) {
      const hx = W - 30 - i * 80 + Math.sin(tSec * 0.8 + i) * 4;
      const hy = 475 - i * 5;
      const hs = 0.55 + i * 0.04;
      drawHorsemanSilhouette(hx, hy, hs, '180,80,20', 0.32 - i*0.02, false);
    }
    // 步兵縱列（中段右側）
    for (let i = 0; i < 12; i++) {
      const sx2 = 350 + i * 32 + Math.sin(tSec * 1.2 + i*0.4) * 2;
      const sy = 468 - (i%3)*6;
      drawSoldierSilhouette(sx2, sy, 0.55, '160,70,15', 0.25, false);
    }
    // 弓兵（左側敵陣）
    for (let i = 0; i < 5; i++) {
      drawArcherSilhouette(480 + i*45, 452, 0.52, '140,60,10', 0.22);
    }

    // 稀疏樹木（左邊）
    [40, 110, 190].forEach((tx, ti) => {
      drawTreeSilhouette(tx, splitTop - 5, 0.6 + ti*0.05, '50,25,8', 0.30);
    });

    // 遠處篝火（多個，帶光暈）
    for (let i = 0; i < 6; i++) {
      const fx = 80 + i * 110;
      const fy = splitTop - 25 + Math.sin(tSec*1.2 + i*0.9)*4;
      const fg = ctx.createRadialGradient(fx, fy, 2, fx, fy, 28);
      fg.addColorStop(0, `rgba(255,180,50,${0.35 + Math.sin(tSec*3+i)*0.08})`);
      fg.addColorStop(0.5, 'rgba(255,80,0,0.12)');
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(fx, fy, 28, 0, Math.PI*2); ctx.fill();
      // 小火苗
      ctx.fillStyle = `rgba(255,140,30,${0.4 + Math.sin(tSec*4+i)*0.12})`;
      ctx.beginPath(); ctx.ellipse(fx, fy-6, 4, 7+Math.sin(tSec*3+i)*2, 0, 0, Math.PI*2); ctx.fill();
    }

    // 玩家後方（下半）也加幾個衝鋒騎兵（趙雲陣線）
    for (let i = 0; i < 5; i++) {
      const hx2 = 380 + i * 60;
      const hy2 = splitBot + 30 + i * 5;
      drawHorsemanSilhouette(hx2, hy2, 0.42, '60,130,200', 0.18, true);
    }

  } else if (stage <= 6) {
    // ═══════════════════════════════════
    // 赤壁：烈火焚江，船艦血戰
    // ═══════════════════════════════════
    const fireR = ctx.createLinearGradient(0, 0, 0, splitTop);
    fireR.addColorStop(0, `rgba(140, 45, 0, ${0.52 + Math.sin(tSec)*0.06})`);
    fireR.addColorStop(0.55, 'rgba(80, 18, 0, 0.92)');
    fireR.addColorStop(1, 'rgba(10, 3, 1, 0.97)');
    ctx.fillStyle = fireR; ctx.fillRect(0, 0, W, splitTop);
    const waterG = ctx.createLinearGradient(0, splitBot, 0, H);
    waterG.addColorStop(0, 'rgba(10, 3, 1, 0.97)');
    waterG.addColorStop(0.5, 'rgba(60, 15, 3, 0.70)');
    waterG.addColorStop(1, `rgba(100, 25, 0, ${0.35 + Math.sin(tSec*0.7)*0.06})`);
    ctx.fillStyle = waterG; ctx.fillRect(0, splitBot, W, H - splitBot);

    // 大型火柱（10 根，不同高度和動畫相位）
    for (let i = 0; i < 10; i++) {
      const fx = 30 + i * 68;
      const baseH = 80 + (i%3)*30;
      const fh = baseH + Math.sin(tSec * 1.8 + i*0.9)*25;
      // 底部火球
      const fg = ctx.createLinearGradient(fx, splitTop-fh, fx, splitTop);
      fg.addColorStop(0, 'rgba(255, 200, 0, 0)');
      fg.addColorStop(0.3, `rgba(255, 120, 0, ${0.22 + Math.sin(tSec*2+i)*0.08})`);
      fg.addColorStop(0.7, `rgba(255, 50, 0, ${0.35 + Math.sin(tSec*2.5+i*1.1)*0.10})`);
      fg.addColorStop(1, `rgba(200, 20, 0, ${0.45 + Math.sin(tSec*3+i)*0.10})`);
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.ellipse(fx, splitTop-fh*0.45, 14+Math.sin(tSec*2+i)*4, fh*0.55, 0, 0, Math.PI*2); ctx.fill();
    }

    // 燃燒船隻（遠景左側 y=430-490）
    [100, 240, 390].forEach((sx2, si) => {
      const sOff = Math.sin(tSec*0.6 + si)*3;
      drawShipSilhouette(sx2, splitTop-30+sOff, 0.65+si*0.08, '60,20,5', 0.45);
    });

    // 江面波光（橫線波動）
    ctx.strokeStyle = 'rgba(255, 100, 20, 0.12)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 16; i++) {
      const wy = splitBot + 20 + i*46 + Math.sin(tSec*0.8+i*0.6)*8;
      ctx.beginPath(); ctx.moveTo(0, wy); ctx.lineTo(W, wy); ctx.stroke();
    }
    // 飛火星（ember 粒子）
    ctx.fillStyle = 'rgba(255,180,50,0.5)';
    for (let i = 0; i < 20; i++) {
      const ex = (tSec * (20+i*7) + i * 137) % W;
      const ey = 80 + (tSec*(-15-i*4) + i*80) % (splitTop-80);
      const er = 1.5 + Math.sin(tSec*4+i)*0.8;
      ctx.beginPath(); ctx.arc(ex, ey < 10 ? 10 : ey, er, 0, Math.PI*2); ctx.fill();
    }
    // 戰船（更近，下半江面）
    [160, 400, 580].forEach((sx2, si) => {
      drawShipSilhouette(sx2, splitBot + 60 + si*8, 0.70+si*0.06, '70,25,5', 0.35);
    });

  } else {
    // ═══════════════════════════════════
    // 官渡：黑甲夜幕，持炬強軍
    // ═══════════════════════════════════
    const night = ctx.createLinearGradient(0, 0, 0, splitTop);
    night.addColorStop(0, hexToRgba(enemy.color, 0.42));
    night.addColorStop(0.6, 'rgba(4, 4, 14, 0.94)');
    night.addColorStop(1, 'rgba(2, 2, 8, 0.98)');
    ctx.fillStyle = night; ctx.fillRect(0, 0, W, splitTop);
    const lowerN = ctx.createLinearGradient(0, splitBot, 0, H);
    lowerN.addColorStop(0, 'rgba(2, 2, 8, 0.98)');
    lowerN.addColorStop(1, 'rgba(20, 50, 80, 0.30)');
    ctx.fillStyle = lowerN; ctx.fillRect(0, splitBot, W, H - splitBot);

    // 月亮（右上）
    const moonX = W - 80, moonY = 70;
    const moonG = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 50);
    moonG.addColorStop(0, 'rgba(255,240,200,0.30)');
    moonG.addColorStop(0.4, 'rgba(220,200,140,0.15)');
    moonG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = moonG; ctx.beginPath(); ctx.arc(moonX, moonY, 50, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(240,230,200,0.22)';
    ctx.beginPath(); ctx.arc(moonX, moonY, 22, 0, Math.PI*2); ctx.fill();

    // 繁星
    for (let i = 0; i < 40; i++) {
      const sx2 = (i * 193 + 40) % W;
      const sy = 15 + (i * 97) % (splitTop*0.55);
      const sr = 0.6 + Math.sin(tSec*1.5 + i)*0.5;
      ctx.fillStyle = `rgba(255,255,255,${0.45 + Math.sin(tSec*2+i)*0.2})`;
      ctx.beginPath(); ctx.arc(sx2, sy, sr, 0, Math.PI*2); ctx.fill();
    }
    // 遠處帳篷（大軍紮營）
    for (let i = 0; i < 8; i++) {
      const tx2 = 60 + i * 85;
      drawTentSilhouette(tx2, splitTop - 8, 0.8, '80,50,30', 0.28);
    }
    // 旌旗（帶顏色）
    for (let i = 0; i < 6; i++) {
      const px = 80 + i * 115;
      const fc = hexToRgba(enemy.color, 0.35);
      ctx.fillStyle = fc;
      ctx.fillRect(px-2, splitTop-70, 4, 60);
      ctx.beginPath(); ctx.moveTo(px, splitTop-70); ctx.lineTo(px+26, splitTop-54); ctx.lineTo(px, splitTop-38); ctx.closePath(); ctx.fill();
      // 旗光暈
      const tg = ctx.createRadialGradient(px, splitTop-54, 2, px, splitTop-54, 18);
      tg.addColorStop(0, hexToRgba(enemy.color, 0.18));
      tg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = tg; ctx.beginPath(); ctx.arc(px, splitTop-54, 18, 0, Math.PI*2); ctx.fill();
    }
    // 持火炬士兵縱列（右側敵陣）
    for (let i = 0; i < 10; i++) {
      const sx2 = 250 + i * 47 + Math.sin(tSec*0.5+i)*2;
      const sy = splitTop - 8;
      drawSoldierSilhouette(sx2, sy, 0.60, '90,60,30', 0.30, false);
      // 火炬
      const tg2 = ctx.createRadialGradient(sx2+8, sy-62, 2, sx2+8, sy-62, 16);
      tg2.addColorStop(0, `rgba(255,160,40,${0.4+Math.sin(tSec*3+i)*0.1})`);
      tg2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = tg2; ctx.beginPath(); ctx.arc(sx2+8, sy-62, 16, 0, Math.PI*2); ctx.fill();
    }
    // 玩家方騎士（下半）
    for (let i = 0; i < 4; i++) {
      drawHorsemanSilhouette(100 + i*80, splitBot + 40, 0.48, '50,100,180', 0.20, true);
    }
  }

  // 共用：輕微橫線紋路
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 32; i++) {
    ctx.beginPath(); ctx.moveTo(0, i * 40); ctx.lineTo(W, i * 40); ctx.stroke();
  }
}

function drawCentralDivider() {
  const L = CONFIG.LAYOUT;
  const W = CONFIG.W;
  const msgY = L.MSG_Y, msgH = L.MSG_H;
  const midY = msgY + msgH / 2;
  const t = Date.now() / 1000;

  // ── 若有外部分隔線圖，直接渲染並疊加（不取代動態波紋）
  if (_ASSET_IMGS.divider) {
    ctx.save();
    ctx.globalAlpha = 0.88;
    ctx.drawImage(_ASSET_IMGS.divider, 0, msgY, W, msgH);
    ctx.globalAlpha = 1.0;
    ctx.restore();
    return;  // 外部圖夠精緻，跳過 canvas 繪製
  }

  // ── 底色條（深赤木色漸層）— canvas fallback
  const divGrad = ctx.createLinearGradient(0, msgY, 0, msgY + msgH);
  divGrad.addColorStop(0, 'rgba(28,10,2,0.97)');
  divGrad.addColorStop(0.5, 'rgba(52,18,4,0.99)');
  divGrad.addColorStop(1, 'rgba(28,10,2,0.97)');
  ctx.fillStyle = divGrad;
  ctx.fillRect(0, msgY, W, msgH);

  // ── 微光波紋（流動的金色墨紋）
  ctx.save();
  ctx.rect(0, msgY + 5, W, msgH - 10);
  ctx.clip();
  for (let i = 0; i < 5; i++) {
    const wx = ((t * 28 + i * W / 5) % (W + 60)) - 30;
    const wy = midY + Math.sin(t * 1.4 + i * 1.2) * 5;
    const wg = ctx.createRadialGradient(wx, wy, 0, wx, wy, 55);
    wg.addColorStop(0, `rgba(200,140,20,${0.08 + 0.04 * Math.sin(t * 2 + i)})`);
    wg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = wg;
    ctx.beginPath(); ctx.ellipse(wx, wy, 55, 10, 0, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  // ── 上下粗金線（帶漸層）
  const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
  lineGrad.addColorStop(0, 'rgba(200,140,30,0.4)');
  lineGrad.addColorStop(0.15, 'rgba(240,180,40,0.85)');
  lineGrad.addColorStop(0.5, 'rgba(255,210,60,0.95)');
  lineGrad.addColorStop(0.85, 'rgba(240,180,40,0.85)');
  lineGrad.addColorStop(1, 'rgba(200,140,30,0.4)');
  ctx.strokeStyle = lineGrad; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, msgY+1.5); ctx.lineTo(W, msgY+1.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, msgY+msgH-1.5); ctx.lineTo(W, msgY+msgH-1.5); ctx.stroke();
  // 內側細金線
  ctx.strokeStyle = 'rgba(255,200,80,0.28)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(0, msgY+5); ctx.lineTo(W, msgY+5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, msgY+msgH-5); ctx.lineTo(W, msgY+msgH-5); ctx.stroke();

  // ── 左右紅色印章（「戰」「鬥」）
  function drawSeal(sx, sy, char) {
    const sz = 22;
    // 印章底紅色
    const sealGrad = ctx.createRadialGradient(sx, sy, 2, sx, sy, sz * 0.7);
    sealGrad.addColorStop(0, 'rgba(180,20,10,0.95)');
    sealGrad.addColorStop(1, 'rgba(100,8,4,0.85)');
    ctx.fillStyle = sealGrad;
    ctx.fillRect(sx - sz/2, sy - sz/2, sz, sz);
    ctx.strokeStyle = 'rgba(220,80,30,0.8)'; ctx.lineWidth = 1.5;
    ctx.strokeRect(sx - sz/2, sy - sz/2, sz, sz);
    // 篆字
    ctx.fillStyle = 'rgba(255,220,200,0.92)';
    ctx.font = `bold 14px "Noto Serif TC", serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(char, sx, sy);
    ctx.textBaseline = 'alphabetic';
  }
  drawSeal(22, midY, '戰');
  drawSeal(W - 22, midY, '鬥');
}

// 【v0.6】BOSS 特色立繪（Canvas 手繪圖示）
// ============================================================
// ============================================================
// 【陣營徽章】魏/蜀
function drawFactionBadge(x, y, text, bgColor, textColor) {
  const bw = 44, bh = 44, r = 5;
  ctx.save();
  // 底色
  const bg = ctx.createLinearGradient(x, y, x, y + bh);
  bg.addColorStop(0, bgColor);
  bg.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = bg;
  roundRect(x, y, bw, bh, r, true, false);
  // 金邊框
  ctx.strokeStyle = '#cc9900'; ctx.lineWidth = 2;
  roundRect(x, y, bw, bh, r, false, true);
  ctx.strokeStyle = 'rgba(255,200,60,0.3)'; ctx.lineWidth = 0.8;
  roundRect(x + 2, y + 2, bw - 4, bh - 4, r - 1, false, true);
  // 文字
  ctx.fillStyle = textColor;
  ctx.font = `bold 28px "Noto Serif TC", serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = textColor; ctx.shadowBlur = 8;
  ctx.fillText(text, x + bw/2, y + bh/2);
  ctx.shadowBlur = 0; ctx.restore();
}

// 【立繪】水墨武將面板 — drawInkCharPanel()
// ============================================================
function drawInkCharPanel(x, y, w, h, name, color, isEnemy) {
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();

  // ── 背景色塊（水墨漸層）
  const bgG = ctx.createLinearGradient(x, y, x + w, y + h);
  const baseR = isEnemy ? 30 : 10, baseG = isEnemy ? 8 : 18, baseB = isEnemy ? 8 : 45;
  bgG.addColorStop(0, `rgba(${baseR},${baseG},${baseB},0.85)`);
  bgG.addColorStop(0.6, `rgba(${baseR-5},${baseG-5},${baseB-5},0.72)`);
  bgG.addColorStop(1, `rgba(0,0,0,0.6)`);
  ctx.fillStyle = bgG;
  ctx.fillRect(x, y, w, h);

  // ── 水墨暈染斑點（橫向紋理）
  const t2 = Date.now() / 8000;
  for (let i = 0; i < 6; i++) {
    const lx = x + w * (0.1 + i * 0.15);
    const ly = y + h * (0.2 + Math.sin(i * 1.7) * 0.25);
    const lr = w * (0.12 + Math.sin(i * 2.3) * 0.06);
    const lg = ctx.createRadialGradient(lx, ly, 0, lx, ly, lr);
    const alpha = 0.08 + 0.06 * Math.sin(t2 + i);
    lg.addColorStop(0, `rgba(${isEnemy ? '160,60,20' : '30,80,160'},${alpha + 0.04})`);
    lg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lg;
    ctx.beginPath(); ctx.ellipse(lx, ly, lr, lr * 0.6, 0.3, 0, Math.PI * 2); ctx.fill();
  }

  // ── 武將名（直書，由上往下逐字）
  const chars = name.split('');
  const charH = Math.min(h * 0.28, w * 0.65);
  const totalH = chars.length * charH * 1.05;
  const startY = y + (h - totalH) / 2 + charH * 0.8;
  const cx2 = x + w * 0.5;

  chars.forEach((ch, ci) => {
    const cy2 = startY + ci * charH * 1.05;
    // 字體陰影光暈
    const cg = ctx.createRadialGradient(cx2, cy2 - charH * 0.3, 0, cx2, cy2 - charH * 0.3, charH * 0.8);
    cg.addColorStop(0, `rgba(${isEnemy ? '200,80,20' : '60,130,220'},0.3)`);
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(cx2, cy2 - charH * 0.3, charH * 0.8, 0, Math.PI * 2); ctx.fill();
    // 主文字
    ctx.font = `bold ${Math.round(charH)}px "Noto Serif TC", serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = isEnemy ? 'rgba(255,60,0,0.7)' : 'rgba(60,150,255,0.7)';
    ctx.shadowBlur = 12;
    // 描邊（黑色輪廓）
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = charH * 0.06;
    ctx.strokeText(ch, cx2, cy2);
    // 填色（金白漸層）
    const tg = ctx.createLinearGradient(cx2 - charH * 0.4, cy2 - charH * 0.5, cx2 + charH * 0.4, cy2 + charH * 0.5);
    tg.addColorStop(0, '#fff8e8');
    tg.addColorStop(0.4, '#ffd88a');
    tg.addColorStop(1, isEnemy ? '#cc6622' : '#5599ff');
    ctx.fillStyle = tg;
    ctx.fillText(ch, cx2, cy2);
    ctx.shadowBlur = 0;
  });

  // ── 右側漸層淡出（融入戰場背景）
  const fadeG = ctx.createLinearGradient(x + w * 0.45, 0, x + w, 0);
  const bgHex = isEnemy ? '8,4,4' : '4,8,20';
  fadeG.addColorStop(0, `rgba(${bgHex},0)`);
  fadeG.addColorStop(1, `rgba(${bgHex},0.94)`);
  ctx.fillStyle = fadeG;
  ctx.fillRect(x, y, w, h);

  ctx.restore();
}

function drawWarriorPortrait(x, y, name, color, isEnemy) {
  const r = isEnemy ? 44 : 30;
  const t = Date.now() / 1000;

      ctx.beginPath(); ctx.arc(bx, by, 4, 0, Math.PI*2); ctx.fill();
    });
    // 遼字
    ctx.shadowColor = '#88aaff'; ctx.shadowBlur = 18;
    ctx.fillStyle = '#cce8ff';
    ctx.font = 'bold 20px "Noto Serif TC",serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('遼', 34, 36);
    ctx.shadowBlur = 0;

  } else if (name === '司馬懿') {
    // ── 司馬懿：八卦陣 + 算 ──
    // 外發光六角
    ctx.fillStyle = 'rgba(80,200,80,0.12)';
    ctx.beginPath();
    for (let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i===0?ctx.moveTo(Math.cos(a)*48,Math.sin(a)*48):ctx.lineTo(Math.cos(a)*48,Math.sin(a)*48);}
    ctx.closePath(); ctx.fill();
    // 外六角邊
    ctx.strokeStyle = '#44cc44'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i===0?ctx.moveTo(Math.cos(a)*44,Math.sin(a)*44):ctx.lineTo(Math.cos(a)*44,Math.sin(a)*44);}
    ctx.closePath(); ctx.stroke();
    // 內六角
    ctx.fillStyle = '#112220';
    ctx.beginPath();
    for (let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i===0?ctx.moveTo(Math.cos(a)*30,Math.sin(a)*30):ctx.lineTo(Math.cos(a)*30,Math.sin(a)*30);}
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#33aa44'; ctx.lineWidth = 1.5; ctx.stroke();
    // 星形連線
    ctx.strokeStyle = 'rgba(80,200,80,0.28)'; ctx.lineWidth = 1;
    for (let i=0;i<6;i++){
      const a1=i*Math.PI/3-Math.PI/6, a2=(i+2)*Math.PI/3-Math.PI/6;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a1)*30,Math.sin(a1)*30);
      ctx.lineTo(Math.cos(a2)*30,Math.sin(a2)*30);
      ctx.stroke();
    }
    // 八方小圓點
    for (let i=0;i<8;i++){
      const a=i*Math.PI/4;
      ctx.fillStyle=i%2===0?'#66dd66':'#44aa44';
      ctx.beginPath(); ctx.arc(Math.cos(a)*40,Math.sin(a)*40,3,0,Math.PI*2); ctx.fill();
    }
    // 算 字
    ctx.shadowColor = '#44ff44'; ctx.shadowBlur = 16;
    ctx.fillStyle = '#aaffaa';
    ctx.font = 'bold 32px "Noto Serif TC",serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('算', 0, 2);
    ctx.shadowBlur = 0;
    // 底部慧眼
    ctx.fillStyle = '#00ff88';
    ctx.beginPath(); ctx.arc(0, 46, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, 46, 3, 0, Math.PI*2); ctx.fill();

  } else if (name === '曹操') {
    // ── 曹操：帝王冠冕 ──
    // 王冠底座
    ctx.fillStyle = '#660099';
    ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(-36, 8, 72, 26, 4); else ctx.rect(-36,8,72,26); ctx.fill();
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2.5; ctx.stroke();
    // 五枝冠尖
    const spX = [-28,-14,0,14,28];
    const spH = [32,40,50,40,32];
    spX.forEach((sx,si) => {
      ctx.fillStyle = si===2 ? '#7700bb' : '#5500aa';
      ctx.beginPath(); ctx.moveTo(sx-10,10); ctx.lineTo(sx, 10-spH[si]); ctx.lineTo(sx+10,10); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5; ctx.stroke();
      // 頂寶石
      const gemColors = ['#ff4488','#ff8844','#ff44ff','#88ff44','#4488ff'];
      ctx.fillStyle = gemColors[si];
      ctx.beginPath(); ctx.arc(sx, 10-spH[si], 5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
    });
    // 腰帶寶石排
    ['#ff4444','#ffd700','#ff66ff','#ffd700','#44ddff'].forEach((gc,gi) => {
      ctx.fillStyle = gc;
      ctx.beginPath(); ctx.arc(-16+gi*8, 18, 4, 0, Math.PI*2); ctx.fill();
    });
    // 龍珠（中心）
    ctx.fillStyle = '#ffddaa';
    ctx.beginPath(); ctx.arc(0, 28, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#550000'; ctx.font = 'bold 12px "Noto Serif TC",serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('魏', 0, 28);
    // 魏 大字
    ctx.shadowColor = '#cc00ff'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#ffe68a';
    ctx.font = 'bold 28px "Noto Serif TC",serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('操', 0, 52);
    ctx.shadowBlur = 0;

  } else {
    // 預設
    ctx.strokeStyle = 'rgba(255,215,0,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 34, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#ffe080'; ctx.font = 'bold 38px "Noto Serif TC",serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(name.charAt(0), 0, 2);
  }

  ctx.shadowBlur = 0;
  } // end canvas fallback
  ctx.restore(); // 移除 clip + translate

  // === 5. 亮面光澤 ===
  const shine = ctx.createLinearGradient(x-r, y-r, x+r*0.3, y+r*0.3);
  shine.addColorStop(0, 'rgba(255,255,255,0.20)');
  shine.addColorStop(0.45, 'rgba(255,255,255,0.06)');
  shine.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = shine;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();

  ctx.restore(); // 初始 save
}

// 卷軸風 HP 條
function drawScrollBar(x, y, w, h, hp, max, fillColor, deepColor) {
  const ratio = Math.max(0, hp / max);
  const t = Date.now() / 1000;
  const lowHp = ratio < 0.30;
  const critHp = ratio < 0.15;

  // ── 凹槽底色（含內嵌紋理感）— T5 vGrad
  ctx.fillStyle = vGrad(x, y, h, [[0,'#2a0c04'],[0.4,'#0e0402'],[1,'#1a0804']]);
  ctx.fillRect(x, y, w, h);

  // ── 凹陷陰影（頂部深、底部淡）— T5 vGrad
  ctx.fillStyle = vGrad(x, y, h, [[0,'rgba(0,0,0,0.65)'],[0.3,'rgba(0,0,0,0.10)'],[1,'rgba(0,0,0,0)']]);
  ctx.fillRect(x, y, w, h);

  // ── HP 填充
  if (ratio > 0) {
    const hpW = w * ratio;

    // 低血量：紅色脈衝光暈
    if (lowHp) {
      const pulse = 0.4 + 0.35 * Math.sin(t * (critHp ? 6 : 3.5));
      ctx.save();
      ctx.shadowColor = critHp ? `rgba(255,0,0,${pulse})` : `rgba(255,80,0,${pulse * 0.8})`;
      ctx.shadowBlur = critHp ? 22 : 14;
      ctx.fillStyle = 'transparent';
      ctx.fillRect(x, y, hpW, h);
      ctx.restore();
    }

    // 主漸層 — T5 vGrad
    let _fillStops;
    if (lowHp) {
      const pulse2 = 0.85 + 0.15 * Math.sin(t * (critHp ? 5 : 2.8));
      _fillStops = [
        [0, `rgba(255, ${Math.round(60 * pulse2)}, 0, 1)`],
        [0.45, critHp ? '#cc0000' : '#dd3300'],
        [1, '#550000']
      ];
    } else {
      _fillStops = [[0, lightenColor(fillColor, 28)], [0.45, fillColor], [1, deepColor]];
    }
    ctx.fillStyle = vGrad(x, y, h, _fillStops);
    ctx.fillRect(x, y, hpW, h);

    // 金屬光澤（頂部高光條）— T5 vGrad
    ctx.fillStyle = vGrad(x, y, h * 0.5, [[0,'rgba(255,255,255,0.30)'],[0.5,'rgba(255,255,255,0.08)'],[1,'rgba(255,255,255,0)']]);
    ctx.fillRect(x, y, hpW, h * 0.5);

    // 底部反光條
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(x, y + h - 3, hpW, 3);
  }

  // ── 刻度線（每 25% 一條）
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.lineWidth = 1;
  for (let tick = 1; tick < 4; tick++) {
    const tx = x + w * tick / 4;
    ctx.beginPath(); ctx.moveTo(tx, y + 1); ctx.lineTo(tx, y + h - 1); ctx.stroke();
  }

  // ── 外框（金邊）
  const borderCol = lowHp
    ? `rgba(255,${Math.round(100 + 80 * Math.sin(t * 3))},0,0.9)`
    : 'rgba(200,140,30,0.85)';
  ctx.strokeStyle = borderCol;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);
  // 內側細光邊
  ctx.strokeStyle = lowHp ? 'rgba(255,120,0,0.25)' : 'rgba(255,210,80,0.20)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
}

// 卷軸按鈕（青銅古典風）
function drawScrollButton(x, y, w, h, label, enabled, key) {
  const hovering = enabled && mousePos.x >= x && mousePos.x <= x + w &&
                   mousePos.y >= y && mousePos.y <= y + h;
  const t = Date.now() / 1000;

  ctx.save();

  // ── 外層陰影光暈
  if (enabled) {
    const glowAlpha = hovering ? 0.55 : 0.25 + 0.08 * Math.sin(t * 1.8);
    ctx.shadowColor = hovering ? 'rgba(255,180,0,0.7)' : `rgba(200,120,0,${glowAlpha})`;
    ctx.shadowBlur = hovering ? 18 : 10;
  }

  // ── 主體漸層（金屬感）— T5: 用 fillRoundRectVGrad
  let _bodyStops;
  if (!enabled) _bodyStops = [[0, '#261208'], [1, '#181008']];
  else if (hovering) _bodyStops = [[0, '#8a4a20'], [0.35, '#7a3c16'], [0.7, '#6a2e10'], [1, '#4a1c08']];
  else _bodyStops = [[0, '#6a3418'], [0.35, '#5a2a10'], [0.7, '#4a2008'], [1, '#341608']];
  fillRoundRectVGrad(x, y, w, h, 5, _bodyStops);
  ctx.shadowBlur = 0;

  // ── 外金框
  const borderGrad = ctx.createLinearGradient(x, y, x + w, y + h);
  borderGrad.addColorStop(0, enabled ? '#ffe066' : '#554433');
  borderGrad.addColorStop(0.5, enabled ? '#cc8800' : '#443322');
  borderGrad.addColorStop(1, enabled ? '#ffd700' : '#554433');
  ctx.strokeStyle = borderGrad;
  ctx.lineWidth = enabled ? 2 : 1;
  roundRect(x, y, w, h, 5, false, true);

  if (enabled) {
    // ── 內側細金邊
    ctx.strokeStyle = 'rgba(255,220,100,0.35)';
    ctx.lineWidth = 0.8;
    roundRect(x + 3, y + 3, w - 6, h - 6, 3, false, true);

    // ── 頂部光澤 — T5: 垂直 fade
    fillRoundRectVGrad(x + 1, y + 1, w - 2, h * 0.45, 4,
      [[0, 'rgba(255,200,120,0.22)'], [1, 'rgba(255,200,120,0)']]);

    // ── 四角裝飾菱形
    const corners = [[x+7, y+5], [x+w-7, y+5], [x+7, y+h-5], [x+w-7, y+h-5]];
    corners.forEach(([cx2, cy2]) => {
      ctx.fillStyle = hovering ? 'rgba(255,210,60,0.9)' : 'rgba(200,150,30,0.7)';
      ctx.beginPath();
      ctx.moveTo(cx2, cy2 - 3); ctx.lineTo(cx2 + 3, cy2);
      ctx.lineTo(cx2, cy2 + 3); ctx.lineTo(cx2 - 3, cy2);
      ctx.closePath(); ctx.fill();
    });

    // ── 頂部+底部橫線
    ctx.strokeStyle = hovering ? 'rgba(255,200,60,0.55)' : 'rgba(200,140,20,0.35)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(x + 14, y + 7); ctx.lineTo(x + w - 14, y + 7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 14, y + h - 7); ctx.lineTo(x + w - 14, y + h - 7); ctx.stroke();
  }

  // ── 文字
  ctx.shadowColor = enabled ? 'rgba(0,0,0,0.8)' : 'transparent';
  ctx.shadowBlur = 4;
  ctx.fillStyle = enabled ? (hovering ? '#fff8cc' : '#ffe680') : '#5a4a3a';
  ctx.font = `bold ${h < 36 ? 15 : 18}px "Noto Serif TC", serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2);
  ctx.textBaseline = 'alphabetic';
  ctx.shadowBlur = 0;

  ctx.restore();

  game._buttons = game._buttons || {};
  game._buttons[key] = { x, y, w, h };
}

// 關卡進度指示（頂端中央）
// drawStageIndicator() — 已移除（TODO-F：之前 disable 的 dead code，函數本體 200+ 行刪除）

function drawPlayerRowEval() {
  if (game.phase !== 'placing') return;
  const L = CONFIG.LAYOUT;
  const rowNames = ['front', 'middle', 'back'];
  const rowLabels = { front: '前鋒', middle: '中軍', back: '後陣' };

  // 犯規判斷（只有三排都有牌時才判斷）
  const hasFront = game.rows.front.length > 0;
  const hasMid   = game.rows.middle.length > 0;
  const hasBack  = game.rows.back.length > 0;
  let isFoul = false;
  if (hasFront && hasMid && hasBack) {
    const arr = getBestArrangement(game.rows);
    isFoul = arr.foul;
  }

  rowNames.forEach(rn => {
    const cards = game.rows[rn];
    if (cards.length === 0) return;

    const y = getRowY(rn, false);
    const cap = game.cardCaps[rn] || CONFIG.ROW_CAPS[rn];
    const totalW = cap * CONFIG.CARD_W + (cap - 1) * 6;
    const maxW = 5 * CONFIG.CARD_W + 4 * 6;
    const startX = CONFIG.W - 16 - maxW;

    // 評估當前牌型
    const ev = evaluateHand(cards);
    const typeName = handTypeName(ev.type);
    const full = cards.length >= (CONFIG.ROW_CAPS[rn]);

    // 牌型標籤：浮動顯示在牌堆上方
    {
      const _cardStartX = CONFIG.LAYOUT.PORTRAIT_W + CONFIG.LAYOUT.ROW_LABEL_W;
      const _cardW = cards.length * CONFIG.CARD_W + Math.max(0, cards.length - 1) * 6;
      const _labelCX = _cardStartX + _cardW / 2;
      const _floatOff = Math.sin(Date.now() / 620 + (rn === 'front' ? 0 : rn === 'middle' ? 1.2 : 2.4)) * 2.5;
      const _labelY = y - 13 + _floatOff;
      const rank = CONFIG.HAND_RANK[ev.type] || 1;
      const _lColor = rank >= 8 ? '#ffd700' : rank >= 6 ? '#88eeff' : rank >= 4 ? '#88ff88' : rank >= 2 ? '#ffe680' : '#aaaaaa';

      ctx.save();
      ctx.font = 'bold 13px "Noto Serif TC", serif';
      ctx.textAlign = 'center';

      // 背景藥丸
      const _labelText = (isFoul && full) ? ('⚠ ' + typeName) : (full ? ('✦ ' + typeName) : typeName);
      const _lW = ctx.measureText(_labelText).width + 16;
      const _lBgColor = (isFoul && full) ? 'rgba(120,10,0,0.82)' : 'rgba(8,18,45,0.80)';
      const _lBorderColor = (isFoul && full) ? '#ff3300' : _lColor + 'cc';
      ctx.fillStyle = _lBgColor;
      roundRect(_labelCX - _lW/2, _labelY - 15, _lW, 18, 5, true, false);
      ctx.strokeStyle = _lBorderColor; ctx.lineWidth = 1;
      roundRect(_labelCX - _lW/2, _labelY - 15, _lW, 18, 5, false, true);

      if (isFoul && full) {
        // 犯規：閃爍紅框
        const flash = Math.sin(Date.now() / 140) > 0;
        if (flash) {
          ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 18;
          ctx.strokeStyle = '#ff2200'; ctx.lineWidth = 3;
          roundRect(startX - 4, y - 4, totalW + 8, CONFIG.CARD_H + 8, 6, false, true);
          ctx.shadowBlur = 0;
        }
        ctx.fillStyle = '#ff5533';
        ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 8;
        ctx.fillText(_labelText, _labelCX, _labelY);
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = _lColor;
        if (full) { ctx.shadowColor = _lColor; ctx.shadowBlur = 6; }
        ctx.fillText(_labelText, _labelCX, _labelY);
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }
  });

  // 龍膽換位模式：高亮每張已放牌（正確座標）
  if (game._skillMode) {
    rowNames.forEach(rn => {
      const cards = game.rows[rn];
      if (cards.length === 0) return;
      const rowY = getRowY(rn, false);
      // 牌的實際起始 X（立繪欄 + 標籤欄之後）
      const cardStartX = CONFIG.LAYOUT.PORTRAIT_W + CONFIG.LAYOUT.ROW_LABEL_W;
      const pulse = 0.5 + Math.sin(Date.now() / 180) * 0.5;
      // 整道選取框
      const rowTotalW = cards.length * CONFIG.CARD_W + Math.max(0, cards.length - 1) * 6;
      ctx.save();
      ctx.strokeStyle = `rgba(100, 200, 255, ${0.35 + pulse * 0.25})`;
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 4]);
      roundRect(cardStartX - 6, rowY - 6, rowTotalW + 12, CONFIG.CARD_H + 12, 6, false, true);
      ctx.setLineDash([]);
      ctx.restore();
    });
  }
}

const RARITY_COLORS = {
  red:    { bg0: '#6a0808', bg1: '#3a0404', border: '#ff4444', text: '#ffaaaa' },
  yellow: { bg0: '#7a5a00', bg1: '#3a2a00', border: '#ffd700', text: '#ffe680' },
  green:  { bg0: '#0a5a18', bg1: '#042a08', border: '#44cc66', text: '#aaffcc' },
  blue:   { bg0: '#082060', bg1: '#040f30', border: '#4488ff', text: '#aaccff' },
};
// 遺物代表符號（依 ID 對應）
const RELIC_SYMBOLS = {
  changban: '魂', ahdou: '符', yiqiankudun: '軍', iron_wall: '甲', double_down: '賭', queen_grace: '鳳',
  qingang_ying: '銀', douxin: '心', qinggang: '劍', tongque: '台', discard_dmg: '棄', baima: '馬', longdan: '弩',
  qiyou: '七', low_card: '草', imperial_seal: '璽', wuhu: '虎',
  zhuge: '連', jiading: '乾', lubu: '呂',
  // v0.6 新增
  changban_charge: '衝', zilong_shield: '護', chain_slash: '連', boiling_blood: '血', war_trophy: '勳',
  qixing_lamp: '燈', kongming_fan: '扇', silver_armor: '袍', red_hare: '蹄', dragon_spear: '破',
};

function drawRelicsBar(startX, y) {
  ctx.fillStyle = '#aa7700';
  ctx.font = 'bold 18px "Noto Serif TC", serif';
  ctx.textAlign = 'left';
  ctx.fillText('神兵 ▸', startX, y + 22);

  const slotW = 40, slotH = 38, gap = 5;
  const startCol = startX + 56;
  const maxCols = Math.max(4, Math.floor((CONFIG.W - startCol - 12) / (slotW + gap)));

  game.relics.forEach((r, i) => {
    const col = i % maxCols;
    const row = Math.floor(i / maxCols);
    const x = startCol + col * (slotW + gap);
    const ry = y + row * (slotH + gap);
    const rc = RARITY_COLORS[r.rarity] || RARITY_COLORS.blue;

    // 稀有度背景
    const grad = ctx.createLinearGradient(x, ry, x, ry + slotH);
    grad.addColorStop(0, rc.bg0);
    grad.addColorStop(1, rc.bg1);
    ctx.fillStyle = grad;
    roundRect(x, ry, slotW, slotH, 4, true, false);

    // 稀有度邊框（發光）
    ctx.strokeStyle = rc.border;
    ctx.lineWidth = 1.8;
    roundRect(x, ry, slotW, slotH, 4, false, true);
    // 內細邊
    ctx.strokeStyle = rc.border.replace(')', ', 0.3)').replace('rgb', 'rgba') || 'rgba(255,215,0,0.3)';
    ctx.lineWidth = 0.5;
    roundRect(x + 3, ry + 3, slotW - 6, slotH - 6, 3, false, true);

    // 圖示：優先用 sprite sheet，失敗再用文字
    const _slotCX = x + slotW / 2;
    const _slotCY = ry + slotH / 2;
    const _slotR  = Math.min(slotW, slotH) * 0.50 - 2;  // 填滿格子
    if (!_drawRelicSprite(r.id, _slotCX, _slotCY, _slotR)) {
      // Fallback 文字圖示
      const sym = RELIC_SYMBOLS[r.id] || r.name.charAt(0);
      ctx.fillStyle = rc.text;
      ctx.font = 'bold 18px "Noto Serif TC", serif';
      ctx.textAlign = 'center';
      ctx.shadowColor = rc.border;
      ctx.shadowBlur = 4;
      ctx.fillText(sym, _slotCX, ry + 17);
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.font = '13px "Noto Serif TC", serif';
      ctx.fillText(r.name.slice(-1), _slotCX, ry + 31);
    }

    r._iconBox = { x, y: ry, w: slotW, h: slotH };
  });
}

function hexToRgba(hex, alpha) {
  const c = hex.replace('#','');
  const r = parseInt(c.substr(0,2),16);
  const g = parseInt(c.substr(2,2),16);
  const b = parseInt(c.substr(4,2),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function lightenColor(hex, amt) {
  const c = hex.replace('#','');
  const r = Math.max(0, Math.min(255, parseInt(c.substr(0,2),16) + amt));
  const g = Math.max(0, Math.min(255, parseInt(c.substr(2,2),16) + amt));
  const b = Math.max(0, Math.min(255, parseInt(c.substr(4,2),16) + amt));
  return `rgb(${r},${g},${b})`;
}
